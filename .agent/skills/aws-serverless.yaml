  \ (Apache 2.0)\ndate_added: 2026-02-27\n---\n\n# AWS Serverless\n\nSpecialized skill\
  \ for building production-ready serverless applications on AWS.\nCovers Lambda functions,\
  \ API Gateway, DynamoDB, SQS/SNS event-driven patterns,\nSAM/CDK deployment, and\
  \ cold start optimization.\n\n## Principles\n\n- Right-size memory and timeout (measure\
  \ before optimizing)\n- Minimize cold starts for latency-sensitive workloads\n-\
  \ Use SnapStart for Java/.NET functions\n- Prefer HTTP API over REST API for simple\
  \ use cases\n- Design for failure with DLQs and retries\n- Keep deployment packages\
  \ small\n- Use environment variables for configuration\n- Implement structured logging\
  \ with correlation IDs\n\n## Patterns\n\n### Lambda Handler Pattern\n\nProper Lambda\
  \ function structure with error handling\n\n**When to use**: Any Lambda function\
  \ implementation,API handlers, event processors, scheduled tasks\n\n```javascript\n\
  // Node.js Lambda Handler\n// handler.js\n\n// Initialize outside handler (reused\
  \ across invocations)\nconst { DynamoDBClient } = require('@aws-sdk/client-dynamodb');\n\
  const { DynamoDBDocumentClient, GetCommand } = require('@aws-sdk/lib-dynamodb');\n\
  \nconst client = new DynamoDBClient({});\nconst docClient = DynamoDBDocumentClient.from(client);\n\
  \n// Handler function\nexports.handler = async (event, context) => {\n  // Optional:\
  \ Don't wait for event loop to clear (Node.js)\n  context.callbackWaitsForEmptyEventLoop\
  \ = false;\n\n  try {\n    // Parse input based on event source\n    const body\
  \ = typeof event.body === 'string'\n      ? JSON.parse(event.body)\n      : event.body;\n\
  \n    // Business logic\n    const result = await processRequest(body);\n\n    //\
  \ Return API Gateway compatible response\n    return {\n      statusCode: 200,\n\
  \      headers: {\n        'Content-Type': 'application/json',\n        'Access-Control-Allow-Origin':\
  \ '*'\n      },\n      body: JSON.stringify(result)\n    };\n  } catch (error) {\n\
  \    console.error('Error:', JSON.stringify({\n      error: error.message,\n   \
  \   stack: error.stack,\n      requestId: context.awsRequestId\n    }));\n\n   \
  \ return {\n      statusCode: error.statusCode || 500,\n      headers: { 'Content-Type':\
  \ 'application/json' },\n      body: JSON.stringify({\n        error: error.message\
  \ || 'Internal server error'\n      })\n    };\n  }\n};\n\nasync function processRequest(data)\
  \ {\n  // Your business logic here\n  const result = await docClient.send(new GetCommand({\n\
  \    TableName: process.env.TABLE_NAME,\n    Key: { id: data.id }\n  }));\n  return\
  \ result.Item;\n}\n```\n\n```python\n# Python Lambda Handler\n# handler.py\n\nimport\
