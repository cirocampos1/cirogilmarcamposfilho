  ```\n\n## Implementation Guide\n\n### Step 1: Data Models\n\nCreate two tables:\
  \ `support_chats` and `support_messages`.\n\n**support_chats**\n```\nid        \
  \      - primary key (UUID recommended)\nuser_id         - foreign key to users\
  \ (UNIQUE - one chat per user)\nlast_message_at - timestamp (for sorting chats by\
  \ recency)\nadmin_viewed_at - timestamp (tracks when admin last viewed)\narchived_at\
  \     - timestamp (null = active, set = archived)\ncreated_at\nupdated_at\n```\n\
  \n**support_messages**\n```\nid              - primary key (UUID recommended)\n\
  chat_id         - foreign key to support_chats\ncontent         - text (required)\n\
  sender_type     - enum: 'user' | 'admin'\nread_at         - timestamp (null = unread)\n\
  created_at\nupdated_at\n```\n\n**Key indexes:**\n- `support_chats.user_id` (unique)\n\
