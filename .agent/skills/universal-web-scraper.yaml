  # Universal Web Scraper


  AI-driven data extraction from 55+ Actors across all major platforms. This skill
  automatically selects the best Actor for your task.


  ## When to Use


  - The user needs web data extraction but has not yet chosen a specific Apify Actor.

  - You need a general-purpose Apify entry point that maps a broad scraping goal to
  the most suitable Actor.

  - The task spans multiple platforms and benefits from one unified workflow for actor
  selection, execution, and summarization.


  ## Prerequisites

  (No need to check it upfront)


  - `.env` file with `APIFY_TOKEN`

  - Node.js 20.6+ (for native `--env-file` support)

  - `mcpc` CLI tool: `npm install -g @apify/mcpc`


  ## Workflow


  Copy this checklist and track progress:


  ```

  Task Progress:

  - [ ] Step 1: Understand user goal and select Actor

  - [ ] Step 2: Fetch Actor schema via mcpc

  - [ ] Step 3: Ask user preferences (format, filename)

  - [ ] Step 4: Run the scraper script

  - [ ] Step 5: Summarize results and offer follow-ups

  ```


