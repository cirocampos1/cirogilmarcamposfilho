  \n---\n\n# SymPy - Symbolic Mathematics in Python\n\n## Overview\n\nSymPy is a Python\
  \ library for symbolic mathematics that enables exact computation using mathematical\
  \ symbols rather than numerical approximations. This skill provides comprehensive\
  \ guidance for performing symbolic algebra, calculus, linear algebra, equation solving,\
  \ physics calculations, and code generation using SymPy.\n\n## When to Use This\
  \ Skill\n\nUse this skill when:\n- Solving equations symbolically (algebraic, differential,\
  \ systems of equations)\n- Performing calculus operations (derivatives, integrals,\
  \ limits, series)\n- Manipulating and simplifying algebraic expressions\n- Working\
  \ with matrices and linear algebra symbolically\n- Doing physics calculations (mechanics,\
  \ quantum mechanics, vector analysis)\n- Number theory computations (primes, factorization,\
  \ modular arithmetic)\n- Geometric calculations (2D/3D geometry, analytic geometry)\n\
  - Converting mathematical expressions to executable code (Python, C, Fortran)\n\
  - Generating LaTeX or other formatted mathematical output\n- Needing exact mathematical\
  \ results (e.g., `sqrt(2)` not `1.414...`)\n\n## Core Capabilities\n\n### 1. Symbolic\
  \ Computation Basics\n\n**Creating symbols and expressions:**\n```python\nfrom sympy\
  \ import symbols, Symbol\nx, y, z = symbols('x y z')\nexpr = x**2 + 2*x + 1\n\n\
  # With assumptions\nx = symbols('x', real=True, positive=True)\nn = symbols('n',\
  \ integer=True)\n```\n\n**Simplification and manipulation:**\n```python\nfrom sympy\
  \ import simplify, expand, factor, cancel\nsimplify(sin(x)**2 + cos(x)**2)  # Returns\
  \ 1\nexpand((x + 1)**3)  # x**3 + 3*x**2 + 3*x + 1\nfactor(x**2 - 1)    # (x - 1)*(x\
  \ + 1)\n```\n\n**For detailed basics:** See `references/core-capabilities.md`\n\n\
  ### 2. Calculus\n\n**Derivatives:**\n```python\nfrom sympy import diff\ndiff(x**2,\
  \ x)        # 2*x\ndiff(x**4, x, 3)     # 24*x (third derivative)\ndiff(x**2*y**3,\
  \ x, y)  # 6*x*y**2 (partial derivatives)\n```\n\n**Integrals:**\n```python\nfrom\
  \ sympy import integrate, oo\nintegrate(x**2, x)              # x**3/3 (indefinite)\n\
  integrate(x**2, (x, 0, 1))      # 1/3 (definite)\nintegrate(exp(-x), (x, 0, oo))\
  \  # 1 (improper)\n```\n\n**Limits and Series:**\n```python\nfrom sympy import limit,\
  \ series\nlimit(sin(x)/x, x, 0)  # 1\nseries(exp(x), x, 0, 6)  # 1 + x + x**2/2\
  \ + x**3/6 + x**4/24 + x**5/120 + O(x**6)\n```\n\n**For detailed calculus operations:**\
  \ See `references/core-capabilities.md`\n\n### 3. Equation Solving\n\n**Algebraic\
  \ equations:**\n```python\nfrom sympy import solveset, solve, Eq\nsolveset(x**2\
  \ - 4, x)  # {-2, 2}\nsolve(Eq(x**2, 4), x)  # [-2, 2]\n```\n\n**Systems of equations:**\n\
  ```python\nfrom sympy import linsolve, nonlinsolve\nlinsolve([x + y - 2, x - y],\
  \ x, y)  # {(1, 1)} (linear\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ\
