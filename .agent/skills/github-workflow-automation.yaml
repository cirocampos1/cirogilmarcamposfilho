  \ \"2026-02-27\"\n---\n\n# \U0001F527 GitHub Workflow Automation\n\n> Patterns for\
  \ automating GitHub workflows with AI assistance, inspired by [Gemini CLI](https://github.com/google-gemini/gemini-cli)\
  \ and modern DevOps practices.\n\n## When to Use This Skill\n\nUse this skill when:\n\
  \n- Automating PR reviews with AI\n- Setting up issue triage automation\n- Creating\
  \ GitHub Actions workflows\n- Integrating AI into CI/CD pipelines\n- Automating\
  \ Git operations (rebases, cherry-picks)\n\n---\n\n## 1. Automated PR Review\n\n\
  ### 1.1 PR Review Action\n\n```yaml\n# .github/workflows/ai-review.yml\nname: AI\
  \ Code Review\n\non:\n  pull_request:\n    types: [opened, synchronize]\n\njobs:\n\
  \  review:\n    runs-on: ubuntu-latest\n    permissions:\n      contents: read\n\
  \      pull-requests: write\n\n    steps:\n      - uses: actions/checkout@v4\n \
  \       with:\n          fetch-depth: 0\n\n      - name: Get changed files\n   \
  \     id: changed\n        run: |\n          files=$(git diff --name-only origin/${{\
  \ github.base_ref }}...HEAD)\n          echo \"files<<EOF\" >> $GITHUB_OUTPUT\n\
  \          echo \"$files\" >> $GITHUB_OUTPUT\n          echo \"EOF\" >> $GITHUB_OUTPUT\n\
  \n      - name: Get diff\n        id: diff\n        run: |\n          diff=$(git\
  \ diff origin/${{ github.base_ref }}...HEAD)\n          echo \"diff<<EOF\" >> $GITHUB_OUTPUT\n\
  \          echo \"$diff\" >> $GITHUB_OUTPUT\n          echo \"EOF\" >> $GITHUB_OUTPUT\n\
  \n      - name: AI Review\n        uses: actions/github-script@v7\n        with:\n\
  \          script: |\n            const { Anthropic } = require('@anthropic-ai/sdk');\n\
  \            const client = new Anthropic({ apiKey: process.env.ANTHROPIC_API_KEY\
  \ });\n\n            const response = await client.messages.create({\n         \
  \     model: \"claude-3-sonnet-20240229\",\n              max_tokens: 4096,\n  \
  \            messages: [{\n                role: \"user\",\n                content:\
  \ `Review this PR diff and provide feedback:\n                \n               \
  \ Changed files: ${{ steps.changed.outputs.files }}\n                \n        \
  \        Diff:\n                ${{ steps.diff.outputs.diff }}\n               \
  \ \n                Provide:\n                1. Summary of changes\n          \
  \      2. Potential issues or bugs\n                3. Suggestions for improvement\n\
  \                4. Security concerns if any\n                \n               \
  \ Format as GitHub markdown.`\n              }]\n            });\n\n           \
  \ await github.rest.pulls.createReview({\n              owner: context.repo.owner,\n\
  \              repo: context.repo.repo,\n              pull_number: context.issue.number,\n\
  \              body: response.content[0].text,\n              event: 'COMMENT'\n\
  \            });\n        env:\n          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY\
  \ }}\n```\n\n### 1.2 Review Comment Patterns\n\n````markdown\n# AI Re\n\n## Diretrizes\
  \ do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente o gerenciador\
  \ uv para dependências. Todo código deve ser lintado via ruff e tipado com mypy.\n"
