  \n---\n\n# Azure Identity (Java)\n\nAuthenticate Java applications with Azure services\
  \ using Microsoft Entra ID (Azure AD).\n\n## Installation\n\n```xml\n<dependency>\n\
  \    <groupId>com.azure</groupId>\n    <artifactId>azure-identity</artifactId>\n\
  \    <version>1.15.0</version>\n</dependency>\n```\n\n## Key Concepts\n\n| Credential\
  \ | Use Case |\n|------------|----------|\n| `DefaultAzureCredential` | **Recommended**\
  \ - Works in dev and production |\n| `ManagedIdentityCredential` | Azure-hosted\
  \ apps (App Service, Functions, VMs) |\n| `EnvironmentCredential` | CI/CD pipelines\
  \ with env vars |\n| `ClientSecretCredential` | Service principals with secret |\n\
  | `ClientCertificateCredential` | Service principals with certificate |\n| `AzureCliCredential`\
  \ | Local dev using `az login` |\n| `InteractiveBrowserCredential` | Interactive\
  \ login flow |\n| `DeviceCodeCredential` | Headless device authentication |\n\n\
  ## DefaultAzureCredential (Recommended)\n\nThe `DefaultAzureCredential` tries multiple\
  \ authentication methods in order:\n\n1. Environment variables\n2. Workload Identity\n\
  3. Managed Identity\n4. Azure CLI\n5. Azure PowerShell\n6. Azure Developer CLI\n\
  \n```java\nimport com.azure.identity.DefaultAzureCredential;\nimport com.azure.identity.DefaultAzureCredentialBuilder;\n\
  \n// Simple usage\nDefaultAzureCredential credential = new DefaultAzureCredentialBuilder().build();\n\
  \n// Use with any Azure client\nBlobServiceClient blobClient = new BlobServiceClientBuilder()\n\
  \    .endpoint(\"https://<storage-account>.blob.core.windows.net\")\n    .credential(credential)\n\
  \    .buildClient();\n\nKeyClient keyClient = new KeyClientBuilder()\n    .vaultUrl(\"\
  https://<vault-name>.vault.azure.net\")\n    .credential(credential)\n    .buildClient();\n\
  ```\n\n### Configure DefaultAzureCredential\n\n```java\nDefaultAzureCredential credential\
  \ = new DefaultAzureCredentialBuilder()\n    .managedIdentityClientId(\"<user-assigned-identity-client-id>\"\
  )  // For user-assigned MI\n    .tenantId(\"<tenant-id>\")                     \
  \                   // Limit to specific tenant\n    .excludeEnvironmentCredential()\
  \                                 // Skip env vars\n    .excludeAzureCliCredential()\
  \                                    // Skip Azure CLI\n    .build();\n```\n\n##\
  \ Managed Identity\n\nFor Azure-hosted applications (App Service, Functions, AKS,\
  \ VMs).\n\n```java\nimport com.azure.identity.ManagedIdentityCredential;\nimport\
  \ com.azure.identity.ManagedIdentityCredentialBuilder;\n\n// System-assigned managed\
  \ identity\nManagedIdentityCredential credential = new ManagedIdentityCredentialBuilder()\n\
  \    .build();\n\n// User-assigned managed identity (by client ID)\nManagedIdentityCredential\
  \ credential = new ManagedIdentityCredentialBuilder()\n    .clientId(\"<user-assigned-client-id>\"\
  )\n    .build();\n\n// User-assigned managed identity (by resource ID)\nManagedIdentityCredential\
