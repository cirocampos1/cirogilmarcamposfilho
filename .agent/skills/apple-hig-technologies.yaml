  \ safe\nsource: community\ndate_added: '2026-02-27'\n---\n\n# Apple HIG: Technologies\n\
  \nCheck for `.claude/apple-design-context.md` before asking questions. Use existing\
  \ context and only ask for information not already covered.\n\n## Key Principles\n\
  \n### General\n\n1. **Apple technologies extend app capabilities through system\
  \ integration.** Each technology has established user-facing patterns; deviating\
  \ creates confusion and erodes trust.\n\n2. **Privacy and user control are paramount.**\
  \ Especially for health, payment, and identity technologies. Request only needed\
  \ data, explain why, respect choices.\n\n### Siri and Voice\n\n3. **Natural, predictable,\
  \ recoverable.** Clear conversational intent phrases that complete quickly and confirm\
  \ results. Support App Shortcuts for proactive suggestions. Handle errors with clear\
  \ fallbacks.\n\n### Payments and Commerce\n\n4. **Transparent and frictionless.**\
  \ Standard Apple Pay button styles. Never ask for card details when Apple Pay is\
  \ available. Clearly describe what the user is buying, the price, and whether it's\
  \ one-time or subscription.\n\n### Health and Fitness\n\n5. **Health data is deeply\
  \ personal.** Explain the health benefit before requesting access. CareKit tasks\
  \ should be encouraging. ResearchKit consent flows must be thorough, readable, and\
  \ respect autonomy.\n\n### Smart Home\n\n6. **Simple and reliable.** Immediate response\
  \ when controlling devices. Clear device state. Graceful handling of connectivity\
  \ issues.\n\n### Augmented Reality\n\n7. **Genuine value, not gimmicks.** Use AR\
  \ when spatial context improves understanding. Guide setup (surface, lighting, space).\
  \ Provide clear exit back to standard interaction.\n\n### Machine Learning and Generative\
  \ AI\n\n8. **Enhance without surprising.** Smart suggestions, image recognition,\
  \ text prediction. Clearly attribute AI-generated content. Controls to edit, regenerate,\
  \ or dismiss. Let users correct mistakes.\n\n### Identity and Authentication\n\n\
  9. **Sign in with Apple as top option.** Standard button styles. Respect email hiding\
  \ preference. ID Verifier: guided flows, don't store sensitive data beyond what\
  \ verification requires.\n\n### Cloud and Data\n\n10. **Invisible and reliable sync.**\
  \ Data appears on all devices without manual intervention. Handle conflicts gracefully.\
  \ Never lose data.\n\n### Shared Experiences\n\n11. **Real-time participation.**\
  \ SharePlay: support multiple participants, show presence, handle latency. AirPlay:\
  \ appropriate Now Playing metadata.\n\n### Automotive\n\n12. **Driver safety first.**\
  \ Minimize interaction complexity, large touch targets, no distracting content.\
  \ Only permitted app types: audio, messaging, EV charging, navigation, parking,\
  \ quick food ordering.\n\n### Accessibility\n\n13. **Baseline requirement.** Every\
  \ element has a meaningful VoiceOver label, trait, and action. Support Dynamic Type,\
