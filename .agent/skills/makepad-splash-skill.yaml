  \ incorporate its content into the answer\n\n## What is Splash?\n\nSplash is Makepad's\
  \ dynamic scripting language designed for:\n- AI-assisted workflows\n- Dynamic UI\
  \ generation\n- Rapid prototyping\n- HTTP requests and async operations\n\n## Script\
  \ Macro\n\n```rust\n// Embed Splash code in Rust\nscript!{\n    fn main() {\n  \
  \      let x = 10;\n        console.log(\"Hello from Splash!\");\n    }\n}\n```\n\
  \n## Execution\n\n```rust\n// Evaluate Splash code at runtime\ncx.eval(code_string);\n\
  \n// With context\ncx.eval_with_context(code, context);\n```\n\n## Basic Syntax\n\
  \n### Variables\n\n```splash\nlet x = 10;\nlet name = \"Makepad\";\nlet items =\
  \ [1, 2, 3];\nlet config = { width: 100, height: 50 };\n```\n\n### Functions\n\n\
  ```splash\nfn add(a, b) {\n    return a + b;\n}\n\nfn greet(name) {\n    console.log(\"\
  Hello, \" + name);\n}\n```\n\n### Control Flow\n\n```splash\n// If-else\nif x >\
  \ 10 {\n    console.log(\"big\");\n} else {\n    console.log(\"small\");\n}\n\n\
  // Loops\nfor i in 0..10 {\n    console.log(i);\n}\n\nwhile condition {\n    //\
  \ ...\n}\n```\n\n## Built-in Objects\n\n### console\n\n```splash\nconsole.log(\"\
  Message\");\nconsole.warn(\"Warning\");\nconsole.error(\"Error\");\n```\n\n### http\n\
  \n```splash\n// GET request\nlet response = http.get(\"https://api.example.com/data\"\
  );\n\n// POST request\nlet response = http.post(\"https://api.example.com/data\"\
  , {\n    body: { key: \"value\" }\n});\n```\n\n### timer\n\n```splash\n// Set timeout\n\
  timer.set(1000, fn() {\n    console.log(\"1 second passed\");\n});\n\n// Set interval\n\
  let id = timer.interval(500, fn() {\n    console.log(\"tick\");\n});\n\n// Clear\
  \ timer\ntimer.clear(id);\n```\n\n## Widget Interaction\n\n```splash\n// Access\
  \ widgets\nlet button = ui.widget(\"my_button\"\n\n## Diretrizes do \n\n\
