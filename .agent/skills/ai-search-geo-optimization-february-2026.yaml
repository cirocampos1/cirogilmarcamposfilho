  \n---\n\n## GEO Analysis Criteria (Updated)\n\n### 1. Citability Score (25%)\n\n\
  **Optimal passage length: 134-167 words** for AI citation.\n\n**Strong signals:**\n\
  - Clear, quotable sentences with specific facts/statistics\n- Self-contained answer\
  \ blocks (can be extracted without context)\n- Direct answer in first 40-60 words\
  \ of section\n- Claims attributed with specific sources\n- Definitions following\
  \ \"X is...\" or \"X refers to...\" patterns\n- Unique data points not found elsewhere\n\
  \n**Weak signals:**\n- Vague, general statements\n- Opinion without evidence\n-\
  \ Buried conclusions\n- No specific data points\n\n### 2. Structural Readability\
  \ (20%)\n\n**92% of AI Overview citations come from top-10 ranking pages**, but\
  \ 47% come from pages ranking below position 5, demonstrating different selection\
  \ logic.\n\n**Strong signals:**\n- Clean H1->H2->H3 heading hierarchy\n- Question-based\
  \ headings (matches query patterns)\n- Short paragraphs (2-4 sentences)\n- Tables\
  \ for comparative data\n- Ordered/unordered lists for step-by-step or multi-item\
  \ content\n- FAQ sections with clear Q&A format\n\n**Weak signals:**\n- Wall of\
  \ text with no structure\n- Inconsistent heading hierarchy\n- No lists or tables\n\
