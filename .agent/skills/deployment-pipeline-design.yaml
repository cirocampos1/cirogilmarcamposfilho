  \ \"2026-02-27\"\n---\n\n# Deployment Pipeline Design\n\nArchitecture patterns for\
  \ multi-stage CI/CD pipelines with approval gates and deployment strategies.\n\n\
  ## Do not use this skill when\n\n- The task is unrelated to deployment pipeline\
  \ design\n- You need a different domain or tool outside this scope\n\n## Instructions\n\
  \n- Clarify goals, constraints, and required inputs.\n- Apply relevant best practices\
  \ and validate outcomes.\n- Provide actionable steps and verification.\n- If detailed\
  \ examples are required, open `resources/implementation-playbook.md`.\n\n## Purpose\n\
  \nDesign robust, secure deployment pipelines that balance speed with safety through\
  \ proper stage organization and approval workflows.\n\n## Use this skill when\n\n\
  - Design CI/CD architecture\n- Implement deployment gates\n- Configure multi-environment\
  \ pipelines\n- Establish deployment best practices\n- Implement progressive delivery\n\
  \n## Pipeline Stages\n\n### Standard Pipeline Flow\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”җ\
  \   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  Build  в”Ӯ вҶ’ в”Ӯ Test в”Ӯ вҶ’ в”Ӯ Staging\
  \ в”Ӯ вҶ’ в”Ӯ Approveв”Ӯ вҶ’ в”ӮProductionв”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ   в””в”Җв”Җв”Җв”Җв”Җв”Җв”ҳ   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\
  \   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n### Detailed Stage Breakdown\n\n1. **Source** - Code checkout\n\
  2. **Build** - Compile, package, containerize\n3. **Test** - Unit, integration,\
  \ security scans\n4. **Staging Deploy** - Deploy to staging environment\n5. **Integration\
  \ Tests** - E2E, smoke tests\n6. **Approval Gate** - Manual approval required\n\
  7. **Production Deploy** - Canary, blue-green, rolling\n8. **Verification** - Health\
  \ checks, monitoring\n9. **Rollback** - Automated rollback on failure\n\n## Approval\
  \ Gate Patterns\n\n### Pattern 1: Manual Approval\n\n```yaml\n# GitHub Actions\n\
  production-deploy:\n  needs: staging-deploy\n  environment:\n    name: production\n\
  \    url: https://app.example.com\n  runs-on: ubuntu-latest\n  steps:\n    - name:\
  \ Deploy to production\n      run: |\n        # Deployment commands\n```\n\n###\
  \ Pattern 2: Time-Based Approval\n\n```yaml\n# GitLab CI\ndeploy:production:\n \
  \ stage: deploy\n  script:\n    - deploy.sh production\n  environment:\n    name:\
  \ production\n  when: delayed\n  start_in: 30 minutes\n  only:\n    - main\n```\n\
  \n### Pattern 3: Multi-Approver\n\n```yaml\n# Azure Pipelines\nstages:\n- stage:\
  \ Production\n  dependsOn: Staging\n  jobs:\n  - deployment: Deploy\n    environment:\n\
  \      name: production\n      resourceType: Kubernetes\n    strategy:\n      runOnce:\n\
  \        preDeploy:\n          steps:\n          - task: ManualValidation@0\n  \
  \          inputs:\n              notifyUsers: 'team-leads@example.com'\n      \
  \        instructions: 'Review staging metrics before approving'\n```\n\n**Reference:**\
  \ See `assets/approval-gate-template.yml`\n\n## Deployment Strategies\n\n### 1.\
