  # Metasploit Framework


  > **⚠️ AUTHORIZED USE ONLY**

  > This skill is for educational purposes or authorized security assessments only.

  > You must have explicit, written permission from the system owner before using
  this tool.

  > Misuse of this tool is illegal and strictly prohibited.


  ## Purpose


  Leverage the Metasploit Framework for comprehensive penetration testing, from initial
  exploitation through post-exploitation activities. Metasploit provides a unified
  platform for vulnerability exploitation, payload generation, auxiliary scanning,
  and maintaining access to compromised systems during authorized security assessments.


  ## Prerequisites


  ### Required Tools

  ```bash

  # Metasploit must already be installed before using this skill.

  # Kali Linux usually ships with it preinstalled.

  msfconsole --version

  ```


  Installation varies by operating system and package source. Follow your platform''s
  documented package-manager or vendor installation process before using this skill.
  Do not rely on an unpinned remote installer script from inside this skill.


  If you want database-backed features such as workspace tracking, initialize `msfdb`
  using the instructions for your local installation. This skill assumes Metasploit
  is already available and does not require `sudo`, `systemctl`, or other privileged
  host-level setup steps.


  ### Required Knowledge

  - Network and system fundamentals

  - Understanding of vulnerabilities and exploits

  - Basic programming concepts

  - Target enumeration techniques


  ### Required Access

  - Written authorization for testing

  - Network access to target systems

  - Understanding of scope and rules of engagement


  Before running exploit modules, ask the user to confirm the exact target host, scope,
  and authorization state.


  ## Outputs and Deliverables


  1. **Exploitation Evidence** - Screenshots and logs of successful compromises

  2. **Session Logs** - Command history and extracted data

  3. **Vulnerability Mapping** - Exploited vulnerabilities with CVE references

  4. **Post-Exploitation Artifacts** - Credentials, files, and system information


  ## Core Workflow


  ### Phase 1: MSFConsole Basics


  Launch and navigate the Metasploit console:


  ```bash

  # Start msfconsole

  msfconsole


  # Quiet mode (skip banner)

  msfconsole -q


  # Basic navigation commands

  msf6 > help                    # Show all commands

  msf6 > search [term]           # Search modules

  msf6 > use [module]            # Select module

  msf6 > info                    # Show module details

  msf6 > show options            # Display required options

  msf6 > set [OPTION] [value]    # Configure option

  msf6 > run / exploit           # Ex


