  \             в”Ӯ\nв”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”ҳ    в””в”Җв”Җв”Җв”Җв”Җв”ҳ    в””в”Җв”Җв”Җв”Җв”Җв”ҳ             в”Ӯ\nв”Ӯ     в”Ӯ       \
  \    в”Ӯ           в”Ӯ               в”Ӯ\nв”Ӯ  в”Ңв”Җв”Җв”ҙв”Җв”Җв”җ    в”Ңв”Җв”Җв”ҙв”Җв”Җв”җ    в”Ңв”Җв”Җв”ҙв”Җв”Җв”җ           \
  \ в”Ӯ\nв”Ӯ  в”Ӯ app в”Ӯ    в”Ӯ app в”Ӯ    в”Ӯ app в”Ӯ            в”Ӯ\nв”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”ҳ    в””в”Җв”Җв”Җв”Җв”Җв”ҳ    в””в”Җв”Җв”Җв”Җв”Җв”ҳ\
  \            в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n### 2. Key\
  \ Resources\n\n| Resource | Purpose |\n|----------|---------|\n| **ServiceProfile**\
  \ | Per-route metrics, retries, timeouts |\n| **TrafficSplit** | Canary deployments,\
  \ A/B testing |\n| **Server** | Define server-side policies |\n| **ServerAuthorization**\
  \ | Access control policies |\n\n## Templates\n\n### Template 1: Mesh Installation\n\
  \n```bash\n# Install CLI\ncurl --proto '=https' --tlsv1.2 -sSfL https://run.linkerd.io/install\
  \ | sh\n\n# Validate cluster\nlinkerd check --pre\n\n# Install CRDs\nlinkerd install\
  \ --crds | kubectl apply -f -\n\n# Install control plane\nlinkerd install | kubectl\
  \ apply -f -\n\n# Verify installation\nlinkerd check\n\n# Install viz extension\
  \ (optional)\nlinkerd viz install | kubectl apply -f -\n```\n\n### Template 2: Inject\
  \ Namespace\n\n```yaml\n# Automatic injection for namespace\napiVersion: v1\nkind:\
  \ Namespace\nmetadata:\n  name: my-app\n  annotations:\n    linkerd.io/inject: enabled\n\
  ---\n# Or inject specific deployment\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n\
  \  name: my-app\n  annotations:\n    linkerd.io/inject: enabled\nspec:\n  template:\n\
  \    metadata:\n      annotations:\n        linkerd.io/inject: enabled\n```\n\n\
