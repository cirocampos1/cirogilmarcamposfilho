  \ \"2026-02-27\"\n---\n\n<!-- security-allowlist: curl-pipe-bash -->\n\n# Linkerd\
  \ Patterns\n\nProduction patterns for Linkerd service mesh - the lightweight, security-first\
  \ service mesh for Kubernetes.\n\n## Do not use this skill when\n\n- The task is\
  \ unrelated to linkerd patterns\n- You need a different domain or tool outside this\
  \ scope\n\n## Instructions\n\n- Clarify goals, constraints, and required inputs.\n\
  - Apply relevant best practices and validate outcomes.\n- Provide actionable steps\
  \ and verification.\n- If detailed examples are required, open `resources/implementation-playbook.md`.\n\
  \n## Use this skill when\n\n- Setting up a lightweight service mesh\n- Implementing\
  \ automatic mTLS\n- Configuring traffic splits for canary deployments\n- Setting\
  \ up service profiles for per-route metrics\n- Implementing retries and timeouts\n\
  - Multi-cluster service mesh\n\n## Core Concepts\n\n### 1. Linkerd Architecture\n\
  \n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ                Control\
  \ Plane                 в”Ӯ\nв”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ в”Ӯ\nв”Ӯ  в”Ӯ\
  \ destiny в”Ӯ в”Ӯ identity в”Ӯ в”Ӯ proxy-inject в”Ӯ в”Ӯ\nв”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\
  \ в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n                      в”Ӯ\n\
  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ                 Data Plane  \
