  - Personal branding for devs/designers\n- Contact conversion\n- Portfolio performance\n\
  - Work presentation\n- Testimonial integration\n\n## Patterns\n\n### Portfolio Architecture\n\
  \nStructure that works for portfolios\n\n**When to use**: When planning portfolio\
  \ structure\n\n## Portfolio Architecture\n\n### The 30-Second Test\nIn 30 seconds,\
  \ visitors should know:\n1. Who you are\n2. What you do\n3. Your best work\n4. How\
  \ to contact you\n\n### Essential Sections\n| Section | Purpose | Priority |\n|---------|---------|----------|\n\
  | Hero | Hook + identity | Critical |\n| Work/Projects | Prove skills | Critical\
  \ |\n| About | Personality + story | Important |\n| Contact | Convert interest |\
  \ Critical |\n| Testimonials | Social proof | Nice to have |\n| Blog/Writing | Thought\
  \ leadership | Optional |\n\n### Navigation Patterns\n```\nOption 1: Single page\
  \ scroll\n- Best for: Designers, creatives\n- Works well with animations\n- Mobile\
  \ friendly\n\nOption 2: Multi-page\n- Best for: Lots of projects\n- Individual case\
  \ study pages\n- Better for SEO\n\nOption 3: Hybrid\n- Main sections on one page\n\
  - Detailed case studies separate\n- Best of both worlds\n```\n\n### Hero Section\
  \ Formula\n```\n[Your name]\n[What you do in one line]\n[One line that differentiates\
