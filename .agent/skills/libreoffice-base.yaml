  \n---\n\n# LibreOffice Base\n\n## Overview\n\nLibreOffice Base skill for creating,\
  \ managing, and automating database workflows using the native ODB (OpenDocument\
  \ Database) format.\n\n## When to Use This Skill\n\nUse this skill when:\n- Creating\
  \ new databases in ODB format\n- Connecting to external databases (MySQL, PostgreSQL,\
  \ etc.)\n- Automating database operations and reports\n- Creating forms and reports\n\
  - Building database applications\n\n## Core Capabilities\n\n### 1. Database Creation\n\
  - Create new ODB databases from scratch\n- Design tables, views, and relationships\n\
  - Create embedded HSQLDB/Firebird databases\n- Connect to external databases\n\n\
  ### 2. Data Operations\n- Import data from CSV, spreadsheets\n- Export data to various\
  \ formats\n- Query execution and management\n- Batch data processing\n\n### 3. Form\
  \ and Report Automation\n- Create data entry forms\n- Design custom reports\n- Automate\
  \ report generation\n- Build form templates\n\n### 4. Query and SQL\n- Visual query\
  \ design\n- SQL query execution\n- Query optimization\n- Result set manipulation\n\
  \n### 5. Integration\n- Command-line automation\n- Python scripting with UNO\n-\
  \ JDBC/ODBC connectivity\n\n## Workflows\n\n### Creating a New Database\n\n####\
  \ Method 1: Command-Line\n```bash\nsoffice --base\n```\n\n#### Method 2: Python\
  \ with UNO\n```python\nimport uno\n\ndef create_database():\n    local_ctx = uno.getComponentContext()\n\
  \    resolver = local_ctx.ServiceManager.createInstanceWithContext(\n        \"\
  com.sun.star.bridge.UnoUrlResolver\", local_ctx\n    )\n    ctx = resolver.resolve(\n\
  \        \"uno:socket,host=localhost,port=8100;urp;StarOffice.ComponentContext\"\
  \n    )\n    smgr = ctx.ServiceManager\n    doc = smgr.createInstanceWithContext(\"\
  com.sun.star.sdb.DatabaseDocument\", ctx)\n    doc.storeToURL(\"file:///path/to/database.odb\"\
  , ())\n    doc.close(True)\n```\n\n### Connecting to External Database\n\n```python\n\
  import uno\n\ndef connect_to_mysql(host, port, database, user, password):\n    local_ctx\
  \ = uno.getComponentContext()\n    resolver = local_ctx.ServiceManager.createInstanceWithContext(\n\
  \        \"com.sun.star.bridge.UnoUrlResolver\", local_ctx\n    )\n    ctx = resolver.resolve(\n\
  \        \"uno:socket,host=localhost,port=8100;urp;StarOffice.ComponentContext\"\
  \n    )\n    smgr = ctx.ServiceManager\n    \n    doc = smgr.createInstanceWithContext(\"\
  com.sun.star.sdb.DatabaseDocument\", ctx)\n    datasource = doc.getDataSource()\n\
  \    datasource.URL = f\"sdbc:mysql:jdbc:mysql://{host}:{port}/{database}\"\n  \
  \  datasource.Properties[\"UserName\"] = user\n    datasource.Properties[\"Password\"\
  ] = password\n    \n    doc.storeToURL(\"file:///path/to/connected.odb\", ())\n\
  \    return doc\n```\n\n## Database Connection Reference\n\n### Supported Database\
  \ Types\n- HSQLDB (embedded)\n- Firebird (embedded)\n- MySQL/MariaDB\n- PostgreSQL\n\
  - SQLite\n- ODBC data sources\n- JDBC data sources\n\n### Connection Strings\n\n\
