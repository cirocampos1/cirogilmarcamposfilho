  ---\n\n# Microsoft 365 Agents SDK (.NET)\n\n## Overview\nBuild enterprise agents\
  \ for Microsoft 365, Teams, and Copilot Studio using the Microsoft.Agents SDK with\
  \ ASP.NET Core hosting, agent routing, and MSAL-based authentication.\n\n## Before\
  \ implementation\n- Use the microsoft-docs MCP to verify the latest APIs for AddAgent,\
  \ AgentApplication, and authentication options.\n- Confirm package versions in NuGet\
  \ for the Microsoft.Agents.* packages you plan to use.\n\n## Installation\n\n```bash\n\
  dotnet add package Microsoft.Agents.Hosting.AspNetCore\ndotnet add package Microsoft.Agents.Authentication.Msal\n\
  dotnet add package Microsoft.Agents.Storage\ndotnet add package Microsoft.Agents.CopilotStudio.Client\n\
  dotnet add package Microsoft.Identity.Client.Extensions.Msal\n```\n\n## Configuration\
  \ (appsettings.json)\n\n```json\n{\n  \"TokenValidation\": {\n    \"Enabled\": true,\n\
  \    \"Audiences\": [\n      \"{{ClientId}}\"\n    ],\n    \"TenantId\": \"{{TenantId}}\"\
  \n  },\n  \"AgentApplication\": {\n    \"StartTypingTimer\": false,\n    \"RemoveRecipientMention\"\
  : false,\n    \"NormalizeMentions\": false\n  },\n  \"Connections\": {\n    \"ServiceConnection\"\
  : {\n      \"Settings\": {\n        \"AuthType\": \"ClientSecret\",\n        \"\
  ClientId\": \"{{ClientId}}\",\n        \"ClientSecret\": \"{{ClientSecret}}\",\n\
  \        \"AuthorityEndpoint\": \"https://login.microsoftonline.com/{{TenantId}}\"\
  ,\n        \"Scopes\": [\n          \"https://api.botframework.com/.default\"\n\
  \        ]\n      }\n    }\n  },\n  \"ConnectionsMap\": [\n    {\n      \"ServiceUrl\"\
  : \"*\",\n      \"Connection\": \"ServiceConnection\"\n    }\n  ],\n  \"CopilotStudioClientSettings\"\
  : {\n    \"DirectConnectUrl\": \"\",\n    \"EnvironmentId\": \"\",\n    \"SchemaName\"\
  : \"\",\n    \"TenantId\": \"\",\n    \"AppClientId\": \"\",\n    \"AppClientSecret\"\
  : \"\"\n  }\n}\n```\n\n## Core Workflow: ASP.NET Core agent host\n\n```csharp\n\
  using Microsoft.Agents.Builder;\nusing Microsoft.Agents.Hosting.AspNetCore;\nusing\
  \ Microsoft.Agents.Storage;\nusing Microsoft.AspNetCore.Builder;\nusing Microsoft.AspNetCore.Http;\n\
  using Microsoft.Extensions.DependencyInjection;\nusing Microsoft.Extensions.Hosting;\n\
  \nvar builder = WebApplication.CreateBuilder(args);\n\nbuilder.Services.AddHttpClient();\n\
  builder.AddAgentApplicationOptions();\nbuilder.AddAgent<MyAgent>();\nbuilder.Services.AddSingleton<IStorage,\
  \ MemoryStorage>();\n\nbuilder.Services.AddControllers();\nbuilder.Services.AddAgentAspNetAuthentication(builder.Configuration);\n\
  \nWebApplication app = builder.Build();\n\napp.UseAuthentication();\napp.UseAuthorization();\n\
  \napp.MapGet(\"/\", () => \"Microsoft Agents SDK Sample\");\n\nvar incomingRoute\
  \ = app.MapPost(\"/api/messages\",\n    async (HttpRequest request, HttpResponse\
  \ response, IAgentHttpAdapter adapter, IAgent agent, CancellationToken ct) =>\n\
  \    {\n        await adapter.ProcessAsync(request, response, agent, ct);\n    \n\
