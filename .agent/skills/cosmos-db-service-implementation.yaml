  ```\n\n## Quick Start\n\n### 1. Client Module Setup\n\nCreate a singleton Cosmos\
  \ client with dual authentication:\n\n```python\n# db/cosmos.py\nfrom azure.cosmos\
  \ import CosmosClient\nfrom azure.identity import DefaultAzureCredential\nfrom starlette.concurrency\
  \ import run_in_threadpool\n\n_cosmos_container = None\n\ndef _is_emulator_endpoint(endpoint:\
  \ str) -> bool:\n    return \"localhost\" in endpoint or \"127.0.0.1\" in endpoint\n\
  \nasync def get_container():\n    global _cosmos_container\n    if _cosmos_container\
  \ is None:\n        if _is_emulator_endpoint(settings.cosmos_endpoint):\n      \
