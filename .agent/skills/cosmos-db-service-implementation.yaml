  \nrisk: unknown\nsource: community\ndate_added: \"2026-02-27\"\n---\n\n# Cosmos\
  \ DB Service Implementation\n\nBuild production-grade Azure Cosmos DB NoSQL services\
  \ following clean code, security best practices, and TDD principles.\n\n## Installation\n\
  \n```bash\npip install azure-cosmos azure-identity\n```\n\n## Environment Variables\n\
  \n```bash\nCOSMOS_ENDPOINT=https://<account>.documents.azure.com:443/\nCOSMOS_DATABASE_NAME=<database-name>\n\
  COSMOS_CONTAINER_ID=<container-id>\n# For emulator only (not production)\nCOSMOS_KEY=<emulator-key>\n\
  ```\n\n## Authentication\n\n**DefaultAzureCredential (preferred)**:\n```python\n\
  from azure.cosmos import CosmosClient\nfrom azure.identity import DefaultAzureCredential\n\
  \nclient = CosmosClient(\n    url=os.environ[\"COSMOS_ENDPOINT\"],\n    credential=DefaultAzureCredential()\n\
  )\n```\n\n**Emulator (local development)**:\n```python\nfrom azure.cosmos import\
  \ CosmosClient\n\nclient = CosmosClient(\n    url=\"https://localhost:8081\",\n\
  \    credential=os.environ[\"COSMOS_KEY\"],\n    connection_verify=False\n)\n```\n\
