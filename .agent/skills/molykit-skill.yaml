  \ community\n---\n\n# MolyKit Skill\n\nBest practices for building AI chat interfaces\
  \ with Makepad using MolyKit - a toolkit for cross-platform AI chat applications.\n\
  \n**Source codebase**: `/Users/zhangalex/Work/Projects/FW/robius/moly/moly-kit`\n\
  \n## When to Use\n\nUse this skill when:\n- Building AI chat interfaces with Makepad\n\
  - Integrating OpenAI or other LLM APIs\n- Implementing cross-platform async for\
  \ native and WASM\n- Creating chat widgets (messages, prompts, avatars)\n- Handling\
  \ SSE streaming responses\n- Keywords: molykit, moly-kit, ai chat, bot client, openai\
  \ makepad, chat widget, sse streaming\n\n## Overview\n\nMolyKit provides:\n- Cross-platform\
  \ async utilities (PlatformSend, spawn(), ThreadToken)\n- Ready-to-use chat widgets\
  \ (Chat, Messages, PromptInput, Avatar)\n- BotClient trait for AI provider integration\n\
  - OpenAI-compatible client with SSE streaming\n- Protocol types for messages, bots,\
  \ and tool calls\n- MCP (Model Context Protocol) support\n\n## Cross-Platform Async\
  \ Patterns\n\n### PlatformSend - Send Only on Native\n\n```rust\n/// Implies Send\
  \ only on native platforms, not on WASM\n/// - On native: implemented by types that\
  \ implement Send\n/// - On WASM: implemented by ALL types\npub trait PlatformSend:\
  \ PlatformSendInner {}\n\n/// Boxed future type for cross-platform use\npub type\
  \ BoxPlatformSendFuture<'a, T> = Pin<Box<dyn PlatformSendFuture<Output = T> + 'a>>;\n\
  \n/// Boxed stream type for cross-platform use\npub type BoxPlatformSendStream<'a,\
  \ T> = Pin<Box<dyn PlatformSendStream<Item = T> + 'a>>;\n```\n\n### Platform-Agnostic\
  \ Spawning\n\n```rust\n/// Runs a future independently\n/// - Uses tokio on native\
  \ (requires Send)\n/// - Uses wasm-bindgen-futures on WASM (no Send required)\n\
  pub fn spawn(fut: impl PlatformSendFuture<Output = ()> + 'static);\n\n// Usage\n\
  spawn(async move {\n    let result = fetch_data().await;\n    Cx::post_action(DataReady(result));\n\
  \    SignalToUI::set_ui_signal();\n});\n```\n\n### Task Cancellation with AbortOnDropHandle\n\
  \n```rust\n/// Handle that aborts its future when dropped\npub struct AbortOnDropHandle(AbortHandle);\n\
  \n// Usage - task cancelled when widget dropped\n#[rust]\ntask_handle: Option<AbortOnDropHandle>,\n\
  \nfn start_task(&mut self) {\n    let (future, handle) = abort_on_drop(async move\
  \ {\n        // async work...\n    });\n    self.task_handle = Some(handle);\n \
  \   spawn(async move { let _ = future.await; });\n}\n```\n\n### ThreadToken for\
  \ Non-Send Types on WASM\n\n```rust\n/// Store non-Send value in thread-local, access\
  \ via token\npub struct ThreadToken<T: 'static>;\n\nimpl<T> ThreadToken<T> {\n \
  \   pub fn new(value: T) -> Self;\n    pub fn peek<R>(&self, f: impl FnOnce(&T)\
  \ -> R) -> R;\n    pub fn peek_mut<R>(&self, f: impl FnOnce(&mut T) -> R) -> R;\n\
  }\n\n// Usage - wrap non-Send type for use across Send\n\n## Diretrizes do \n\
  \n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente o gerenciador uv para dependências.\
  \ Todo código deve ser lintado via ruff e tipado com mypy.\n"
