  author: Champbreed\ndate_added: \"2026-03-24\"\n---\n\n# /aegisops-ai — Autonomous\
  \ Governance Orchestrator\n\nAegisOps-AI is a professional-grade \"Living Pipeline\"\
  \ \nthat integrates advanced AI reasoning directly into \nthe SDLC. It acts as an\
  \ intelligent gatekeeper for \nsystems-level security, cloud infrastructure costs,\
  \ \nand Kubernetes compliance.\n\n## Goal\n\nTo automate high-stakes security and\
  \ financial audits by:\n1. Identifying logic-based vulnerabilities (UAF, Stale \n\
  State) in Linux Kernel patches.\n2. Detecting massive \"Silent Disaster\" cost drifts\
  \ in \nTerraform plans.\n3. Translating natural language security intent into \n\
  hardened K8s manifests.\n\n## When to Use\n\n- **Kernel Patch Review:** Auditing\
  \ raw C-based Git diffs for memory safety.\n- **Pre-Apply IaC Audit:** Analyzing\
  \ `terraform plan` outputs to prevent bill spikes.\n- **Cluster Hardening:** Generating\
  \ \"Least Privilege\" securityContexts for deployments.\n- **CI/CD Quality Gating:**\
  \ Blocking non-compliant merges via GitHub Actions.\n\n## When Not to Use\n\n- **Web\
  \ App Logic:** Do not use for standard web vulnerabilities (XSS, SQLi); use dedicated\
  \ SAST scanners.\n- **Non-C Memory Analysis:** The patch analyzer is optimized for\
  \ C-logic; avoid using it for high-level languages like Python or JS.\n- **Direct\
  \ Resource Mutation:** This is an *auditor*, not a deployment tool. It does not\
  \ execute `terraform apply` or `kubectl apply`.\n- **Post-Mortem Analysis:** For\
  \ analyzing *why* a previous AI session failed, use `/analyze-project` instead.\n\
  \n---\n## \U0001F916 Generative AI Integration\n\nAegisOps-AI leverages the **Google\
  \ GenAI SDK** to implement a \"Reasoning Path\" for autonomous security and financial\
  \ audits:\n\n* **Neural Patch Analysis:** Performs semantic code reviews of Linux\
  \ Kernel patches, moving beyond simple pattern matching to understand complex memory\
  \ state logic.\n* **Intelligent Cost Synthesis:** Processes raw Terraform plan diffs\
  \ through a financial reasoning model to detect high-risk resource escalations and\
  \ \"silent\" fiscal drifts.\n* **Natural Language Policy Mapping:** Translates human\
  \ security intent into syntactically correct, hardened Kubernetes `securityContext`\
  \ configurations.\n\n## \U0001F9ED Core Modules\n\n### 1. \U0001F427 Kernel Patch\
  \ Reviewer (`patch_analyzer.py`)\n\n* **Problem:** Manual review of Linux Kernel\
  \ memory safety is time-consuming and prone to human error.\n* **Solution:** Gemini\
  \ 3 performs a \"Deep Reasoning\" audit on raw Git diffs to detect critical memory\
  \ corruption vulnerabilities (UAF, Stale State) in seconds.\n* **Key Output:** `analysis_results.json`\n\
  \n### 2. \U0001F4B0 FinOps & Cloud Auditor (`cost_auditor.py`)\n\n* **Problem:**\
  \ Infrastructure-as-Code (IaC) changes can lead to accidental \"Silent Disasters\"\
  \ and massive cloud bill spikes.\n* **Solution:** Analyzes `terraform plan` output\
  \ to identify cost anomalies—\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ\
  \ DE ENGENHARIA: Use exclusivamente o gerenciador uv para dependências. Todo código\
  \ deve ser lintado via ruff e tipado com mypy.\n"
