  \n## Patterns\n\n### Perception-Reasoning-Action Loop\n\nThe fundamental architecture\
  \ of computer use agents: observe screen,\nreason about next action, execute action,\
  \ repeat. This loop integrates\nvision models with action execution through an iterative\
  \ pipeline.\n\nKey components:\n1. PERCEPTION: Screenshot captures current screen\
  \ state\n2. REASONING: Vision-language model analyzes and plans\n3. ACTION: Execute\
  \ mouse/keyboard operations\n4. FEEDBACK: Observe result, continue or correct\n\n\
  Critical insight: Vision agents are completely still during \"thinking\"\nphase\
  \ (1-5 seconds), creating a detectable pause pattern.\n\n**When to use**: Building\
  \ any computer use agent from scratch,Integrating vision models with desktop control,Understanding\
  \ agent behavior patterns\n\nfrom anthropic import Anthropic\nfrom PIL import Image\n\
