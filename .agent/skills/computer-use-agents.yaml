  \        self.action_delay = 0.5  # Seconds between actions\n\n    def capture_screenshot(self)\
  \ -> str:\n        \"\"\"Capture screen and return base64 encoded image.\"\"\"\n\
  \        screenshot = pyautogui.screenshot()\n        # Resize for token efficiency\
  \ (1280x800 is good balance)\n        screenshot = screenshot.resize((1280, 800),\
  \ Image.LANCZOS)\n\n        import io\n        buffer = io.BytesIO()\n        screenshot.save(buffer,\
  \ format=\"PNG\")\n        return base64.b64encode(buffer.getvalue()).decode()\n\
  \n    def execute_action(self, action: dict) -> dict:\n        \"\"\"Execute mouse/keyboard\
  \ action on the computer.\"\"\"\n        action_type = action.get(\"type\")\n\n\
  \        if action_type == \"click\":\n            x, y = action[\"x\"], action[\"\
  y\"]\n            button = action.get(\"button\", \"left\")\n            pyautogui.click(x,\
  \ y, button=button)\n            return {\"success\": True, \"action\": f\"clicked\
  \ at ({x}, {y})\"}\n\n        elif action_type == \"type\":\n            text =\
  \ action[\"text\"]\n            pyautogui.typewrite(text, interval=0.02)\n     \
  \       return {\"success\": True, \"action\": f\"typed {len(text)} chars\"}\n\n\
