  date_added: \"2026-03-07\"\n---\n\n# Spline 3D Integration Skill\n\nMaster guide\
  \ for embedding interactive 3D scenes from [Spline.design](https://spline.design)\
  \ into web projects.\n\n---\n\n## When to Use\n\n- You need to embed an interactive\
  \ Spline scene into a web project.\n- The task involves choosing the correct integration\
  \ path for vanilla web, React, Next.js, Vue, or iframe contexts.\n- You need guidance\
  \ on scene URLs, runtime control, performance, or common Spline embedding problems.\n\
  \n## Quick Reference\n\n| Task                              | Guide            \
  \                                              |\n| ---------------------------------\
  \ | -------------------------------------------------------------- |\n| Vanilla\
  \ HTML/JS embed             | [guides/VANILLA_INTEGRATION.md](guides/VANILLA_INTEGRATION.md)\
  \ |\n| React / Next.js / Vue embed       | [guides/REACT_INTEGRATION.md](guides/REACT_INTEGRATION.md)\
  \     |\n| Performance & mobile optimization | [guides/PERFORMANCE.md](guides/PERFORMANCE.md)\
  \                 |\n| Debugging & common problems       | [guides/COMMON_PROBLEMS.md](guides/COMMON_PROBLEMS.md)\
  \         |\n\n## Working Examples\n\n| File                                   \
  \                                | What it shows                               \
  \             |\n| ----------------------------------------------------------------------\
  \ | -------------------------------------------------------- |\n| [examples/vanilla-embed.html](examples/vanilla-embed.html)\
