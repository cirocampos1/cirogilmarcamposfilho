  \ | Production-ready lazy-loaded React wrapper with fallback |\n| [examples/interactive-scene.tsx](examples/interactive-scene.tsx)\
  \       | Full interactive example: events, object control, camera |\n\n---\n\n\
  ## What Is Spline?\n\nSpline is a browser-based 3D design tool — think Figma, but\
  \ for 3D. Designers create interactive 3D scenes (objects, materials, animations,\
  \ physics, events) in the Spline editor, then export them for the web via a hosted\
  \ `.splinecode` file URL.\n\n---\n\n## STEP 1 — Identify the Stack\n\nBefore writing\
  \ any code, check the existing project files to determine the framework.\n\n| Stack\
  \                          | Method                                            \
  \       |\n| ------------------------------ | --------------------------------------------------------\
  \ |\n| Vanilla HTML/JS                | `<spline-viewer>` web component OR `@splinetool/runtime`\
  \ |\n| React / Vite                   | `@splinetool/react-spline`             \
  \                  |\n| Next.js                        | `@splinetool/react-spline/next`\
  \                          |\n| Vue                            | `@splinetool/vue-spline`\
  \                                 |\n| iframe (Webflow, Notion, \n\n## Diretrizes\
  \ do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente o gerenciador\
  \ uv para dependências. Todo código deve ser lintado via ruff e tipado com mypy.\n"
