  \ unknown\nsource: community\ndate_added: '2026-02-27'\n---\n\n# Azure AI Vision\
  \ Image Analysis SDK for Python\n\nClient library for Azure AI Vision 4.0 image\
  \ analysis including captions, tags, objects, OCR, and more.\n\n## Installation\n\
  \n```bash\npip install azure-ai-vision-imageanalysis\n```\n\n## Environment Variables\n\
  \n```bash\nVISION_ENDPOINT=https://<resource>.cognitiveservices.azure.com\nVISION_KEY=<your-api-key>\
  \  # If using API key\n```\n\n## Authentication\n\n### API Key\n\n```python\nimport\
  \ os\nfrom azure.ai.vision.imageanalysis import ImageAnalysisClient\nfrom azure.core.credentials\
  \ import AzureKeyCredential\n\nendpoint = os.environ[\"VISION_ENDPOINT\"]\nkey =\
  \ os.environ[\"VISION_KEY\"]\n\nclient = ImageAnalysisClient(\n    endpoint=endpoint,\n\
  \    credential=AzureKeyCredential(key)\n)\n```\n\n### Entra ID (Recommended)\n\n\
  ```python\nfrom azure.ai.vision.imageanalysis import ImageAnalysisClient\nfrom azure.identity\
  \ import DefaultAzureCredential\n\nclient = ImageAnalysisClient(\n    endpoint=os.environ[\"\
  VISION_ENDPOINT\"],\n    credential=DefaultAzureCredential()\n)\n```\n\n## Analyze\
  \ Image from URL\n\n```python\nfrom azure.ai.vision.imageanalysis.models import\
  \ VisualFeatures\n\nimage_url = \"https://example.com/image.jpg\"\n\nresult = client.analyze_from_url(\n\
  \    image_url=image_url,\n    visual_features=[\n        VisualFeatures.CAPTION,\n\
  \        VisualFeatures.TAGS,\n        VisualFeatures.OBJECTS,\n        VisualFeatures.READ,\n\
  \        VisualFeatures.PEOPLE,\n        VisualFeatures.SMART_CROPS,\n        VisualFeatures.DENSE_CAPTIONS\n\
  \    ],\n    gender_neutral_caption=True,\n    language=\"en\"\n)\n```\n\n## Analyze\
  \ Image from File\n\n```python\nwith open(\"image.jpg\", \"rb\") as f:\n    image_data\
  \ = f.read()\n\nresult = client.analyze(\n    image_data=image_data,\n    visual_features=[VisualFeatures.CAPTION,\
  \ VisualFeatures.TAGS]\n)\n```\n\n## Image Caption\n\n```python\nresult = client.analyze_from_url(\n\
  \    image_url=image_url,\n    visual_features=[VisualFeatures.CAPTION],\n    gender_neutral_caption=True\n\
  )\n\nif result.caption:\n    print(f\"Caption: {result.caption.text}\")\n    print(f\"\
  Confidence: {result.caption.confidence:.2f}\")\n```\n\n## Dense Captions (Multiple\
  \ Regions)\n\n```python\nresult = client.analyze_from_url(\n    image_url=image_url,\n\
  \    visual_features=[VisualFeatures.DENSE_CAPTIONS]\n)\n\nif result.dense_captions:\n\
  \    for caption in result.dense_captions.list:\n        print(f\"Caption: {caption.text}\"\
  )\n        print(f\"  Confidence: {caption.confidence:.2f}\")\n        print(f\"\
  \  Bounding box: {caption.bounding_box}\")\n```\n\n## Tags\n\n```python\nresult\
  \ = client.analyze_from_url(\n    image_url=image_url,\n    visual_features=[VisualFeatures.TAGS]\n\
  )\n\nif result.tags:\n    for tag in result.tags.list:\n        print(f\"Tag: {tag.name}\
  \ (confidence: {tag.confidence:.2f})\")\n```\n\n## Object Detection\n\n```python\n\
