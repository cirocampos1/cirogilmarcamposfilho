  \ (Apache 2.0)\ndate_added: 2026-02-27\n---\n\n# HubSpot Integration\n\nExpert patterns\
  \ for HubSpot CRM integration including OAuth authentication,\nCRM objects, associations,\
  \ batch operations, webhooks, and custom objects.\nCovers Node.js and Python SDKs.\n\
  \n## Patterns\n\n### OAuth 2.0 Authentication\n\nSecure authentication for public\
  \ apps\n\n**When to use**: Building public app or multi-account integration\n\n\
  ### Template\n\n// OAuth 2.0 flow for HubSpot\nimport { Client } from \"@hubspot/api-client\"\
  ;\n\n// Environment variables\nconst CLIENT_ID = process.env.HUBSPOT_CLIENT_ID;\n\
  const CLIENT_SECRET = process.env.HUBSPOT_CLIENT_SECRET;\nconst REDIRECT_URI = process.env.HUBSPOT_REDIRECT_URI;\n\
  const SCOPES = \"crm.objects.contacts.read crm.objects.contacts.write\";\n\n// Step\
  \ 1: Generate authorization URL\nfunction getAuthUrl(): string {\n  const authUrl\
  \ = new URL(\"https://app.hubspot.com/oauth/authorize\");\n  authUrl.searchParams.set(\"\
  client_id\", CLIENT_ID);\n  authUrl.searchParams.set(\"redirect_uri\", REDIRECT_URI);\n\
  \  authUrl.searchParams.set(\"scope\", SCOPES);\n  return authUrl.toString();\n\
  }\n\n// Step 2: Handle OAuth callback\nasync function handleOAuthCallback(code:\
  \ string) {\n  const response = await fetch(\"https://api.hubapi.com/oauth/v1/token\"\
  , {\n    method: \"POST\",\n    headers: { \"Content-Type\": \"application/x-www-form-urlencoded\"\
  \ },\n    body: new URLSearchParams({\n      grant_type: \"authorization_code\"\
  ,\n      client_id: CLIENT_ID,\n      client_secret: CLIENT_SECRET,\n      redirect_uri:\
  \ REDIRECT_URI,\n      code: code,\n    }),\n  });\n\n  const tokens = await response.json();\n\
  \  // {\n  //   access_token: \"xxx\",\n  //   refresh_token: \"xxx\",\n  //   expires_in:\
  \ 1800  // 30 minutes\n  // }\n\n  // Store tokens securely\n  await storeTokens(tokens);\n\
  \n  return tokens;\n}\n\n// Step 3: Refresh access token (before expiry)\nasync\
  \ function refreshAccessToken(refreshToken: string) {\n  const response = await\
  \ fetch(\"https://api.hubapi.com/oauth/v1/token\", {\n    method: \"POST\",\n  \
  \  headers: { \"Content-Type\": \"application/x-www-form-urlencoded\" },\n    body:\
  \ new URLSearchParams({\n      grant_type: \"refresh_token\",\n      client_id:\
  \ CLIENT_ID,\n      client_secret: CLIENT_SECRET,\n      refresh_token: refreshToken,\n\
  \    }),\n  });\n\n  return response.json();\n}\n\n// Step 4: Create authenticated\
  \ client\nfunction createClient(accessToken: string): Client {\n  const hubspotClient\
  \ = new Client({ accessToken });\n  return hubspotClient;\n}\n\n### Notes\n\n- Access\
  \ tokens expire in 30 minutes\n- Refresh tokens before expiry\n- Store refresh tokens\
  \ securely\n- Rotate tokens every 6 months\n\n### Private App Token\n\nAuthentication\
  \ for single-account integrations\n\n**When to use**: Building internal integration\
  \ for one HubSpot account\n\n### Template\n\n// Private App Token\n\n## Diretrizes\
  \ do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente o gerenciador\
  \ uv para dependências. Todo código deve ser lintado via ruff e tipado com mypy.\n"
