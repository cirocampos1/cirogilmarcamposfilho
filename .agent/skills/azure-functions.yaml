  \ (Apache 2.0)\ndate_added: 2026-02-27\n---\n\n# Azure Functions\n\nExpert patterns\
  \ for Azure Functions development including isolated worker model,\nDurable Functions\
  \ orchestration, cold start optimization, and production patterns.\nCovers .NET,\
  \ Python, and Node.js programming models.\n\n## Patterns\n\n### Isolated Worker\
  \ Model (.NET)\n\nModern .NET execution model with process isolation\n\n**When to\
  \ use**: Building new .NET Azure Functions apps\n\n### Template\n\n// Program.cs\
  \ - Isolated Worker Model\nusing Microsoft.Azure.Functions.Worker;\nusing Microsoft.Extensions.DependencyInjection;\n\
  using Microsoft.Extensions.Hosting;\n\nvar host = new HostBuilder()\n    .ConfigureFunctionsWorkerDefaults()\n\
  \    .ConfigureServices(services =>\n    {\n        // Add Application Insights\n\
  \        services.AddApplicationInsightsTelemetryWorkerService();\n        services.ConfigureFunctionsApplicationInsights();\n\
  \n        // Add HttpClientFactory (prevents socket exhaustion)\n        services.AddHttpClient();\n\
  \n        // Add your services\n        services.AddSingleton<IMyService, MyService>();\n\
  \    })\n    .Build();\n\nhost.Run();\n\n// HttpTriggerFunction.cs\nusing Microsoft.Azure.Functions.Worker;\n\
  using Microsoft.Azure.Functions.Worker.Http;\nusing Microsoft.Extensions.Logging;\n\
  \npublic class HttpTriggerFunction\n{\n    private readonly ILogger<HttpTriggerFunction>\
  \ _logger;\n    private readonly IMyService _service;\n\n    public HttpTriggerFunction(\n\
  \        ILogger<HttpTriggerFunction> logger,\n        IMyService service)\n   \
  \ {\n        _logger = logger;\n        _service = service;\n    }\n\n    [Function(\"\
  HttpTrigger\")]\n    public async Task<HttpResponseData> Run(\n        [HttpTrigger(AuthorizationLevel.Function,\
  \ \"get\", \"post\")] HttpRequestData req)\n    {\n        _logger.LogInformation(\"\
  Processing request\");\n\n        try\n        {\n            var result = await\
  \ _service.ProcessAsync(req);\n\n            var response = req.CreateResponse(HttpStatusCode.OK);\n\
  \            await response.WriteAsJsonAsync(result);\n            return response;\n\
  \        }\n        catch (Exception ex)\n        {\n            _logger.LogError(ex,\
  \ \"Error processing request\");\n            var response = req.CreateResponse(HttpStatusCode.InternalServerError);\n\
  \            await response.WriteAsJsonAsync(new { error = \"Internal server error\"\
  \ });\n            return response;\n        }\n    }\n}\n\n### Notes\n\n- In-process\
  \ model deprecated November 2026\n- Isolated worker supports .NET 8, 9, 10, and\
  \ .NET Framework\n- Full dependency injection support\n- Custom middleware support\n\
  \n### Node.js v4 Programming Model\n\nModern code-centric approach for TypeScript/JavaScript\n\
  \n**When to use**: Building Node.js Azure Functions\n\n### Template\n\n// src/functions/httpTrig\n\
  \n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente\
  \ o gerenciador uv para dependências. Todo código deve ser lintado via ruff e tipado\
  \ com mypy.\n"
