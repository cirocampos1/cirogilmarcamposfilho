  \ (Apache 2.0)\ndate_added: 2026-02-27\n---\n\n# Discord Bot Architect\n\nSpecialized\
  \ skill for building production-ready Discord bots.\nCovers Discord.js (JavaScript)\
  \ and Pycord (Python), gateway intents,\nslash commands, interactive components,\
  \ rate limiting, and sharding.\n\n## Principles\n\n- Slash commands over message\
  \ parsing (Message Content Intent deprecated)\n- Acknowledge interactions within\
  \ 3 seconds, always\n- Request only required intents (minimize privileged intents)\n\
  - Handle rate limits gracefully with exponential backoff\n- Plan for sharding from\
  \ the start (required at 2500+ guilds)\n- Use components (buttons, selects, modals)\
  \ for rich UX\n- Test with guild commands first, deploy global when ready\n\n##\
  \ Patterns\n\n### Discord.js v14 Foundation\n\nModern Discord bot setup with Discord.js\
  \ v14 and slash commands\n\n**When to use**: Building Discord bots with JavaScript/TypeScript,Need\
  \ full gateway connection with events,Building bots with complex interactions\n\n\
  ```javascript\n// src/index.js\nconst { Client, Collection, GatewayIntentBits, Events\
  \ } = require('discord.js');\nconst fs = require('node:fs');\nconst path = require('node:path');\n\
  require('dotenv').config();\n\n// Create client with minimal required intents\n\
  const client = new Client({\n  intents: [\n    GatewayIntentBits.Guilds,\n    //\
  \ Add only what you need:\n    // GatewayIntentBits.GuildMessages,\n    // GatewayIntentBits.MessageContent,\
  \  // PRIVILEGED - avoid if possible\n  ]\n});\n\n// Load commands\nclient.commands\
  \ = new Collection();\nconst commandsPath = path.join(__dirname, 'commands');\n\
  const commandFiles = fs.readdirSync(commandsPath).filter(f => f.endsWith('.js'));\n\
  \nfor (const file of commandFiles) {\n  const filePath = path.join(commandsPath,\
  \ file);\n  const command = require(filePath);\n  if ('data' in command && 'execute'\
  \ in command) {\n    client.commands.set(command.data.name, command);\n  }\n}\n\n\
  // Load events\nconst eventsPath = path.join(__dirname, 'events');\nconst eventFiles\
  \ = fs.readdirSync(eventsPath).filter(f => f.endsWith('.js'));\n\nfor (const file\
  \ of eventFiles) {\n  const filePath = path.join(eventsPath, file);\n  const event\
  \ = require(filePath);\n  if (event.once) {\n    client.once(event.name, (...args)\
  \ => event.execute(...args));\n  } else {\n    client.on(event.name, (...args) =>\
  \ event.execute(...args));\n  }\n}\n\nclient.login(process.env.DISCORD_TOKEN);\n\
