  date_added: '2026-02-27'\n---\n\n# Microsoft.Azure.WebJobs.Extensions.AuthenticationEvents\
  \ (.NET)\n\nAzure Functions extension for handling Microsoft Entra ID custom authentication\
  \ events.\n\n## Installation\n\n```bash\ndotnet add package Microsoft.Azure.WebJobs.Extensions.AuthenticationEvents\n\
  ```\n\n**Current Version**: v1.1.0 (stable)\n\n## Supported Events\n\n| Event |\
  \ Purpose |\n|-------|---------|\n| `OnTokenIssuanceStart` | Add custom claims to\
  \ tokens during issuance |\n| `OnAttributeCollectionStart` | Customize attribute\
  \ collection UI before display |\n| `OnAttributeCollectionSubmit` | Validate/modify\
  \ attributes after user submission |\n| `OnOtpSend` | Custom OTP delivery (SMS,\
  \ email, etc.) |\n\n## Core Workflows\n\n### 1. Token Enrichment (Add Custom Claims)\n\
  \nAdd custom claims to access or ID tokens during sign-in.\n\n```csharp\nusing Microsoft.Azure.WebJobs;\n\
  using Microsoft.Azure.WebJobs.Extensions.AuthenticationEvents;\nusing Microsoft.Azure.WebJobs.Extensions.AuthenticationEvents.TokenIssuanceStart;\n\
  using Microsoft.Extensions.Logging;\n\npublic static class TokenEnrichmentFunction\n\
  {\n    [FunctionName(\"OnTokenIssuanceStart\")]\n    public static WebJobsAuthenticationEventResponse\
  \ Run(\n        [WebJobsAuthenticationEventsTrigger] WebJobsTokenIssuanceStartRequest\
  \ request,\n        ILogger log)\n    {\n        log.LogInformation(\"Token issuance\
  \ event for user: {UserId}\", \n            request.Data?.AuthenticationContext?.User?.Id);\n\
  \n        // Create response with custom claims\n        var response = new WebJobsTokenIssuanceStartResponse();\n\
  \        \n        // Add claims to the token\n        response.Actions.Add(new\
  \ WebJobsProvideClaimsForToken\n        {\n            Claims = new Dictionary<string,\
  \ string>\n            {\n                { \"customClaim1\", \"customValue1\" },\n\
  \                { \"department\", \"Engineering\" },\n                { \"costCenter\"\
  , \"CC-12345\" },\n                { \"apiVersion\", \"v2\" }\n            }\n \
  \       });\n\n        return response;\n    }\n}\n```\n\n### 2. Token Enrichment\
  \ with External Data\n\nFetch claims from external systems (databases, APIs).\n\n\
