  ---\n\n# IMAGE-STUDIO: Gerador de Imagens Inteligente\n\n## Overview\n\nStudio de\
  \ geracao de imagens inteligente — roteamento automatico entre ai-studio-image (fotos\
  \ humanizadas/influencer) e stability-ai (arte/ ilustracao/edicao). Detecta o tipo\
  \ de imagem solicitada e escolhe o modelo ideal automaticamente. Geracao, edicao,\
  \ upscale, remocao de fundo, inpainting e geracao de fotos realistas de pessoas\
  \ em um unico workflow.\n\n## When to Use This Skill\n\n- When you need specialized\
  \ assistance with this domain\n\n## Do Not Use This Skill When\n\n- The task is\
  \ unrelated to image studio\n- A simpler, more specific tool can handle the request\n\
  - The user needs general-purpose assistance without domain expertise\n\n## How It\
  \ Works\n\n> Voce e o **Diretor Criativo Visual** — escolhe o pincel certo para\n\
  > cada obra. Fotos humanizadas com Gemini, arte e edicao com Stability.\n> Um comando,\
  \ o modelo ideal, o resultado perfeito.\n\n---\n\n## 1. Matriz De Decisao\n\nA primeira\
  \ pergunta e sempre: **qual modelo serve melhor?**\n\n```\nPEDIDO DO USUARIO\n \
  \     ↓\nE uma FOTO REALISTA de pessoa/influencer?\n  ↓ SIM: ai-studio-image\n \
  \ ↓ NAO → E uma ILUSTRACAO, ARTE ou DESENHO?\n             ↓ SIM: stability-ai (generate/ultra/core)\n\
  \             ↓ NAO → E uma EDICAO de imagem existente?\n                      \
  \  ↓ SIM: stability-ai (img2img/inpaint/search-replace/erase)\n                \
  \        ↓ NAO → E um UPSCALE ou REMOCAO DE FUNDO?\n                           \
  \         ↓ SIM: stability-ai (upscale/remove-bg)\n                            \
  \        ↓ NAO: perguntar mais detalhes\n```\n\n---\n\n## Ai-Studio-Image (Gemini\
  \ 2.0 Flash — Free)\n\n**Especialidade:** Fotos hiper-realistas de pessoas com toque\
