  foto estilo instagram de mulher em cafe\" |\n| Foto de perfil profissional | \"\
  headshot profissional homem terno\" |\n| Foto lifestyle | \"pessoa na praia com\
  \ celular, luz dourada\" |\n| Conteudo educacional humanizado | \"professor ensinando\
  \ com quadro\" |\n| Foto produto com pessoa | \"mulher segurando smartphone\" |\n\
  \n**Vantagens:**\n- Gratuito (gemini-2.0-flash-exp)\n- 5 camadas de humanizacao\
  \ narrativa (device, lighting, imperfection, authenticity, environment)\n- 20 templates\
  \ pre-configurados (10 influencer + 10 educacional)\n- Imperfeicoes sutis que tornam\
  \ a foto credivel\n\n**Limitacoes:**\n- 1 imagem por vez, ~9s\n- ~1K resolucao\n\
  - Nao suporta aspect_ratio customizado\n- 50 imgs/dia free tier\n\n---\n\n## Stability-Ai\
  \ (Sd3.5 Large — Community)\n\n**Especialidade:** Arte, ilustracao, edicao e manipu\n\
