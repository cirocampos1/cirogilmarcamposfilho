  \ | Intimação do cônjuge/companheiro (imóvel) |\n| Art. 867 | Usufruto de imóvel\
  \ ou empresa como alternativa |\n| Art. 870 | Avaliação — realizada pelo oficial\
  \ ou perito |\n| Art. 873 | Reavaliação — quando cabível |\n| Art. 876 | Adjudicação\
  \ — direito preferencial do exequente |\n| Art. 879 | Formas de expropriação |\n\
  | Art. 881 | Alienação por iniciativa particular |\n| Art. 882 | Hasta pública —\
  \ modalidades |\n| Art. 884 | Quem pode arrematar |\n| Art. 885 | Impedidos de arrematar\
  \ (devedor, tutor, curador...) |\n| Art. 886 | Condições de pagamento na arrematação\
  \ |\n| Art. 887 | Edital — conteúdo obrigatório |\n| Art. 888 | Publicação do edital\
