  \n## Contexto Original da Skill\nAzure Key Vault Keys SDK for TypeScript\n\n## Instruções\n\
  ---\nname: azure-keyvault-keys-ts\ndescription: \"Manage cryptographic keys using\
  \ Azure Key Vault Keys SDK for JavaScript (@azure/keyvault-keys). Use when creating,\
  \ encrypting/decrypting, signing, or rotating keys.\"\nrisk: unknown\nsource: community\n\
  date_added: \"2026-02-27\"\n---\n\n# Azure Key Vault Keys SDK for TypeScript\n\n\
  Manage cryptographic keys with Azure Key Vault.\n\n## Installation\n\n```bash\n\
  # Keys SDK\nnpm install @azure/keyvault-keys @azure/identity\n```\n\n## Environment\
  \ Variables\n\n```bash\nKEY_VAULT_URL=https://<vault-name>.vault.azure.net\n# Or\n\
  AZURE_KEYVAULT_NAME=<vault-name>\n```\n\n## Authentication\n\n```typescript\nimport\
  \ { DefaultAzureCredential } from \"@azure/identity\";\nimport { KeyClient, CryptographyClient\
  \ } from \"@azure/keyvault-keys\";\n\nconst credential = new DefaultAzureCredential();\n\
  const vaultUrl = `https://${process.env.AZURE_KEYVAULT_NAME}.vault.azure.net`;\n\
  \nconst keyClient = new KeyClient(vaultUrl, credential);\nconst secretClient = new\
  \ SecretClient(vaultUrl, credential);\n```\n\n## Secrets Operations\n\n### Create/Set\
  \ Secret\n\n```typescript\nconst secret = await secretClient.setSecret(\"MySecret\"\
  , \"secret-value\");\n\n// With attributes\nconst secretWithAttrs = await secretClient.setSecret(\"\
  MySecret\", \"value\", {\n  enabled: true,\n  expiresOn: new Date(\"2025-12-31\"\
  ),\n  contentType: \"application/json\",\n  tags: { environment: \"production\"\
  \ }\n});\n```\n\n### Get Secret\n\n```typescript\n// Get latest version\nconst secret\
  \ = await secretClient.getSecret(\"MySecret\");\nconsole.log(secret.value);\n\n\
  // Get specific version\nconst specificSecret = await secretClient.getSecret(\"\
  MySecret\", {\n  version: secret.properties.version\n});\n```\n\n### List Secrets\n\
  \n```typescript\nfor await (const secretProperties of secretClient.listPropertiesOfSecrets())\
  \ {\n  console.log(secretProperties.name);\n}\n\n// List versions\nfor await (const\
  \ version of secretClient.listPropertiesOfSecretVersions(\"MySecret\")) {\n  console.log(version.version);\n\
  }\n```\n\n### Delete Secret\n\n```typescript\n// Soft delete\nconst deletePoller\
  \ = await secretClient.beginDeleteSecret(\"MySecret\");\nawait deletePoller.pollUntilDone();\n\
  \n// Purge (permanent)\nawait secretClient.purgeDeletedSecret(\"MySecret\");\n\n\
  // Recover\nconst recoverPoller = await secretClient.beginRecoverDeletedSecret(\"\
  MySecret\");\nawait recoverPoller.pollUntilDone();\n```\n\n## Keys Operations\n\n\
  ### Create Keys\n\n```typescript\n// Generic key\nconst key = await keyClient.createKey(\"\
  MyKey\", \"RSA\");\n\n// RSA key with size\nconst rsaKey = await keyClient.createRsaKey(\"\
  MyRsaKey\", { keySize: 2048 });\n\n// Elliptic Curve key\nconst ecKey = await keyClient.createEcKey(\"\
  MyEcKey\", { curve: \"P-256\" });\n\n// With attributes\nconst keyWithAttrs = await\
  \ keyClient.createKey(\"MyKey\", \"RSA\", {\n  enabled: true,\n  expiresOn: new\
  \ Date(\"2025-12-31\"),\n  tags: { purpose: \"encryption\" },\n  keyOps: [\"encrypt\"\
  , \"decrypt\", \"sign\", \"verify\"]\n});\n```\n\n### Get Key\n\n```typescript\n\
