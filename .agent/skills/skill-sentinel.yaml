  - codex-cli\n---\n\n# Skill Sentinel\n\n## Overview\n\nAuditoria e evolucao do ecossistema\
  \ de skills. Qualidade de codigo, seguranca, custos, gaps, duplicacoes, dependencias\
  \ e relatorios de saude.\n\n## When to Use This Skill\n\n- When the user mentions\
  \ \"auditar skills\" or related topics\n- When the user mentions \"qualidade skills\"\
  \ or related topics\n- When the user mentions \"verificar skills ecossistema\" or\
  \ related topics\n- When the user mentions \"saude ecossistema skills\" or related\
  \ topics\n- When the user mentions \"skills duplicadas\" or related topics\n- When\
  \ the user mentions \"otimizar skills\" or related topics\n\n## Do Not Use This\
  \ Skill When\n\n- The task is unrelated to skill sentinel\n- A simpler, more specific\
  \ tool can handle the request\n- The user needs general-purpose assistance without\
  \ domain expertise\n\n## How It Works\n\nMeta-agente que monitora, audita e evolui\
  \ o ecossistema de skills. Analisa\ntodas as skills em 7 dimensoes, identifica problemas,\
  \ sugere melhorias\ne recomenda novas skills especialistas.\n\n## Resumo Rapido\n\
  \n| Area | Script | O que faz |\n|------|--------|-----------|\n| **Discovery**\
  \ | `scanner.py` | Descobre todas as skills automaticamente |\n| **Qualidade** |\
  \ `analyzers/code_quality.py` | Complexidade, docstrings, error handling |\n| **Seguranca**\
  \ | `analyzers/security.py` | Secrets, SQL injection, HTTPS |\n| **Performance**\
  \ | `analyzers/performance.py` | API calls, caching, retry |\n| **Governanca** |\
  \ `analyzers/governance_audit.py` | Rate limits, audit log, confirmacoes |\n| **Documentacao**\
  \ | `analyzers/documentation.py` | SKILL.md, triggers, references |\n| **Dependencias**\
  \ | `analyzers/dependencies.py` | requirements.txt, versoes |\n| **Cross-Skill**\
  \ | `analyzers/cross_skill.py` | Duplicacao, padroes compartilhados |\n| **Custos**\
  \ | `cost_optimizer.py` | Tokens, verbosidade, output |\n| **Recomendacoes** | `recommender.py`\
  \ | Gap analysis, novas skills |\n| **Relatorio** | `report_generator.py` | Markdown\
  \ estruturado |\n| **Orquestracao** | `run_audit.py` | CLI principal |\n\n## Localizacao\n\
