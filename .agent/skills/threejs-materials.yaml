  # Three.js Materials\n\n## Quick Start\n\n```javascript\nimport * as THREE from\
  \ \"three\";\n\n// PBR material (recommended for realistic rendering)\nconst material\
  \ = new THREE.MeshStandardMaterial({\n  color: 0x00ff00,\n  roughness: 0.5,\n  metalness:\
  \ 0.5,\n});\n\nconst mesh = new THREE.Mesh(geometry, material);\n```\n\n## Material\
  \ Types Overview\n\n| Material             | Use Case                          \
  \    | Lighting           |\n| -------------------- | -------------------------------------\
  \ | ------------------ |\n| MeshBasicMaterial    | Unlit, flat colors, wireframes\
  \        | No                 |\n| MeshLambertMaterial  | Matte surfaces, performance\
  \           | Yes (diffuse only) |\n| MeshPhongMaterial    | Shiny surfaces, specular\
  \ highlights   | Yes                |\n| MeshStandardMaterial | PBR, realistic materials\
  \              | Yes (PBR)          |\n| MeshPhysicalMaterial | Advanced PBR, clearcoat,\
  \ transmission | Yes (PBR+)         |\n| MeshToonMaterial     | Cel-shaded, cartoon\
  \ look              | Yes (toon)         |\n| MeshNormalMaterial   | Debug normals\
  \                         | No                 |\n| MeshDepthMaterial    | Depth\
  \ visualization                   | No                 |\n| ShaderMaterial     \
  \  | Custom GLSL shaders                   | Custom             |\n| RawShaderMaterial\
  \    | Full shader control                   | Custom             |\n\n## MeshBasicMaterial\n\
  \nNo lighting calculations. Fast, always visible.\n\n```javascript\nconst material\
  \ = new THREE.MeshBasicMaterial({\n  color: 0xff0000,\n  transparent: true,\n  opacity:\
  \ 0.5,\n  side: THREE.DoubleSide, // FrontSide, BackSide, DoubleSide\n  wireframe:\
  \ false,\n  map: texture, // Color/diffuse texture\n  alphaMap: alphaTexture, //\
  \ Transparency texture\n  envMap: envTexture, // Reflection texture\n  reflectivity:\
  \ 1, // Env map intensity\n  fog: true, // Affected by scene fog\n});\n```\n\n##\
  \ MeshLambertMaterial\n\nDiffuse-only lighting. Fast, no specular highlights.\n\n\
  ```javascript\nconst material = new THREE.MeshLambertMaterial({\n  color: 0x00ff00,\n\
  \  emissive: 0x111111, // Self-illumination color\n  emissiveIntensity: 1,\n  map:\
  \ texture,\n  emissiveMap: emissiveTexture,\n  envMap: envTexture,\n  reflectivity:\
  \ 0.5,\n});\n```\n\n## MeshPhongMaterial\n\nSpecular highlights. Good for shiny,\
  \ plastic-like surfaces.\n\n```javascript\nconst material = new THREE.MeshPhongMaterial({\n\
  \  color: 0x0000ff,\n  specular: 0xffffff, // Highlight color\n  shininess: 100,\
  \ // Highlight sharpness (0-1000)\n  emissive: 0x000000,\n  flatShading: false,\
  \ // Flat vs smooth shading\n  map: texture,\n  specularMap: specTexture, // Per-pixel\
  \ shininess\n  normalMap: normalTexture,\n  normalScale: new THREE.Vector2(1, 1),\n\
  \  bumpMap: bumpTexture,\n  bumpScale: 1,\n  displacementMap: dispTexture,\n  displacementS\n\
  \n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente\
  \ o gerenciador uv para dependências. Todo código deve ser lintado via ruff e tipado\
  \ com mypy.\n"
