  \n# Refactoring Imperative Code to fp-ts\n\nThis skill provides comprehensive patterns\
  \ and strategies for migrating existing imperative TypeScript code to fp-ts functional\
  \ programming patterns.\n\n## When to Use\n\n- You are refactoring an existing imperative\
  \ TypeScript codebase toward fp-ts patterns.\n- The task involves converting `try/catch`,\
  \ null checks, callbacks, DI, or loops into functional equivalents.\n- You need\
  \ migration guidance and tradeoffs, not just isolated fp-ts examples.\n\n## Table\
  \ of Contents\n\n1. [Converting try-catch to Either/TaskEither](#1-converting-try-catch-to-eithertaskeither)\n\
  2. [Converting null checks to Option](#2-converting-null-checks-to-option)\n3. [Converting\
  \ callbacks to Task](#3-converting-callbacks-to-task)\n4. [Converting class-based\
  \ DI to Reader](#4-converting-class-based-di-to-reader)\n5. [Converting imperative\
  \ loops to functional operations](#5-converting-imperative-loops-to-functional-operations)\n\
  6. [Migrating Promise chains to TaskEither](#6-migrating-promise-chains-to-taskeither)\n\
  7. [Common Pitfalls](#7-common-pitfalls)\n8. [Gradual Adoption Strategies](#8-gradual-adoption-strategies)\n\
  9. [When NOT to Refactor](#9-when-not-to-refactor)\n\n---\n\n## 1. Converting try-catch\
  \ to Either/TaskEither\n\n### The Problem with try-catch\n\nTraditional try-catch\
  \ blocks have several issues:\n- Error handling is implicit and easy to forget\n\
  - The type system doesn't track which functions can throw\n- Control flow is non-linear\
  \ and harder to reason about\n- Composing multiple fallible operations is verbose\n\
  \n### Pattern: Synchronous try-catch to Either\n\n#### Before (Imperative)\n\n```typescript\n\
  function parseJSON(input: string): unknown {\n  try {\n    return JSON.parse(input);\n\
  \  } catch (error) {\n    throw new Error(`Invalid JSON: ${error}`);\n  }\n}\n\n\
  function validateUser(data: unknown): User {\n  try {\n    if (!data || typeof data\
  \ !== 'object') {\n      throw new Error('Data must be an object');\n    }\n   \
  \ const obj = data as Record<string, unknown>;\n    if (typeof obj.name !== 'string')\
  \ {\n      throw new Error('Name is required');\n    }\n    if (typeof obj.age !==\
  \ 'number') {\n      throw new Error('Age must be a number');\n    }\n    return\
  \ { name: obj.name, age: obj.age };\n  } catch (error) {\n    throw error;\n  }\n\
  }\n\n// Usage with nested try-catch\nfunction processUserInput(input: string): User\
  \ | null {\n  try {\n    const data = parseJSON(input);\n    const user = validateUser(data);\n\
  \    return user;\n  } catch (error) {\n    console.error('Failed to process user:',\
  \ error);\n    return null;\n  }\n}\n```\n\n#### After (fp-ts Either)\n\n```typescript\n\
  import * as E from 'fp-ts/Either';\nimport * as J from 'fp-ts/Json';\nimport { pipe\
  \ } from 'fp-ts/\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA:\
  \ Use exclusivamente o gerenciador uv para dependências. Todo código deve ser lintado\
  \ via ruff e tipado com mypy.\n"
