  source: community\ndate_added: '2026-03-06'\nauthor: renat\ntags:\n- scraping\n\
  - brazilian-data\n- auctioneers\n- api\ntools:\n- claude-code\n- antigravity\n-\
  \ cursor\n- gemini-cli\n- codex-cli\n---\n\n# Skill: Leiloeiros das Juntas Comerciais\
  \ do Brasil\n\n## Overview\n\nColeta e consulta dados de leiloeiros oficiais de\
  \ todas as 27 Juntas Comerciais do Brasil. Scraper multi-UF, banco SQLite, API FastAPI\
  \ e exportacao CSV/JSON.\n\n## When to Use This Skill\n\n- When the user mentions\
  \ \"leiloeiro junta\" or related topics\n- When the user mentions \"junta comercial\
  \ leiloeiro\" or related topics\n- When the user mentions \"scraper junta\" or related\
  \ topics\n- When the user mentions \"jucesp leiloeiro\" or related topics\n- When\
  \ the user mentions \"jucerja\" or related topics\n- When the user mentions \"jucemg\
  \ leiloeiro\" or related topics\n\n## Do Not Use This Skill When\n\n- The task is\
  \ unrelated to junta leiloeiros\n- A simpler, more specific tool can handle the\
  \ request\n- The user needs general-purpose assistance without domain expertise\n\
  \n## How It Works\n\nColeta dados públicos de leiloeiros oficiais de todas as 27\
  \ Juntas Comerciais estaduais,\npersiste em banco SQLite local e oferece API REST\
  \ e exportação em múltiplos formatos.\n\n## Localização\n\n```\nC:\\Users\\renat\\\
  skills\\junta-leiloeiros\\\n├── scripts/\n│   ├── scraper/\n│   │   ├── base_scraper.py\
  \      ← classe abstrata\n│   │   ├── states.py            ← registro dos 27 scrapers\n\
  │   │   ├── jucesp.py / jucerja.py / jucemg.py / jucec.py / jucis_df.py\n│   │ \
  \  └── generic_scraper.py   ← usado pelos 22 estados restantes\n│   ├── db.py  \
  \                  ← banco SQLite\n│   ├── run_all.py               ← orquestrador\
  \ de scraping\n│   ├── serve_api.py             ← API FastAPI\n│   ├── export.py\
  \                ← exportação\n│   └── requirements.txt\n├── references/\n│   ├──\
  \ juntas_urls.md           ← URLs e status de todas as 27 juntas\n│   ├── schema.md\
  \                ← schema do banco\n│   └── legal.md                 ← base legal\n\
  └── data/\n    ├── leiloeiros.db            ← banco SQLite (criado no primeiro run)\n\
  \    ├── scraping_log.json        ← log de cada coleta\n    └── exports/       \
  \          ← arquivos exportados\n```\n\n## Instalação (Uma Vez)\n\n```bash\npip\
  \ install -r C:\\Users\\renat\\skills\\junta-leiloeiros\\scripts\\requirements.txt\n\
  \n## Para Sites Com Javascript:\n\nplaywright install chromium\n```\n\n## Coletar\
  \ Dados\n\n```bash\n\n## Todos Os 27 Estados\n\npython C:\\Users\\renat\\skills\\\
  junta-leiloeiros\\scripts\\run_all.py\n\n## Estados Específicos\n\npython C:\\Users\\\
  renat\\skills\\junta-leiloeiros\\scripts\\run_all.py --estado SP RJ MG\n\n## Ver\
  \ O Que Seria Coletado Sem Executar\n\npython C:\\Users\\renat\\skills\\junta-leiloeiros\\\
  scripts\\run_all.py --dry-run\n\n## Controlar Paralelismo (Default: 5)\n\npython\
  \ C:\\Users\\renat\\skills\\junta-leiloeiros\\scripts\\run_all.py --concurrency\
  \ 3\n```\n\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use\
  \ exclusivamente o gerenciador uv para dependências. Todo código deve ser lintado\
  \ via ruff e tipado com mypy.\n"
