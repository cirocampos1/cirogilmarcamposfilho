  ---\n\n# Azure.AI.Agents.Persistent (.NET)\n\nLow-level SDK for creating and managing\
  \ persistent AI agents with threads, messages, runs, and tools.\n\n## Installation\n\
  \n```bash\ndotnet add package Azure.AI.Agents.Persistent --prerelease\ndotnet add\
  \ package Azure.Identity\n```\n\n**Current Versions**: Stable v1.1.0, Preview v1.2.0-beta.8\n\
  \n## Environment Variables\n\n```bash\nPROJECT_ENDPOINT=https://<resource>.services.ai.azure.com/api/projects/<project>\n\
  MODEL_DEPLOYMENT_NAME=gpt-4o-mini\nAZURE_BING_CONNECTION_ID=<bing-connection-resource-id>\n\
  AZURE_AI_SEARCH_CONNECTION_ID=<search-connection-resource-id>\n```\n\n## Authentication\n\
  \n```csharp\nusing Azure.AI.Agents.Persistent;\nusing Azure.Identity;\n\nvar projectEndpoint\
  \ = Environment.GetEnvironmentVariable(\"PROJECT_ENDPOINT\");\nPersistentAgentsClient\
  \ client = new(projectEndpoint, new DefaultAzureCredential());\n```\n\n## Client\
  \ Hierarchy\n\n```\nPersistentAgentsClient\n├── Administration  → Agent CRUD operations\n\
  ├── Threads         → Thread management\n├── Messages        → Message operations\n\
  ├── Runs            → Run execution and streaming\n├── Files           → File upload/download\n\
  └── VectorStores    → Vector store management\n```\n\n## Core Workflow\n\n### 1.\
  \ Create Agent\n\n```csharp\nvar modelDeploymentName = Environment.GetEnvironmentVariable(\"\
  MODEL_DEPLOYMENT_NAME\");\n\nPersistentAgent agent = await client.Administration.CreateAgentAsync(\n\
  \    model: modelDeploymentName,\n    name: \"Math Tutor\",\n    instructions: \"\
  You are a personal math tutor. Write and run code to answer math questions.\",\n\
  \    tools: [new CodeInterpreterToolDefinition()]\n);\n```\n\n### 2. Create Thread\
  \ and Message\n\n```csharp\n// Create thread\nPersistentAgentThread thread = await\
  \ client.Threads.CreateThreadAsync();\n\n// Create message\nawait client.Messages.CreateMessageAsync(\n\
  \    thread.Id,\n    MessageRole.User,\n    \"I need to solve the equation `3x +\
  \ 11 = 14`. Can you help me?\"\n);\n```\n\n### 3. Run Agent (Polling)\n\n```csharp\n\
  // Create run\nThreadRun run = await client.Runs.CreateRunAsync(\n    thread.Id,\n\
  \    agent.Id,\n    additionalInstructions: \"Please address the user as Jane Doe.\"\
  \n);\n\n// Poll for completion\ndo\n{\n    await Task.Delay(TimeSpan.FromMilliseconds(500));\n\
  \    run = await client.Runs.GetRunAsync(thread.Id, run.Id);\n}\nwhile (run.Status\
  \ == RunStatus.Queued || run.Status == RunStatus.InProgress);\n\n// Retrieve messages\n\
  await foreach (PersistentThreadMessage message in client.Messages.GetMessagesAsync(\n\
  \    threadId: thread.Id, \n    order: ListSortOrder.Ascending))\n{\n    Console.Write($\"\
  {message.Role}: \");\n    foreach (MessageContent content in message.ContentItems)\n\
  \    {\n        if (content is MessageTextContent textContent)\n            Console.WriteLine(textContent.Text);\n\
  \    }\n}\n```\n\n### 4. Streaming Response\n\n```csharp\nAsyn\n\n## Diretrizes\
