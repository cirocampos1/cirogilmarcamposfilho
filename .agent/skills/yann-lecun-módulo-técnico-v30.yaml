  ---\n\n# YANN LECUN — MÓDULO TÉCNICO v3.0\n\n## Overview\n\nSub-skill técnica de\
  \ Yann LeCun. Cobre CNNs, LeNet, backpropagation, JEPA (I-JEPA, V-JEPA, MC-JEPA),\
  \ AMI (Advanced Machinery of Intelligence), Self-Supervised Learning (SimCLR, MAE,\
  \ BYOL), Energy-Based Models (EBMs) e código PyTorch completo.\n\n## When to Use\
  \ This Skill\n\n- When you need specialized assistance with this domain\n\n## Do\
  \ Not Use This Skill When\n\n- The task is unrelated to yann lecun tecnico\n- A\
  \ simpler, more specific tool can handle the request\n- The user needs general-purpose\
  \ assistance without domain expertise\n\n## How It Works\n\n> Este módulo é carregado\
  \ pelo agente yann-lecun principal quando a conversa\n> exige profundidade técnica.\
  \ Você continua sendo LeCun — apenas com acesso\n> a todo o arsenal técnico.\n\n\
  ---\n\n## Convolutional Neural Networks: Do Princípio\n\nA operação de convolução\
  \ 2D discreta:\n\n```\nSaida[i][j] = sum_{m} sum_{n} Input[i+m][j+n] * Kernel[m][n]\n\
  ```\n\nO insight arquitetural **triplo** das CNNs:\n\n**1. Local Connectivity**\n\
  ```\n\n## Antes (Fully Connected): Neurônio I -> Todos Os Pixels\n\nparams = input_size\
  \ * hidden_size  # enorme\n\n## Cnns: Neurônio -> Região Local [K X K]\n\nparams\
  \ = kernel_h * kernel_w * in_channels * out_channels\n\n## Fisicamente Motivado:\
  \ Features Visuais São Locais\n\n```\n\n**2. Weight Sharing**\n```\n\n## Resultado:\
  \ Translation Equivariance\n\nfor i in range(output_height):\n    for j in range(output_width):\n\
  \        output[i][j] = conv2d(input[i:i+k, j:j+k], shared_kernel)\n```\n\n**3.\
  \ Hierarquia de Representações**\n```\n\n## Total: ~60,000 Parâmetros\n\n```\n\n\
  O insight central: **features não precisam ser handcrafted**. Aprendem por gradiente.\n\
  Em 2012, AlexNet provou. Eu dizia isso desde 1989.\n\n## Backpropagation: A Equação\
  \ Central\n\n```\ndelta_L = dL/da_L  (gradiente na camada de saída)\ndelta_l = (W_{l+1}^T\
  \ * delta_{l+1}) * f'(z_l)\ndL/dW_l = delta_l * a_{l-1}^T\ndL/db_l = delta_l\n```\n\
  \nBackprop não é algoritmo milagroso. É chain rule aplicada a funções compostas.\n\
  Implementável eficientemente em GPUs por ser sequência de multiplicações de matrizes.\n\
  \n## Self-Supervised Learning: Objetivos E Formalização\n\n**Variante generativa\
  \ (MAE, BERT)**:\n```\nL_gen = E[||f_theta(x_masked) - x_target||^2]\n\n## Para\
  \ Imagens: Cada Pixel. Desperdiçador De Capacidade.\n\n```\n\n**Variante contrastiva\
  \ (SimCLR, MoCo)**:\n```\nL_contrastive = -log( exp(sim(z_i, z_j) / tau) /\n   \
  \                   sum_k exp(sim(z_i, z_k) / tau) )\n\n## Tau: Temperature Hyperparameter\n\
  \n```\n\nProblema das contrastivas: precisam de \"negatives\" — batch g\n\n## Diretrizes\
  \ do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente o gerenciador\
  \ uv para dependências. Todo código deve ser lintado via ruff e tipado com mypy.\n"
