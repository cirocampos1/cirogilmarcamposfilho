  risk: unknown\nsource: community\ndate_added: '2026-02-27'\n---\n\n# Azure.Messaging.EventHubs\
  \ (.NET)\n\nHigh-throughput event streaming SDK for sending and receiving events\
  \ via Azure Event Hubs.\n\n## Installation\n\n```bash\n# Core package (sending and\
  \ simple receiving)\ndotnet add package Azure.Messaging.EventHubs\n\n# Processor\
  \ package (production receiving with checkpointing)\ndotnet add package Azure.Messaging.EventHubs.Processor\n\
  \n# Authentication\ndotnet add package Azure.Identity\n\n# For checkpointing (required\
  \ by EventProcessorClient)\ndotnet add package Azure.Storage.Blobs\n```\n\n**Current\
  \ Versions**: Azure.Messaging.EventHubs v5.12.2, Azure.Messaging.EventHubs.Processor\
  \ v5.12.2\n\n## Environment Variables\n\n```bash\nEVENTHUB_FULLY_QUALIFIED_NAMESPACE=<namespace>.servicebus.windows.net\n\
  EVENTHUB_NAME=<event-hub-name>\n\n# For checkpointing (EventProcessorClient)\nBLOB_STORAGE_CONNECTION_STRING=<storage-connection-string>\n\
  BLOB_CONTAINER_NAME=<checkpoint-container>\n\n# Alternative: Connection string auth\
  \ (not recommended for production)\nEVENTHUB_CONNECTION_STRING=Endpoint=sb://<namespace>.servicebus.windows.net/;SharedAccessKeyName=...\n\
  ```\n\n## Authentication\n\n```csharp\nusing Azure.Identity;\nusing Azure.Messaging.EventHubs;\n\
  using Azure.Messaging.EventHubs.Producer;\n\n// Always use DefaultAzureCredential\
  \ for production\nvar credential = new DefaultAzureCredential();\n\nvar fullyQualifiedNamespace\
  \ = Environment.GetEnvironmentVariable(\"EVENTHUB_FULLY_QUALIFIED_NAMESPACE\");\n\
  var eventHubName = Environment.GetEnvironmentVariable(\"EVENTHUB_NAME\");\n\nvar\
  \ producer = new EventHubProducerClient(\n    fullyQualifiedNamespace,\n    eventHubName,\n\
  \    credential);\n```\n\n**Required RBAC Roles**:\n- **Sending**: `Azure Event\
  \ Hubs Data Sender`\n- **Receiving**: `Azure Event Hubs Data Receiver`\n- **Both**:\
  \ `Azure Event Hubs Data Owner`\n\n## Client Types\n\n| Client | Purpose | When\
  \ to Use |\n|--------|---------|-------------|\n| `EventHubProducerClient` | Send\
  \ events immediately in batches | Real-time sending, full control over batching\
  \ |\n| `EventHubBufferedProducerClient` | Automatic batching with background sending\
  \ | High-volume, fire-and-forget scenarios |\n| `EventHubConsumerClient` | Simple\
  \ event reading | Prototyping only, NOT for production |\n| `EventProcessorClient`\
  \ | Production event processing | **Always use this for receiving in production**\
