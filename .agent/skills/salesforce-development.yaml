  risk: safe\nsource: vibeship-spawner-skills (Apache 2.0)\ndate_added: 2026-02-27\n\
  ---\n\n# Salesforce Development\n\nExpert patterns for Salesforce platform development\
  \ including Lightning Web\nComponents (LWC), Apex triggers and classes, REST/Bulk\
  \ APIs, Connected Apps,\nand Salesforce DX with scratch orgs and 2nd generation\
  \ packages (2GP).\n\n## Patterns\n\n### Lightning Web Component with Wire Service\n\
  \nUse @wire decorator for reactive data binding with Lightning Data Service\nor\
  \ Apex methods. @wire fits LWC's reactive architecture and enables\nSalesforce performance\
  \ optimizations.\n\n// myComponent.js\nimport { LightningElement, wire, api } from\
  \ 'lwc';\nimport { getRecord, getFieldValue } from 'lightning/uiRecordApi';\nimport\
  \ getRelatedRecords from '@salesforce/apex/MyController.getRelatedRecords';\nimport\
  \ ACCOUNT_NAME from '@salesforce/schema/Account.Name';\nimport ACCOUNT_INDUSTRY\
  \ from '@salesforce/schema/Account.Industry';\n\nconst FIELDS = [ACCOUNT_NAME, ACCOUNT_INDUSTRY];\n\
  \nexport default class MyComponent extends LightningElement {\n  @api recordId;\
  \  // Passed from parent or record page\n\n  // Wire to Lightning Data Service (preferred\
  \ for single records)\n  @wire(getRecord, { recordId: '$recordId', fields: FIELDS\
  \ })\n  account;\n\n  // Wire to Apex method (for complex queries)\n  @wire(getRelatedRecords,\
  \ { accountId: '$recordId' })\n  wiredRecords({ error, data }) {\n    if (data)\
  \ {\n      this.relatedRecords = data;\n      this.error = undefined;\n    } else\
  \ if (error) {\n      this.error = error;\n      this.relatedRecords = undefined;\n\
  \    }\n  }\n\n  get accountName() {\n    return getFieldValue(this.account.data,\
  \ ACCOUNT_NAME);\n  }\n\n  get isLoading() {\n    return !this.account.data && !this.account.error;\n\
  \  }\n\n  // Reactive: changing recordId automatically re-fetches\n}\n\n// myComponent.html\n\
  <template>\n  <lightning-card title={accountName}>\n    <template if:true={isLoading}>\n\
  \      <lightning-spinner alternative-text=\"Loading\"></lightning-spinner>\n  \
  \  </template>\n\n    <template if:true={account.data}>\n      <p>Industry: {industry}</p>\n\
  \    </template>\n\n    <template if:true={error}>\n      <p class=\"slds-text-color_error\"\
  >{error.body.message}</p>\n    </template>\n  </lightning-card>\n</template>\n\n\
  // MyController.cls\npublic with sharing class MyController {\n  @AuraEnabled(cacheable=true)\n\
  \  public static List<Contact> getRelatedRecords(Id accountId) {\n    return [\n\
  \      SELECT Id, Name, Email, Phone\n      FROM Contact\n      WHERE AccountId\
  \ = :accountId\n      WITH SECURITY_ENFORCED\n      LIMIT 100\n    ];\n  }\n}\n\n\
  ### Context\n\n- building LWC components\n- fetching Salesforce data\n- reactive\
  \ UI\n\n### Bulkified Apex Trigger with Handler Pattern\n\nApex triggers must be\
  \ bulkified to handle 200+ records per transaction.\nUse ha\n\n## Diretrizes do\
  \ \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente o gerenciador\
  \ uv para dependências. Todo código deve ser lintado via ruff e tipado com mypy.\n"
