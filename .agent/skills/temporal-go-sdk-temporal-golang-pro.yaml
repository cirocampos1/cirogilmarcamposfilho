  \n---\n\n# Temporal Go SDK (temporal-golang-pro)\n\n## Overview\n\nExpert-level\
  \ guide for building resilient, scalable, and deterministic distributed systems\
  \ using the Temporal Go SDK. This skill transforms vague orchestration requirements\
  \ into production-grade Go implementations, focusing on durable execution, strict\
  \ determinism, and enterprise-scale worker configuration.\n\n## When to Use This\
  \ Skill\n\n- **Designing Distributed Systems**: When building microservices that\
  \ require durable state and reliable orchestration.\n- **Implementing Complex Workflows**:\
  \ Using the Go SDK to handle long-running processes (days/months) or complex Saga\
  \ patterns.\n- **Optimizing Performance**: When workers need fine-tuned concurrency,\
  \ mTLS security, or custom interceptors.\n- **Ensuring Reliability**: Implementing\
  \ idempotent activities, graceful error handling, and sophisticated retry policies.\n\
  - **Maintenance & Evolution**: Versioning running workflows or performing zero-downtime\
  \ worker updates.\n\n## Do not use this skill when\n\n- Using Temporal with other\
  \ SDKs (Python, Java, TypeScript) - refer to their specific `-pro` skills.\n- The\
  \ task is a simple request/response without durability or coordination needs.\n\
  - High-level design without implementation (use `workflow-orchestration-patterns`).\n\
  \n## Step-by-Step Guide\n\n1.  **Gather Context**: Proactively ask for:\n    - Target\
  \ **Temporal Cluster** (Cloud vs. Self-hosted) and **Namespace**.\n    - **Task\
  \ Queue** names and expected throughput.\n    - **Security requirements** (mTLS\
  \ paths, authentication).\n    - **Failure modes** and desired retry/timeout policies.\n\
  2.  **Verify Determinism**: Before suggesting workflow code, verify against these\
  \ **5 Rules**:\n    - No native Go concurrency (goroutines).\n    - No native time\
  \ (`time.Now`, `time.Sleep`).\n    - No non-deterministic map iteration (must sort\
  \ keys).\n    - No direct external I/O or network calls.\n    - No non-deterministic\
  \ random numbers.\n3.  **Implement Incrementally**: Start with shared Protobuf/Data\
  \ classes, then Activities, then Workflows, and finally Workers.\n4.  **Leverage\
  \ Resources**: If the implementation requires advanced patterns (Sagas, Interceptors,\
  \ Replay Testing), explicitly refer to the implementation playbook and testing strategies.\n\
  \n## Capabilities\n\n### Go SDK Implementation\n\n- **Worker Management**: Deep\
  \ knowledge of `worker.Options`, including `MaxConcurrentActivityTaskPollers`, `WorkerStopTimeout`,\
  \ and `StickyScheduleToStartTimeout`.\n- **Interceptors**: Implementing Client,\
  \ Worker, and Workflow interceptors for cross-cutting concerns (logging, tracing,\
  \ auth).\n- **Custom Data Converters**: Integrating Protobuf, encrypted payloads,\
  \ or custom JSON marshaling.\n\n### Advanced Workflow Patterns\n\n- **Durable Concurrency**:\
  \ Using \n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use\
