  date_added: \"2026-02-27\"\n---\n\n# DOCX creation, editing, and analysis\n\n##\
  \ Overview\n\nA user may ask you to create, edit, or analyze the contents of a .docx\
  \ file. A .docx file is essentially a ZIP archive containing XML files and other\
  \ resources that you can read or edit. You have different tools and workflows available\
  \ for different tasks.\n\n## Workflow Decision Tree\n\n### Reading/Analyzing Content\n\
  Use \"Text extraction\" or \"Raw XML access\" sections below\n\n### Creating New\
  \ Document\nUse \"Creating a new Word document\" workflow\n\n### Editing Existing\
  \ Document\n- **Your own document + simple changes**\n  Use \"Basic OOXML editing\"\
  \ workflow\n\n- **Someone else's document**\n  Use **\"Redlining workflow\"** (recommended\
  \ default)\n\n- **Legal, academic, business, or government docs**\n  Use **\"Redlining\
  \ workflow\"** (required)\n\n## Reading and analyzing content\n\n### Text extraction\n\
  If you just need to read the text contents of a document, you should convert the\
  \ document to markdown using pandoc. Pandoc provides excellent support for preserving\
  \ document structure and can show tracked changes:\n\n```bash\n# Convert document\
  \ to markdown with tracked changes\npandoc --track-changes=all path-to-file.docx\
  \ -o output.md\n# Options: --track-changes=accept/reject/all\n```\n\n### Raw XML\
  \ access\nYou need raw XML access for: comments, complex formatting, document structure,\
  \ embedded media, and metadata. For any of these features, you'll need to unpack\
  \ a document and read its raw XML contents.\n\n#### Unpacking a file\n`python ooxml/scripts/unpack.py\
  \ <office_file> <output_directory>`\n\n#### Key file structures\n* `word/document.xml`\
  \ - Main document contents\n* `word/comments.xml` - Comments referenced in document.xml\n\
  * `word/media/` - Embedded images and media files\n* Tracked changes use `<w:ins>`\
  \ (insertions) and `<w:del>` (deletions) tags\n\n## Creating a new Word document\n\
  \nWhen creating a new Word document from scratch, use **docx-js**, which allows\
  \ you to create Word documents using JavaScript/TypeScript.\n\n### Workflow\n1.\
  \ **MANDATORY - READ ENTIRE FILE**: Read [`docx-js.md`](docx-js.md) (~500 lines)\
  \ completely from start to finish. **NEVER set any range limits when reading this\
  \ file.** Read the full file content for detailed syntax, critical formatting rules,\
  \ and best practices before proceeding with document creation.\n2. Create a JavaScript/TypeScript\
  \ file using Document, Paragraph, TextRun components (You can assume all dependencies\
  \ are installed, but if not, refer to the dependencies section below)\n3. Export\
  \ as .docx using Packer.toBuffer()\n\n## Editing an existing Word document\n\nWhen\
  \ editing an existing Word document, use the **Document library** (a Python library\
  \ for OOXM\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use\
  \ exclusivamente o gerenciador uv para dependências. Todo código deve ser lintado\
  \ via ruff e tipado com mypy.\n"
