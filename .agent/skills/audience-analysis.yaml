  # Audience Analysis


  Analyze and understand your audience using Apify Actors to extract follower demographics,
  engagement patterns, and behavior data from multiple platforms.


  ## When to Use


  - You need audience demographics, engagement patterns, or follower behavior from
  social platforms.

  - The task is to choose and run Apify Actors for audience analysis across Facebook,
  Instagram, YouTube, or TikTok.

  - You need structured extraction plus a summarized interpretation of audience findings.


  ## Prerequisites

  (No need to check it upfront)


  - `.env` file with `APIFY_TOKEN`

  - Node.js 20.6+ (for native `--env-file` support)

  - `mcpc` CLI tool: `npm install -g @apify/mcpc`


  ## Workflow


  Copy this checklist and track progress:


  ```

  Task Progress:

  - [ ] Step 1: Identify audience analysis type (select Actor)

  - [ ] Step 2: Fetch Actor schema via mcpc

  - [ ] Step 3: Ask user preferences (format, filename)

  - [ ] Step 4: Run the analysis script

  - [ ] Step 5: Summarize findings

  ```


  ### Step 1: Identify Audience Analysis Type


  Select the appropriate Actor based on analysis needs:


  | User Need | Actor ID | Best For |

  |-----------|----------|----------|

  | Facebook follower demographics | `apify/facebook-followers-following-scraper`
  | FB followers/following lists |

  | Facebook engagement behavior | `apify/facebook-likes-scraper` | FB post likes
  analysis |

  | Facebook video audience | `apify/facebook-reels-scraper` | FB Reels viewers |

  | Facebook comment analysis | `apify/facebook-comments-scraper` | FB post/video
  comments |

  | Facebook content engagement | `apify/facebook-posts-scraper` | FB post engagement
  metrics |

  | Instagram audience sizing | `apify/instagram-profile-scraper` | IG profile demographics
  |

  | Instagram location-based | `apify/instagram-search-scraper` | IG geo-tagged audience
  |

  | Instagram tagged network | `apify/instagram-tagged-scraper` | IG tag network analysis
  |

  | Instagram comprehensive | `apify/instagram-scraper` | Full IG audience data |

  | Instagram API-based | `apify/instagram-api-scraper` | IG API access |

  | Instagram follower counts | `apify/instagram-followers-count-scraper` | IG follower
  tracking |

  | Instagram comment export | `apify/export-instagram-comments-posts` | IG comment
  bulk export |

  | Instagram comment analysis | `apify/instagram-comment-scraper` | IG comment sentiment
  |

  | YouTube viewer feedback | `streamers/youtube-comments-scraper` | YT comment analysis
  |

  | YouTube channel audience | `streamers/youtube-channel-scraper` | YT channel subscribers
  |

  | TikTok follower demographics | `clockworks/tiktok-followers-scraper` | TT follower
  lists |

  | TikTok profile analysis | `clockworks/tiktok-profile-scraper` | TT profile demographics
  |

  | TikTok comment analysis | `clockworks/tiktok-comments-scraper` | TT comment engage


