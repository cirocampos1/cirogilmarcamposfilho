  \ — type-safe tool use, structured outputs, dependency injection, and multi-model\
  \ support.\"\ncategory: ai-agents\nrisk: safe\nsource: community\ndate_added: \"\
  2026-03-18\"\nauthor: suhaibjanjua\ntags: [pydantic-ai, ai-agents, llm, openai,\
  \ anthropic, gemini, tool-use, structured-output, python]\ntools: [claude, cursor,\
  \ gemini]\n---\n\n# PydanticAI — Typed AI Agents in Python\n\n## Overview\n\nPydanticAI\
  \ is a Python agent framework from the Pydantic team that brings the same type-safety\
  \ and validation guarantees as Pydantic to LLM-based applications. It supports structured\
  \ outputs (validated with Pydantic models), dependency injection for testability,\
  \ streamed responses, multi-turn conversations, and tool use — across OpenAI, Anthropic,\
  \ Google Gemini, Groq, Mistral, and Ollama. Use this skill when building production\
  \ AI agents, chatbots, or LLM pipelines where correctness and testability matter.\n\
  \n## When to Use This Skill\n\n- Use when building Python AI agents that call tools\
  \ and return structured data\n- Use when you need validated, typed LLM outputs (not\
  \ raw strings)\n- Use when you want to write unit tests for agent logic without\
  \ hitting a real LLM\n- Use when switching between LLM providers without rewriting\
  \ agent code\n- Use when the user asks about `Agent`, `@agent.tool`, `RunContext`,\
  \ `ModelRetry`, or `result_type`\n\n## How It Works\n\n### Step 1: Installation\n\
  \n```bash\npip install pydantic-ai\n\n# Install extras for specific providers\n\
  pip install 'pydantic-ai[openai]'       # OpenAI / Azure OpenAI\npip install 'pydantic-ai[anthropic]'\
  \    # Anthropic Claude\npip install 'pydantic-ai[gemini]'       # Google Gemini\n\
  pip install 'pydantic-ai[groq]'         # Groq\npip install 'pydantic-ai[vertexai]'\
  \     # Google Vertex AI\n```\n\n### Step 2: A Minimal Agent\n\n```python\nfrom\
  \ pydantic_ai import Agent\n\n# Simple agent — returns a plain string\nagent = Agent(\n\
  \    'anthropic:claude-sonnet-4-6',\n    system_prompt='You are a helpful assistant.\
  \ Be concise.',\n)\n\nresult = agent.run_sync('What is the capital of Japan?')\n\
  print(result.data)  # \"Tokyo\"\nprint(result.usage())  # Usage(requests=1, request_tokens=...,\
  \ response_tokens=...)\n```\n\n### Step 3: Structured Output with Pydantic Models\n\
  \n```python\nfrom pydantic import BaseModel\nfrom pydantic_ai import Agent\n\nclass\
  \ MovieReview(BaseModel):\n    title: str\n    year: int\n    rating: float  # 0.0\
  \ to 10.0\n    summary: str\n    recommended: bool\n\nagent = Agent(\n    'openai:gpt-4o',\n\
  \    result_type=MovieReview,\n    system_prompt='You are a film critic. Return\
  \ structured reviews.',\n)\n\nresult = agent.run_sync('Review Inception (2010)')\n\
  review = result.data  # Fully typed MovieReview instance\nprint(f\"{review.title}\
  \ ({review.year}): {review.rating}/10\")\nprint(f\"Recommended: {review.recommended}\"\
  )\n```\n\n### Step 4: Tool Use\n\nRegister tools with `@agent.tool` — the LLM can\
  \ call them during a run:\n\n```python\nfrom pydantic_ai import Agent, RunContext\n\
  from pydantic import BaseMod\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ\
  \ DE ENGENHARIA: Use exclusivamente o gerenciador uv para dependências. Todo código\
  \ deve ser lintado via ruff e tipado com mypy.\n"
