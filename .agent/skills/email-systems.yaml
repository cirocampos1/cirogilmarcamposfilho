  \ 2.0)\ndate_added: 2026-02-27\n---\n\n# Email Systems\n\nEmail has the highest\
  \ ROI of any marketing channel. $36 for every $1 spent.\nYet most startups treat\
  \ it as an afterthought - bulk blasts, no personalization,\nlanding in spam folders.\n\
  \nThis skill covers transactional email that works, marketing automation that\n\
  converts, deliverability that reaches inboxes, and the infrastructure decisions\n\
  that scale.\n\n## Principles\n\n- Transactional vs Marketing separation | Description:\
  \ Transactional emails (password reset, receipts) need 100% delivery.\nMarketing\
  \ emails (newsletters, promos) have lower priority. Use separate\nIP addresses and\
  \ providers to protect transactional deliverability. | Examples: Good: Password\
  \ resets via Postmark, marketing via ConvertKit | Bad: All emails through one SendGrid\
  \ account\n- Permission is everything | Description: Only email people who asked\
  \ to hear from you. Double opt-in for marketing.\nEasy unsubscribe. Clean your list\
  \ ruthlessly. Bad lists destroy deliverability. | Examples: Good: Confirmed subscription\
  \ + one-click unsubscribe | Bad: Scraped email list, hidden unsubscribe, bought\
  \ contacts\n- Deliverability is infrastructure | Description: SPF, DKIM, DMARC are\
  \ not optional. Warm up new IPs. Monitor bounce rates.\nDeliverability is earned\
  \ through technical setup and good behavior. | Examples: Good: All DNS records configured,\
  \ dedicated IP warmed for 4 weeks | Bad: Using free tier shared IP, no authentication\
  \ records\n- One email, one goal | Description: Each email should have exactly one\
  \ purpose and one CTA. Multiple asks\nmeans nothing gets clicked. Clear single action.\
  \ | Examples: Good: \"Click here to verify your email\" (one button) | Bad: \"Verify\
  \ email, check out our blog, follow us on Twitter, refer a friend...\"\n- Timing\
  \ and frequency matter | Description: Wrong time = low open rates. Too frequent\
  \ = unsubscribes. Let users\nset preferences. Test send times. Respect inbox fatigue.\
  \ | Examples: Good: Weekly digest on Tuesday 10am user's timezone, preference center\
  \ | Bad: Daily emails at random times, no way to reduce frequency\n\n## Patterns\n\
  \n### Transactional Email Queue\n\nQueue all transactional emails with retry logic\
  \ and monitoring\n\n**When to use**: Sending any critical email (password reset,\
  \ receipts, confirmations)\n\n// Don't block request on email send\nawait queue.add('email',\
  \ {\n  template: 'password-reset',\n  to: user.email,\n  data: { resetToken, expiresAt\
  \ }\n}, {\n  attempts: 3,\n  backoff: { type: 'exponential', delay: 2000 }\n});\n\
  \n### Email Event Tracking\n\nTrack delivery, opens, clicks, bounces, and complaints\n\
  \n**When to use**: Any email campaign or transactional flow\n\n# Track lifecycle:\n\
  - Queued: Email entered system\n- Sent: Handed to provider\n- Delivered: Rea\n\n\
