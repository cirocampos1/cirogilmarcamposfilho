  \n**Setup Intents (Save Payment Methods)**\n- Collect payment method without charging\n\
  - Used for subscriptions and future payments\n- Requires customer confirmation\n\
  \n### 2. Webhooks\n**Critical Events:**\n- `payment_intent.succeeded`: Payment completed\n\
