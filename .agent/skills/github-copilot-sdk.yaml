  \nrisk: unknown\nsource: community\ndate_added: \"2026-02-27\"\n---\n\n# GitHub\
  \ Copilot SDK\n\nBuild applications that programmatically interact with GitHub Copilot.\
  \ The SDK wraps the Copilot CLI via JSON-RPC, providing session management, custom\
  \ tools, hooks, MCP server integration, and streaming across Node.js, Python, Go,\
  \ and .NET.\n\n## Prerequisites\n\n- **GitHub Copilot CLI** installed and authenticated\
  \ (`copilot --version` to verify)\n- **GitHub Copilot subscription** (Individual,\
  \ Business, or Enterprise) — not required for BYOK\n- **Runtime:** Node.js 18+ /\
  \ Python 3.8+ / Go 1.21+ / .NET 8.0+\n\n## Installation\n\n| Language | Package\
  \ | Install |\n|----------|---------|---------|\n| Node.js | `@github/copilot-sdk`\
  \ | `npm install @github/copilot-sdk` |\n| Python | `github-copilot-sdk` | `pip\
  \ install github-copilot-sdk` |\n| Go | `github.com/github/copilot-sdk/go` | `go\
  \ get github.com/github/copilot-sdk/go` |\n| .NET | `GitHub.Copilot.SDK` | `dotnet\
  \ add package GitHub.Copilot.SDK` |\n\n---\n\n## Core Pattern: Client → Session\
  \ → Message\n\nAll SDK usage follows this pattern: create a client, create a session,\
  \ send messages.\n\n### Node.js / TypeScript\n\n```typescript\nimport { CopilotClient\
  \ } from \"@github/copilot-sdk\";\n\nconst client = new CopilotClient();\nconst\
  \ session = await client.createSession({ model: \"gpt-4.1\" });\n\nconst response\
  \ = await session.sendAndWait({ prompt: \"What is 2 + 2?\" });\nconsole.log(response?.data.content);\n\
  \nawait client.stop();\n```\n\n### Python\n\n```python\nimport asyncio\nfrom copilot\
  \ import CopilotClient\n\nasync def main():\n    client = CopilotClient()\n    await\
  \ client.start()\n    session = await client.create_session({\"model\": \"gpt-4.1\"\
  })\n    response = await session.send_and_wait({\"prompt\": \"What is 2 + 2?\"})\n\
  \    print(response.data.content)\n    await client.stop()\n\nasyncio.run(main())\n\
  ```\n\n### Go\n\n```go\nclient := copilot.NewClient(nil)\nif err := client.Start(ctx);\
  \ err != nil { log.Fatal(err) }\ndefer client.Stop()\n\nsession, _ := client.CreateSession(ctx,\
  \ &copilot.SessionConfig{Model: \"gpt-4.1\"})\nresponse, _ := session.SendAndWait(ctx,\
  \ copilot.MessageOptions{Prompt: \"What is 2 + 2?\"})\nfmt.Println(*response.Data.Content)\n\
  ```\n\n### .NET\n\n```csharp\nawait using var client = new CopilotClient();\nawait\
  \ using var session = await client.CreateSessionAsync(new SessionConfig { Model\
  \ = \"gpt-4.1\" });\nvar response = await session.SendAndWaitAsync(new MessageOptions\
  \ { Prompt = \"What is 2 + 2?\" });\nConsole.WriteLine(response?.Data.Content);\n\
  ```\n\n---\n\n## Streaming Responses\n\nEnable real-time output by setting `streaming:\
  \ true` and subscribing to delta events.\n\n```typescript\nconst session = await\
  \ client.createSession({ model: \"gpt-4.1\", streaming: true });\n\nsession.on(\"\
  assistant.message_delta\", (eve\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ\
