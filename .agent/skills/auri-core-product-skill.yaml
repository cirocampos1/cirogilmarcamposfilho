  \n## Auri - Core Product Skill\n\n>  A voz que pensa com voce.\n\nAuri e um assistente\
  \ de voz de nova geracao construido sobre Amazon Alexa + Claude claude-opus-4-20250805.\n\
  Enquanto a Alexa tradicional executa comandos, a Auri conduz conversas reais e raciocina\
  \ sobre contexto.\n\n---\n\n## O Que E A Auri\n\nA Auri e uma Alexa Skill avancada\
  \ que substitui o motor de respostas padrao pelo modelo\nClaude claude-opus-4-20250805\
  \ da Anthropic. O resultado: um assistente de voz capaz de:\n\n- Conduzir conversas\
  \ multi-turno com memoria contextual\n- Raciocinar sobre problemas complexos em\
  \ linguagem natural\n- Adaptar tom e profundidade ao perfil do usuario\n- Operar\
  \ 100% em portugues brasileiro com nuances culturais\n- Integrar com o ecossistema\
  \ Amazon (calendario, compras, smart home, musica)\n\n## Proposta De Valor Unica\n\
  \nANTES: Alexa, qual a previsao do tempo? -> Amanha, 28 graus e nublado.\n\nDEPOIS:\
  \ Auri, devo levar guarda-chuva amanha?\n  -> Amanha 70% de chuva a tarde mas a\
  \ manha estara limpa. Reuniao as 14h? Leve guarda-chuva.\n\n## Diferencial Estrategico\n\
  \n1. Continuidade conversacional - Lembra contexto entre sessoes via DynamoDB\n\
  2. Personalidade consistente - Voz Vitoria Neural + persona calibrada\n3. Raciocinio\
  \ profundo - Claude claude-opus-4-20250805 como motor principal\n4. Ecossistema\
  \ integrado - Native no hardware Alexa (Echo, Echo Dot, Echo Show)\n5. Privacidade\
  \ by design - Dados na AWS, sem compartilhamento com terceiros\n\n---\n\n## Valores\
  \ Da Marca\n\n- Clareza - Respostas objetivas, sem rodeios\n- Empatia - Entende\
