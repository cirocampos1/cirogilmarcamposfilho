  \ unknown\nsource: community\ndate_added: \"2026-02-27\"\n---\n\n# NoSQL Expert\
  \ Patterns (Cassandra & DynamoDB)\n\n## Overview\n\nThis skill provides professional\
  \ mental models and design patterns for **distributed wide-column and key-value\
  \ stores** (specifically Apache Cassandra and Amazon DynamoDB).\n\nUnlike SQL (where\
  \ you model data entities), or document stores (like MongoDB), these distributed\
  \ systems require you to **model your queries first**.\n\n## When to Use\n- **Designing\
  \ for Scale**: Moving beyond simple single-node databases to distributed clusters.\n\
  - **Technology Selection**: Evaluating or using **Cassandra**, **ScyllaDB**, or\
  \ **DynamoDB**.\n- **Performance Tuning**: Troubleshooting \"hot partitions\" or\
  \ high latency in existing NoSQL systems.\n- **Microservices**: Implementing \"\
  database-per-service\" patterns where highly optimized reads are required.\n\n##\
  \ The Mental Shift: SQL vs. Distributed NoSQL\n\n| Feature | SQL (Relational) |\
  \ Distributed NoSQL (Cassandra/DynamoDB) |\n| :--- | :--- | :--- |\n| **Data modeling**\
  \ | Model Entities + Relationships | Model **Queries** (Access Patterns) |\n| **Joins**\
  \ | CPU-intensive, at read time | **Pre-computed** (Denormalized) at write time\
  \ |\n| **Storage cost** | Expensive (minimize duplication) | Cheap (duplicate data\
  \ for read speed) |\n| **Consistency** | ACID (Strong) | **BASE (Eventual)** / Tunable\
  \ |\n| **Scalability** | Vertical (Bigger machine) | **Horizontal** (More nodes/shards)\
  \ |\n\n> **The Golden Rule:** In SQL, you design the data model to answer *any*\
  \ query. In NoSQL, you design the data model to answer *specific* queries efficiently.\n\
  \n## Core Design Patterns\n\n### 1. Query-First Modeling (Access Patterns)\n\nYou\
  \ typically cannot \"add a query later\" without migration or creating a new table/index.\n\
  \n**Process:**\n1.  **List all Entities** (User, Order, Product).\n2.  **List all\
  \ Access Patterns** (\"Get User by Email\", \"Get Orders by User sorted by Date\"\
  ).\n3.  **Design Table(s)** specifically to serve those patterns with a single lookup.\n\
  \n### 2. The Partition Key is King\n\nData is distributed across physical nodes\
  \ based on the **Partition Key (PK)**.\n-   **Goal:** Even distribution of data\
  \ and traffic.\n-   **Anti-Pattern:** Using a low-cardinality PK (e.g., `status=\"\
  active\"` or `gender=\"m\"`) creates **Hot Partitions**, limiting throughput to\
  \ a single node's capacity.\n-   **Best Practice:** Use high-cardinality keys (User\
  \ IDs, Device IDs, Composite Keys).\n\n### 3. Clustering / Sort Keys\n\nWithin a\
  \ partition, data is sorted on disk by the **Clustering Key (Cassandra)** or **Sort\
  \ Key (DynamoDB)**.\n-   This allows for efficient **Range Queries** (e.g., `WHERE\
  \ user_id=X AND date > Y`).\n-   It effectively pre-sorts your data for specific\
