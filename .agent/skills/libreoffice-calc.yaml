  \ personal\ndate_added: \"2026-02-27\"\n---\n\n# LibreOffice Calc\n\n## Overview\n\
  \nLibreOffice Calc skill for creating, editing, converting, and automating spreadsheet\
  \ workflows using the native ODS (OpenDocument Spreadsheet) format.\n\n## When to\
  \ Use This Skill\n\nUse this skill when:\n- Creating new spreadsheets in ODS format\n\
  - Converting between ODS, XLSX, CSV, PDF formats\n- Automating data processing and\
  \ analysis\n- Creating formulas, charts, and pivot tables\n- Batch processing spreadsheet\
  \ operations\n\n## Core Capabilities\n\n### 1. Spreadsheet Creation\n- Create new\
  \ ODS spreadsheets from scratch\n- Generate spreadsheets from templates\n- Create\
  \ data entry forms\n- Build dashboards and reports\n\n### 2. Format Conversion\n\
  - ODS to other formats: XLSX, CSV, PDF, HTML\n- Other formats to ODS: XLSX, XLS,\
  \ CSV, DBF\n- Batch conversion of multiple files\n\n### 3. Data Automation\n- Formula\
  \ automation and calculations\n- Data import from CSV, database, APIs\n- Data export\
  \ to various formats\n- Batch data processing\n\n### 4. Data Analysis\n- Pivot tables\
  \ and data summarization\n- Statistical functions and analysis\n- Data validation\
  \ and filtering\n- Conditional formatting\n\n### 5. Integration\n- Command-line\
  \ automation via soffice\n- Python scripting with UNO\n- Database connectivity\n\
  \n## Workflows\n\n### Creating a New Spreadsheet\n\n#### Method 1: Command-Line\n\
  ```bash\nsoffice --calc template.ods\n```\n\n#### Method 2: Python with UNO\n```python\n\
  import uno\n\ndef create_spreadsheet():\n    local_ctx = uno.getComponentContext()\n\
  \    resolver = local_ctx.ServiceManager.createInstanceWithContext(\n        \"\
  com.sun.star.bridge.UnoUrlResolver\", local_ctx\n    )\n    ctx = resolver.resolve(\n\
  \        \"uno:socket,host=localhost,port=8100;urp;StarOffice.ComponentContext\"\
  \n    )\n    smgr = ctx.ServiceManager\n    doc = smgr.createInstanceWithContext(\"\
  com.sun.star.sheet.SpreadsheetDocument\", ctx)\n    sheets = doc.getSheets()\n \
  \   sheet = sheets.getByIndex(0)\n    cell = sheet.getCellByPosition(0, 0)\n   \
  \ cell.setString(\"Hello from LibreOffice Calc!\")\n    doc.storeToURL(\"file:///path/to/spreadsheet.ods\"\
  , ())\n    doc.close(True)\n```\n\n#### Method 3: Using ezodf\n```python\nimport\
  \ ezodf\n\ndoc = ezodf.newdoc('ods', 'spreadsheet.ods')\nsheet = doc.sheets[0]\n\
  sheet['A1'].set_value('Hello')\nsheet['B1'].set_value('World')\ndoc.save()\n```\n\
  \n### Converting Spreadsheets\n\n```bash\n# ODS to XLSX\nsoffice --headless --convert-to\
  \ xlsx spreadsheet.ods\n\n# ODS to CSV\nsoffice --headless --convert-to csv spreadsheet.ods\n\
  \n# ODS to PDF\nsoffice --headless --convert-to pdf spreadsheet.ods\n\n# XLSX to\
  \ ODS\nsoffice --headless --convert-to ods spreadsheet.xlsx\n\n# Batch convert\n\
  for file in *.ods; do\n    soffice --headless --convert-to xlsx \"$file\"\ndone\n\
  ```\n\n### Formula Automation\n```python\nimport uno\n\ndef create_formula_spreadsheet():\n\
