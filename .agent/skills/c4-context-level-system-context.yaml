  \ to user journey map]\n\n## User Journeys\n\n### [Feature Name] - [Persona Name]\
  \ Journey\n\n1. [Step 1]: [Description]\n2. [Step 2]: [Description]\n3. [Step 3]:\
  \ [Description]\n   ...\n\n### [External System] Integration Journey\n\n1. [Step\
  \ 1]: [Description]\n2. [Step 2]: [Description]\n   ...\n\n## External Systems and\
  \ Dependencies\n\n### [External System Name]\n\n- **Type**: [Database, API, Service,\
  \ Message Queue, etc.]\n- **Description**: [What this external system provides]\n\
  - **Integration Type**: [API, Events, File Transfer, etc.]\n- **Purpose**: [Why\
  \ the system depends on this]\n\n## System Context Diagram\n\n[Mermaid diagram showing\
  \ system, users, and external systems]\n\n## Related Documentation\n\n- Container\
  \ Documentation\n- Component Documentation\n```\n\n## Context Diagram Template\n\
  \nAccording to the [C4 model](https://c4model.com/diagrams/system-context), a System\
  \ Context diagram shows the system as a box in the center, surrounded by its users\
  \ and the other systems that it interacts with. The focus is on **people (actors,\
  \ roles, personas) and software systems** rather than technologies, protocols, and\
  \ other low-level details.\n\nUse proper Mermaid C4 syntax:\n\n```mermaid\nC4Context\n\
  \    title System Context Diagram\n\n    Person(user, \"User\", \"Uses the system\
  \ to accomplish their goals\")\n    System(system, \"System Name\", \"Provides features\
  \ X, Y, and Z\")\n    System_Ext(external1, \"External System 1\", \"Provides service\
  \ A\")\n    System_Ext(external2, \"External System 2\", \"Provides service B\"\
  )\n    \n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente\
  \ o gerenciador uv para dependências. Todo código deve ser lintado via ruff e tipado\
  \ com mypy.\n"
