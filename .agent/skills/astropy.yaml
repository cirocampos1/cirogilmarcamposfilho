  ---\n\n# Astropy\n\n## Overview\n\nAstropy is the core Python package for astronomy,\
  \ providing essential functionality for astronomical research and data analysis.\
  \ Use astropy for coordinate transformations, unit and quantity calculations, FITS\
  \ file operations, cosmological calculations, precise time handling, tabular data\
  \ manipulation, and astronomical image processing.\n\n## When to Use This Skill\n\
  \nUse astropy when tasks involve:\n- Converting between celestial coordinate systems\
  \ (ICRS, Galactic, FK5, AltAz, etc.)\n- Working with physical units and quantities\
  \ (converting Jy to mJy, parsecs to km, etc.)\n- Reading, writing, or manipulating\
  \ FITS files (images or tables)\n- Cosmological calculations (luminosity distance,\
  \ lookback time, Hubble parameter)\n- Precise time handling with different time\
  \ scales (UTC, TAI, TT, TDB) and formats (JD, MJD, ISO)\n- Table operations (reading\
  \ catalogs, cross-matching, filtering, joining)\n- WCS transformations between pixel\
  \ and world coordinates\n- Astronomical constants and calculations\n\n## Quick Start\n\
  \n```python\nimport astropy.units as u\nfrom astropy.coordinates import SkyCoord\n\
  from astropy.time import Time\nfrom astropy.io import fits\nfrom astropy.table import\
  \ Table\nfrom astropy.cosmology import Planck18\n\n# Units and quantities\ndistance\
  \ = 100 * u.pc\ndistance_km = distance.to(u.km)\n\n# Coordinates\ncoord = SkyCoord(ra=10.5*u.degree,\
  \ dec=41.2*u.degree, frame='icrs')\ncoord_galactic = coord.galactic\n\n# Time\n\
  t = Time('2023-01-15 12:30:00')\njd = t.jd  # Julian Date\n\n# FITS files\ndata\
  \ = fits.getdata('image.fits')\nheader = fits.getheader('image.fits')\n\n# Tables\n\
  table = Table.read('catalog.fits')\n\n# Cosmology\nd_L = Planck18.luminosity_distance(z=1.0)\n\
  ```\n\n## Core Capabilities\n\n### 1. Units and Quantities (`astropy.units`)\n\n\
  Handle physical quantities with units, perform unit conversions, and ensure dimensional\
  \ consistency in calculations.\n\n**Key operations:**\n- Create quantities by multiplying\
  \ values with units\n- Convert between units using `.to()` method\n- Perform arithmetic\
  \ with automatic unit handling\n- Use equivalencies for domain-specific conversions\
  \ (spectral, doppler, parallax)\n- Work with logarithmic units (magnitudes, decibels)\n\
  \n**See:** `references/units.md` for comprehensive documentation, unit systems,\
  \ equivalencies, performance optimization, and unit arithmetic.\n\n### 2. Coordinate\
  \ Systems (`astropy.coordinates`)\n\nRepresent celestial positions and transform\
  \ between different coordinate frames.\n\n**Key operations:**\n- Create coordinates\
  \ with `SkyCoord` in any frame (ICRS, Galactic, FK5, AltAz, etc.)\n- Transform between\
  \ coordinate systems\n- Calculate angular separations and position angles\n- Match\
  \ coordinates to catalogs\n- Include distance f\n\n## Diretrizes do \n\n\
