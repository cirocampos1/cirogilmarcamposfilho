  description: \"Comprehensive GitLab CI/CD pipeline patterns for automated testing,\
  \ building, and deployment.\"\nrisk: critical\nsource: community\ndate_added: \"\
  2026-02-27\"\n---\n\n# GitLab CI Patterns\n\nComprehensive GitLab CI/CD pipeline\
  \ patterns for automated testing, building, and deployment.\n\n## Do not use this\
  \ skill when\n\n- The task is unrelated to gitlab ci patterns\n- You need a different\
  \ domain or tool outside this scope\n\n## Instructions\n\n- Clarify goals, constraints,\
  \ and required inputs.\n- Apply relevant best practices and validate outcomes.\n\
  - Provide actionable steps and verification.\n- If detailed examples are required,\
  \ open `resources/implementation-playbook.md`.\n\n## Purpose\n\nCreate efficient\
  \ GitLab CI pipelines with proper stage organization, caching, and deployment strategies.\n\
  \n## Use this skill when\n\n- Automate GitLab-based CI/CD\n- Implement multi-stage\
  \ pipelines\n- Configure GitLab Runners\n- Deploy to Kubernetes from GitLab\n- Implement\
  \ GitOps workflows\n\n## Basic Pipeline Structure\n\n```yaml\nstages:\n  - build\n\
  \  - test\n  - deploy\n\nvariables:\n  DOCKER_DRIVER: overlay2\n  DOCKER_TLS_CERTDIR:\
  \ \"/certs\"\n\nbuild:\n  stage: build\n  image: node:20\n  script:\n    - npm ci\n\
  \    - npm run build\n  artifacts:\n    paths:\n      - dist/\n    expire_in: 1\
  \ hour\n  cache:\n    key: ${CI_COMMIT_REF_SLUG}\n    paths:\n      - node_modules/\n\
  \ntest:\n  stage: test\n  image: node:20\n  script:\n    - npm ci\n    - npm run\
  \ lint\n    - npm test\n  coverage: '/Lines\\s*:\\s*(\\d+\\.\\d+)%/'\n  artifacts:\n\
  \    reports:\n      coverage_report:\n        coverage_format: cobertura\n    \
  \    path: coverage/cobertura-coverage.xml\n\ndeploy:\n  stage: deploy\n  image:\
  \ bitnami/kubectl:latest\n  script:\n    - kubectl apply -f k8s/\n    - kubectl\
  \ rollout status deployment/my-app\n  only:\n    - main\n  environment:\n    name:\
  \ production\n    url: https://app.example.com\n```\n\n## Docker Build and Push\n\
  \n```yaml\nbuild-docker:\n  stage: build\n  image: docker:24\n  services:\n    -\
  \ docker:24-dind\n  before_script:\n    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD\
  \ $CI_REGISTRY\n  script:\n    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA\
  \ .\n    - docker build -t $CI_REGISTRY_IMAGE:latest .\n    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA\n\
  \    - docker push $CI_REGISTRY_IMAGE:latest\n  only:\n    - main\n    - tags\n\
  ```\n\n## Multi-Environment Deployment\n\n```yaml\n.deploy_template: &deploy_template\n\
  \  image: bitnami/kubectl:latest\n  before_script:\n    - kubectl config set-cluster\
  \ k8s --server=\"$KUBE_URL\" --insecure-skip-tls-verify=true\n    - kubectl config\
  \ set-credentials admin --token=\"$KUBE_TOKEN\"\n    - kubectl config set-context\
  \ default --cluster=k8s --user=admin\n    - kubectl config use-context default\n\
  \ndeploy:staging:\n  <<: *deploy_template\n  stage: deploy\n  script:\n    - kubectl\
  \ apply -f k8s/ -n staging\n    - kubectl rollout status deployment/my-app -n staging\n\
  \  environment:\n    name: staging\n    url: https://staging.example.com\n  only:\n\
  \    - develop\n\ndeploy:production:\n  <<: *deploy_t\n\n## Diretrizes do \n\
  \n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente o gerenciador uv para dependências.\
  \ Todo código deve ser lintado via ruff e tipado com mypy.\n"
