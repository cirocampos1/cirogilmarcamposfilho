  source: vibeship-spawner-skills (Apache 2.0)\ndate_added: 2026-02-27\n---\n\n# Browser\
  \ Automation\n\nBrowser automation powers web testing, scraping, and AI agent interactions.\n\
  The difference between a flaky script and a reliable system comes down to\nunderstanding\
  \ selectors, waiting strategies, and anti-detection patterns.\n\nThis skill covers\
  \ Playwright (recommended) and Puppeteer, with patterns for\ntesting, scraping,\
  \ and agentic browser control. Key insight: Playwright won\nthe framework war. Unless\
  \ you need Puppeteer's stealth ecosystem or are\nChrome-only, Playwright is the\
  \ better choice in 2025.\n\nCritical distinction: Testing automation (predictable\
  \ apps you control) vs\nscraping/agent automation (unpredictable sites that fight\
  \ back). Different\nproblems, different solutions.\n\n## Principles\n\n- Use user-facing\
  \ locators (getByRole, getByText) over CSS/XPath\n- Never add manual waits - Playwright's\
  \ auto-wait handles it\n- Each test/task should be fully isolated with fresh context\n\
  - Screenshots and traces are your debugging lifeline\n- Headless for CI, headed\
  \ for debugging\n- Anti-detection is cat-and-mouse - stay current or get blocked\n\
  \n## Capabilities\n\n- browser-automation\n- playwright\n- puppeteer\n- headless-browsers\n\
  - web-scraping\n- browser-testing\n- e2e-testing\n- ui-automation\n- selenium-alternatives\n\
  \n## Scope\n\n- api-testing → backend\n- load-testing → performance-thinker\n- accessibility-testing\
  \ → accessibility-specialist\n- visual-regression-testing → ui-design\n\n## Tooling\n\
  \n### Frameworks\n\n- Playwright - When: Default choice - cross-browser, auto-waiting,\
  \ best DX Note: 96% success rate, 4.5s avg execution, Microsoft-backed\n- Puppeteer\
  \ - When: Chrome-only, need stealth plugins, existing codebase Note: 75% success\
  \ rate at scale, but best stealth ecosystem\n- Selenium - When: Legacy systems,\
  \ specific language bindings Note: Slower, more verbose, but widest browser support\n\
  \n### Stealth_tools\n\n- puppeteer-extra-plugin-stealth - When: Need to bypass bot\
  \ detection with Puppeteer Note: Gold standard for anti-detection\n- playwright-extra\
  \ - When: Stealth plugins for Playwright Note: Port of puppeteer-extra ecosystem\n\
  - undetected-chromedriver - When: Selenium anti-detection Note: Dynamic bypass of\
  \ detection\n\n### Cloud_browsers\n\n- Browserbase - When: Managed headless infrastructure\
  \ Note: Built-in stealth mode, session management\n- BrowserStack - When: Cross-browser\
  \ testing at scale Note: Real devices, CI integration\n\n## Patterns\n\n### Test\
  \ Isolation Pattern\n\nEach test runs in complete isolation with fresh state\n\n\
  **When to use**: Testing, any automation that needs reproducibility\n\n# TEST ISOLATION:\n\
  \n\"\"\"\nEach test gets its own:\n- Browser context (cookies, storage)\n- Fresh\
  \ page\n- Clean state\n\"\"\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ\
  \ DE ENGENHARIA: Use exclusivamente o gerenciador uv para dependências. Todo código\
  \ deve ser lintado via ruff e tipado com mypy.\n"
