  \ SDK.\n\n## Installation\n\n```bash\npip install azure-ai-projects azure-identity\n\
  ```\n\n## Environment Variables\n\n```bash\nAZURE_AI_PROJECT_ENDPOINT=\"https://<resource>.services.ai.azure.com/api/projects/<project>\"\
