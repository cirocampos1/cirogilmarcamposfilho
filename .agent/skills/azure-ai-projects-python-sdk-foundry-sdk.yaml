  | `client.evaluations` | `.evaluations.*` | Run evaluations |\n| `client.red_teams`\
  \ | `.red_teams.*` | Red team operations |\n\n## Two Client Approaches\n\n### 1.\
  \ AIProjectClient (Native Foundry)\n\n```python\nfrom azure.ai.projects import AIProjectClient\n\
  \nclient = AIProjectClient(\n    endpoint=os.environ[\"AZURE_AI_PROJECT_ENDPOINT\"\
  ],\n    credential=DefaultAzureCredential(),\n)\n\n# Use Foundry-native operations\n\
  agent = client.agents.create_agent(\n    model=os.environ[\"AZURE_AI_MODEL_DEPLOYMENT_NAME\"\
  ],\n    name=\"my-agent\",\n    instructions=\"You are helpful.\",\n)\n```\n\n###\
  \ 2. OpenAI-Compatible Client\n\n```python\n# Get OpenAI-compatible client from\
  \ project\nopenai_client = client.get_openai_client()\n\n# Use standard OpenAI API\n\
  response = openai_client.chat.completions.create(\n    model=os.environ[\"AZURE_AI_MODEL_DEPLOYMENT_NAME\"\
  ],\n    messages=[{\"role\": \"user\", \"content\": \"Hello!\"}],\n)\n```\n\n##\
  \ Agent Operations\n\n### Create Agent (Basic)\n\n```python\nagent = client.agents.create_agent(\n\
  \    model=os.environ[\"AZURE_AI_MODEL_DEPLOYMENT_NAME\"],\n    name=\"my-agent\"\
  ,\n    instructions=\"You are a helpful assistant.\",\n)\n```\n\n### Create Agent\
  \ with Tools\n\n```python\nfrom azure.ai.agents import CodeInterpreterTool, FileSearchTool\n\
  \nagent = client.agents.create_agent(\n    model=os.environ[\"AZURE_AI_MODEL_DEPLOYMENT_NAME\"\
  ],\n    name=\"tool-agent\",\n    instructions=\"You can execute code and search\
