  ---\n\n# Azure AI Agents Persistent SDK for Java\n\nLow-level SDK for creating and\
  \ managing persistent AI agents with threads, messages, runs, and tools.\n\n## Installation\n\
  \n```xml\n<dependency>\n    <groupId>com.azure</groupId>\n    <artifactId>azure-ai-agents-persistent</artifactId>\n\
  \    <version>1.0.0-beta.1</version>\n</dependency>\n```\n\n## Environment Variables\n\
  \n```bash\nPROJECT_ENDPOINT=https://<resource>.services.ai.azure.com/api/projects/<project>\n\
  MODEL_DEPLOYMENT_NAME=gpt-4o-mini\n```\n\n## Authentication\n\n```java\nimport com.azure.ai.agents.persistent.PersistentAgentsClient;\n\
  import com.azure.ai.agents.persistent.PersistentAgentsClientBuilder;\nimport com.azure.identity.DefaultAzureCredentialBuilder;\n\
  \nString endpoint = System.getenv(\"PROJECT_ENDPOINT\");\nPersistentAgentsClient\
  \ client = new PersistentAgentsClientBuilder()\n    .endpoint(endpoint)\n    .credential(new\
  \ DefaultAzureCredentialBuilder().build())\n    .buildClient();\n```\n\n## Key Concepts\n\
  \nThe Azure AI Agents Persistent SDK provides a low-level API for managing persistent\
  \ agents that can be reused across sessions.\n\n### Client Hierarchy\n\n| Client\
  \ | Purpose |\n|--------|---------|\n| `PersistentAgentsClient` | Sync client for\
  \ agent operations |\n| `PersistentAgentsAsyncClient` | Async client for agent operations\
  \ |\n\n## Core Workflow\n\n### 1. Create Agent\n\n```java\n// Create agent with\
  \ tools\nPersistentAgent agent = client.createAgent(\n    modelDeploymentName,\n\
  \    \"Math Tutor\",\n    \"You are a personal math tutor.\"\n);\n```\n\n### 2.\
  \ Create Thread\n\n```java\nPersistentAgentThread thread = client.createThread();\n\
  ```\n\n### 3. Add Message\n\n```java\nclient.createMessage(\n    thread.getId(),\n\
  \    MessageRole.USER,\n    \"I need help with equations.\"\n);\n```\n\n### 4. Run\
  \ Agent\n\n```java\nThreadRun run = client.createRun(thread.getId(), agent.getId());\n\
  \n// Poll for completion\nwhile (run.getStatus() == RunStatus.QUEUED || run.getStatus()\
  \ == RunStatus.IN_PROGRESS) {\n    Thread.sleep(500);\n    run = client.getRun(thread.getId(),\
  \ run.getId());\n}\n```\n\n### 5. Get Response\n\n```java\nPagedIterable<PersistentThreadMessage>\
  \ messages = client.listMessages(thread.getId());\nfor (PersistentThreadMessage\
  \ message : messages) {\n    System.out.println(message.getRole() + \": \" + message.getContent());\n\
  }\n```\n\n### 6. Cleanup\n\n```java\nclient.deleteThread(thread.getId());\nclient.deleteAgent(agent.getId());\n\
  ```\n\n## Best Practices\n\n1. **Use DefaultAzureCredential** for production authentication\n\
  2. **Poll with appropriate delays** — 500ms recommended between status checks\n\
  3. **Clean up resources** — Delete threads and agents when done\n4. **Handle all\
  \ run statuses** — Check for RequiresAction, Failed, Cancelled\n5. **Use async client**\
  \ for better throughput in high-concurrency scenarios\n\n## Error Handling\n\n```java\n\
