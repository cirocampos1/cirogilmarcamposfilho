  ---\n\n# Azure.ResourceManager.CosmosDB (.NET)\n\nManagement plane SDK for provisioning\
  \ and managing Azure Cosmos DB resources via Azure Resource Manager.\n\n> **⚠️ Management\
  \ vs Data Plane**\n> - **This SDK (Azure.ResourceManager.CosmosDB)**: Create accounts,\
  \ databases, containers, configure throughput, manage RBAC\n> - **Data Plane SDK\
  \ (Microsoft.Azure.Cosmos)**: CRUD operations on documents, queries, stored procedures\
  \ execution\n\n## Installation\n\n```bash\ndotnet add package Azure.ResourceManager.CosmosDB\n\
  dotnet add package Azure.Identity\n```\n\n**Current Versions**: Stable v1.4.0, Preview\
  \ v1.4.0-beta.13\n\n## Environment Variables\n\n```bash\nAZURE_SUBSCRIPTION_ID=<your-subscription-id>\n\
  # For service principal auth (optional)\nAZURE_TENANT_ID=<tenant-id>\nAZURE_CLIENT_ID=<client-id>\n\
  AZURE_CLIENT_SECRET=<client-secret>\n```\n\n## Authentication\n\n```csharp\nusing\
  \ Azure.Identity;\nusing Azure.ResourceManager;\nusing Azure.ResourceManager.CosmosDB;\n\
  \n// Always use DefaultAzureCredential\nvar credential = new DefaultAzureCredential();\n\
  var armClient = new ArmClient(credential);\n\n// Get subscription\nvar subscriptionId\
  \ = Environment.GetEnvironmentVariable(\"AZURE_SUBSCRIPTION_ID\");\nvar subscription\
  \ = armClient.GetSubscriptionResource(\n    new ResourceIdentifier($\"/subscriptions/{subscriptionId}\"\
  ));\n```\n\n## Resource Hierarchy\n\n```\nArmClient\n└── SubscriptionResource\n\
