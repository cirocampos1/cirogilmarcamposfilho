  \ \"Document creation, format conversion (ODT/DOCX/PDF), mail merge, and automation\
  \ with LibreOffice Writer.\"\ncategory: document-processing\nrisk: safe\nsource:\
  \ personal\ndate_added: \"2026-02-27\"\n---\n\n# LibreOffice Writer\n\n## Overview\n\
  \nLibreOffice Writer skill for creating, editing, converting, and automating document\
  \ workflows using the native ODT (OpenDocument Text) format.\n\n## When to Use This\
  \ Skill\n\nUse this skill when:\n- Creating new documents in ODT format\n- Converting\
  \ documents between formats (ODT <-> DOCX, PDF, HTML, RTF, TXT)\n- Automating document\
  \ generation workflows\n- Performing batch document operations\n- Creating templates\
  \ and standardized document formats\n\n## Core Capabilities\n\n### 1. Document Creation\n\
  - Create new ODT documents from scratch\n- Generate documents from templates\n-\
  \ Create mail merge documents\n- Build forms with fillable fields\n\n### 2. Format\
  \ Conversion\n- ODT to other formats: DOCX, PDF, HTML, RTF, TXT, EPUB\n- Other formats\
  \ to ODT: DOCX, DOC, RTF, HTML, TXT\n- Batch conversion of multiple documents\n\n\
  ### 3. Document Automation\n- Template-based document generation\n- Mail merge with\
  \ data sources (CSV, spreadsheet, database)\n- Batch document processing\n- Automated\
  \ report generation\n\n### 4. Content Manipulation\n- Text extraction and insertion\n\
  - Style management and application\n- Table creation and manipulation\n- Header/footer\
  \ management\n\n### 5. Integration\n- Command-line automation via soffice\n- Python\
  \ scripting with UNO\n- Integration with workflow automation tools\n\n## Workflows\n\
  \n### Creating a New Document\n\n#### Method 1: Command-Line\n```bash\nsoffice --writer\
  \ template.odt\n```\n\n#### Method 2: Python with UNO\n```python\nimport uno\n\n\
  def create_document():\n    local_ctx = uno.getComponentContext()\n    resolver\
  \ = local_ctx.ServiceManager.createInstanceWithContext(\n        \"com.sun.star.bridge.UnoUrlResolver\"\
  , local_ctx\n    )\n    ctx = resolver.resolve(\n        \"uno:socket,host=localhost,port=8100;urp;StarOffice.ComponentContext\"\
  \n    )\n    smgr = ctx.ServiceManager\n    doc = smgr.createInstanceWithContext(\"\
  com.sun.star.text.TextDocument\", ctx)\n    text = doc.Text\n    cursor = text.createTextCursor()\n\
  \    text.insertString(cursor, \"Hello from LibreOffice Writer!\", 0)\n    doc.storeToURL(\"\
  file:///path/to/document.odt\", ())\n    doc.close(True)\n```\n\n#### Method 3:\
  \ Using odfpy\n```python\nfrom odf.opendocument import OpenDocumentText\nfrom odf.text\
  \ import P, H\n\ndoc = OpenDocumentText()\nh1 = H(outlinelevel='1', text='Document\
  \ Title')\ndoc.text.appendChild(h1)\ndoc.save(\"document.odt\")\n```\n\n### Converting\
  \ Documents\n\n```bash\n# ODT to DOCX\nsoffice --headless --convert-to docx document.odt\n\
  \n# ODT to PDF\nsoffice --headless --convert-to pdf document.odt\n\n# DOCX to ODT\n\
  soffice --headless --convert-to odt document.docx\n\n# Batch convert\nfor file in\
  \ *.odt; do\n    soffice --headless --convert-to pdf \"$file\"\ndone\n```\n\n###\
  \ Template-Based Generation\n```python\nimport subprocess\nimport tempfile\nfrom\
  \ pathlib import Path\n\ndef generate_fr\n\n## Diretrizes do \n\n\U0001F527\
  \ DIRETRIZ DE ENGENHARIA: Use exclusivamente o gerenciador uv para dependências.\
  \ Todo código deve ser lintado via ruff e tipado com mypy.\n"
