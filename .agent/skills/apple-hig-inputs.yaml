  \ community\ndate_added: '2026-02-27'\n---\n\n# Apple HIG: Inputs\n\nCheck for `.claude/apple-design-context.md`\
  \ before asking questions. Use existing context and only ask for information not\
  \ already covered.\n\n## Key Principles\n\n### General\n\n1. **Support multiple\
  \ input methods.** Touch, pointer, keyboard, pencil, voice, eyes, hands, controllers.\
  \ Design for the inputs available on each platform. On iPadOS, support both touch\
  \ and pointer; on macOS, both pointer and keyboard.\n\n2. **Consistent feedback\
  \ for every input action.** Visible, audible, or haptic response.\n\n### Gestures\n\
  \n3. **Standard gestures must behave consistently.** Tap to activate, swipe to scroll/navigate,\
  \ pinch to zoom, long press for context menus, drag to move. Don't override system\
  \ gestures (edge swipes for back, Home, notifications).\n\n4. **Use standard recognizers;\
  \ keep custom gestures discoverable.** Apple's built-in recognizers handle edge\
  \ cases and accessibility. If you add non-standard gestures, provide hints or coaching\
  \ to teach them.\n\n### Apple Pencil\n\n5. **Precision drawing, markup, and selection.**\
  \ Support pressure, tilt, and hover. Distinguish finger from Pencil when appropriate\
  \ (finger pans, Pencil draws).\n\n6. **Support Scribble in text fields.** Users\
  \ expect to write with Pencil in any text input.\n\n### Keyboards\n\n7. **Keyboard\
  \ shortcuts and full navigation.** Standard shortcuts (Cmd+C/V/Z) plus custom ones\
  \ visible in the iPadOS Command key overlay. Logical tab order.\n\n8. **Respect\
  \ the software keyboard.** Adjust layout when keyboard appears. Use keyboard-avoidance\
  \ APIs.\n\n### Game Controllers\n\n9. **MFi controllers with on-screen fallbacks.**\
  \ Map to extended gamepad profile, sensible defaults, remappable. Always offer touch\
  \ or keyboard alternatives.\n\n### Pointer and Trackpad\n\n10. **Native feel.**\
  \ Hover effects, pointer shape adaptation, standard cursor behaviors. Two-finger\
  \ scroll, pinch to zoom, swipe to navigate.\n\n### Digital Crown\n\n11. **Primary\
  \ scrolling and value-adjustment input on watchOS.** Scrolling lists, adjusting\
  \ values, navigating views. Haptic feedback at detents.\n\n### Eyes and Spatial\
  \ (visionOS)\n\n12. **Look and pinch.** Generous hit targets (eye tracking is less\
  \ precise than touch). Avoid sustained gaze for activation. Direct hand manipulation\
  \ in immersive experiences.\n\n### Focus System\n\n13. **Critical for tvOS and visionOS.**\
  \ Predictable focus movement. Every interactive element focusable. Clear visual\
  \ indicators (scale, highlight, elevation). Logical focus groups.\n\n### Remotes\n\
  \n14. **Siri Remote: limited surface.** Touch area for swiping, clickpad for selection,\
  \ few physical buttons. Keep interactions simple.\n\n### Motion and Nearby\n\n15.\
  \ **Gyroscope, accelerometer, UWB: use judiciously.** Suits gaming, fitness, AR.\
  \ Not for essential tasks. Provide calibration and reset. \n\n## Diretrizes do \n\
