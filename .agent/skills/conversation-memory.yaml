  \ {\n            if (memory.importance > 0.7 || memory.referenced > 2) {\n     \
  \           await this.longTerm.add(memory);\n            }\n            await this.shortTerm.remove(memory.id);\n\
  \        }\n    }\n\n    async buildContext(query: string): Promise<string> {\n\
