  date_added: '2026-02-27'\n---\n\n# Azure Batch SDK for Java\n\nClient library for\
  \ running large-scale parallel and high-performance computing (HPC) batch jobs in\
  \ Azure.\n\n## Installation\n\n```xml\n<dependency>\n    <groupId>com.azure</groupId>\n\
  \    <artifactId>azure-compute-batch</artifactId>\n    <version>1.0.0-beta.5</version>\n\
  </dependency>\n```\n\n## Prerequisites\n\n- Azure Batch account\n- Pool configured\
  \ with compute nodes\n- Azure subscription\n\n## Environment Variables\n\n```bash\n\
  AZURE_BATCH_ENDPOINT=https://<account>.<region>.batch.azure.com\nAZURE_BATCH_ACCOUNT=<account-name>\n\
  AZURE_BATCH_ACCESS_KEY=<account-key>\n```\n\n## Client Creation\n\n### With Microsoft\
  \ Entra ID (Recommended)\n\n```java\nimport com.azure.compute.batch.BatchClient;\n\
  import com.azure.compute.batch.BatchClientBuilder;\nimport com.azure.identity.DefaultAzureCredentialBuilder;\n\
  \nBatchClient batchClient = new BatchClientBuilder()\n    .credential(new DefaultAzureCredentialBuilder().build())\n\
  \    .endpoint(System.getenv(\"AZURE_BATCH_ENDPOINT\"))\n    .buildClient();\n```\n\
  \n### Async Client\n\n```java\nimport com.azure.compute.batch.BatchAsyncClient;\n\
  \nBatchAsyncClient batchAsyncClient = new BatchClientBuilder()\n    .credential(new\
  \ DefaultAzureCredentialBuilder().build())\n    .endpoint(System.getenv(\"AZURE_BATCH_ENDPOINT\"\
  ))\n    .buildAsyncClient();\n```\n\n### With Shared Key Credentials\n\n```java\n\
  import com.azure.core.credential.AzureNamedKeyCredential;\n\nString accountName\
  \ = System.getenv(\"AZURE_BATCH_ACCOUNT\");\nString accountKey = System.getenv(\"\
  AZURE_BATCH_ACCESS_KEY\");\nAzureNamedKeyCredential sharedKeyCreds = new AzureNamedKeyCredential(accountName,\
  \ accountKey);\n\nBatchClient batchClient = new BatchClientBuilder()\n    .credential(sharedKeyCreds)\n\
  \    .endpoint(System.getenv(\"AZURE_BATCH_ENDPOINT\"))\n    .buildClient();\n```\n\
  \n## Key Concepts\n\n| Concept | Description |\n|---------|-------------|\n| Pool\
  \ | Collection of compute nodes that run tasks |\n| Job | Logical grouping of tasks\
  \ |\n| Task | Unit of computation (command/script) |\n| Node | VM that executes\
  \ tasks |\n| Job Schedule | Recurring job creation |\n\n## Pool Operations\n\n###\
  \ Create Pool\n\n```java\nimport com.azure.compute.batch.models.*;\n\nbatchClient.createPool(new\
  \ BatchPoolCreateParameters(\"myPoolId\", \"STANDARD_DC2s_V2\")\n    .setVirtualMachineConfiguration(\n\
  \        new VirtualMachineConfiguration(\n            new BatchVmImageReference()\n\
  \                .setPublisher(\"Canonical\")\n                .setOffer(\"UbuntuServer\"\
  )\n                .setSku(\"22_04-lts\")\n                .setVersion(\"latest\"\
  ),\n            \"batch.node.ubuntu 22.04\"))\n    .setTargetDedicatedNodes(2)\n\
  \    .setTargetLowPriorityNodes(0), null);\n```\n\n### Get Pool\n\n```java\nBatchPool\
  \ pool = batchClient.getPool(\"myPoolId\");\nSystem.out.println(\"Pool state: \"\
  \ + pool.getState());\nSystem.out.println(\"Current dedicated nod\n\n## Diretrizes\
