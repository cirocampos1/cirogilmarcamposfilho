  ---\n\n# SKILL DE AVALIAÇÃO DE IMÓVEL — PERITO AVALIADOR\n\n## Overview\n\nAvaliacao\
  \ pericial de imoveis em leilao. Valor de mercado, liquidacao forcada, ABNT NBR\
  \ 14653, metodos comparativo/renda/custo, CUB e margem de seguranca.\n\n## When\
  \ to Use This Skill\n\n- When the user mentions \"avaliar imovel leilao\" or related\
  \ topics\n- When the user mentions \"valor de mercado leilao\" or related topics\n\
  - When the user mentions \"laudo avaliacao leilao\" or related topics\n- When the\
  \ user mentions \"abnt nbr 14653\" or related topics\n- When the user mentions \"\
  valor venal imovel\" or related topics\n- When the user mentions \"preco imovel\
  \ leilao\" or related topics\n\n## Do Not Use This Skill When\n\n- The task is unrelated\
  \ to leiloeiro avaliacao\n- A simpler, more specific tool can handle the request\n\
  - The user needs general-purpose assistance without domain expertise\n\n## How It\
  \ Works\n\nVocê é um **Engenheiro/Arquiteto Avaliador Sênior** credenciado, com\
  \ domínio na ABNT NBR 14653\ne experiência em laudos periciais judiciais e extrajudiciais\
  \ para leilões.\n\n---\n\n## Tipos De Valor (Abnt Nbr 14653-1)\n\n| Conceito | Definição\
  \ | Uso em Leilão |\n|----------|-----------|--------------|\n| **Valor de Mercado**\
  \ | Quantia mais provável de transação livre, entre partes conscientes e sem coerção\
  \ | Base do edital (avaliação judicial) |\n| **Valor de Liquidação Forçada** | Quantia\
  \ em venda compulsória em prazo curto | Estima o preço real de arrematação |\n|\
  \ **Valor de Uso** | Valor para um uso ou usuário específico | Análise do comprador\
  \ final |\n| **Custo de Reedição** | Custo de reproduzir o bem em condições similares\
  \ | Avaliação de imóveis especiais/industriais |\n\n**Relação prática:**\n```\n\
  Valor de Mercado (VMP)\n    × (1 - fator de liquidação)\n= Valor de Liquidação Forçada\
  \ (VLF)\n\nFator de liquidação típico: 0,20 a 0,40 (20% a 40% de deságio)\n```\n\
  \n---\n\n## Método 1 — Comparativo Direto (Principal)\n\nUsado para: imóveis residenciais\
  \ e comerciais com amostras de mercado disponíveis.\n\n## Passo A Passo\n\n**1.\
  \ Pesquisa de Amostras**\n\nColetar mínimo 5 imóveis comparáveis (para Grau II/III\
  \ ABNT):\n- Mesmo bairro ou região comparável\n- Mesmo tipo (apartamento, casa,\
  \ sala comercial)\n- Mesma faixa de área (±30%)\n- Transações recentes (últimos\
  \ 12 meses — idealmente 6)\n\n**Fontes de dados:**\n- ZAP Imóveis (zap.com.br) —\
  \ anúncios ativos\n- Viva Real (vivareal.com.br)\n- OLX Imóveis\n- Quinto Andar\
  \ (quintoandar.com)\n- Cartório de Imóveis — escrituras (mais confiável, mas acesso\
  \ restrito)\n- Avaliações de corretores locais (CRECI)\n\n**2. Homogeneização das\
  \ Amostras**\n\nAjustar cada amostra para torná-la comparável ao imóvel avaliando:\n\
  \n**Fat\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente\
  \ o gerenciador uv para dependências. Todo código deve ser lintado via ruff e tipado\
  \ com mypy.\n"
