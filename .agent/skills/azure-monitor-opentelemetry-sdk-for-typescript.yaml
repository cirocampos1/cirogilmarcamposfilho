  # Azure Monitor OpenTelemetry SDK for TypeScript\n\nAuto-instrument Node.js applications\
  \ with distributed tracing, metrics, and logs.\n\n## Installation\n\n```bash\n#\
  \ Distro (recommended - auto-instrumentation)\nnpm install @azure/monitor-opentelemetry\n\
  \n# Low-level exporters (custom OpenTelemetry setup)\nnpm install @azure/monitor-opentelemetry-exporter\n\
  \n# Custom logs ingestion\nnpm install @azure/monitor-ingestion\n```\n\n## Environment\
  \ Variables\n\n```bash\nAPPLICATIONINSIGHTS_CONNECTION_STRING=InstrumentationKey=...;IngestionEndpoint=...\n\
  ```\n\n## Quick Start (Auto-Instrumentation)\n\n**IMPORTANT:** Call `useAzureMonitor()`\
  \ BEFORE importing other modules.\n\n```typescript\nimport { useAzureMonitor } from\
  \ \"@azure/monitor-opentelemetry\";\n\nuseAzureMonitor({\n  azureMonitorExporterOptions:\
  \ {\n    connectionString: process.env.APPLICATIONINSIGHTS_CONNECTION_STRING\n \
  \ }\n});\n\n// Now import your application\nimport express from \"express\";\nconst\
  \ app = express();\n```\n\n## ESM Support (Node.js 18.19+)\n\n```bash\nnode --import\
  \ @azure/monitor-opentelemetry/loader ./dist/index.js\n```\n\n**package.json:**\n\
  ```json\n{\n  \"scripts\": {\n    \"start\": \"node --import @azure/monitor-opentelemetry/loader\
  \ ./dist/index.js\"\n  }\n}\n```\n\n## Full Configuration\n\n```typescript\nimport\
  \ { useAzureMonitor, AzureMonitorOpenTelemetryOptions } from \"@azure/monitor-opentelemetry\"\
  ;\nimport { resourceFromAttributes } from \"@opentelemetry/resources\";\n\nconst\
  \ options: AzureMonitorOpenTelemetryOptions = {\n  azureMonitorExporterOptions:\
  \ {\n    connectionString: process.env.APPLICATIONINSIGHTS_CONNECTION_STRING,\n\
  \    storageDirectory: \"/path/to/offline/storage\",\n    disableOfflineStorage:\
  \ false\n  },\n  \n  // Sampling\n  samplingRatio: 1.0,  // 0-1, percentage of traces\n\
  \  \n  // Features\n  enableLiveMetrics: true,\n  enableStandardMetrics: true,\n\
  \  enablePerformanceCounters: true,\n  \n  // Instrumentation libraries\n  instrumentationOptions:\
  \ {\n    azureSdk: { enabled: true },\n    http: { enabled: true },\n    mongoDb:\
  \ { enabled: true },\n    mySql: { enabled: true },\n    postgreSql: { enabled:\
  \ true },\n    redis: { enabled: true },\n    bunyan: { enabled: false },\n    winston:\
  \ { enabled: false }\n  },\n  \n  // Custom resource\n  resource: resourceFromAttributes({\
  \ \"service.name\": \"my-service\" })\n};\n\nuseAzureMonitor(options);\n```\n\n\
  ## Custom Traces\n\n```typescript\nimport { trace } from \"@opentelemetry/api\"\
  ;\n\nconst tracer = trace.getTracer(\"my-tracer\");\n\nconst span = tracer.startSpan(\"\
  doWork\");\ntry {\n  span.setAttribute(\"component\", \"worker\");\n  span.setAttribute(\"\
  operation.id\", \"42\");\n  span.addEvent(\"processing started\");\n  \n  // Your\
  \ work here\n  \n} catch (error) {\n  span.recordException(error as Error);\n  span.setStatus({\
