  # Azure Key Vault Keys SDK for Rust\n\nClient library for Azure Key Vault Keys —\
  \ secure storage and management of cryptographic keys.\n\n## Installation\n\n```sh\n\
  cargo add azure_security_keyvault_keys azure_identity\n```\n\n## Environment Variables\n\
  \n```bash\nAZURE_KEYVAULT_URL=https://<vault-name>.vault.azure.net/\n```\n\n## Authentication\n\
  \n```rust\nuse azure_identity::DeveloperToolsCredential;\nuse azure_security_keyvault_keys::KeyClient;\n\
  \nlet credential = DeveloperToolsCredential::new(None)?;\nlet client = KeyClient::new(\n\
  \    \"https://<vault-name>.vault.azure.net/\",\n    credential.clone(),\n    None,\n\
  )?;\n```\n\n## Key Types\n\n| Type | Description |\n|------|-------------|\n| RSA\
  \ | RSA keys (2048, 3072, 4096 bits) |\n| EC | Elliptic curve keys (P-256, P-384,\
  \ P-521) |\n| RSA-HSM | HSM-protected RSA keys |\n| EC-HSM | HSM-protected EC keys\
  \ |\n\n## Core Operations\n\n### Get Key\n\n```rust\nlet key = client\n    .get_key(\"\
  key-name\", None)\n    .await?\n    .into_model()?;\n\nprintln!(\"Key ID: {:?}\"\
  , key.key.as_ref().map(|k| &k.kid));\n```\n\n### Create Key\n\n```rust\nuse azure_security_keyvault_keys::models::{CreateKeyParameters,\
  \ KeyType};\n\nlet params = CreateKeyParameters {\n    kty: KeyType::Rsa,\n    key_size:\
  \ Some(2048),\n    ..Default::default()\n};\n\nlet key = client\n    .create_key(\"\
  key-name\", params.try_into()?, None)\n    .await?\n    .into_model()?;\n```\n\n\
  ### Create EC Key\n\n```rust\nuse azure_security_keyvault_keys::models::{CreateKeyParameters,\
  \ KeyType, CurveName};\n\nlet params = CreateKeyParameters {\n    kty: KeyType::Ec,\n\
  \    curve: Some(CurveName::P256),\n    ..Default::default()\n};\n\nlet key = client\n\
  \    .create_key(\"ec-key\", params.try_into()?, None)\n    .await?\n    .into_model()?;\n\
  ```\n\n### Delete Key\n\n```rust\nclient.delete_key(\"key-name\", None).await?;\n\
  ```\n\n### List Keys\n\n```rust\nuse azure_security_keyvault_keys::ResourceExt;\n\
  use futures::TryStreamExt;\n\nlet mut pager = client.list_key_properties(None)?.into_stream();\n\
  while let Some(key) = pager.try_next().await? {\n    let name = key.resource_id()?.name;\n\
  \    println!(\"Key: {}\", name);\n}\n```\n\n### Backup Key\n\n```rust\nlet backup\
  \ = client.backup_key(\"key-name\", None).await?;\n// Store backup.value safely\n\
  ```\n\n### Restore Key\n\n```rust\nuse azure_security_keyvault_keys::models::RestoreKeyParameters;\n\
  \nlet params = RestoreKeyParameters {\n    key_bundle_backup: backup_bytes,\n};\n\
  \nclient.restore_key(params.try_into()?, None).await?;\n```\n\n## Cryptographic\
  \ Operations\n\nKey Vault can perform crypto operations without exposing the private\
  \ key:\n\n```rust\n// For cryptographic operations, use the key's operations\n//\
  \ Available operations depend on key type and permissions:\n// - encrypt/decrypt\
  \ (RSA)\n// - sign/verify (RSA, EC)\n// - wrapKey/unwrapKey (RSA)\n```\n\n##\n\n\
