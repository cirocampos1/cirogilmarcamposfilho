  ---\n\n# Slack Bot Builder\n\nBuild Slack apps using the Bolt framework across Python,\
  \ JavaScript, and Java.\nCovers Block Kit for rich UIs, interactive components,\
  \ slash commands,\nevent handling, OAuth installation flows, and Workflow Builder\
  \ integration.\nFocus on best practices for production-ready Slack apps.\n\n## Patterns\n\
  \n### Bolt App Foundation Pattern\n\nThe Bolt framework is Slack's recommended approach\
  \ for building apps.\nIt handles authentication, event routing, request verification,\
  \ and\nHTTP request processing so you can focus on app logic.\n\nKey benefits:\n\
  - Event handling in a few lines of code\n- Security checks and payload validation\
  \ built-in\n- Organized, consistent patterns\n- Works for experiments and production\n\
  \nAvailable in: Python, JavaScript (Node.js), Java\n\n**When to use**: Starting\
  \ any new Slack app,Migrating from legacy Slack APIs,Building production Slack integrations\n\
  \n# Python Bolt App\nfrom slack_bolt import App\nfrom slack_bolt.adapter.socket_mode\
  \ import SocketModeHandler\nimport os\n\n# Initialize with tokens from environment\n\
  app = App(\n    token=os.environ[\"SLACK_BOT_TOKEN\"],\n    signing_secret=os.environ[\"\
  SLACK_SIGNING_SECRET\"]\n)\n\n# Handle messages containing \"hello\"\n@app.message(\"\
  hello\")\ndef handle_hello(message, say):\n    \"\"\"Respond to messages containing\
  \ 'hello'.\"\"\"\n    user = message[\"user\"]\n    say(f\"Hey there <@{user}>!\"\
  )\n\n# Handle slash command\n@app.command(\"/ticket\")\ndef handle_ticket_command(ack,\
  \ body, client):\n    \"\"\"Handle /ticket slash command.\"\"\"\n    # Acknowledge\
  \ immediately (within 3 seconds)\n    ack()\n\n    # Open a modal for ticket creation\n\
  \    client.views_open(\n        trigger_id=body[\"trigger_id\"],\n        view={\n\
  \            \"type\": \"modal\",\n            \"callback_id\": \"ticket_modal\"\
  ,\n            \"title\": {\"type\": \"plain_text\", \"text\": \"Create Ticket\"\
  },\n            \"submit\": {\"type\": \"plain_text\", \"text\": \"Submit\"},\n\
  \            \"blocks\": [\n                {\n                    \"type\": \"\
  input\",\n                    \"block_id\": \"title_block\",\n                 \
  \   \"element\": {\n                        \"type\": \"plain_text_input\",\n  \
  \                      \"action_id\": \"title_input\"\n                    },\n\
  \                    \"label\": {\"type\": \"plain_text\", \"text\": \"Title\"}\n\
  \                },\n                {\n                    \"type\": \"input\"\
  ,\n                    \"block_id\": \"desc_block\",\n                    \"element\"\
  : {\n                        \"type\": \"plain_text_input\",\n                 \
  \       \"multiline\": True,\n                        \"action_id\": \"desc_input\"\
  \n                    },\n                    \"label\": {\"type\": \"plain_text\"\
  , \"text\": \"Description\"}\n                \n\n## Diretrizes do \n\n\U0001F527\
