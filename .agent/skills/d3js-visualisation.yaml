  \ \"2026-02-27\"\n---\n\n# D3.js Visualisation\n\n## Overview\n\nThis skill provides\
  \ guidance for creating sophisticated, interactive data visualisations using d3.js.\
  \ D3.js (Data-Driven Documents) excels at binding data to DOM elements and applying\
  \ data-driven transformations to create custom, publication-quality visualisations\
  \ with precise control over every visual element. The techniques work across any\
  \ JavaScript environment, including vanilla JavaScript, React, Vue, Svelte, and\
  \ other frameworks.\n\n## When to use d3.js\n\n**Use d3.js for:**\n- Custom visualisations\
  \ requiring unique visual encodings or layouts\n- Interactive explorations with\
  \ complex pan, zoom, or brush behaviours\n- Network/graph visualisations (force-directed\
  \ layouts, tree diagrams, hierarchies, chord diagrams)\n- Geographic visualisations\
  \ with custom projections\n- Visualisations requiring smooth, choreographed transitions\n\
  - Publication-quality graphics with fine-grained styling control\n- Novel chart\
  \ types not available in standard libraries\n\n**Consider alternatives for:**\n\
  - 3D visualisations - use Three.js instead\n\n## Core workflow\n\n### 1. Set up\
  \ d3.js\n\nImport d3 at the top of your script:\n\n```javascript\nimport * as d3\
  \ from 'd3';\n```\n\nOr use the CDN version (7.x):\n\n```html\n<script src=\"https://d3js.org/d3.v7.min.js\"\
  ></script>\n```\n\nAll modules (scales, axes, shapes, transitions, etc.) are accessible\
  \ through the `d3` namespace.\n\n### 2. Choose the integration pattern\n\n**Pattern\
  \ A: Direct DOM manipulation (recommended for most cases)**\nUse d3 to select DOM\
  \ elements and manipulate them imperatively. This works in any JavaScript environment:\n\
  \n```javascript\nfunction drawChart(data) {\n  if (!data || data.length === 0) return;\n\
  \n  const svg = d3.select('#chart'); // Select by ID, class, or DOM element\n\n\
  \  // Clear previous content\n  svg.selectAll(\"*\").remove();\n\n  // Set up dimensions\n\
  \  const width = 800;\n  const height = 400;\n  const margin = { top: 20, right:\
  \ 30, bottom: 40, left: 50 };\n\n  // Create scales, axes, and draw visualisation\n\
  \  // ... d3 code here ...\n}\n\n// Call when data changes\ndrawChart(myData);\n\
  ```\n\n**Pattern B: Declarative rendering (for frameworks with templating)**\nUse\
  \ d3 for data calculations (scales, layouts) but render elements via your framework:\n\
  \n```javascript\nfunction getChartElements(data) {\n  const xScale = d3.scaleLinear()\n\
  \    .domain([0, d3.max(data, d => d.value)])\n    .range([0, 400]);\n\n  return\
  \ data.map((d, i) => ({\n    x: 50,\n    y: i * 30,\n    width: xScale(d.value),\n\
  \    height: 25\n  }));\n}\n\n// In React: {getChartElements(data).map((d, i) =>\
  \ <rect key={i} {...d} fill=\"steelblue\" />)}\n// In Vue: v-for directive over\
  \ the returned array\n// In vanilla JS: Create elements manually from the returned\
  \ data\n```\n\nUse Pattern A for complex visualisations with transitions, interactions,\
