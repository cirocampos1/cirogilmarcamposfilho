  ## Instruções\n---\nname: azure-storage-queue-ts\ndescription: Azure Queue Storage\
  \ JavaScript/TypeScript SDK (@azure/storage-queue) for message queue operations.\
  \ Use for sending, receiving, peeking, and deleting messages in queues.\nrisk: unknown\n\
  source: community\ndate_added: '2026-02-27'\n---\n\n# @azure/storage-queue (TypeScript/JavaScript)\n\
  \nSDK for Azure Queue Storage operations — send, receive, peek, and manage messages\
  \ in queues.\n\n## Installation\n\n```bash\nnpm install @azure/storage-queue @azure/identity\n\
  ```\n\n**Current Version**: 12.x  \n**Node.js**: >= 18.0.0\n\n## Environment Variables\n\
  \n```bash\nAZURE_STORAGE_ACCOUNT_NAME=<account-name>\nAZURE_STORAGE_ACCOUNT_KEY=<account-key>\n\
  # OR connection string\nAZURE_STORAGE_CONNECTION_STRING=DefaultEndpointsProtocol=https;AccountName=...\n\
  ```\n\n## Authentication\n\n### DefaultAzureCredential (Recommended)\n\n```typescript\n\
  import { QueueServiceClient } from \"@azure/storage-queue\";\nimport { DefaultAzureCredential\
  \ } from \"@azure/identity\";\n\nconst accountName = process.env.AZURE_STORAGE_ACCOUNT_NAME!;\n\
  const client = new QueueServiceClient(\n  `https://${accountName}.queue.core.windows.net`,\n\
  \  new DefaultAzureCredential()\n);\n```\n\n### Connection String\n\n```typescript\n\
  import { QueueServiceClient } from \"@azure/storage-queue\";\n\nconst client = QueueServiceClient.fromConnectionString(\n\
  \  process.env.AZURE_STORAGE_CONNECTION_STRING!\n);\n```\n\n### StorageSharedKeyCredential\
  \ (Node.js only)\n\n```typescript\nimport { QueueServiceClient, StorageSharedKeyCredential\
  \ } from \"@azure/storage-queue\";\n\nconst accountName = process.env.AZURE_STORAGE_ACCOUNT_NAME!;\n\
  const accountKey = process.env.AZURE_STORAGE_ACCOUNT_KEY!;\n\nconst sharedKeyCredential\
  \ = new StorageSharedKeyCredential(accountName, accountKey);\nconst client = new\
  \ QueueServiceClient(\n  `https://${accountName}.queue.core.windows.net`,\n  sharedKeyCredential\n\
  );\n```\n\n### SAS Token\n\n```typescript\nimport { QueueServiceClient } from \"\
  @azure/storage-queue\";\n\nconst accountName = process.env.AZURE_STORAGE_ACCOUNT_NAME!;\n\
  const sasToken = process.env.AZURE_STORAGE_SAS_TOKEN!;\n\nconst client = new QueueServiceClient(\n\
  \  `https://${accountName}.queue.core.windows.net${sasToken}`\n);\n```\n\n## Client\
  \ Hierarchy\n\n```\nQueueServiceClient (account level)\n└── QueueClient (queue level)\n\
  \    └── Messages (send, receive, peek, delete)\n```\n\n## Queue Operations\n\n\
  ### Create Queue\n\n```typescript\nconst queueClient = client.getQueueClient(\"\
  my-queue\");\nawait queueClient.create();\n\n// Or create if not exists\nawait queueClient.createIfNotExists();\n\
  ```\n\n### List Queues\n\n```typescript\nfor await (const queue of client.listQueues())\
  \ {\n  console.log(queue.name);\n}\n\n// With prefix filter\nfor await (const queue\
  \ of client.listQueues({ prefix: \"task-\" })) {\n  console.log(queue.name);\n}\n\
  ```\n\n### Delete Queue\n\n```typescript\nawait queueClient.delete();\n\n// Or delete\
  \ if exists\nawait queueClient.deleteIfExists();\n```\n\n### Get Queue Properties\n\
  \n```typescript\nconst properties = await queueClient.getProperties();\nconsole.log(\"\
  Approximate message count:\", pr\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ\
