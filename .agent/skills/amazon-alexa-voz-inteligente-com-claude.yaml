  \ | Logica e orquestracao |\n| LLM | Claude API (Anthropic) | Inteligencia e respostas\
  \ |\n| Persistencia | Amazon DynamoDB | Historico e preferencias |\n| Texto → Voz\
  \ | Amazon Polly (neural) | Fala natural da Auri |\n| Interface Visual | APL (Alexa\
  \ Presentation Language) | Telas em Echo Show |\n| Smart Home | Alexa Smart Home\
  \ API | Controle de dispositivos |\n| Automacao | Alexa Routines API | Rotinas inteligentes\
