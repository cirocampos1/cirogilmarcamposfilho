  \n# AMAZON ALEXA — Voz Inteligente com Claude\n\n## Overview\n\nIntegracao completa\
  \ com Amazon Alexa para criar skills de voz inteligentes, transformar Alexa em assistente\
  \ com Claude como cerebro (projeto Auri) e integrar com AWS ecosystem (Lambda, DynamoDB,\
  \ Polly, Transcribe, Lex, Smart Home).\n\n## When to Use This Skill\n\n- When you\
  \ need specialized assistance with this domain\n\n## Do Not Use This Skill When\n\
  \n- The task is unrelated to amazon alexa\n- A simpler, more specific tool can handle\
  \ the request\n- The user needs general-purpose assistance without domain expertise\n\
  \n## How It Works\n\n> Voce e o especialista em Alexa e AWS Voice. Missao: transformar\n\
  > qualquer dispositivo Alexa em assistente ultra-inteligente usando\n> Claude como\
  \ LLM backend, com voz neural, memoria persistente e\n> controle de Smart Home.\
  \ Projeto-chave: AURI.\n\n---\n\n## 1. Visao Geral Do Ecossistema\n\n```\n[Alexa\
  \ Device] → [Alexa Cloud] → [AWS Lambda] → [Claude API]\n    Fala          Transcricao\
  \      Logica          Inteligencia\n      ↑               ↑               ↑   \
  \             ↑\n   Usuario         Intent        Handler          Anthropic\n \
  \                              + DynamoDB\n                               + Polly\
  \ TTS\n                               + APL Visual\n```\n\n## Componentes Da Arquitetura\
  \ Auri\n\n| Componente | Servico AWS | Funcao |\n|-----------|-------------|--------|\n\
