  \ ao Revenue\n\n## Overview\n\nEstrategia e implementacao de monetizacao para produtos\
  \ digitais - Stripe, subscriptions, pricing experiments, freemium, upgrade flows,\
  \ churn prevention, revenue optimization e modelos de negocio SaaS. Ativar para:\
  \ integrar Stripe, criar planos de assinatura, pricing strategy, upgrade/downgrade,\
  \ webhook de pagamento, trial gratuito, churn, LTV/CAC, unit economics, modelo de\
  \ negocio.\n\n## When to Use This Skill\n\n- When you need specialized assistance\
  \ with this domain\n\n## Do Not Use This Skill When\n\n- The task is unrelated to\
  \ monetization\n- A simpler, more specific tool can handle the request\n- The user\
  \ needs general-purpose assistance without domain expertise\n\n## How It Works\n\
  \n> Price is what you pay. Value is what you get. - Warren Buffett\n> A monetizacao\
  \ perfeita captura valor proporcional ao valor entregue.\n\n---\n\n## A Regra De\
  \ Ouro\n\nUsuarios pagam quando:\n1. O produto resolve um problema real (need)\n\
  2. A solucao e melhor que alternativas (differentiation)\n3. O preco e percebido\
  \ como justo (value perception)\n4. O momento de cobranca e natural (timing)\n\n\
  ## Erros Classicos\n\n- Cobranca antes de mostrar valor (kill activation)\n- Preco\
  \ muito baixo (sinaliza baixa qualidade)\n- Planos demais (paralisia de escolha)\n\
  - Trial sem carta de credito (baixa conversao)\n- Churn invisivel (sem alertas de\
  \ cancelamento iminente)\n\n---\n\n## Setup Inicial\n\n```bash\npip install stripe\n\
  \n## Ou\n\nnpm install stripe\n```\n\n```python\n\n## Config.Py\n\nimport stripe\n\
  import os\n\nstripe.api_key = os.environ[\"STRIPE_SECRET_KEY\"]\nSTRIPE_WEBHOOK_SECRET\
  \ = os.environ[\"STRIPE_WEBHOOK_SECRET\"]\n\nPLANS = {\n    \"free\": None,\n  \
  \  \"pro\": os.environ[\"STRIPE_PRICE_PRO\"],\n    \"business\": os.environ[\"STRIPE_PRICE_BIZ\"\
  ],\n}\n```\n\n## Criar Customer E Subscription\n\n```python\ndef create_customer(email:\
  \ str, name: str, user_id: str) -> str:\n    customer = stripe.Customer.create(\n\
  \        email=email,\n        name=name,\n        metadata={\"user_id\": user_id}\n\
  \    )\n    return customer.id\n\ndef create_subscription(customer_id: str, price_id:\
  \ str, trial_days: int = 14):\n    subscription = stripe.Subscription.create(\n\
  \        customer=customer_id,\n        items=[{\"price\": price_id}],\n       \
  \ trial_period_days=trial_days,\n        payment_behavior=\"default_incomplete\"\
  ,\n        expand=[\"latest_invoice.payment_intent\"],\n    )\n    return {\n  \
  \      \"subscription_id\": subscription.id,\n        \"client_secret\": subscription.latest_invoice.payment_intent.client_secret,\n\
  \        \"status\": subscription.status\n    }\n```\n\n## Checkout Session (R\n\
