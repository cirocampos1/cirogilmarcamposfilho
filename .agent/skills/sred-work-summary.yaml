  # SRED Work Summary


  Collect all the Github PRs, Notion docs and Linear tickets a person completed in
  a given year. Group the links from all of those into projects. Put everything into
  a private Notion document and return a link to that document.


  ## When to Use


  - You need to gather a year''s worth of PRs, Notion docs, and Linear tickets into
  project groupings for SRED preparation.

  - The task is to build the upstream Notion work summary before writing individual
  SRED project descriptions.

  - You need a repeatable collection workflow across GitHub, Notion, and Linear for
  a fixed time window.


  ## Prerequisites


  Before starting make sure that Github, Notion and Linear can be accessed. Notion
  and Linear should be connected using an MCP. Github can be connected with an MCP,
  but if you have access to the `gh` CLI tool, you can use that instead.


  If any of these can''t be accessed, prompt the user to grant access before proceeding.


  ## Process


  ### Step 1


  ```bash

  # Get the current year

  date +%Y

  ```


  The output of this command is the current year.

  The current year minus one is the previous year.


  ### Step 2


  Collect all of the required information from the user:


  *Github Username*: What is the github username of the user?


  *Github Repositories*: Which Github repositories should be searched for PRs?


  The user can either specify a comma separated list, or provide a directory that
  contains repositories. In the second case use this command in the specified directory:


  ```bash

  # Find github repos

  find . -maxdepth 2 -name ".git" -type d | sed ''s/\/.git$//'' | sort

  ```


  Ensure:

  - All the repositories listed are in the `getsentry` Github organization.


  The output of this is hereafter referred to as the "user repos".


  *Incidents*: Ask if the user wants to include incident documents.


  The answer is either yes or no. If the answer is no, that will exclude certain documents
  from the search later on.


  *Other Users*: Ask if there are any other users who might have created Notion documents.


  This should be a comma separated list of names. Remember this as the "other users".


  ### Step 3


  Create a private Notion document entitled "SRED Work Summary [current year]". This
  document will be referred to as the Work Summary.


  If a document with this name already exists, notify the user to rename the existing
  document and stop executing.


  Ensure:

  - If the Work Summary already exists, stop execution.


  ### Step 4


  The time window is Feb. 1 of the previous year until Jan. 31 of the current year

  Find all Github PRs created by the given github username in the time window for
  the user repos.

  If the user does not want to include incident documents, ignore any Github PRs with
  `INC-X`, `inc-X` in the title or description.

  Use either the Github MCP or the `gh` co


