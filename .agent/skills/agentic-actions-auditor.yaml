  \ community\ndate_added: 2026-03-18\n---\n\n# Agentic Actions Auditor\n\nStatic\
  \ security analysis guidance for GitHub Actions workflows that invoke AI coding\
  \ agents. This skill teaches you how to discover workflow files locally or from\
  \ remote GitHub repositories, identify AI action steps, follow cross-file references\
  \ to composite actions and reusable workflows that may contain hidden AI agents,\
  \ capture security-relevant configuration, and detect attack vectors where attacker-controlled\
  \ input reaches an AI agent running in a CI/CD pipeline.\n\n## When to Use\n- Auditing\
  \ a repository's GitHub Actions workflows for AI agent security\n- Reviewing CI/CD\
  \ configurations that invoke Claude Code Action, Gemini CLI, or OpenAI Codex\n-\
  \ Checking whether attacker-controlled input can reach AI agent prompts\n- Evaluating\
  \ agentic action configurations (sandbox settings, tool permissions, user allowlists)\n\
  - Assessing trigger events that expose workflows to external input (`pull_request_target`,\
  \ `issue_comment`, etc.)\n- Investigating data flow from GitHub event context through\
  \ `env:` blocks to AI prompt fields\n\n## When NOT to Use\n\n- Analyzing workflows\
  \ that do NOT use any AI agent actions (use general Actions security tools instead)\n\
  - Reviewing standalone composite actions or reusable workflows outside of a caller\
  \ workflow context (use this skill when analyzing a workflow that references them\
  \ via `uses:`)\n- Performing runtime prompt injection testing (this is static analysis\
  \ guidance, not exploitation)\n- Auditing non-GitHub CI/CD systems (Jenkins, GitLab\
  \ CI, CircleCI)\n- Auto-fixing or modifying workflow files (this skill reports findings,\
  \ does not modify files)\n\n## Rationalizations to Reject\n\nWhen auditing agentic\
  \ actions, reject these common rationalizations. Each represents a reasoning shortcut\
  \ that leads to missed findings.\n\n**1. \"It only runs on PRs from maintainers\"\
  **\nWrong because it ignores `pull_request_target`, `issue_comment`, and other trigger\
  \ events that expose actions to external input. Attackers do not need write access\
  \ to trigger these workflows. A `pull_request_target` event runs in the context\
  \ of the base branch, not the PR branch, meaning any external contributor can trigger\
  \ it by opening a PR.\n\n**2. \"We use allowed_tools to restrict what it can do\"\
  **\nWrong because tool restrictions can still be weaponized. Even restricted tools\
  \ like `echo` can be abused for data exfiltration via subshell expansion (`echo\
  \ $(env)`). A tool allowlist reduces attack surface but does not eliminate it. Limited\
  \ tools != safe tools.\n\n**3. \"There's no ${{ }} in the prompt, so it's safe\"\
  **\nWrong because this is the classic env var in\n\n## Diretrizes do \n\n\
