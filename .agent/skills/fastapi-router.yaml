  date_added: \"2026-02-27\"\n---\n\n# FastAPI Router\n\nCreate FastAPI routers following\
  \ established patterns with proper authentication, response models, and HTTP status\
  \ codes.\n\n## Quick Start\n\nCopy the template from assets/template.py and replace\
  \ placeholders:\n- `{{ResourceName}}` → PascalCase name (e.g., `Project`)\n- `{{resource_name}}`\
  \ → snake_case name (e.g., `project`)\n- `{{resource_plural}}` → plural form (e.g.,\
  \ `projects`)\n\n## Authentication Patterns\n\n```python\n# Optional auth - returns\
  \ None if not authenticated\ncurrent_user: Optional[User] = Depends(get_current_user)\n\
  \n# Required auth - raises 401 if not authenticated\ncurrent_user: User = Depends(get_current_user_required)\n\
  ```\n\n## Response Models\n\n```python\n@router.get(\"/items/{item_id}\", response_model=Item)\n\
  async def get_item(item_id: str) -> Item:\n    ...\n\n@router.get(\"/items\", response_model=list[Item])\n\
  async def list_items() -> list[Item]:\n    ...\n```\n\n## HTTP Status Codes\n\n\
  ```python\n@router.post(\"/items\", status_code=status.HTTP_201_CREATED)\n@router.delete(\"\
  /items/{id}\", status_code=status.HTTP_204_NO_CONTENT)\n```\n\n## Integration Steps\n\
  \n1. Create router in `src/backend/app/routers/`\n2. Mount in `src/backend/app/main.py`\n\
  3. Create corresponding Pydantic models\n4. Create service layer if needed\n5. Add\
  \ frontend API functions\n\n## When to Use\nThis skill is applicable to execute\
  \ the workflow or actions described in the overview.\n\n\n## Diretrizes do \n\
  \n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente o gerenciador uv para dependências.\
  \ Todo código deve ser lintado via ruff e tipado com mypy.\n"
