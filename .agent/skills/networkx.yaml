  # NetworkX\n\n## Overview\n\nNetworkX is a Python package for creating, manipulating,\
  \ and analyzing complex networks and graphs. Use this skill when working with network\
  \ or graph data structures, including social networks, biological networks, transportation\
  \ systems, citation networks, knowledge graphs, or any system involving relationships\
  \ between entities.\n\n## When to Use This Skill\n\nInvoke this skill when tasks\
  \ involve:\n\n- **Creating graphs**: Building network structures from data, adding\
  \ nodes and edges with attributes\n- **Graph analysis**: Computing centrality measures,\
  \ finding shortest paths, detecting communities, measuring clustering\n- **Graph\
  \ algorithms**: Running standard algorithms like Dijkstra's, PageRank, minimum spanning\
  \ trees, maximum flow\n- **Network generation**: Creating synthetic networks (random,\
  \ scale-free, small-world models) for testing or simulation\n- **Graph I/O**: Reading\
  \ from or writing to various formats (edge lists, GraphML, JSON, CSV, adjacency\
  \ matrices)\n- **Visualization**: Drawing and customizing network visualizations\
  \ with matplotlib or interactive libraries\n- **Network comparison**: Checking isomorphism,\
  \ computing graph metrics, analyzing structural properties\n\n## Core Capabilities\n\
  \n### 1. Graph Creation and Manipulation\n\nNetworkX supports four main graph types:\n\
  - **Graph**: Undirected graphs with single edges\n- **DiGraph**: Directed graphs\
  \ with one-way connections\n- **MultiGraph**: Undirected graphs allowing multiple\
  \ edges between nodes\n- **MultiDiGraph**: Directed graphs with multiple edges\n\
  \nCreate graphs by:\n```python\nimport networkx as nx\n\n# Create empty graph\n\
  G = nx.Graph()\n\n# Add nodes (can be any hashable type)\nG.add_node(1)\nG.add_nodes_from([2,\
  \ 3, 4])\nG.add_node(\"protein_A\", type='enzyme', weight=1.5)\n\n# Add edges\n\
  G.add_edge(1, 2)\nG.add_edges_from([(1, 3), (2, 4)])\nG.add_edge(1, 4, weight=0.8,\
  \ relation='interacts')\n```\n\n**Reference**: See `references/graph-basics.md`\
  \ for comprehensive guidance on creating, modifying, examining, and managing graph\
  \ structures, including working with attributes and subgraphs.\n\n### 2. Graph Algorithms\n\
  \nNetworkX provides extensive algorithms for network analysis:\n\n**Shortest Paths**:\n\
  ```python\n# Find shortest path\npath = nx.shortest_path(G, source=1, target=5)\n\
  length = nx.shortest_path_length(G, source=1, target=5, weight='weight')\n```\n\n\
  **Centrality Measures**:\n```python\n# Degree centrality\ndegree_cent = nx.degree_centrality(G)\n\
  \n# Betweenness centrality\nbetweenness = nx.betweenness_centrality(G)\n\n# PageRank\n\
  pagerank = nx.pagerank(G)\n```\n\n**Community Detection**:\n```python\nfrom networkx.algorithms\
  \ import community\n\n# Detect communities\ncommunities = community.greedy_modularity_communities(G)\n\
  ```\n\n**Connectivity**:\n\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE\
