  \n# Scikit-learn\n\n## Overview\n\nThis skill provides comprehensive guidance for\
  \ machine learning tasks using scikit-learn, the industry-standard Python library\
  \ for classical machine learning. Use this skill for classification, regression,\
  \ clustering, dimensionality reduction, preprocessing, model evaluation, and building\
  \ production-ready ML pipelines.\n\n## Installation\n\n```bash\n# Install scikit-learn\
  \ using uv\nuv uv pip install scikit-learn\n\n# Optional: Install visualization\
  \ dependencies\nuv uv pip install matplotlib seaborn\n\n# Commonly used with\nuv\
  \ uv pip install pandas numpy\n```\n\n## When to Use This Skill\n\nUse the scikit-learn\
  \ skill when:\n\n- Building classification or regression models\n- Performing clustering\
  \ or dimensionality reduction\n- Preprocessing and transforming data for machine\
  \ learning\n- Evaluating model performance with cross-validation\n- Tuning hyperparameters\
  \ with grid or random search\n- Creating ML pipelines for production workflows\n\
  - Comparing different algorithms for a task\n- Working with both structured (tabular)\
  \ and text data\n- Need interpretable, classical machine learning approaches\n\n\
  ## Quick Start\n\n### Classification Example\n\n```python\nfrom sklearn.model_selection\
  \ import train_test_split\nfrom sklearn.preprocessing import StandardScaler\nfrom\
  \ sklearn.ensemble import RandomForestClassifier\nfrom sklearn.metrics import classification_report\n\
  \n# Split data\nX_train, X_test, y_train, y_test = train_test_split(\n    X, y,\
  \ test_size=0.2, stratify=y, random_state=42\n)\n\n# Preprocess\nscaler = StandardScaler()\n\
  X_train_scaled = scaler.fit_transform(X_train)\nX_test_scaled = scaler.transform(X_test)\n\
  \n# Train model\nmodel = RandomForestClassifier(n_estimators=100, random_state=42)\n\
  model.fit(X_train_scaled, y_train)\n\n# Evaluate\ny_pred = model.predict(X_test_scaled)\n\
  print(classification_report(y_test, y_pred))\n```\n\n### Complete Pipeline with\
  \ Mixed Data\n\n```python\nfrom sklearn.pipeline import Pipeline\nfrom sklearn.compose\
  \ import ColumnTransformer\nfrom sklearn.preprocessing import StandardScaler, OneHotEncoder\n\
  from sklearn.impute import SimpleImputer\nfrom sklearn.ensemble import GradientBoostingClassifier\n\
  \n# Define feature types\nnumeric_features = ['age', 'income']\ncategorical_features\
  \ = ['gender', 'occupation']\n\n# Create preprocessing pipelines\nnumeric_transformer\
  \ = Pipeline([\n    ('imputer', SimpleImputer(strategy='median')),\n    ('scaler',\
  \ StandardScaler())\n])\n\ncategorical_transformer = Pipeline([\n    ('imputer',\
  \ SimpleImputer(strategy='most_frequent')),\n    ('onehot', OneHotEncoder(handle_unknown='ignore'))\n\
  ])\n\n# Combine transformers\npreprocessor = ColumnTransformer([\n    ('num', numeric_transformer,\
  \ numeric_features),\n    ('cat', categorical_transformer, categorical_features)\n\
  ])\n\n# \n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use\
  \ exclusivamente o gerenciador uv para dependências. Todo código deve ser lintado\
  \ via ruff e tipado com mypy.\n"
