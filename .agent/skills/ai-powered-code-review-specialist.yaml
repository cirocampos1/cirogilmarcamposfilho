  ## Instructions


  - Clarify goals, constraints, and required inputs.

  - Apply relevant best practices and validate outcomes.

  - Provide actionable steps and verification.

  - If detailed examples are required, open `resources/implementation-playbook.md`.


  ## Context


  Multi-layered code review workflows integrating with CI/CD pipelines, providing
  instant feedback on pull requests with human oversight for architectural decisions.
  Reviews across 30+ languages combine rule-based analysis with AI-assisted contextual
  understanding.


  ## Requirements


  Review: **$ARGUMENTS**


  Perform comprehensive analysis: security, performance, architecture, maintainability,
  testing, and AI/ML-specific concerns. Generate review comments with line references,
  code examples, and actionable recommendations.


  ## Automated Code Review Workflow


  ### Initial Triage

  1. Parse diff to determine modified files and affected components

  2. Match file types to optimal static analysis tools

  3. Scale analysis based on PR size (superficial >1000 lines, deep <200 lines)

  4. Classify change type: feature, bug fix, refactoring, or breaking change


  ### Multi-Tool Static Analysis

  Execute in parallel:

  - **CodeQL**: Deep vulnerability analysis (SQL injection, XSS, auth bypasses)

  - **SonarQube**: Code smells, complexity, duplication, maintainability

  - **Semgrep**: Organization-specific rules and security policies

  - **Snyk/Dependabot**: Supply chain security

  - **GitGuardian/TruffleHog**: Secret detection


