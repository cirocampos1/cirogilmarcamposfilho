  \n## Contexto Original da Skill\nAzure.ResourceManager.MongoDBAtlas SDK\n\n## Instruções\n\
  ---\nname: azure-mgmt-mongodbatlas-dotnet\ndescription: \"Manage MongoDB Atlas Organizations\
  \ as Azure ARM resources with unified billing through Azure Marketplace.\"\nrisk:\
  \ unknown\nsource: community\ndate_added: \"2026-02-27\"\n---\n\n# Azure.ResourceManager.MongoDBAtlas\
  \ SDK\n\nManage MongoDB Atlas Organizations as Azure ARM resources with unified\
  \ billing through Azure Marketplace.\n\n## Package Information\n\n| Property | Value\
  \ |\n|----------|-------|\n| Package | `Azure.ResourceManager.MongoDBAtlas` |\n\
  | Version | 1.0.0 (GA) |\n| API Version | 2025-06-01 |\n| Resource Type | `MongoDB.Atlas/organizations`\
  \ |\n| NuGet | [Azure.ResourceManager.MongoDBAtlas](https://www.nuget.org/packages/Azure.ResourceManager.MongoDBAtlas)\
  \ |\n\n## Installation\n\n```bash\ndotnet add package Azure.ResourceManager.MongoDBAtlas\n\
  dotnet add package Azure.Identity\ndotnet add package Azure.ResourceManager\n```\n\
  \n## Important Scope Limitation\n\nThis SDK manages **MongoDB Atlas Organizations\
  \ as Azure ARM resources** for marketplace integration. It does NOT directly manage:\n\
  - Atlas clusters\n- Databases\n- Collections\n- Users/roles\n\nFor cluster management,\
  \ use the MongoDB Atlas API directly after creating the organization.\n\n## Authentication\n\
  \n```csharp\nusing Azure.Identity;\nusing Azure.ResourceManager;\nusing Azure.ResourceManager.MongoDBAtlas;\n\
  using Azure.ResourceManager.MongoDBAtlas.Models;\n\n// Create ARM client with DefaultAzureCredential\n\
  var credential = new DefaultAzureCredential();\nvar armClient = new ArmClient(credential);\n\
  ```\n\n## Core Types\n\n| Type | Purpose |\n|------|---------|\n| `MongoDBAtlasOrganizationResource`\
  \ | ARM resource representing an Atlas organization |\n| `MongoDBAtlasOrganizationCollection`\
  \ | Collection of organizations in a resource group |\n| `MongoDBAtlasOrganizationData`\
  \ | Data model for organization resource |\n| `MongoDBAtlasOrganizationProperties`\
  \ | Organization-specific properties |\n| `MongoDBAtlasMarketplaceDetails` | Azure\
  \ Marketplace subscription details |\n| `MongoDBAtlasOfferDetails` | Marketplace\
  \ offer configuration |\n| `MongoDBAtlasUserDetails` | User information for the\
  \ organization |\n| `MongoDBAtlasPartnerProperties` | MongoDB-specific properties\
  \ (org name, ID) |\n\n## Workflows\n\n### Get Organization Collection\n\n```csharp\n\
  // Get resource group\nvar subscription = await armClient.GetDefaultSubscriptionAsync();\n\
  var resourceGroup = await subscription.GetResourceGroupAsync(\"my-resource-group\"\
  );\n\n// Get organizations collection\nMongoDBAtlasOrganizationCollection organizations\
  \ = \n    resourceGroup.Value.GetMongoDBAtlasOrganizations();\n```\n\n### Create\
  \ Organization\n\n```csharp\nvar organizationName = \"my-atlas-org\";\nvar location\
  \ = AzureLocation.EastUS2;\n\n// Build organization data\nvar organizationData =\
  \ new MongoDBAtlasOrganizationData(location)\n{\n    Properties = new MongoDBAtlasOrganizationProperties(\n\
  \        marketplace: new MongoDBAtlasMarketplaceDetails(\n            subscriptionId:\
  \ \"your-azure-subscription-id\",\n            offerDetails: new MongoDBAtlasOfferDetails(\n\
  \              \n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA:\
  \ Use exclusivamente o gerenciador uv para dependências. Todo código deve ser lintado\
  \ via ruff e tipado com mypy.\n"
