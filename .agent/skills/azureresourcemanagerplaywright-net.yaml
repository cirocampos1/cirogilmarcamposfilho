  \ community\ndate_added: '2026-02-27'\n---\n\n# Azure.ResourceManager.Playwright\
  \ (.NET)\n\nManagement plane SDK for provisioning and managing Microsoft Playwright\
  \ Testing workspaces via Azure Resource Manager.\n\n> **⚠️ Management vs Test Execution**\n\
  > - **This SDK (Azure.ResourceManager.Playwright)**: Create workspaces, manage quotas,\
  \ check name availability\n> - **Test Execution SDK (Azure.Developer.MicrosoftPlaywrightTesting.NUnit)**:\
  \ Run Playwright tests at scale on cloud browsers\n\n## Installation\n\n```bash\n\
  dotnet add package Azure.ResourceManager.Playwright\ndotnet add package Azure.Identity\n\
  ```\n\n**Current Versions**: Stable v1.0.0, Preview v1.0.0-beta.1\n\n## Environment\
  \ Variables\n\n```bash\nAZURE_SUBSCRIPTION_ID=<your-subscription-id>\n# For service\
  \ principal auth (optional)\nAZURE_TENANT_ID=<tenant-id>\nAZURE_CLIENT_ID=<client-id>\n\
  AZURE_CLIENT_SECRET=<client-secret>\n```\n\n## Authentication\n\n```csharp\nusing\
  \ Azure.Identity;\nusing Azure.ResourceManager;\nusing Azure.ResourceManager.Playwright;\n\
  \n// Always use DefaultAzureCredential\nvar credential = new DefaultAzureCredential();\n\
  var armClient = new ArmClient(credential);\n\n// Get subscription\nvar subscriptionId\
  \ = Environment.GetEnvironmentVariable(\"AZURE_SUBSCRIPTION_ID\");\nvar subscription\
  \ = armClient.GetSubscriptionResource(\n    new ResourceIdentifier($\"/subscriptions/{subscriptionId}\"\
  ));\n```\n\n## Resource Hierarchy\n\n```\nArmClient\n└── SubscriptionResource\n\
  \    ├── PlaywrightQuotaResource (subscription-level quotas)\n    └── ResourceGroupResource\n\
  \        └── PlaywrightWorkspaceResource\n            └── PlaywrightWorkspaceQuotaResource\
  \ (workspace-level quotas)\n```\n\n## Core Workflow\n\n### 1. Create Playwright\
  \ Workspace\n\n```csharp\nusing Azure.ResourceManager.Playwright;\nusing Azure.ResourceManager.Playwright.Models;\n\
  \n// Get resource group\nvar resourceGroup = await subscription\n    .GetResourceGroupAsync(\"\
  my-resource-group\");\n\n// Define workspace\nvar workspaceData = new PlaywrightWorkspaceData(AzureLocation.WestUS3)\n\
  {\n    // Optional: Configure regional affinity and local auth\n    RegionalAffinity\
  \ = PlaywrightRegionalAffinity.Enabled,\n    LocalAuth = PlaywrightLocalAuth.Enabled,\n\
  \    Tags =\n    {\n        [\"Team\"] = \"Dev Exp\",\n        [\"Environment\"\
  ] = \"Production\"\n    }\n};\n\n// Create workspace (long-running operation)\n\
  var workspaceCollection = resourceGroup.Value.GetPlaywrightWorkspaces();\nvar operation\
  \ = await workspaceCollection.CreateOrUpdateAsync(\n    WaitUntil.Completed,\n \
  \   \"my-playwright-workspace\",\n    workspaceData);\n\nPlaywrightWorkspaceResource\
  \ workspace = operation.Value;\n\n// Get the data plane URI for running tests\n\
  Console.WriteLine($\"Data Plane URI: {workspace.Data.DataplaneUri}\");\nConsole.WriteLine($\"\
  Workspace ID: {workspace.Data.WorkspaceId}\");\n```\n\n### 2. Get Existing Workspace\n\
  \n```csharp\n// Get by name\nvar workspace = await workspaceCollection.GetAsync(\"\
