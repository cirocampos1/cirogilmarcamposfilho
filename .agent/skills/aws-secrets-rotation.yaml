  \n# AWS Secrets Rotation\n\nAutomate rotation of secrets, credentials, and API keys\
  \ using AWS Secrets Manager and Lambda.\n\n## When to Use\nUse this skill when you\
  \ need to implement automated secrets rotation, manage credentials securely, or\
  \ comply with security policies requiring regular key rotation.\n\n## Supported\
  \ Secret Types\n\n**AWS Services**\n- RDS database credentials\n- DocumentDB credentials\n\
  - Redshift credentials\n- ElastiCache credentials\n\n**Third-Party Services**\n\
  - API keys\n- OAuth tokens\n- SSH keys\n- Custom credentials\n\n## Secrets Manager\
  \ Setup\n\n### Create a Secret\n\n```bash\n# Create RDS secret\naws secretsmanager\
  \ create-secret \\\n  --name prod/db/mysql \\\n  --description \"Production MySQL\
  \ credentials\" \\\n  --secret-string '{\n    \"username\": \"admin\",\n    \"password\"\
  : \"CHANGE_ME\",\n    \"engine\": \"mysql\",\n    \"host\": \"mydb.cluster-abc.us-east-1.rds.amazonaws.com\"\
  ,\n    \"port\": 3306,\n    \"dbname\": \"myapp\"\n  }'\n\n# Create API key secret\n\
  aws secretsmanager create-secret \\\n  --name prod/api/stripe \\\n  --secret-string\
  \ '{\n    \"api_key\": \"sk_live_xxxxx\",\n    \"webhook_secret\": \"whsec_xxxxx\"\
  \n  }'\n\n# Create secret from file\naws secretsmanager create-secret \\\n  --name\
  \ prod/ssh/private-key \\\n  --secret-binary fileb://~/.ssh/id_rsa\n```\n\n### Retrieve\
  \ Secrets\n\n```bash\n# Get secret value\naws secretsmanager get-secret-value \\\
  \n  --secret-id prod/db/mysql \\\n  --query 'SecretString' --output text\n\n# Get\
  \ specific field\naws secretsmanager get-secret-value \\\n  --secret-id prod/db/mysql\
  \ \\\n  --query 'SecretString' --output text | \\\n  jq -r '.password'\n\n# Get\
  \ binary secret\naws secretsmanager get-secret-value \\\n  --secret-id prod/ssh/private-key\
  \ \\\n  --query 'SecretBinary' --output text | \\\n  base64 -d > private-key.pem\n\
  ```\n\n## Automatic Rotation Setup\n\n### Enable RDS Rotation\n\n```bash\n# Enable\
  \ automatic rotation (30 days)\naws secretsmanager rotate-secret \\\n  --secret-id\
  \ prod/db/mysql \\\n  --rotation-lambda-arn arn:aws:lambda:us-east-1:123456789012:function:SecretsManagerRDSMySQLRotation\
  \ \\\n  --rotation-rules AutomaticallyAfterDays=30\n\n# Rotate immediately\naws\
  \ secretsmanager rotate-secret \\\n  --secret-id prod/db/mysql\n\n# Check rotation\
  \ status\naws secretsmanager describe-secret \\\n  --secret-id prod/db/mysql \\\n\
  \  --query 'RotationEnabled'\n```\n\n### Lambda Rotation Function\n\n```python\n\
