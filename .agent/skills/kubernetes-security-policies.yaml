  \nrisk: unknown\nsource: community\ndate_added: \"2026-02-27\"\n---\n\n# Kubernetes\
  \ Security Policies\n\nComprehensive guide for implementing NetworkPolicy, PodSecurityPolicy,\
  \ RBAC, and Pod Security Standards in Kubernetes.\n\n## Do not use this skill when\n\
  \n- The task is unrelated to kubernetes security policies\n- You need a different\
  \ domain or tool outside this scope\n\n## Instructions\n\n- Clarify goals, constraints,\
  \ and required inputs.\n- Apply relevant best practices and validate outcomes.\n\
  - Provide actionable steps and verification.\n- If detailed examples are required,\
  \ open `resources/implementation-playbook.md`.\n\n## Purpose\n\nImplement defense-in-depth\
  \ security for Kubernetes clusters using network policies, pod security standards,\
  \ and RBAC.\n\n## Use this skill when\n\n- Implement network segmentation\n- Configure\
  \ pod security standards\n- Set up RBAC for least-privilege access\n- Create security\
  \ policies for compliance\n- Implement admission control\n- Secure multi-tenant\
  \ clusters\n\n## Pod Security Standards\n\n### 1. Privileged (Unrestricted)\n```yaml\n\
  apiVersion: v1\nkind: Namespace\nmetadata:\n  name: privileged-ns\n  labels:\n \
  \   pod-security.kubernetes.io/enforce: privileged\n    pod-security.kubernetes.io/audit:\
  \ privileged\n    pod-security.kubernetes.io/warn: privileged\n```\n\n### 2. Baseline\
  \ (Minimally restrictive)\n```yaml\napiVersion: v1\nkind: Namespace\nmetadata:\n\
  \  name: baseline-ns\n  labels:\n    pod-security.kubernetes.io/enforce: baseline\n\
  \    pod-security.kubernetes.io/audit: baseline\n    pod-security.kubernetes.io/warn:\
  \ baseline\n```\n\n### 3. Restricted (Most restrictive)\n```yaml\napiVersion: v1\n\
  kind: Namespace\nmetadata:\n  name: restricted-ns\n  labels:\n    pod-security.kubernetes.io/enforce:\
  \ restricted\n    pod-security.kubernetes.io/audit: restricted\n    pod-security.kubernetes.io/warn:\
  \ restricted\n```\n\n## Network Policies\n\n### Default Deny All\n```yaml\napiVersion:\
  \ networking.k8s.io/v1\nkind: NetworkPolicy\nmetadata:\n  name: default-deny-all\n\
  \  namespace: production\nspec:\n  podSelector: {}\n  policyTypes:\n  - Ingress\n\
  \  - Egress\n```\n\n### Allow Frontend to Backend\n```yaml\napiVersion: networking.k8s.io/v1\n\
  kind: NetworkPolicy\nmetadata:\n  name: allow-frontend-to-backend\n  namespace:\
  \ production\nspec:\n  podSelector:\n    matchLabels:\n      app: backend\n  policyTypes:\n\
  \  - Ingress\n  ingress:\n  - from:\n    - podSelector:\n        matchLabels:\n\
  \          app: frontend\n    ports:\n    - protocol: TCP\n      port: 8080\n```\n\
  \n### Allow DNS\n```yaml\napiVersion: networking.k8s.io/v1\nkind: NetworkPolicy\n\
  metadata:\n  name: allow-dns\n  namespace: production\nspec:\n  podSelector: {}\n\
  \  policyTypes:\n  - Egress\n  egress:\n  - to:\n    - namespaceSelector:\n    \
  \    matchLabels:\n          name: kube-system\n    ports:\n    - protocol: UDP\n\
  \      port: 53\n```\n\n**Reference:** See `assets/network-policy-template.yaml`\n\
