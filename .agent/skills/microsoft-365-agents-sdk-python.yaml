  date_added: '2026-02-27'\n---\n\n# Microsoft 365 Agents SDK (Python)\n\nBuild enterprise\
  \ agents for Microsoft 365, Teams, and Copilot Studio using the Microsoft Agents\
  \ SDK with aiohttp hosting, AgentApplication routing, streaming responses, and MSAL-based\
  \ authentication.\n\n## Before implementation\n- Use the microsoft-docs MCP to verify\
  \ the latest API signatures for AgentApplication, start_agent_process, and authentication\
  \ options.\n- Confirm package versions on PyPI for the microsoft-agents-* packages\
  \ you plan to use.\n\n## Important Notice - Import Changes\n\n> **⚠️ Breaking Change**:\
  \ Recent updates have changed the Python import structure from `microsoft.agents`\
  \ to `microsoft_agents` (using underscores instead of dots).\n\n## Installation\n\
  \n```bash\npip install microsoft-agents-hosting-core\npip install microsoft-agents-hosting-aiohttp\n\
  pip install microsoft-agents-activity\npip install microsoft-agents-authentication-msal\n\
  pip install microsoft-agents-copilotstudio-client\npip install python-dotenv aiohttp\n\
  ```\n\n## Environment Variables (.env)\n\n```bash\nCONNECTIONS__SERVICE_CONNECTION__SETTINGS__CLIENTID=<client-id>\n\
  CONNECTIONS__SERVICE_CONNECTION__SETTINGS__CLIENTSECRET=<client-secret>\nCONNECTIONS__SERVICE_CONNECTION__SETTINGS__TENANTID=<tenant-id>\n\
  \n# Optional: OAuth handlers for auto sign-in\nAGENTAPPLICATION__USERAUTHORIZATION__HANDLERS__GRAPH__SETTINGS__AZUREBOTOAUTHCONNECTIONNAME=<connection-name>\n\
  \n# Optional: Azure OpenAI for streaming\nAZURE_OPENAI_ENDPOINT=<endpoint>\nAZURE_OPENAI_API_VERSION=<version>\n\
  AZURE_OPENAI_API_KEY=<key>\n\n# Optional: Copilot Studio client\nCOPILOTSTUDIOAGENT__ENVIRONMENTID=<environment-id>\n\
  COPILOTSTUDIOAGENT__SCHEMANAME=<schema-name>\nCOPILOTSTUDIOAGENT__TENANTID=<tenant-id>\n\
  COPILOTSTUDIOAGENT__AGENTAPPID=<app-id>\n```\n\n## Core Workflow: aiohttp-hosted\
  \ AgentApplication\n\n```python\nimport logging\nfrom os import environ\n\nfrom\
  \ dotenv import load_dotenv\nfrom aiohttp.web import Request, Response, Application,\
  \ run_app\n\nfrom microsoft_agents.activity import load_configuration_from_env\n\
  from microsoft_agents.hosting.core import (\n    Authorization,\n    AgentApplication,\n\
  \    TurnState,\n    TurnContext,\n    MemoryStorage,\n)\nfrom microsoft_agents.hosting.aiohttp\
  \ import (\n    CloudAdapter,\n    start_agent_process,\n    jwt_authorization_middleware,\n\
  )\nfrom microsoft_agents.authentication.msal import MsalConnectionManager\n\n# Enable\
  \ logging\nms_agents_logger = logging.getLogger(\"microsoft_agents\")\nms_agents_logger.addHandler(logging.StreamHandler())\n\
  ms_agents_logger.setLevel(logging.INFO)\n\n# Load configuration\nload_dotenv()\n\
  agents_sdk_config = load_configuration_from_env(environ)\n\n# Create storage and\
  \ connection manager\nSTORAGE = MemoryStorage()\nCONNECTION_MANAGER = MsalConnectionManager(**agents_sdk_config)\n\
  \n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente\
  \ o gerenciador uv para dependências. Todo código deve ser lintado via ruff e tipado\
  \ com mypy.\n"
