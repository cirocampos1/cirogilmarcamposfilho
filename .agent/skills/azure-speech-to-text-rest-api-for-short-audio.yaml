  source: community\ndate_added: '2026-02-27'\n---\n\n# Azure Speech to Text REST\
  \ API for Short Audio\n\nSimple REST API for speech-to-text transcription of short\
  \ audio files (up to 60 seconds). No SDK required - just HTTP requests.\n\n## Prerequisites\n\
  \n1. **Azure subscription** - [Create one free](https://azure.microsoft.com/free/)\n\
  2. **Speech resource** - Create in [Azure Portal](https://portal.azure.com/#create/Microsoft.CognitiveServicesSpeechServices)\n\
  3. **Get credentials** - After deployment, go to resource > Keys and Endpoint\n\n\
  ## Environment Variables\n\n```bash\n# Required\nAZURE_SPEECH_KEY=<your-speech-resource-key>\n\
  AZURE_SPEECH_REGION=<region>  # e.g., eastus, westus2, westeurope\n\n# Alternative:\
  \ Use endpoint directly\nAZURE_SPEECH_ENDPOINT=https://<region>.stt.speech.microsoft.com\n\
  ```\n\n## Installation\n\n```bash\npip install requests\n```\n\n## Quick Start\n\
  \n```python\nimport os\nimport requests\n\ndef transcribe_audio(audio_file_path:\
  \ str, language: str = \"en-US\") -> dict:\n    \"\"\"Transcribe short audio file\
  \ (max 60 seconds) using REST API.\"\"\"\n    region = os.environ[\"AZURE_SPEECH_REGION\"\
  ]\n    api_key = os.environ[\"AZURE_SPEECH_KEY\"]\n    \n    url = f\"https://{region}.stt.speech.microsoft.com/speech/recognition/conversation/cognitiveservices/v1\"\
  \n    \n    headers = {\n        \"Ocp-Apim-Subscription-Key\": api_key,\n     \
  \   \"Content-Type\": \"audio/wav; codecs=audio/pcm; samplerate=16000\",\n     \
  \   \"Accept\": \"application/json\"\n    }\n    \n    params = {\n        \"language\"\
  : language,\n        \"format\": \"detailed\"  # or \"simple\"\n    }\n    \n  \
  \  with open(audio_file_path, \"rb\") as audio_file:\n        response = requests.post(url,\
  \ headers=headers, params=params, data=audio_file)\n    \n    response.raise_for_status()\n\
  \    return response.json()\n\n# Usage\nresult = transcribe_audio(\"audio.wav\"\
  , \"en-US\")\nprint(result[\"DisplayText\"])\n```\n\n## Audio Requirements\n\n|\
  \ Format | Codec | Sample Rate | Notes |\n|--------|-------|-------------|-------|\n\
  | WAV | PCM | 16 kHz, mono | **Recommended** |\n| OGG | OPUS | 16 kHz, mono | Smaller\
  \ file size |\n\n**Limitations:**\n- Maximum 60 seconds of audio\n- For pronunciation\
  \ assessment: maximum 30 seconds\n- No partial/interim results (final only)\n\n\
  ## Content-Type Headers\n\n```python\n# WAV PCM 16kHz\n\"Content-Type\": \"audio/wav;\
  \ codecs=audio/pcm; samplerate=16000\"\n\n# OGG OPUS\n\"Content-Type\": \"audio/ogg;\
  \ codecs=opus\"\n```\n\n## Response Formats\n\n### Simple Format (default)\n\n```python\n\
  params = {\"language\": \"en-US\", \"format\": \"simple\"}\n```\n\n```json\n{\n\
  \  \"RecognitionStatus\": \"Success\",\n  \"DisplayText\": \"Remind me to buy 5\
  \ pencils.\",\n  \"Offset\": \"1236645672289\",\n  \"Duration\": \"1236645672289\"\
  \n}\n```\n\n### Detailed Format\n\n```python\nparams = {\"language\": \"en-US\"\
  , \"format\": \"detailed\"}\n```\n\n```json\n{\n  \"RecognitionStatus\": \"Success\"\
  ,\n  \"Offset\": \"1236645672289\",\n  \"D\n\n## Diretrizes do \n\n\U0001F527\
  \ DIRETRIZ DE ENGENHARIA: Use exclusivamente o gerenciador uv para dependências.\
  \ Todo código deve ser lintado via ruff e tipado com mypy.\n"
