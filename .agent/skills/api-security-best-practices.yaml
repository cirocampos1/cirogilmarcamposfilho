  \nrisk: unknown\nsource: community\ndate_added: \"2026-02-27\"\n---\n\n# API Security\
  \ Best Practices\n\n## Overview\n\nGuide developers in building secure APIs by implementing\
  \ authentication, authorization, input validation, rate limiting, and protection\
  \ against common vulnerabilities. This skill covers security patterns for REST,\
  \ GraphQL, and WebSocket APIs.\n\n## When to Use This Skill\n\n- Use when designing\
  \ new API endpoints\n- Use when securing existing APIs\n- Use when implementing\
  \ authentication and authorization\n- Use when protecting against API attacks (injection,\
  \ DDoS, etc.)\n- Use when conducting API security reviews\n- Use when preparing\
  \ for security audits\n- Use when implementing rate limiting and throttling\n- Use\
  \ when handling sensitive data in APIs\n\n## How It Works\n\n### Step 1: Authentication\
  \ & Authorization\n\nI'll help you implement secure authentication:\n- Choose authentication\
  \ method (JWT, OAuth 2.0, API keys)\n- Implement token-based authentication\n- Set\
  \ up role-based access control (RBAC)\n- Secure session management\n- Implement\
  \ multi-factor authentication (MFA)\n\n### Step 2: Input Validation & Sanitization\n\
  \nProtect against injection attacks:\n- Validate all input data\n- Sanitize user\
  \ inputs\n- Use parameterized queries\n- Implement request schema validation\n-\
  \ Prevent SQL injection, XSS, and command injection\n\n### Step 3: Rate Limiting\
  \ & Throttling\n\nPrevent abuse and DDoS attacks:\n- Implement rate limiting per\
  \ user/IP\n- Set up API throttling\n- Configure request quotas\n- Handle rate limit\
  \ errors gracefully\n- Monitor for suspicious activity\n\n### Step 4: Data Protection\n\
  \nSecure sensitive data:\n- Encrypt data in transit (HTTPS/TLS)\n- Encrypt sensitive\
  \ data at rest\n- Implement proper error handling (no data leaks)\n- Sanitize error\
  \ messages\n- Use secure headers\n\n### Step 5: API Security Testing\n\nVerify security\
  \ implementation:\n- Test authentication and authorization\n- Perform penetration\
  \ testing\n- Check for common vulnerabilities (OWASP API Top 10)\n- Validate input\
  \ handling\n- Test rate limiting\n\n\n## Examples\n\n### Example 1: Implementing\
  \ JWT Authentication\n\n```markdown\n## Secure JWT Authentication Implementation\n\
  \n### Authentication Flow\n\n1. User logs in with credentials\n2. Server validates\
  \ credentials\n3. Server generates JWT token\n4. Client stores token securely\n\
  5. Client sends token with each request\n6. Server validates token\n\n### Implementation\n\
  \n#### 1. Generate Secure JWT Tokens\n\n\\`\\`\\`javascript\n// auth.js\nconst jwt\
  \ = require('jsonwebtoken');\nconst bcrypt = require('bcrypt');\n\n// Login endpoint\n\
  app.post('/api/auth/login', async (req, res) => {\n  try {\n    const { email, password\
  \ } = req.body;\n    \n    // Validate input\n    if (!email || !password) {\n \
  \     return res.status(400).json({ \n        error: 'Email and password are required'\
  \ \n      });\n  \n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA:\
