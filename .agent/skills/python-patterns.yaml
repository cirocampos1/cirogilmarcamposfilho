  \ unknown\nsource: community\ndate_added: \"2026-02-27\"\n---\n\n# Python Patterns\n\
  \n> Python development principles and decision-making for 2025.\n> **Learn to THINK,\
  \ not memorize patterns.**\n\n## When to Use\nUse this skill when making Python\
  \ architecture decisions, choosing frameworks, designing async patterns, or structuring\
  \ Python projects.\n\n---\n\n## вљ пёЏ How to Use This Skill\n\nThis skill teaches **decision-making\
  \ principles**, not fixed code to copy.\n\n- ASK user for framework preference when\
  \ unclear\n- Choose async vs sync based on CONTEXT\n- Don't default to same framework\
  \ every time\n\n---\n\n## 1. Framework Selection (2025)\n\n### Decision Tree\n\n\
  ```\nWhat are you building?\nв”‚\nв”њв”Ђв”Ђ API-first / Microservices\nв”‚   в””в”Ђв”Ђ FastAPI (async,\
  \ modern, fast)\nв”‚\nв”њв”Ђв”Ђ Full-stack web / CMS / Admin\nв”‚   в””в”Ђв”Ђ Django (batteries-included)\n\
  в”‚\nв”њв”Ђв”Ђ Simple / Script / Learning\nв”‚   в””в”Ђв”Ђ Flask (minimal, flexible)\nв”‚\nв”њв”Ђв”Ђ AI/ML\
  \ API serving\nв”‚   в””в”Ђв”Ђ FastAPI (Pydantic, async, uvicorn)\nв”‚\nв””в”Ђв”Ђ Background workers\n\
  \    в””в”Ђв”Ђ Celery + any framework\n```\n\n### Comparison Principles\n\n| Factor |\
  \ FastAPI | Django | Flask |\n|--------|---------|--------|-------|\n| **Best for**\
  \ | APIs, microservices | Full-stack, CMS | Simple, learning |\n| **Async** | Native\
  \ | Django 5.0+ | Via extensions |\n| **Admin** | Manual | Built-in | Via extensions\
  \ |\n| **ORM** | Choose your own | Django ORM | Choose your own |\n| **Learning\
  \ curve** | Low | Medium | Low |\n\n### Selection Questions to Ask:\n1. Is this\
  \ API-only or full-stack?\n2. Need admin interface?\n3. Team familiar with async?\n\
  4. Existing infrastructure?\n\n---\n\n## 2. Async vs Sync Decision\n\n### When to\
  \ Use Async\n\n```\nasync def is better when:\nв”њв”Ђв”Ђ I/O-bound operations (database,\
  \ HTTP, file)\nв”њв”Ђв”Ђ Many concurrent connections\nв”њв”Ђв”Ђ Real-time features\nв”њв”Ђв”Ђ Microservices\
  \ communication\nв””в”Ђв”Ђ FastAPI/Starlette/Django ASGI\n\ndef (sync) is better when:\n\
  в”њв”Ђв”Ђ CPU-bound operations\nв”њв”Ђв”Ђ Simple scripts\nв”њв”Ђв”Ђ Legacy codebase\nв”њв”Ђв”Ђ Team unfamiliar\
  \ with async\nв””в”Ђв”Ђ Blocking libraries (no async version)\n```\n\n### The Golden Rule\n\
  \n```\nI/O-bound в†’ async (waiting for external)\nCPU-bound в†’ sync + multiprocessing\
  \ (computing)\n\nDon't:\nв”њв”Ђв”Ђ Mix sync and async carelessly\nв”њв”Ђв”Ђ Use sync libraries\
  \ in async code\nв””в”Ђв”Ђ Force async for CPU work\n```\n\n### Async Library Selection\n\
  \n| Need | Async Library |\n|------|---------------|\n| HTTP client | httpx |\n\
  | PostgreSQL | asyncpg |\n| Redis | aioredis / redis-py async |\n| File I/O | aiofiles\
  \ |\n| Database ORM | SQLAlchemy 2.0 async, Tortoise |\n\n---\n\n## 3. Type Hints\
  \ Strategy\n\n### When to Type\n\n```\nAlways type:\nв”њв”Ђв”Ђ Function parameters\nв”њв”Ђв”Ђ\
  \ Return types\nв”њв”Ђв”Ђ Class attributes\nв”њв”Ђв”Ђ Public APIs\n\nCan skip:\nв”њв”Ђв”Ђ Local variables\
  \ (let inference work)\nв”њв”Ђв”Ђ One-off scripts\nв”њв”Ђв”Ђ Tests (usually)\n```\n\n### Common\
