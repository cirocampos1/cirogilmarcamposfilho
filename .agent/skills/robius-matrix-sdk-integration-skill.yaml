  risk: unknown\nsource: community\n---\n\n# Robius Matrix SDK Integration Skill\n\
  \nBest practices for integrating external APIs with Makepad applications based on\
  \ Robrix and Moly codebases.\n\n**Source codebases:**\n- **Robrix**: Matrix SDK\
  \ integration - sliding sync, timeline subscriptions, real-time updates\n- **Moly**:\
  \ OpenAI/LLM API integration - SSE streaming, MCP protocol, multi-provider support\n\
  \n## When to Use\n\nUse this skill when:\n- Integrating Matrix SDK with Makepad\n\
  - Building a Matrix client with Makepad\n- Implementing Matrix features (rooms,\
  \ timelines, messages)\n- Handling Matrix SDK async operations in UI\n- Keywords:\
  \ matrix-sdk, matrix client, robrix, matrix timeline, matrix room, sliding sync\n\
  \n## Overview\n\nRobrix uses the `matrix-sdk` and `matrix-sdk-ui` crates to connect\
  \ to Matrix homeservers. The key architectural decisions:\n\n1. **Sliding Sync**:\
  \ Uses native sliding sync for efficient room list updates\n2. **Separate Runtime**:\
  \ Tokio runtime runs Matrix operations, Makepad handles UI\n3. **Request/Response\
  \ Pattern**: UI sends requests, receives actions/updates back\n4. **Per-Room Background\
  \ Tasks**: Each room has dedicated timeline subscriber task\n\n## MatrixRequest\
  \ Pattern\n\n### Request Enum Definition\n\n```rust\n/// All async requests that\
  \ can be made to the Matrix worker task\npub enum MatrixRequest {\n    /// Login\
  \ requests\n    Login(LoginRequest),\n    Logout { is_desktop: bool },\n\n    ///\
  \ Timeline operations\n    PaginateRoomTimeline {\n        room_id: OwnedRoomId,\n\
  \        num_events: u16,\n        direction: PaginationDirection,\n    },\n   \
  \ SendMessage {\n        room_id: OwnedRoomId,\n        message: RoomMessageEventContent,\n\
  \        replied_to: Option<Reply>,\n    },\n    EditMessage {\n        room_id:\
  \ OwnedRoomId,\n        timeline_event_item_id: TimelineEventItemId,\n        edited_content:\
  \ EditedContent,\n    },\n    RedactMessage {\n        room_id: OwnedRoomId,\n \
  \       timeline_event_id: TimelineEventItemId,\n        reason: Option<String>,\n\
  \    },\n\n    /// Room operations\n    JoinRoom { room_id: OwnedRoomId },\n   \
  \ LeaveRoom { room_id: OwnedRoomId },\n    GetRoomMembers {\n        room_id: OwnedRoomId,\n\
  \        memberships: RoomMemberships,\n        local_only: bool,\n    },\n\n  \
  \  /// User operations\n    GetUserProfile {\n        user_id: OwnedUserId,\n  \
  \      room_id: Option<OwnedRoomId>,\n        local_only: bool,\n    },\n    IgnoreUser\
  \ {\n        ignore: bool,\n        room_member: RoomMember,\n        room_id: OwnedRoomId,\n\
  \    },\n\n    /// Media operations\n    FetchAvatar {\n        mxc_uri: OwnedMxcUri,\n\
  \        on_fetched: fn(AvatarUpdate),\n    },\n    FetchMedia {\n        media_request:\
  \ MediaRequestParameters,\n        on_fetched: OnMediaFetchedFn,\n        destination:\
  \ MediaCacheEntryRef,\n        update_sender: Option<cross\n\n## Diretrizes do \n\
