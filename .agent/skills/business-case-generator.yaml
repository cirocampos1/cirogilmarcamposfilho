  date_added: '2026-02-27'\n---\n\n# Business Case Generator\n\nGenerate a comprehensive,\
  \ investor-ready business case document covering market opportunity, solution, competitive\
  \ landscape, financial projections, team, risks, and funding ask for startup fundraising\
  \ and strategic planning.\n\n## Use this skill when\n\n- Working on business case\
  \ generator tasks or workflows\n- Needing guidance, best practices, or checklists\
  \ for business case generator\n\n## Do not use this skill when\n\n- The task is\
  \ unrelated to business case generator\n- You need a different domain or tool outside\
  \ this scope\n\n## Instructions\n\n- Clarify goals, constraints, and required inputs.\n\
  - Apply relevant best practices and validate outcomes.\n- Provide actionable steps\
  \ and verification.\n- If detailed examples are required, open `resources/implementation-playbook.md`.\n\
  \n## What This Command Does\n\nCreate a complete business case including:\n1. Executive\
  \ summary\n2. Problem and market opportunity\n3. Solution and product\n4. Competitive\
  \ analysis and differentiation\n5. Financial projections\n6. Go-to-market strategy\n\
  7. Team and organization\n8. Risks and mitigation\n9. Funding ask and use of proceeds\n\
  \n## Instructions for Claude\n\nWhen this command is invoked, follow these steps:\n\
  \n### Step 1: Gather Context\n\nAsk the user for key information:\n\n**Company Basics:**\n\
  - Company name and elevator pitch\n- Stage (pre-seed, seed, Series A)\n- Problem\
  \ being solved\n- Target customers\n\n**Audience:**\n- Who will read this? (VCs,\
  \ angels, strategic partners)\n- What's the primary goal? (fundraising, partnership,\
  \ internal planning)\n\n**Available Materials:**\n- Existing pitch deck or docs?\n\
  - Market sizing data?\n- Financial model?\n- Competitive analysis?\n\n### Step 2:\
  \ Activate Relevant Skills\n\nReference skills for comprehensive analysis:\n- **market-sizing-analysis**\
  \ - TAM/SAM/SOM calculations\n- **startup-financial-modeling** - Financial projections\n\
  - **competitive-landscape** - Competitive analysis frameworks\n- **team-composition-analysis**\
  \ - Organization planning\n- **startup-metrics-framework** - Key metrics and benchmarks\n\
  \n### Step 3: Structure the Business Case\n\nCreate a comprehensive document with\
  \ these sections:\n\n---\n\n## Business Case Document Structure\n\n### Section 1:\
  \ Executive Summary (1-2 pages)\n\n**Company Overview:**\n- One-sentence description\n\
  - Founded, location, stage\n- Team highlights\n\n**Problem Statement:**\n- Core\
  \ problem being solved (2-3 sentences)\n- Market pain quantified\n\n**Solution:**\n\
  - How the product solves it (2-3 sentences)\n- Key differentiation\n\n**Market Opportunity:**\n\
  - TAM: $X.XB\n- SAM: $X.XM\n- SOM (Year 5): $X.XM\n\n**Traction:**\n- Current metrics\
  \ (MRR, customers, growth rate)\n- Key milestones achieved\n\n**Financial Snapshot:**\n\
  ```\n| Metric | Current | Year 1 | Year 2 | Year 3 |\n|--------|---------|\n\n##\
