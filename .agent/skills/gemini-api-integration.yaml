  \n# Gemini API Integration\n\n## Overview\n\nThis skill guides AI agents through\
  \ integrating Google Gemini API into applications — from basic text generation to\
  \ advanced multimodal, function calling, and streaming use cases. It covers the\
  \ full Gemini SDK lifecycle with production-grade patterns.\n\n## When to Use This\
  \ Skill\n\n- Use when setting up Gemini API for the first time in a Node.js, Python,\
  \ or browser project\n- Use when implementing multimodal inputs (text + image/audio/video)\n\
  - Use when adding streaming responses to improve perceived latency\n- Use when implementing\
  \ function calling / tool use with Gemini\n- Use when optimizing model selection\
  \ (Flash vs Pro vs Ultra) for cost and performance\n- Use when debugging Gemini\
  \ API errors, rate limits, or quota issues\n\n## Step-by-Step Guide\n\n### 1. Installation\
  \ & Setup\n\n**Node.js / TypeScript:**\n```bash\nnpm install @google/generative-ai\n\
  ```\n\n**Python:**\n```bash\npip install google-generativeai\n```\n\nSet your API\
  \ key securely:\n```bash\nexport GEMINI_API_KEY=\"your-api-key-here\"\n```\n\n###\
  \ 2. Basic Text Generation\n\n**Node.js:**\n```javascript\nimport { GoogleGenerativeAI\
  \ } from \"@google/generative-ai\";\n\nconst genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY);\n\
  const model = genAI.getGenerativeModel({ model: \"gemini-1.5-flash\" });\n\nconst\
  \ result = await model.generateContent(\"Explain async/await in JavaScript\");\n\
  console.log(result.response.text());\n```\n\n**Python:**\n```python\nimport google.generativeai\
  \ as genai\nimport os\n\ngenai.configure(api_key=os.environ[\"GEMINI_API_KEY\"])\n\
  model = genai.GenerativeModel(\"gemini-1.5-flash\")\n\nresponse = model.generate_content(\"\
  Explain async/await in JavaScript\")\nprint(response.text)\n```\n\n### 3. Streaming\
  \ Responses\n\n```javascript\nconst result = await model.generateContentStream(\"\
  Write a detailed blog post about AI\");\n\nfor await (const chunk of result.stream)\
  \ {\n  process.stdout.write(chunk.text());\n}\n```\n\n### 4. Multimodal Input (Text\
  \ + Image)\n\n```javascript\nimport fs from \"fs\";\n\nconst imageData = fs.readFileSync(\"\
