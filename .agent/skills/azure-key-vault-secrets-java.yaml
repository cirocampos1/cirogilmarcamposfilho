backstory: "Você é um agente especializado em Azure Key Vault Secrets (Java).\n\n\
  ## Contexto Original da Skill\nAzure Key Vault Secrets (Java)\n\n## Instruções\n\
  ---\nname: azure-security-keyvault-secrets-java\ndescription: \"Azure Key Vault\
  \ Secrets Java SDK for secret management. Use when storing, retrieving, or managing\
  \ passwords, API keys, connection strings, or other sensitive configuration data.\"\
  \nrisk: unknown\nsource: community\ndate_added: \"2026-02-27\"\n---\n\n# Azure Key\
  \ Vault Secrets (Java)\n\nSecurely store and manage secrets like passwords, API\
  \ keys, and connection strings.\n\n## Installation\n\n```xml\n<dependency>\n   \
  \ <groupId>com.azure</groupId>\n    <artifactId>azure-security-keyvault-secrets</artifactId>\n\
  \    <version>4.9.0</version>\n</dependency>\n```\n\n## Client Creation\n\n```java\n\
  import com.azure.security.keyvault.secrets.SecretClient;\nimport com.azure.security.keyvault.secrets.SecretClientBuilder;\n\
  import com.azure.identity.DefaultAzureCredentialBuilder;\n\n// Sync client\nSecretClient\
  \ secretClient = new SecretClientBuilder()\n    .vaultUrl(\"https://<vault-name>.vault.azure.net\"\
  )\n    .credential(new DefaultAzureCredentialBuilder().build())\n    .buildClient();\n\
  \n// Async client\nSecretAsyncClient secretAsyncClient = new SecretClientBuilder()\n\
  \    .vaultUrl(\"https://<vault-name>.vault.azure.net\")\n    .credential(new DefaultAzureCredentialBuilder().build())\n\
  \    .buildAsyncClient();\n```\n\n## Create/Set Secret\n\n```java\nimport com.azure.security.keyvault.secrets.models.KeyVaultSecret;\n\
  \n// Simple secret\nKeyVaultSecret secret = secretClient.setSecret(\"database-password\"\
  , \"P@ssw0rd123!\");\nSystem.out.println(\"Secret name: \" + secret.getName());\n\
  System.out.println(\"Secret ID: \" + secret.getId());\n\n// Secret with options\n\
  KeyVaultSecret secretWithOptions = secretClient.setSecret(\n    new KeyVaultSecret(\"\
  api-key\", \"sk_live_abc123xyz\")\n        .setProperties(new SecretProperties()\n\
  \            .setContentType(\"application/json\")\n            .setExpiresOn(OffsetDateTime.now().plusYears(1))\n\
  \            .setNotBefore(OffsetDateTime.now())\n            .setEnabled(true)\n\
  \            .setTags(Map.of(\n                \"environment\", \"production\",\n\
  \                \"service\", \"payment-api\"\n            ))\n        )\n);\n```\n\
  \n## Get Secret\n\n```java\n// Get latest version\nKeyVaultSecret secret = secretClient.getSecret(\"\
  database-password\");\nString value = secret.getValue();\nSystem.out.println(\"\
  Secret value: \" + value);\n\n// Get specific version\nKeyVaultSecret specificVersion\
  \ = secretClient.getSecret(\"database-password\", \"<version-id>\");\n\n// Get only\
  \ properties (no value)\nSecretProperties props = secretClient.getSecret(\"database-password\"\
  ).getProperties();\nSystem.out.println(\"Enabled: \" + props.isEnabled());\nSystem.out.println(\"\
  Created: \" + props.getCreatedOn());\n```\n\n## Update Secret Properties\n\n```java\n\
  // Get secret\nKeyVaultSecret secret = secretClient.getSecret(\"api-key\");\n\n\
  // Update properties (cannot update value - create new version instead)\nsecret.getProperties()\n\
  \    .setEnabled(false)\n    .setExpiresOn(OffsetDateTime.now().plusMonths(6))\n\
  \    .setTags(Map.of(\"status\", \"rotating\"));\n\nSecretProperties updated = secretClient.updateSecretPropertie\n\
