  \ unknown\nsource: community\nversion: 1.0.0\nlicense: MIT\n---\n\n# Tailwind CSS\
  \ Setup for Expo with react-native-css\n\nThis guide covers setting up Tailwind\
  \ CSS v4 in Expo using react-native-css and NativeWind v5 for universal styling\
  \ across iOS, Android, and Web.\n\n## When to Use\n\n- You need to set up Tailwind\
  \ CSS v4 styling in an Expo app using `react-native-css` and NativeWind v5.\n- The\
  \ task involves configuring Metro, PostCSS, global CSS, or package versions for\
  \ Expo + Tailwind.\n- You want one styling setup that works across iOS, Android,\
  \ and web in an Expo project.\n\n## Overview\n\nThis setup uses:\n\n- **Tailwind\
  \ CSS v4** - Modern CSS-first configuration\n- **react-native-css** - CSS runtime\
  \ for React Native\n- **NativeWind v5** - Metro transformer for Tailwind in React\
  \ Native\n- **@tailwindcss/postcss** - PostCSS plugin for Tailwind v4\n\n## Installation\n\
  \n```bash\n# Install dependencies\nnpx expo install tailwindcss@^4 nativewind@5.0.0-preview.2\
  \ react-native-css@0.0.0-nightly.5ce6396 @tailwindcss/postcss tailwind-merge clsx\n\
  ```\n\nAdd resolutions for lightningcss compatibility:\n\n```json\n// package.json\n\
  {\n  \"resolutions\": {\n    \"lightningcss\": \"1.30.1\"\n  }\n}\n```\n\n- autoprefixer\
  \ is not needed in Expo because of lightningcss\n- postcss is included in expo by\
  \ default\n\n## Configuration Files\n\n### Metro Config\n\nCreate or update `metro.config.js`:\n\
  \n```js\n// metro.config.js\nconst { getDefaultConfig } = require(\"expo/metro-config\"\
  );\nconst { withNativewind } = require(\"nativewind/metro\");\n\n/** @type {import('expo/metro-config').MetroConfig}\
  \ */\nconst config = getDefaultConfig(__dirname);\n\nmodule.exports = withNativewind(config,\
  \ {\n  // inline variables break PlatformColor in CSS variables\n  inlineVariables:\
  \ false,\n  // We add className support manually\n  globalClassNamePolyfill: false,\n\
  });\n```\n\n### PostCSS Config\n\nCreate `postcss.config.mjs`:\n\n```js\n// postcss.config.mjs\n\
  export default {\n  plugins: {\n    \"@tailwindcss/postcss\": {},\n  },\n};\n```\n\
  \n### Global CSS\n\nCreate `src/global.css`:\n\n```css\n@import \"tailwindcss/theme.css\"\
  \ layer(theme);\n@import \"tailwindcss/preflight.css\" layer(base);\n@import \"\
  tailwindcss/utilities.css\";\n\n/* Platform-specific font families */\n@media android\
  \ {\n  :root {\n    --font-mono: monospace;\n    --font-rounded: normal;\n    --font-serif:\
  \ serif;\n    --font-sans: normal;\n  }\n}\n\n@media ios {\n  :root {\n    --font-mono:\
  \ ui-monospace;\n    --font-serif: ui-serif;\n    --font-sans: system-ui;\n    --font-rounded:\
  \ ui-rounded;\n  }\n}\n```\n\n## IMPORTANT: No Babel Config Needed\n\nWith Tailwind\
  \ v4 and NativeWind v5, you do NOT need a babel.config.js for Tailwind. Remove any\
  \ NativeWind babel presets if present:\n\n```js\n// DELETE babel.config.js if it\
  \ only contains NativeWind config\n// The following is NO LONGER needed:\n// module.exports\
  \ = function (api) {\n//   api.cache(true);\n//   return {\n//     presets: [\n\
