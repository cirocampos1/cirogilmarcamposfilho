  risk: unknown\nsource: community\n---\n\n# Multi-Agent Architecture Patterns\n\n\
  Multi-agent architectures distribute work across multiple language model instances,\
  \ each with its own context window. When designed well, this distribution enables\
  \ capabilities beyond single-agent limits. When designed poorly, it introduces coordination\
  \ overhead that negates benefits. The critical insight is that sub-agents exist\
  \ primarily to isolate context, not to anthropomorphize role division.\n\n## When\
  \ to Use\nActivate this skill when:\n- Single-agent context limits constrain task\
  \ complexity\n- Tasks decompose naturally into parallel subtasks\n- Different subtasks\
  \ require different tool sets or system prompts\n- Building systems that must handle\
  \ multiple domains simultaneously\n- Scaling agent capabilities beyond single-context\
  \ limits\n- Designing production agent systems with multiple specialized components\n\
  \n## Core Concepts\n\nMulti-agent systems address single-agent context limitations\
  \ through distribution. Three dominant patterns exist: supervisor/orchestrator for\
  \ centralized control, peer-to-peer/swarm for flexible handoffs, and hierarchical\
  \ for layered abstraction. The critical design principle is context isolation—sub-agents\
  \ exist primarily to partition context rather than to simulate organizational roles.\n\
  \nEffective multi-agent systems require explicit coordination protocols, consensus\
  \ mechanisms that avoid sycophancy, and careful attention to failure modes including\
  \ bottlenecks, divergence, and error propagation.\n\n## Detailed Topics\n\n### Why\
  \ Multi-Agent Architectures\n\n**The Context Bottleneck**\nSingle agents face inherent\
  \ ceilings in reasoning capability, context management, and tool coordination. As\
  \ tasks grow more complex, context windows fill with accumulated history, retrieved\
  \ documents, and tool outputs. Performance degrades according to predictable patterns:\
  \ the lost-in-middle effect, attention scarcity, and context poisoning.\n\nMulti-agent\
  \ architectures address these limitations by partitioning work across multiple context\
  \ windows. Each agent operates in a clean context focused on its subtask. Results\
  \ aggregate at a coordination layer without any single context bearing the full\
  \ burden.\n\n**The Token Economics Reality**\nMulti-agent systems consume significantly\
  \ more tokens than single-agent approaches. Production data shows:\n\n| Architecture\
  \ | Token Multiplier | Use Case |\n|--------------|------------------|----------|\n\
  | Single agent chat | 1× baseline | Simple queries |\n| Single agent with tools\
  \ | ~4× baseline | Tool-using tasks |\n| Multi-agent system | ~15× baseline | Complex\
