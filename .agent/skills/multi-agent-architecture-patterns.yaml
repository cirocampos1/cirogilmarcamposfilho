  ---\nname: multi-agent-patterns\ndescription: This skill should be used when the\
  \ user asks to \"design multi-agent system\", \"implement supervisor pattern\",\
  \ \"create swarm architecture\", \"coordinate multiple agents\", or mentions multi-agent\
