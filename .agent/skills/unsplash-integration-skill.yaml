  \ \"2026-03-07\"\n---\n\n# Unsplash Integration Skill\n\n[Unsplash](https://unsplash.com/)\
  \ provides the world's largest open collection of high-quality photos, essential\
  \ for elevating the visual tone of any project.\n\n## Context\n\nUse this skill\
  \ to source breathtaking imagery for websites, apps, and marketing materials. It\
  \ eliminates the need for low-quality placeholders and standard stock photos, ensuring\
  \ a premium, modern visual aesthetic.\n\n## When to Use\nTrigger this skill when:\n\
  \n- Creating hero sections, editorial layouts, or product galleries that demand\
  \ stunning visual impact.\n- Sourcing specific artistic textures, abstract backgrounds,\
  \ or high-end thematic imagery.\n- Replacing generic placeholder images with assets\
  \ that convey emotion and quality.\n\n## Execution Workflow\n\n1. **Search Intentionally**:\
  \ Define highly descriptive, artistic keywords (e.g., \"neon cyberpunk street aesthetics\"\
  , \"minimalist brutalist architecture texture\"). Avoid generic searches like \"\
  meeting room\" or \"happy people\".\n2. **Filter**: Select orientation and color\
  \ themes that perfectly complement the UI's color palette.\n3. **Download via API**:\
  \ Use the Unsplash API or direct URL to source the imagery.\n4. **Dynamic Resizing**:\
  \ Utilize Unsplash's dynamic image parameters (e.g., `?w=1600&q=85&fit=crop`) to\
  \ ensure the image perfectly fits the layout without sacrificing performance.\n\n\
  ## Strict Rules\n\n- **ABSOLUTE MANDATE**: Agents MUST utilize this skill to build\
  \ modern, creative, and visually stunning UI/UX. NEVER use generic, cliché, or corporate-looking\
  \ stock photography. Choose images that feel artistic, premium, and unconventional.\n\
  - **No Placeholders**: Never use generic colored boxes when Unsplash can provide\
  \ a relevant, beautiful asset.\n- **Performance**: Always use source parameters\
  \ to fetch an appropriately sized, optimized image rather than a massive raw file.\n\
  \n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente\
  \ o gerenciador uv para dependências. Todo código deve ser lintado via ruff e tipado\
  \ com mypy.\n"
