  \nlicense: Unknown\nmetadata:\n    skill-author: K-Dense Inc.\nrisk: unknown\nsource:\
  \ \"https://github.com/biopython/biopython\"\n---\n\n# Biopython: Computational\
  \ Molecular Biology in Python\n\n## Overview\n\nBiopython is a comprehensive set\
  \ of freely available Python tools for biological computation. It provides functionality\
  \ for sequence manipulation, file I/O, database access, structural bioinformatics,\
  \ phylogenetics, and many other bioinformatics tasks. The current version is **Biopython\
  \ 1.85** (released January 2025), which supports Python 3 and requires NumPy.\n\n\
  ## When to Use This Skill\n\nUse this skill when:\n\n- Working with biological sequences\
  \ (DNA, RNA, or protein)\n- Reading, writing, or converting biological file formats\
  \ (FASTA, GenBank, FASTQ, PDB, mmCIF, etc.)\n- Accessing NCBI databases (GenBank,\
  \ PubMed, Protein, Gene, etc.) via Entrez\n- Running BLAST searches or parsing BLAST\
  \ results\n- Performing sequence alignments (pairwise or multiple sequence alignments)\n\
  - Analyzing protein structures from PDB files\n- Creating, manipulating, or visualizing\
  \ phylogenetic trees\n- Finding sequence motifs or analyzing motif patterns\n- Calculating\
  \ sequence statistics (GC content, molecular weight, melting temperature, etc.)\n\
  - Performing structural bioinformatics tasks\n- Working with population genetics\
  \ data\n- Any other computational molecular biology task\n\n## Core Capabilities\n\
  \nBiopython is organized into modular sub-packages, each addressing specific bioinformatics\
  \ domains:\n\n1. **Sequence Handling** - Bio.Seq and Bio.SeqIO for sequence manipulation\
  \ and file I/O\n2. **Alignment Analysis** - Bio.Align and Bio.AlignIO for pairwise\
  \ and multiple sequence alignments\n3. **Database Access** - Bio.Entrez for programmatic\
  \ access to NCBI databases\n4. **BLAST Operations** - Bio.Blast for running and\
  \ parsing BLAST searches\n5. **Structural Bioinformatics** - Bio.PDB for working\
  \ with 3D protein structures\n6. **Phylogenetics** - Bio.Phylo for phylogenetic\
  \ tree manipulation and visualization\n7. **Advanced Features** - Motifs, population\
  \ genetics, sequence utilities, and more\n\n## Installation and Setup\n\nInstall\
  \ Biopython using pip (requires Python 3 and NumPy):\n\n```python\nuv pip install\
  \ biopython\n```\n\nFor NCBI database access, always set your email address (required\
  \ by NCBI):\n\n```python\nfrom Bio import Entrez\nEntrez.email = \"your.email@example.com\"\
  \n\n# Optional: API key for higher rate limits (10 req/s instead of 3 req/s)\nEntrez.api_key\
  \ = \"your_api_key_here\"\n```\n\n## Using This Skill\n\nThis skill provides comprehensive\
  \ documentation organized by functionality area. When working on a task, consult\
  \ the relevant reference documentation:\n\n### 1. Sequence Handling (Bio.Seq & Bio.SeqIO)\n\
