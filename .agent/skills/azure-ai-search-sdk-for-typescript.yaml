  date_added: \"2026-02-27\"\n---\n\n# Azure AI Search SDK for TypeScript\n\nBuild\
  \ search applications with vector, hybrid, and semantic search capabilities.\n\n\
  ## Installation\n\n```bash\nnpm install @azure/search-documents @azure/identity\n\
  ```\n\n## Environment Variables\n\n```bash\nAZURE_SEARCH_ENDPOINT=https://<service-name>.search.windows.net\n\
  AZURE_SEARCH_INDEX_NAME=my-index\nAZURE_SEARCH_ADMIN_KEY=<admin-key>  # Optional\
  \ if using Entra ID\n```\n\n## Authentication\n\n```typescript\nimport { SearchClient,\
  \ SearchIndexClient } from \"@azure/search-documents\";\nimport { DefaultAzureCredential\
  \ } from \"@azure/identity\";\n\nconst endpoint = process.env.AZURE_SEARCH_ENDPOINT!;\n\
  const indexName = process.env.AZURE_SEARCH_INDEX_NAME!;\nconst credential = new\
  \ DefaultAzureCredential();\n\n// For searching\nconst searchClient = new SearchClient(endpoint,\
  \ indexName, credential);\n\n// For index management\nconst indexClient = new SearchIndexClient(endpoint,\
  \ credential);\n```\n\n## Core Workflow\n\n### Create Index with Vector Field\n\n\
  ```typescript\nimport { SearchIndex, SearchField, VectorSearch } from \"@azure/search-documents\"\
  ;\n\nconst index: SearchIndex = {\n  name: \"products\",\n  fields: [\n    { name:\
  \ \"id\", type: \"Edm.String\", key: true },\n    { name: \"title\", type: \"Edm.String\"\
  , searchable: true },\n    { name: \"description\", type: \"Edm.String\", searchable:\
  \ true },\n    { name: \"category\", type: \"Edm.String\", filterable: true, facetable:\
  \ true },\n    {\n      name: \"embedding\",\n      type: \"Collection(Edm.Single)\"\
  ,\n      searchable: true,\n      vectorSearchDimensions: 1536,\n      vectorSearchProfileName:\
  \ \"vector-profile\",\n    },\n  ],\n  vectorSearch: {\n    algorithms: [\n    \
  \  { name: \"hnsw-algorithm\", kind: \"hnsw\" },\n    ],\n    profiles: [\n    \
  \  { name: \"vector-profile\", algorithmConfigurationName: \"hnsw-algorithm\" },\n\
  \    ],\n  },\n};\n\nawait indexClient.createOrUpdateIndex(index);\n```\n\n### Index\
  \ Documents\n\n```typescript\nconst documents = [\n  { id: \"1\", title: \"Widget\"\
  , description: \"A useful widget\", category: \"Tools\", embedding: [...] },\n \
  \ { id: \"2\", title: \"Gadget\", description: \"A cool gadget\", category: \"Electronics\"\
  , embedding: [...] },\n];\n\nconst result = await searchClient.uploadDocuments(documents);\n\
  console.log(`Indexed ${result.results.length} documents`);\n```\n\n### Full-Text\
  \ Search\n\n```typescript\nconst results = await searchClient.search(\"widget\"\
  , {\n  select: [\"id\", \"title\", \"description\"],\n  filter: \"category eq 'Tools'\"\
  ,\n  orderBy: [\"title asc\"],\n  top: 10,\n});\n\nfor await (const result of results.results)\
  \ {\n  console.log(`${result.document.title}: ${result.score}`);\n}\n```\n\n###\
