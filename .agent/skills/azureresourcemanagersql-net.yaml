  ## Contexto Original da Skill\nAzure.ResourceManager.Sql (.NET)\n\n## Instruções\n\
  ---\nname: azure-resource-manager-sql-dotnet\ndescription: Azure Resource Manager\
  \ SDK for Azure SQL in .NET.\nrisk: unknown\nsource: community\ndate_added: '2026-02-27'\n\
  ---\n\n# Azure.ResourceManager.Sql (.NET)\n\nManagement plane SDK for provisioning\
  \ and managing Azure SQL resources via Azure Resource Manager.\n\n> **⚠️ Management\
  \ vs Data Plane**\n> - **This SDK (Azure.ResourceManager.Sql)**: Create servers,\
  \ databases, elastic pools, configure firewall rules, manage failover groups\n>\
  \ - **Data Plane SDK (Microsoft.Data.SqlClient)**: Execute queries, stored procedures,\
  \ manage connections\n\n## Installation\n\n```bash\ndotnet add package Azure.ResourceManager.Sql\n\
  dotnet add package Azure.Identity\n```\n\n**Current Versions**: Stable v1.3.0, Preview\
  \ v1.4.0-beta.3\n\n## Environment Variables\n\n```bash\nAZURE_SUBSCRIPTION_ID=<your-subscription-id>\n\
  # For service principal auth (optional)\nAZURE_TENANT_ID=<tenant-id>\nAZURE_CLIENT_ID=<client-id>\n\
  AZURE_CLIENT_SECRET=<client-secret>\n```\n\n## Authentication\n\n```csharp\nusing\
  \ Azure.Identity;\nusing Azure.ResourceManager;\nusing Azure.ResourceManager.Sql;\n\
  \n// Always use DefaultAzureCredential\nvar credential = new DefaultAzureCredential();\n\
  var armClient = new ArmClient(credential);\n\n// Get subscription\nvar subscriptionId\
  \ = Environment.GetEnvironmentVariable(\"AZURE_SUBSCRIPTION_ID\");\nvar subscription\
  \ = armClient.GetSubscriptionResource(\n    new ResourceIdentifier($\"/subscriptions/{subscriptionId}\"\
  ));\n```\n\n## Resource Hierarchy\n\n```\nArmClient\n└── SubscriptionResource\n\
  \    └── ResourceGroupResource\n        └── SqlServerResource\n            ├── SqlDatabaseResource\n\
  \            ├── ElasticPoolResource\n            │   └── ElasticPoolDatabaseResource\n\
  \            ├── SqlFirewallRuleResource\n            ├── FailoverGroupResource\n\
  \            ├── ServerBlobAuditingPolicyResource\n            ├── EncryptionProtectorResource\n\
  \            └── VirtualNetworkRuleResource\n```\n\n## Core Workflow\n\n### 1. Create\
  \ SQL Server\n\n```csharp\nusing Azure.ResourceManager.Sql;\nusing Azure.ResourceManager.Sql.Models;\n\
  \n// Get resource group\nvar resourceGroup = await subscription\n    .GetResourceGroupAsync(\"\
  my-resource-group\");\n\n// Define server\nvar serverData = new SqlServerData(AzureLocation.EastUS)\n\
  {\n    AdministratorLogin = \"sqladmin\",\n    AdministratorLoginPassword = \"YourSecurePassword123!\"\
  ,\n    Version = \"12.0\",\n    MinimalTlsVersion = SqlMinimalTlsVersion.Tls1_2,\n\
  \    PublicNetworkAccess = ServerNetworkAccessFlag.Enabled\n};\n\n// Create server\
  \ (long-running operation)\nvar serverCollection = resourceGroup.Value.GetSqlServers();\n\
  var operation = await serverCollection.CreateOrUpdateAsync(\n    WaitUntil.Completed,\n\
  \    \"my-sql-server\",\n    serverData);\n\nSqlServerResource server = operation.Value;\n\
  ```\n\n### 2. Create SQL Database\n\n```csharp\nvar databaseData = new SqlDatabaseData(AzureLocation.EastUS)\n\
  {\n    Sku = new SqlSku(\"S0\") { Tier = \"Standard\" },\n    MaxSizeBytes = 2L\
  \ * 1024 * 1024 * 1024, // 2 GB\n    Collation = \"SQL_Latin1_General_CP1_CI_AS\"\
  ,\n    RequestedBackupStorageRed\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ\
  \ DE ENGENHARIA: Use exclusivamente o gerenciador uv para dependências. Todo código\
  \ deve ser lintado via ruff e tipado com mypy.\n"
