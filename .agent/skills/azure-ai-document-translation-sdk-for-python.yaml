  ---\n\n# Azure AI Document Translation SDK for Python\n\nClient library for Azure\
  \ AI Translator document translation service for batch document translation with\
  \ format preservation.\n\n## Installation\n\n```bash\npip install azure-ai-translation-document\n\
  ```\n\n## Environment Variables\n\n```bash\nAZURE_DOCUMENT_TRANSLATION_ENDPOINT=https://<resource>.cognitiveservices.azure.com\n\
  AZURE_DOCUMENT_TRANSLATION_KEY=<your-api-key>  # If using API key\n\n# Storage for\
  \ source and target documents\nAZURE_SOURCE_CONTAINER_URL=https://<storage>.blob.core.windows.net/<container>?<sas>\n\
  AZURE_TARGET_CONTAINER_URL=https://<storage>.blob.core.windows.net/<container>?<sas>\n\
  ```\n\n## Authentication\n\n### API Key\n\n```python\nimport os\nfrom azure.ai.translation.document\
  \ import DocumentTranslationClient\nfrom azure.core.credentials import AzureKeyCredential\n\
  \nendpoint = os.environ[\"AZURE_DOCUMENT_TRANSLATION_ENDPOINT\"]\nkey = os.environ[\"\
  AZURE_DOCUMENT_TRANSLATION_KEY\"]\n\nclient = DocumentTranslationClient(endpoint,\
  \ AzureKeyCredential(key))\n```\n\n### Entra ID (Recommended)\n\n```python\nfrom\
  \ azure.ai.translation.document import DocumentTranslationClient\nfrom azure.identity\
  \ import DefaultAzureCredential\n\nclient = DocumentTranslationClient(\n    endpoint=os.environ[\"\
  AZURE_DOCUMENT_TRANSLATION_ENDPOINT\"],\n    credential=DefaultAzureCredential()\n\
  )\n```\n\n## Basic Document Translation\n\n```python\nfrom azure.ai.translation.document\
  \ import DocumentTranslationInput, TranslationTarget\n\nsource_url = os.environ[\"\
  AZURE_SOURCE_CONTAINER_URL\"]\ntarget_url = os.environ[\"AZURE_TARGET_CONTAINER_URL\"\
  ]\n\n# Start translation job\npoller = client.begin_translation(\n    inputs=[\n\
  \        DocumentTranslationInput(\n            source_url=source_url,\n       \
  \     targets=[\n                TranslationTarget(\n                    target_url=target_url,\n\
  \                    language=\"es\"  # Translate to Spanish\n                )\n\
  \            ]\n        )\n    ]\n)\n\n# Wait for completion\nresult = poller.result()\n\
  \nprint(f\"Status: {poller.status()}\")\nprint(f\"Documents translated: {poller.details.documents_succeeded_count}\"\
  )\nprint(f\"Documents failed: {poller.details.documents_failed_count}\")\n```\n\n\
  ## Multiple Target Languages\n\n```python\npoller = client.begin_translation(\n\
