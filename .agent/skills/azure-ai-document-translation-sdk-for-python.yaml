  \            targets=[\n                TranslationTarget(target_url=target_url_es,\
  \ language=\"es\"),\n                TranslationTarget(target_url=target_url_fr,\
  \ language=\"fr\"),\n                TranslationTarget(target_url=target_url_de,\
