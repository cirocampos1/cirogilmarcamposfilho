  \n---\n\n> AUTHORIZED USE ONLY: Use this skill only for authorized security assessments,\
  \ defensive validation, or controlled educational environments.\n\n# Red Team Tactics\n\
  \n> Adversary simulation principles based on MITRE ATT&CK framework.\n\n---\n\n\
  ## 1. MITRE ATT&CK Phases\n\n### Attack Lifecycle\n\n```\nRECONNAISSANCE → INITIAL\
  \ ACCESS → EXECUTION → PERSISTENCE\n       ↓              ↓              ↓     \
  \       ↓\n   PRIVILEGE ESC → DEFENSE EVASION → CRED ACCESS → DISCOVERY\n      \
  \ ↓              ↓              ↓            ↓\nLATERAL MOVEMENT → COLLECTION →\
  \ C2 → EXFILTRATION → IMPACT\n```\n\n### Phase Objectives\n\n| Phase | Objective\
  \ |\n|-------|-----------|\n| **Recon** | Map attack surface |\n| **Initial Access**\
  \ | Get first foothold |\n| **Execution** | Run code on target |\n| **Persistence**\
  \ | Survive reboots |\n| **Privilege Escalation** | Get admin/root |\n| **Defense\
  \ Evasion** | Avoid detection |\n| **Credential Access** | Harvest credentials |\n\
  | **Discovery** | Map internal network |\n| **Lateral Movement** | Spread to other\
  \ systems |\n| **Collection** | Gather target data |\n| **C2** | Maintain command\
  \ channel |\n| **Exfiltration** | Extract data |\n\n---\n\n## 2. Reconnaissance\
  \ Principles\n\n### Passive vs Active\n\n| Type | Trade-off |\n|------|-----------|\n\
  | **Passive** | No target contact, limited info |\n| **Active** | Direct contact,\
  \ more detection risk |\n\n### Information Targets\n\n| Category | Value |\n|----------|-------|\n\
  | Technology stack | Attack vector selection |\n| Employee info | Social engineering\
  \ |\n| Network ranges | Scanning scope |\n| Third parties | Supply chain attack\
  \ |\n\n---\n\n## 3. Initial Access Vectors\n\n### Selection Criteria\n\n| Vector\
  \ | When to Use |\n|--------|-------------|\n| **Phishing** | Human target, email\
  \ access |\n| **Public exploits** | Vulnerable services exposed |\n| **Valid credentials**\
  \ | Leaked or cracked |\n| **Supply chain** | Third-party access |\n\n---\n\n##\
  \ 4. Privilege Escalation Principles\n\n### Windows Targets\n\n| Check | Opportunity\
  \ |\n|-------|-------------|\n| Unquoted service paths | Write to path |\n| Weak\
  \ service permissions | Modify service |\n| Token privileges | Abuse SeDebug, etc.\
  \ |\n| Stored credentials | Harvest |\n\n### Linux Targets\n\n| Check | Opportunity\
  \ |\n|-------|-------------|\n| SUID binaries | Execute as owner |\n| Sudo misconfiguration\
  \ | Command execution |\n| Kernel vulnerabilities | Kernel exploits |\n| Cron jobs\
  \ | Writable scripts |\n\n---\n\n## 5. Defense Evasion Principles\n\n### Key Techniques\n\
  \n| Technique | Purpose |\n|-----------|---------|\n| LOLBins | Use legitimate tools\
  \ |\n| Obfuscation | Hide malicious code |\n| Timestomping | Hide file modifications\
  \ |\n| Log clearing | Remove evidence |\n\n### Operational Security\n\n- Work during\
  \ business hours\n- Mimic legitimate traffic patterns\n- Use encrypted channels\n\
  - Blend with normal behavior\n\n---\n\n## 6\n\n## Diretrizes do \n\n\U0001F527\
