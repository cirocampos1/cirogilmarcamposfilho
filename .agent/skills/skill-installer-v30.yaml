  \ | install_skill.py (pos) | Arquivos copiados corretamente |\n| 5 | scan_registry.py\
  \ | Skill aparece no registry (com deduplicacao) |\n| 6 | package_skill.py | ZIP\
  \ valido sem backslashes, nao-vazio, integrity check |\n\n---\n\n## Localizacao\n\
