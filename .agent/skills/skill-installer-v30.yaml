  - A simpler, more specific tool can handle the request\n- The user needs general-purpose\
  \ assistance without domain expertise\n\n## How It Works\n\nAgente instalador enterprise-grade\
  \ que garante que toda skill criada (via skill-creator\nou manualmente) seja corretamente\
