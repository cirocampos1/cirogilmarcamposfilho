  - Developing themes with Liquid templating\n- Integrating with Shopify GraphQL or\
  \ REST APIs\n- Implementing webhooks or billing\n- Working with metafields or Shopify\
  \ Functions\n\n---\n\n## ROUTING: What to Build\n\n**IF user wants to integrate\
  \ external services OR build merchant tools OR charge for features:**\n→ Build an\
