  → Build an **Extension** (see `references/extensions.md`)\n\n**IF user wants to\
  \ customize storefront design OR modify product/collection pages:**\n→ Build a **Theme**\
  \ (see `references/themes.md`)\n\n**IF user needs both backend logic AND storefront\
  \ UI:**\n→ Build **App + Theme Extension** combination\n\n---\n\n## Shopify CLI\
  \ Commands\n\nInstall CLI:\n\n```bash\nnpm install -g @shopify/cli@latest\n```\n\
  \nCreate and run app:\n\n```bash\nshopify app init          # Create new app\nshopify\
  \ app dev           # Start dev server with tunnel\nshopify app deploy        #\
  \ Build and upload to Shopify\n```\n\nGenerate extension:\n\n```bash\nshopify app\
  \ generate extension --type checkout_ui_extension\nshopify app generate extension\
  \ --type admin_action\nshopify app generate extension --type admin_block\nshopify\
  \ app generate extension --type pos_ui_extension\nshopify app generate extension\
  \ --type function\n```\n\nTheme development:\n\n```bash\nshopify theme init    \
  \    # Create new theme\nshopify theme dev         # Start local preview at localhost:9292\n\
  shopify theme pull --live # Pull live theme\nshopify theme push --development  #\
  \ Push to dev theme\n```\n\n---\n\n## Access Scopes\n\nConfigure in `shopify.app.toml`:\n\
  \n```toml\n[access_scopes]\nscopes = \"read_products,write_products,read_orders,write_orders,read_customers\"\
  \n```\n\nCommon scopes:\n\n- `read_products`, `write_products` - Product catalog\
  \ access\n- `read_orders`, `write_orders` - Order management\n- `read_customers`,\
  \ `write_customers` - Customer data\n- `read_inventory`, `write_inventory` - Stock\
  \ levels\n- `read_fulfillments`, `write_fulfillments` - Order fulfillment\n\n---\n\
