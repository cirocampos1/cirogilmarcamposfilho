  risk: unknown\nsource: community\ndate_added: '2026-02-27'\n---\n\n# Azure.ResourceManager.ApiCenter\
  \ (.NET)\n\nCentralized API inventory and governance SDK for managing APIs across\
  \ your organization.\n\n## Installation\n\n```bash\ndotnet add package Azure.ResourceManager.ApiCenter\n\
  dotnet add package Azure.Identity\n```\n\n**Current Version**: v1.0.0 (GA)  \n**API\
  \ Version**: 2024-03-01\n\n## Environment Variables\n\n```bash\nAZURE_SUBSCRIPTION_ID=<your-subscription-id>\n\
  AZURE_RESOURCE_GROUP=<your-resource-group>\nAZURE_APICENTER_SERVICE_NAME=<your-apicenter-service>\n\
  ```\n\n## Authentication\n\n```csharp\nusing Azure.Identity;\nusing Azure.ResourceManager;\n\
  using Azure.ResourceManager.ApiCenter;\n\nArmClient client = new ArmClient(new DefaultAzureCredential());\n\
  ```\n\n## Resource Hierarchy\n\n```\nSubscription\n└── ResourceGroup\n    └── ApiCenterService\
  \                    # API inventory service\n        ├── Workspace            \
  \           # Logical grouping of APIs\n        │   ├── Api                    \
  \     # API definition\n        │   │   └── ApiVersion              # Version of\
  \ the API\n        │   │       └── ApiDefinition       # OpenAPI/GraphQL/etc specification\n\
  \        │   ├── Environment                 # Deployment target (dev/staging/prod)\n\
  \        │   └── Deployment                  # API deployed to environment\n   \
  \     └── MetadataSchema                  # Custom metadata definitions\n```\n\n\
  ## Core Workflows\n\n### 1. Create API Center Service\n\n```csharp\nusing Azure.ResourceManager.ApiCenter;\n\
  using Azure.ResourceManager.ApiCenter.Models;\n\nResourceGroupResource resourceGroup\
  \ = await client\n    .GetDefaultSubscriptionAsync()\n    .Result\n    .GetResourceGroupAsync(\"\
  my-resource-group\");\n\nApiCenterServiceCollection services = resourceGroup.GetApiCenterServices();\n\
  \nApiCenterServiceData data = new ApiCenterServiceData(AzureLocation.EastUS)\n{\n\
  \    Identity = new ManagedServiceIdentity(ManagedServiceIdentityType.SystemAssigned)\n\
  };\n\nArmOperation<ApiCenterServiceResource> operation = await services\n    .CreateOrUpdateAsync(WaitUntil.Completed,\
  \ \"my-api-center\", data);\n\nApiCenterServiceResource service = operation.Value;\n\
  ```\n\n### 2. Create Workspace\n\n```csharp\nApiCenterWorkspaceCollection workspaces\
  \ = service.GetApiCenterWorkspaces();\n\nApiCenterWorkspaceData workspaceData =\
  \ new ApiCenterWorkspaceData\n{\n    Title = \"Engineering APIs\",\n    Description\
  \ = \"APIs owned by the engineering team\"\n};\n\nArmOperation<ApiCenterWorkspaceResource>\
  \ operation = await workspaces\n    .CreateOrUpdateAsync(WaitUntil.Completed, \"\
  engineering\", workspaceData);\n\nApiCenterWorkspaceResource workspace = operation.Value;\n\
  ```\n\n### 3. Create API\n\n```csharp\nApiCenterApiCollection apis = workspace.GetApiCenterApis();\n\
  \nApiCenterApiData apiData = new ApiCenterApiData\n{\n    Title = \"Orders API\"\
  ,\n    Description = \"API for managing customer orders\",\n    Kind = ApiKind.Re\n\
  \n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente\
  \ o gerenciador uv para dependências. Todo código deve ser lintado via ruff e tipado\
  \ com mypy.\n"
