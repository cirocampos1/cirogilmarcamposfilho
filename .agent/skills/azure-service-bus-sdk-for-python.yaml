  \ unknown\nsource: community\ndate_added: '2026-02-27'\n---\n\n# Azure Service Bus\
  \ SDK for Python\n\nEnterprise messaging for reliable cloud communication with queues\
  \ and pub/sub topics.\n\n## Installation\n\n```bash\npip install azure-servicebus\
  \ azure-identity\n```\n\n## Environment Variables\n\n```bash\nSERVICEBUS_FULLY_QUALIFIED_NAMESPACE=<namespace>.servicebus.windows.net\n\
  SERVICEBUS_QUEUE_NAME=myqueue\nSERVICEBUS_TOPIC_NAME=mytopic\nSERVICEBUS_SUBSCRIPTION_NAME=mysubscription\n\
  ```\n\n## Authentication\n\n```python\nfrom azure.identity import DefaultAzureCredential\n\
  from azure.servicebus import ServiceBusClient\n\ncredential = DefaultAzureCredential()\n\
  namespace = \"<namespace>.servicebus.windows.net\"\n\nclient = ServiceBusClient(\n\
  \    fully_qualified_namespace=namespace,\n    credential=credential\n)\n```\n\n\
  ## Client Types\n\n| Client | Purpose | Get From |\n|--------|---------|----------|\n\
  | `ServiceBusClient` | Connection management | Direct instantiation |\n| `ServiceBusSender`\
  \ | Send messages | `client.get_queue_sender()` / `get_topic_sender()` |\n| `ServiceBusReceiver`\
  \ | Receive messages | `client.get_queue_receiver()` / `get_subscription_receiver()`\
  \ |\n\n## Send Messages (Async)\n\n```python\nimport asyncio\nfrom azure.servicebus.aio\
  \ import ServiceBusClient\nfrom azure.servicebus import ServiceBusMessage\nfrom\
  \ azure.identity.aio import DefaultAzureCredential\n\nasync def send_messages():\n\
  \    credential = DefaultAzureCredential()\n    \n    async with ServiceBusClient(\n\
  \        fully_qualified_namespace=\"<namespace>.servicebus.windows.net\",\n   \
  \     credential=credential\n    ) as client:\n        sender = client.get_queue_sender(queue_name=\"\
  myqueue\")\n        \n        async with sender:\n            # Single message\n\
  \            message = ServiceBusMessage(\"Hello, Service Bus!\")\n            await\
  \ sender.send_messages(message)\n            \n            # Batch of messages\n\
  \            messages = [ServiceBusMessage(f\"Message {i}\") for i in range(10)]\n\
  \            await sender.send_messages(messages)\n            \n            # Message\
  \ batch (for size control)\n            batch = await sender.create_message_batch()\n\
  \            for i in range(100):\n                try:\n                    batch.add_message(ServiceBusMessage(f\"\
  Batch message {i}\"))\n                except ValueError:  # Batch full\n      \
  \              await sender.send_messages(batch)\n                    batch = await\
  \ sender.create_message_batch()\n                    batch.add_message(ServiceBusMessage(f\"\
  Batch message {i}\"))\n            await sender.send_messages(batch)\n\nasyncio.run(send_messages())\n\
  ```\n\n## Receive Messages (Async)\n\n```python\nasync def receive_messages():\n\
