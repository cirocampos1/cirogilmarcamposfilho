  \n```bash\nAZURE_WEBPUBSUB_CONNECTION_STRING=Endpoint=https://<name>.webpubsub.azure.com;AccessKey=...\n\
  AZURE_WEBPUBSUB_HUB=my-hub\n```\n\n## Service Client (Server-Side)\n\n### Authentication\n\
  \n```python\nfrom azure.messaging.webpubsubservice import WebPubSubServiceClient\n\
  \n# Connection string\nclient = WebPubSubServiceClient.from_connection_string(\n\
  \    connection_string=os.environ[\"AZURE_WEBPUBSUB_CONNECTION_STRING\"],\n    hub=\"\
  my-hub\"\n)\n\n# Entra ID\nfrom azure.identity import DefaultAzureCredential\n\n\
  client = WebPubSubServiceClient(\n    endpoint=\"https://<name>.webpubsub.azure.com\"\
  ,\n    hub=\"my-hub\",\n    credential=DefaultAzureCredential()\n)\n```\n\n### Generate\
  \ Client Access Token\n\n```python\n# Token for anonymous user\ntoken = client.get_client_access_token()\n\
  print(f\"URL: {token['url']}\")\n\n# Token with user ID\ntoken = client.get_client_access_token(\n\
  \    user_id=\"user123\",\n    roles=[\"webpubsub.sendToGroup\", \"webpubsub.joinLeaveGroup\"\
  ]\n)\n\n# Token with groups\ntoken = client.get_client_access_token(\n    user_id=\"\
  user123\",\n    groups=[\"group1\", \"group2\"]\n)\n```\n\n### Send to All Clients\n\
  \n```python\n# Send text\nclient.send_to_all(message=\"Hello everyone!\", content_type=\"\
  text/plain\")\n\n# Send JSON\nclient.send_to_all(\n    message={\"type\": \"notification\"\
  , \"data\": \"Hello\"},\n    content_type=\"application/json\"\n)\n```\n\n### Send\
  \ to User\n\n```python\nclient.send_to_user(\n    user_id=\"user123\",\n    message=\"\
  Hello user!\",\n    content_type=\"text/plain\"\n)\n```\n\n### Send to Group\n\n\
  ```python\nclient.send_to_group(\n    group=\"my-group\",\n    message=\"Hello group!\"\
  ,\n    content_type=\"text/plain\"\n)\n```\n\n### Send to Connection\n\n```python\n\
  client.send_to_connection(\n    connection_id=\"abc123\",\n    message=\"Hello connection!\"\
  ,\n    content_type=\"text/plain\"\n)\n```\n\n### Group Management\n\n```python\n\
