  \n## Contexto Original da Skill\nAzure Blob Storage SDK for Python\n\n## Instruções\n\
  ---\nname: azure-storage-blob-py\ndescription: Azure Blob Storage SDK for Python.\
  \ Use for uploading, downloading, listing blobs, managing containers, and blob lifecycle.\n\
  risk: unknown\nsource: community\ndate_added: '2026-02-27'\n---\n\n# Azure Blob\
  \ Storage SDK for Python\n\nClient library for Azure Blob Storage — object storage\
  \ for unstructured data.\n\n## Installation\n\n```bash\npip install azure-storage-blob\
  \ azure-identity\n```\n\n## Environment Variables\n\n```bash\nAZURE_STORAGE_ACCOUNT_NAME=<your-storage-account>\n\
  # Or use full URL\nAZURE_STORAGE_ACCOUNT_URL=https://<account>.blob.core.windows.net\n\
  ```\n\n## Authentication\n\n```python\nfrom azure.identity import DefaultAzureCredential\n\
  from azure.storage.blob import BlobServiceClient\n\ncredential = DefaultAzureCredential()\n\
  account_url = \"https://<account>.blob.core.windows.net\"\n\nblob_service_client\
  \ = BlobServiceClient(account_url, credential=credential)\n```\n\n## Client Hierarchy\n\
  \n| Client | Purpose | Get From |\n|--------|---------|----------|\n| `BlobServiceClient`\
  \ | Account-level operations | Direct instantiation |\n| `ContainerClient` | Container\
  \ operations | `blob_service_client.get_container_client()` |\n| `BlobClient` |\
  \ Single blob operations | `container_client.get_blob_client()` |\n\n## Core Workflow\n\
  \n### Create Container\n\n```python\ncontainer_client = blob_service_client.get_container_client(\"\
  mycontainer\")\ncontainer_client.create_container()\n```\n\n### Upload Blob\n\n\
  ```python\n# From file path\nblob_client = blob_service_client.get_blob_client(\n\
  \    container=\"mycontainer\",\n    blob=\"sample.txt\"\n)\n\nwith open(\"./local-file.txt\"\
  , \"rb\") as data:\n    blob_client.upload_blob(data, overwrite=True)\n\n# From\
  \ bytes/string\nblob_client.upload_blob(b\"Hello, World!\", overwrite=True)\n\n\
  # From stream\nimport io\nstream = io.BytesIO(b\"Stream content\")\nblob_client.upload_blob(stream,\
  \ overwrite=True)\n```\n\n### Download Blob\n\n```python\nblob_client = blob_service_client.get_blob_client(\n\
  \    container=\"mycontainer\",\n    blob=\"sample.txt\"\n)\n\n# To file\nwith open(\"\
  ./downloaded.txt\", \"wb\") as file:\n    download_stream = blob_client.download_blob()\n\
  \    file.write(download_stream.readall())\n\n# To memory\ndownload_stream = blob_client.download_blob()\n\
  content = download_stream.readall()  # bytes\n\n# Read into existing buffer\nstream\
  \ = io.BytesIO()\nnum_bytes = blob_client.download_blob().readinto(stream)\n```\n\
  \n### List Blobs\n\n```python\ncontainer_client = blob_service_client.get_container_client(\"\
  mycontainer\")\n\n# List all blobs\nfor blob in container_client.list_blobs():\n\
  \    print(f\"{blob.name} - {blob.size} bytes\")\n\n# List with prefix (folder-like)\n\
  for blob in container_client.list_blobs(name_starts_with=\"logs/\"):\n    print(blob.name)\n\
  \n# Walk blob hierarchy (virtual directories)\nfor item in container_client.walk_blobs(delimiter=\"\
  /\"):\n    if item.get(\"prefix\"):\n        print(f\"Directory: {item['prefix']}\"\
  )\n    else:\n        print(f\"Blob: {item.name}\")\n```\n\n### Delete Blob\n\n\
