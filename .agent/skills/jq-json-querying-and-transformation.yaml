  \ kostakost2\ntags: [jq, json, shell, cli, data-transformation, bash]\ntools: [claude,\
  \ cursor, gemini]\n---\n\n# jq — JSON Querying and Transformation\n\n## Overview\n\
  \n`jq` is the standard CLI tool for querying and reshaping JSON. This skill covers\
  \ practical, expert-level usage: filtering deeply nested data, transforming structures,\
  \ aggregating values, and composing `jq` into shell pipelines. Every example is\
  \ copy-paste ready for real workflows.\n\n## When to Use This Skill\n\n- Use when\
  \ parsing JSON output from APIs, CLI tools (AWS, GitHub, kubectl, docker), or log\
  \ files\n- Use when transforming JSON structure (rename keys, flatten arrays, group\
  \ records)\n- Use when the user needs `jq` inside a bash script or one-liner\n-\
  \ Use when explaining what a complex `jq` expression does\n\n## How It Works\n\n\
  `jq` takes a filter expression and applies it to JSON input. Filters compose with\
  \ pipes (`|`), and `jq` handles arrays, objects, strings, numbers, booleans, and\
  \ `null` natively.\n\n### Basic Selection\n\n```bash\n# Extract a field\necho '{\"\
  name\":\"alice\",\"age\":30}' | jq '.name'\n# \"alice\"\n\n# Nested access\necho\
  \ '{\"user\":{\"email\":\"a@b.com\"}}' | jq '.user.email'\n\n# Array index\necho\
  \ '[10, 20, 30]' | jq '.[1]'\n# 20\n\n# Array slice\necho '[1,2,3,4,5]' | jq '.[2:4]'\n\
  # [3, 4]\n\n# All array elements\necho '[{\"id\":1},{\"id\":2}]' | jq '.[]'\n```\n\
  \n### Filtering with `select`\n\n```bash\n# Keep only matching elements\necho '[{\"\
  role\":\"admin\"},{\"role\":\"user\"},{\"role\":\"admin\"}]' \\\n  | jq '[.[] |\
  \ select(.role == \"admin\")]'\n\n# Numeric comparison\ncurl -s https://api.github.com/repos/owner/repo/issues\
  \ \\\n  | jq '[.[] | select(.comments > 5)]'\n\n# Test a field exists and is non-null\n\
  jq '[.[] | select(.email != null)]'\n\n# Combine conditions\njq '[.[] | select(.active\
  \ == true and .score >= 80)]'\n```\n\n### Mapping and Transformation\n\n```bash\n\
  # Extract a field from every array element\necho '[{\"name\":\"alice\",\"age\":30},{\"\
  name\":\"bob\",\"age\":25}]' \\\n  | jq '[.[] | .name]'\n# [\"alice\", \"bob\"]\n\
  \n# Shorthand: map()\njq 'map(.name)'\n\n# Build a new object per element\njq '[.[]\
  \ | {user: .name, years: .age}]'\n\n# Add a computed field\njq '[.[] | . + {senior:\
  \ (.age > 28)}]'\n\n# Rename keys\njq '[.[] | {username: .name, email_address: .email}]'\n\
  ```\n\n### Aggregation and Reduce\n\n```bash\n# Sum all values\necho '[1, 2, 3,\
  \ 4, 5]' | jq 'add'\n# 15\n\n# Sum a field across objects\njq '[.[].price] | add'\n\
  \n# Count elements\njq 'length'\n\n# Max / min\njq 'max_by(.score)'\njq 'min_by(.created_at)'\n\
  \n# reduce: custom accumulator\necho '[1,2,3,4,5]' | jq 'reduce .[] as $x (0; .\
  \ + $x)'\n# 15\n\n# Group by field\njq 'group_by(.department)'\n\n# Count per group\n\
  jq 'group_by(.status) | map({status: .[0].status, count: length})'\n```\n\n### String\
  \ Interpolation and Formatting\n\n```bash\n# String interpolation\njq -r '.[] |\
  \ \"\\(.name) is \\(.\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA:\
