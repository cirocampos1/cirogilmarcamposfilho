  \ safe\nsource: \"self\"\n---\n\n# Odoo Purchase Workflow\n\n## Overview\n\nThis\
  \ skill guides you through the complete Odoo Purchase workflow — from sending a\
  \ Request for Quotation (RFQ) to receiving goods and matching the vendor bill. It\
  \ also covers purchase agreements, vendor price lists on products, automated reordering,\
  \ and 3-way matching controls.\n\n## When to Use This Skill\n\n- Setting up the\
  \ purchase flow for a new Odoo instance.\n- Implementing purchase order approval\
  \ workflows (2-level approval).\n- Configuring vendor price lists with quantity-based\
  \ discounts.\n- Troubleshooting billing/receipt mismatches in 3-way matching.\n\n\
  ## How It Works\n\n1. **Activate**: Mention `@odoo-purchase-workflow` and describe\
  \ your purchasing scenario.\n2. **Configure**: Receive exact Odoo menu paths and\
  \ field-by-field configuration.\n3. **Troubleshoot**: Describe a billing or receiving\
  \ issue and get a root cause diagnosis.\n\n## Examples\n\n### Example 1: Standard\
  \ RFQ → PO → Receipt → Bill Flow\n\n```text\nStep 1: Create RFQ\n  Menu: Purchase\
  \ → Orders → Requests for Quotation → New\n  Vendor: Acme Supplies\n  Add product\
  \ lines with quantity and unit price\n\nStep 2: Send RFQ to Vendor\n  Click \"Send\
  \ by Email\" → Vendor receives PDF with RFQ details\n\nStep 3: Confirm as Purchase\
  \ Order\n  Click \"Confirm Order\" → Status changes to \"Purchase Order\"\n\nStep\
  \ 4: Receive Goods\n  Click \"Receive Products\" → Validate received quantities\n\
  \  (partial receipts are supported; PO stays open for remaining qty)\n\nStep 5:\
  \ Match Vendor Bill (3-Way Match)\n  Click \"Create Bill\" → Bill pre-filled from\
  \ PO quantities\n  Verify: PO qty = Received qty = Billed qty\n  Post Bill → Register\
  \ Payment\n```\n\n### Example 2: Enable 2-Level Purchase Approval\n\n```text\nMenu:\
  \ Purchase → Configuration → Settings\n\nPurchase Order Approval:\n  ☑ Purchase\
  \ Order Approval\n  Minimum Order Amount: $5,000\n\nResult:\n  Orders ≤ $5,000 \
  \ → Confirm directly to PO\n  Orders > $5,000  → Status: \"Waiting for Approval\"\
  \n                     A purchase manager must click \"Approve\"\n```\n\n### Example\
  \ 3: Vendor Price List (Quantity Breaks on a Product)\n\n```text\nVendor price lists\
  \ are configured per product, not as a global menu.\n\nMenu: Inventory → Products\
  \ → [Select Product] → Purchase Tab\n  → Vendor Pricelist section → Add a line\n\
  \nVendor: Acme Supplies\nCurrency: USD\nPrice:    $12.00\nMin. Qty: 1\n\nAdd another\
  \ line for quantity discount:\nMin. Qty: 100 → Price: $10.50   (12.5% discount)\n\
  Min. Qty: 500 → Price:  $9.00   (25% discount)\n\nResult: Odoo automatically selects\
  \ the right price on a PO\nbased on the ordered quantity for this vendor.\n```\n\
  \n## Best Practices\n\n- ✅ **Do:** Enable **Purchase Order Approval** for orders\
  \ above your company's approval threshold.\n- ✅ **Do:** Use **Purchase Agreements\
  \ (Blanket Orders)** for recurring vendors with pre-negotiated annual contracts.\n\
  - ✅ **Do:*\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use\
  \ exclusivamente o gerenciador uv para dependências. Todo código deve ser lintado\
  \ via ruff e tipado com mypy.\n"
