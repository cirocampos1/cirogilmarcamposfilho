  \ Do not use this skill when\n\n- The task is unrelated to distributed tracing\n\
  - You need a different domain or tool outside this scope\n\n## Instructions\n\n\
  - Clarify goals, constraints, and required inputs.\n- Apply relevant best practices\
  \ and validate outcomes.\n- Provide actionable steps and verification.\n- If detailed\
  \ examples are required, open `resources/implementation-playbook.md`.\n\n## Purpose\n\
  \nTrack requests across distributed systems to understand latency, dependencies,\
  \ and failure points.\n\n## Use this skill when\n\n- Debug latency issues\n- Understand\
  \ service dependencies\n- Identify bottlenecks\n- Trace error propagation\n- Analyze\
  \ request paths\n\n## Distributed Tracing Concepts\n\n### Trace Structure\n```\n\
  Trace (Request ID: abc123)\n  ↓\nSpan (frontend) [100ms]\n  ↓\nSpan (api-gateway)\
  \ [80ms]\n  ├→ Span (auth-service) [10ms]\n  └→ Span (user-service) [60ms]\n   \
  \   └→ Span (database) [40ms]\n```\n\n### Key Components\n- **Trace** - End-to-end\
  \ request journey\n- **Span** - Single operation within a trace\n- **Context** -\
  \ Metadata propagated between services\n- **Tags** - Key-value pairs for filtering\n\
  - **Logs** - Timestamped events within a span\n\n## Jaeger Setup\n\n### Kubernetes\
  \ Deployment\n\n```bash\n# Deploy Jaeger Operator\nkubectl create namespace observability\n\
  kubectl create -f https://github.com/jaegertracing/jaeger-operator/releases/download/v1.51.0/jaeger-operator.yaml\
  \ -n observability\n\n# Deploy Jaeger instance\nkubectl apply -f - <<EOF\napiVersion:\
  \ jaegertracing.io/v1\nkind: Jaeger\nmetadata:\n  name: jaeger\n  namespace: observability\n\
  spec:\n  strategy: production\n  storage:\n    type: elasticsearch\n    options:\n\
  \      es:\n        server-urls: http://elasticsearch:9200\n  ingress:\n    enabled:\
  \ true\nEOF\n```\n\n### Docker Compose\n\n```yaml\nversion: '3.8'\nservices:\n \
  \ jaeger:\n    image: jaegertracing/all-in-one:latest\n    ports:\n      - \"5775:5775/udp\"\
  \n      - \"6831:6831/udp\"\n      - \"6832:6832/udp\"\n      - \"5778:5778\"\n\
  \      - \"16686:16686\"  # UI\n      - \"14268:14268\"  # Collector\n      - \"\
  14250:14250\"  # gRPC\n      - \"9411:9411\"    # Zipkin\n    environment:\n   \
  \   - COLLECTOR_ZIPKIN_HOST_PORT=:9411\n```\n\n**Reference:** See `references/jaeger-setup.md`\n\
