  risk: unknown\nsource: community\ndate_added: '2026-02-27'\n---\n\n# Azure AI VoiceLive\
  \ SDK for Java\n\nReal-time, bidirectional voice conversations with AI assistants\
  \ using WebSocket technology.\n\n## Installation\n\n```xml\n<dependency>\n    <groupId>com.azure</groupId>\n\
  \    <artifactId>azure-ai-voicelive</artifactId>\n    <version>1.0.0-beta.2</version>\n\
  </dependency>\n```\n\n## Environment Variables\n\n```bash\nAZURE_VOICELIVE_ENDPOINT=https://<resource>.openai.azure.com/\n\
  AZURE_VOICELIVE_API_KEY=<your-api-key>\n```\n\n## Authentication\n\n### API Key\n\
  \n```java\nimport com.azure.ai.voicelive.VoiceLiveAsyncClient;\nimport com.azure.ai.voicelive.VoiceLiveClientBuilder;\n\
  import com.azure.core.credential.AzureKeyCredential;\n\nVoiceLiveAsyncClient client\
  \ = new VoiceLiveClientBuilder()\n    .endpoint(System.getenv(\"AZURE_VOICELIVE_ENDPOINT\"\
  ))\n    .credential(new AzureKeyCredential(System.getenv(\"AZURE_VOICELIVE_API_KEY\"\
  )))\n    .buildAsyncClient();\n```\n\n### DefaultAzureCredential (Recommended)\n\
  \n```java\nimport com.azure.identity.DefaultAzureCredentialBuilder;\n\nVoiceLiveAsyncClient\
  \ client = new VoiceLiveClientBuilder()\n    .endpoint(System.getenv(\"AZURE_VOICELIVE_ENDPOINT\"\
  ))\n    .credential(new DefaultAzureCredentialBuilder().build())\n    .buildAsyncClient();\n\
  ```\n\n## Key Concepts\n\n| Concept | Description |\n|---------|-------------|\n\
  | `VoiceLiveAsyncClient` | Main entry point for voice sessions |\n| `VoiceLiveSessionAsyncClient`\
  \ | Active WebSocket connection for streaming |\n| `VoiceLiveSessionOptions` | Configuration\
  \ for session behavior |\n\n### Audio Requirements\n\n- **Sample Rate**: 24kHz (24000\
  \ Hz)\n- **Bit Depth**: 16-bit PCM\n- **Channels**: Mono (1 channel)\n- **Format**:\
  \ Signed PCM, little-endian\n\n## Core Workflow\n\n### 1. Start Session\n\n```java\n\
  import reactor.core.publisher.Mono;\n\nclient.startSession(\"gpt-4o-realtime-preview\"\
  )\n    .flatMap(session -> {\n        System.out.println(\"Session started\");\n\
  \        \n        // Subscribe to events\n        session.receiveEvents()\n   \
  \         .subscribe(\n                event -> System.out.println(\"Event: \" +\
  \ event.getType()),\n                error -> System.err.println(\"Error: \" + error.getMessage())\n\
  \            );\n        \n        return Mono.just(session);\n    })\n    .block();\n\
  ```\n\n### 2. Configure Session Options\n\n```java\nimport com.azure.ai.voicelive.models.*;\n\
