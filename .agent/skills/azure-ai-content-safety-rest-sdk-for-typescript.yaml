  CONTENT_SAFETY_KEY=<api-key>\n```\n\n## Authentication\n\n**Important**: This is\
  \ a REST client. `ContentSafetyClient` is a **function**, not a class.\n\n### API\
  \ Key\n\n```typescript\nimport ContentSafetyClient from \"@azure-rest/ai-content-safety\"\
  ;\nimport { AzureKeyCredential } from \"@azure/core-auth\";\n\nconst client = ContentSafetyClient(\n\
  \  process.env.CONTENT_SAFETY_ENDPOINT!,\n  new AzureKeyCredential(process.env.CONTENT_SAFETY_KEY!)\n\
  );\n```\n\n### DefaultAzureCredential\n\n```typescript\nimport ContentSafetyClient\
  \ from \"@azure-rest/ai-content-safety\";\nimport { DefaultAzureCredential } from\
  \ \"@azure/identity\";\n\nconst client = ContentSafetyClient(\n  process.env.CONTENT_SAFETY_ENDPOINT!,\n\
  \  new DefaultAzureCredential()\n);\n```\n\n## Analyze Text\n\n```typescript\nimport\
  \ ContentSafetyClient, { isUnexpected } from \"@azure-rest/ai-content-safety\";\n\
  \nconst result = await client.path(\"/text:analyze\").post({\n  body: {\n    text:\
  \ \"Text content to analyze\",\n    categories: [\"Hate\", \"Sexual\", \"Violence\"\
  , \"SelfHarm\"],\n    outputType: \"FourSeverityLevels\"  // or \"EightSeverityLevels\"\
  \n  }\n});\n\nif (isUnexpected(result)) {\n  throw result.body;\n}\n\nfor (const\
  \ analysis of result.body.categoriesAnalysis) {\n  console.log(`${analysis.category}:\
  \ severity ${analysis.severity}`);\n}\n```\n\n## Analyze Image\n\n### Base64 Content\n\
