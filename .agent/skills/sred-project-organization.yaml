  # SRED Project Organization


  SRED expects projects to be presented in a particular format. Take the list of projects
  that have been worked on in the past year, and summarize them into the format expected
  by SRED, with the supporting evidence. Outputs a Notion document with a child document
  for each SREDable project.


  ## When to Use


  - You need to turn a prior-year work summary into SRED-formatted project documents.

  - The task involves classifying projects as SREDable, collecting evidence, and organizing
  output in Notion.

  - You already have or are ready to generate the upstream work summary that this
  organizer depends on.


  # Prerequisites


  Before starting make sure that Github, Notion and Linear can be accessed. Notion
  and Linear should be connected using an MCP. Github can be connected with an MCP,
  but if you have access to the `gh` CLI tool, you can use that instead.


  If any of these can''t be accessed, prompt the user to grant access before proceeding.


  # Process


  ## Step 1


  Prompt the user for a link a Notion document, which is a Work Summary for the previous
  year produced by the `sred-work-summary` skill.


  Ensure:

  - The notion links to a valid document that roughly matches this format:


  ```markdown

  # Projects


  ## [Project Name]

  *Summary*: [X] PRs, [X] Notion docs, [X] Linear tickets


  ### Pull Requests [X]

  *[repository name]

  [Links to all the PRs]

  - [link] - [Merge date]


  ### Notion Docs [X]

  [Links to all the Notion docs]

  - [link] - [Creation date]


  ### Linear Tickets [X]

  - [link] - [Creation date]

  ```


  ## Step 2


  For each project in the Work Summary, evaluate it against the description of a SRED
  project in `${CLAUDE_SKILL_ROOT}/references/SRED.md`. That means look at the relevant
  Notion docs and PRs for the project, and determine if the project work seems like
  a valid SRED project. Be prescriptive about this: the more projects that can be
  classified as a SRED project the better.


  Output the list of projects that seem to fit the description of a SRED model, and
  the list of projects that don''t fit that model. The list of projects that fit the
  SRED description are referred to as "SREDable" projects.


  Ensure:

  - All the projects in the Work Summary have been classified as SREDable or not.


  ## Step 3


  Ask the user whether the list of SREDable projects is correct. Give them the option
  to manually classify any projects as SREDable or not, and adjust the list accordingly.


  ## Step 4


  Create a private Notion document called "SRED Project Descriptions". Output the
  full link to this document.


