  \ \"2026-02-27\"\n---\n\n# gRPC Golang (gRPC-Go)\n\n## Overview\n\nComprehensive\
  \ guide for designing and implementing production-grade gRPC services in Go. Covers\
  \ contract standardization with Buf, transport layer security via mTLS, and deep\
  \ observability with OpenTelemetry interceptors.\n\n## Use this skill when\n\n-\
  \ Designing microservices communication with gRPC in Go.\n- Building high-performance\
  \ internal APIs using Protobuf.\n- Implementing streaming workloads (unidirectional\
  \ or bidirectional).\n- Standardizing API contracts using Protobuf and Buf.\n- Configuring\
  \ mTLS for service-to-service authentication.\n\n## Do not use this skill when\n\
  \n- Building pure REST/HTTP public APIs without gRPC requirements.\n- Modifying\
  \ legacy `.proto` files without the ability to introduce a new API version (e.g.,\
  \ `api.v2`) or ensure backward compatibility.\n- Managing service mesh traffic routing\
  \ (e.g., Istio/Linkerd), which is outside the application code scope.\n\n## Step-by-Step\
  \ Guide\n\n1. **Confirm Technical Context**: Identify Go version, gRPC-Go version,\
  \ and whether the project uses Buf or raw protoc.\n2. **Confirm Requirements**:\
  \ Identify mTLS needs, load patterns (unary/streaming), SLOs, and message size limits.\n\
  3. **Plan Schema**: Define package versioning (e.g., `api.v1`), resource types,\
  \ and error mapping.\n4. **Security Design**: Implement mTLS for service-to-service\
  \ authentication.\n5. **Observability**: Configure interceptors for tracing, metrics,\
  \ and structured logging.\n6. **Verification**: Always run `buf lint` and breaking\
  \ change checks before finalizing code generation.\n\nRefer to `resources/implementation-playbook.md`\
  \ for detailed patterns, code examples, and anti-patterns.\n\n## Examples\n\n###\
  \ Example 1: Defining a Service & Message (v1 API)\n\n```proto\nsyntax = \"proto3\"\
  ;\npackage api.v1;\noption go_package = \"github.com/org/repo/gen/api/v1;apiv1\"\
  ;\n\nservice UserService {\n  rpc GetUser(GetUserRequest) returns (GetUserResponse);\n\
  }\n\nmessage User {\n  string id = 1;\n  string name = 2;\n}\n\nmessage GetUserRequest\
  \ {\n  string id = 1;\n}\n\nmessage GetUserResponse {\n  User user = 1;\n}\n```\n\
  \n## Best Practices\n\n- ✅ **Do:** Use Buf to standardize your toolchain and linting\
  \ with `buf.yaml` and `buf.gen.yaml`.\n- ✅ **Do:** Always use semantic versioning\
  \ in package paths (e.g., `package api.v1`).\n- ✅ **Do:** Enforce mTLS for all internal\
  \ service-to-service communication.\n- ✅ **Do:** Handle `ctx.Done()` in all streaming\
  \ handlers to prevent resource leaks.\n- ✅ **Do:** Map domain errors to standard\
  \ gRPC status codes (e.g., `codes.NotFound`).\n- ❌ **Don't:** Return raw internal\
  \ error strings or stack traces to gRPC clients.\n- ❌ **Don't:** Create a new `grpc.ClientConn`\
  \ per request; always reuse connections.\n\n## Troubleshooting\n\n- **Error: Inconsistent\n\
  \n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente\
  \ o gerenciador uv para dependências. Todo código deve ser lintado via ruff e tipado\
  \ com mypy.\n"
