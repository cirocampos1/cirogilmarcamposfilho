  \ \"self\"\n---\n\n# Odoo Sales & CRM Expert\n\n## Overview\n\nThis skill helps\
  \ you configure and optimize Odoo Sales and CRM. It covers opportunity pipeline\
  \ setup, automated lead assignment, quotation templates, pricelist strategies, sales\
  \ team management, and the sales-to-invoice workflow.\n\n## When to Use This Skill\n\
  \n- Designing CRM pipeline stages for your sales process.\n- Creating a quotation\
  \ template with optional products and bundles.\n- Setting up pricelists with customer-tier\
  \ pricing.\n- Configuring automated lead assignment by territory or salesperson.\n\
  \n## How It Works\n\n1. **Activate**: Mention `@odoo-sales-crm-expert` and describe\
  \ your sales scenario.\n2. **Configure**: Receive step-by-step Odoo setup instructions.\n\
  3. **Optimize**: Get recommendations for improving pipeline velocity and deal closure\
  \ rate.\n\n## Examples\n\n### Example 1: Configure CRM Pipeline Stages\n\n```text\n\
  Menu: CRM → Configuration → Stages → New\n\nTypical B2B Pipeline:\n  Stage 1: New\
  \ Lead          (probability: 10%)\n  Stage 2: Qualified         (probability: 25%)\n\
  \  Stage 3: Proposal Sent     (probability: 50%)\n  Stage 4: Negotiation       (probability:\
  \ 75%)\n  Stage 5: Won               (is_won: YES — marks opportunity as closed-won)\n\
  \  Stage 6: Lost              (mark as lost via the \"Mark as Lost\" button)\n\n\
  Tips:\n  - Enable \"Rotting Days\" in CRM Settings to flag stale deals in red\n\
  \  - In Odoo 16+, Predictive Lead Scoring (AI) auto-updates probability\n    based\
  \ on historical data. Disable it in Settings if you prefer manual\n    stage-based\
  \ probability.\n```\n\n### Example 2: Create a Quotation Template\n\n```text\nMenu:\
  \ Sales → Configuration → Quotation Templates → New\n(Requires the \"Sales Management\"\
  \ module — enabled in Sales Settings)\n\nTemplate Name: SaaS Annual Subscription\n\
  Valid for: 30 days\n\nLines:\n  1. Platform License   | Qty: 1 | Price: $1,200/yr\
  \ | (required)\n  2. Onboarding Package | Qty: 1 | Price: $500       | Optional\n\
  \  3. Premium Support    | Qty: 1 | Price: $300/yr    | Optional\n  4. Extra User\
  \ License | Qty: 0 | Price: $120/user  | Optional\n\nSignature & Payment:\n  ☑ Online\
  \ Signature required before order confirmation\n  ☑ Online Payment (deposit) — 50%\
  \ upfront\n\nNotes section:\n  \"Prices valid until expiration date. Subject to\
  \ Schedule A terms.\"\n```\n\n### Example 3: Customer Tier Pricelist (VIP Discount)\n\
  \n```text\nMenu: Sales → Configuration → Settings\n  ☑ Enable Pricelists\n\nMenu:\
  \ Sales → Configuration → Pricelists → New\n\nName: VIP Customer — 15% Off\nCurrency:\
  \ USD\nDiscount Policy: Show public price & discount on quotation\n\nRules:\n  Apply\
  \ To: All Products\n  Compute Price: Discount\n  Discount: 15%\n  Min. Quantity:\
  \ 1\n\nAssign to a customer:\n  Customer record → Sales & Purchase tab → Pricelist\
  \ → VIP Customer\n```\n\n## Best Practices\n\n- ✅ **Do:** Use **Lost Reasons** (CRM\
  \ → Configuration → Lost Re\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ\
