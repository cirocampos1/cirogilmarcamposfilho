  \n---\n\n# Azure AI Vision Image Analysis SDK for Java\n\nBuild image analysis applications\
  \ using the Azure AI Vision Image Analysis SDK for Java.\n\n## Installation\n\n\
  ```xml\n<dependency>\n    <groupId>com.azure</groupId>\n    <artifactId>azure-ai-vision-imageanalysis</artifactId>\n\
  \    <version>1.1.0-beta.1</version>\n</dependency>\n```\n\n## Client Creation\n\
  \n### With API Key\n\n```java\nimport com.azure.ai.vision.imageanalysis.ImageAnalysisClient;\n\
  import com.azure.ai.vision.imageanalysis.ImageAnalysisClientBuilder;\nimport com.azure.core.credential.KeyCredential;\n\
  \nString endpoint = System.getenv(\"VISION_ENDPOINT\");\nString key = System.getenv(\"\
  VISION_KEY\");\n\nImageAnalysisClient client = new ImageAnalysisClientBuilder()\n\
  \    .endpoint(endpoint)\n    .credential(new KeyCredential(key))\n    .buildClient();\n\
  ```\n\n### Async Client\n\n```java\nimport com.azure.ai.vision.imageanalysis.ImageAnalysisAsyncClient;\n\
  \nImageAnalysisAsyncClient asyncClient = new ImageAnalysisClientBuilder()\n    .endpoint(endpoint)\n\
  \    .credential(new KeyCredential(key))\n    .buildAsyncClient();\n```\n\n### With\
  \ DefaultAzureCredential\n\n```java\nimport com.azure.identity.DefaultAzureCredentialBuilder;\n\
  \nImageAnalysisClient client = new ImageAnalysisClientBuilder()\n    .endpoint(endpoint)\n\
  \    .credential(new DefaultAzureCredentialBuilder().build())\n    .buildClient();\n\
  ```\n\n## Visual Features\n\n| Feature | Description |\n|---------|-------------|\n\
  | `CAPTION` | Generate human-readable image description |\n| `DENSE_CAPTIONS` |\
  \ Captions for up to 10 regions |\n| `READ` | OCR - Extract text from images |\n\
  | `TAGS` | Content tags for objects, scenes, actions |\n| `OBJECTS` | Detect objects\
  \ with bounding boxes |\n| `SMART_CROPS` | Smart thumbnail regions |\n| `PEOPLE`\
  \ | Detect people with locations |\n\n## Core Patterns\n\n### Generate Caption\n\
  \n```java\nimport com.azure.ai.vision.imageanalysis.models.*;\nimport com.azure.core.util.BinaryData;\n\
  import java.io.File;\nimport java.util.Arrays;\n\n// From file\nBinaryData imageData\
  \ = BinaryData.fromFile(new File(\"image.jpg\").toPath());\n\nImageAnalysisResult\
  \ result = client.analyze(\n    imageData,\n    Arrays.asList(VisualFeatures.CAPTION),\n\
  \    new ImageAnalysisOptions().setGenderNeutralCaption(true));\n\nSystem.out.printf(\"\
  Caption: \\\"%s\\\" (confidence: %.4f)%n\",\n    result.getCaption().getText(),\n\
  \    result.getCaption().getConfidence());\n```\n\n### Generate Caption from URL\n\
  \n```java\nImageAnalysisResult result = client.analyzeFromUrl(\n    \"https://example.com/image.jpg\"\
  ,\n    Arrays.asList(VisualFeatures.CAPTION),\n    new ImageAnalysisOptions().setGenderNeutralCaption(true));\n\
  \nSystem.out.printf(\"Caption: \\\"%s\\\"%n\", result.getCaption().getText());\n\
  ```\n\n### Extract Text (OCR)\n\n```java\nImageAnalysisResult result = cl\n\n##\
