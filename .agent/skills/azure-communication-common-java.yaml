  \nrisk: unknown\nsource: community\ndate_added: \"2026-02-27\"\n---\n\n# Azure Communication\
  \ Common (Java)\n\nShared authentication utilities and data structures for Azure\
  \ Communication Services.\n\n## Installation\n\n```xml\n<dependency>\n    <groupId>com.azure</groupId>\n\
  \    <artifactId>azure-communication-common</artifactId>\n    <version>1.4.0</version>\n\
  </dependency>\n```\n\n## Key Concepts\n\n| Class | Purpose |\n|-------|---------|\n\
  | `CommunicationTokenCredential` | Authenticate users with ACS services |\n| `CommunicationTokenRefreshOptions`\
  \ | Configure automatic token refresh |\n| `CommunicationUserIdentifier` | Identify\
  \ ACS users |\n| `PhoneNumberIdentifier` | Identify PSTN phone numbers |\n| `MicrosoftTeamsUserIdentifier`\
  \ | Identify Teams users |\n| `UnknownIdentifier` | Generic identifier for unknown\
  \ types |\n\n## CommunicationTokenCredential\n\n### Static Token (Short-lived Clients)\n\
  \n```java\nimport com.azure.communication.common.CommunicationTokenCredential;\n\
  \n// Simple static token - no refresh\nString userToken = \"<user-access-token>\"\
  ;\nCommunicationTokenCredential credential = new CommunicationTokenCredential(userToken);\n\
  \n// Use with Chat, Calling, etc.\nChatClient chatClient = new ChatClientBuilder()\n\
  \    .endpoint(\"https://<resource>.communication.azure.com\")\n    .credential(credential)\n\
  \    .buildClient();\n```\n\n### Proactive Token Refresh (Long-lived Clients)\n\n\
  ```java\nimport com.azure.communication.common.CommunicationTokenRefreshOptions;\n\
  import java.util.concurrent.Callable;\n\n// Token refresher callback - called when\
  \ token is about to expire\nCallable<String> tokenRefresher = () -> {\n    // Call\
  \ your server to get a fresh token\n    return fetchNewTokenFromServer();\n};\n\n\
  // With proactive refresh\nCommunicationTokenRefreshOptions refreshOptions = new\
  \ CommunicationTokenRefreshOptions(tokenRefresher)\n    .setRefreshProactively(true)\
  \      // Refresh before expiry\n    .setInitialToken(currentToken);    // Optional\
  \ initial token\n\nCommunicationTokenCredential credential = new CommunicationTokenCredential(refreshOptions);\n\
  ```\n\n### Async Token Refresh\n\n```java\nimport java.util.concurrent.CompletableFuture;\n\
  \n// Async token fetcher\nCallable<String> asyncRefresher = () -> {\n    CompletableFuture<String>\
  \ future = fetchTokenAsync();\n    return future.get();  // Block until token is\
  \ available\n};\n\nCommunicationTokenRefreshOptions options = new CommunicationTokenRefreshOptions(asyncRefresher)\n\
  \    .setRefreshProactively(true);\n\nCommunicationTokenCredential credential =\
  \ new CommunicationTokenCredential(options);\n```\n\n## Entra ID (Azure AD) Authentication\n\
  \n```java\nimport com.azure.identity.InteractiveBrowserCredentialBuilder;\nimport\
  \ com.azure.communication.common.EntraCommunicationTokenCredentialOptions;\nimport\
  \ java.util.Arrays;\nimport java.util.List;\n\n## Diretrizes do \n\n\U0001F527\
