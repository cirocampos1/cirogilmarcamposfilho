  \n# DEVOPS-DEPLOY — Da Ideia para Producao\n\n## Overview\n\nDevOps e deploy de\
  \ aplicacoes — Docker, CI/CD com GitHub Actions, AWS Lambda, SAM, Terraform, infraestrutura\
  \ como codigo e monitoramento. Ativar para: dockerizar aplicacao, configurar pipeline\
  \ CI/CD, deploy na AWS, Lambda, ECS, configurar GitHub Actions, Terraform, rollback,\
  \ blue-green deploy, health checks, alertas.\n\n## When to Use This Skill\n\n- When\
  \ you need specialized assistance with this domain\n\n## Do Not Use This Skill When\n\
  \n- The task is unrelated to devops deploy\n- A simpler, more specific tool can\
  \ handle the request\n- The user needs general-purpose assistance without domain\
  \ expertise\n\n## How It Works\n\n> \"Move fast and don't break things.\" — Engenharia\
  \ de elite nao e lenta.\n> E rapida e confiavel ao mesmo tempo.\n\n---\n\n## Dockerfile\
  \ Otimizado (Python)\n\n```dockerfile\nFROM python:3.11-slim AS builder\nWORKDIR\
  \ /app\nCOPY requirements.txt .\nRUN pip install --no-cache-dir --user -r requirements.txt\n\
  \nFROM python:3.11-slim\nWORKDIR /app\nCOPY --from=builder /root/.local /root/.local\n\
  COPY . .\nENV PATH=/root/.local/bin:$PATH\nENV PYTHONUNBUFFERED=1\nEXPOSE 8000\n\
  HEALTHCHECK --interval=30s --timeout=3s CMD curl -f http://localhost:8000/health\
  \ || exit 1\nCMD [\"uvicorn\", \"main:app\", \"--host\", \"0.0.0.0\", \"--port\"\
  , \"8000\"]\n```\n\n## Docker Compose (Dev Local)\n\n```yaml\nversion: \"3.9\"\n\
  services:\n  app:\n    build: .\n    ports: [\"8000:8000\"]\n    environment:\n\
  \      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}\n    volumes:\n      - .:/app\n\
  \    depends_on: [db, redis]\n  db:\n    image: postgres:15\n    environment:\n\
  \      POSTGRES_DB: auri\n      POSTGRES_USER: auri\n      POSTGRES_PASSWORD: ${DB_PASSWORD}\n\
  \    volumes:\n      - pgdata:/var/lib/postgresql/data\n  redis:\n    image: redis:7-alpine\n\
  volumes:\n  pgdata:\n```\n\n---\n\n## Sam Template (Serverless)\n\n```yaml\n\n##\
  \ Template.Yaml\n\nAWSTemplateFormatVersion: '2010-09-09'\nTransform: AWS::Serverless-2016-10-31\n\
  \nGlobals:\n  Function:\n    Timeout: 30\n    Runtime: python3.11\n    Environment:\n\
  \      Variables:\n        ANTHROPIC_API_KEY: !Ref AnthropicApiKey\n        DYNAMODB_TABLE:\
  \ !Ref AuriTable\n\nResources:\n  AuriFunction:\n    Type: AWS::Serverless::Function\n\
  \    Properties:\n      CodeUri: src/\n      Handler: lambda_function.handler\n\
  \      MemorySize: 512\n      Policies:\n        - DynamoDBCrudPolicy:\n       \
  \     TableName: !Ref AuriTable\n\n  AuriTable:\n    Type: AWS::DynamoDB::Table\n\
  \    Properties:\n      TableName: auri-users\n      BillingMode: PAY_PER_REQUEST\n\
  \      AttributeDefinitions:\n        - AttributeName: userId\n          AttributeType:\
  \ S\n      KeySchema:\n        - AttributeName: userId\n          KeyType:\n\n##\
  \ Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente\
  \ o gerenciador uv para dependências. Todo código deve ser lintado via ruff e tipado\
  \ com mypy.\n"
