  risk: critical\nsource: community\n---\n\n# Claude in Chrome MCP Troubleshooting\n\
  \nUse this skill when Claude in Chrome MCP tools fail to connect or work unreliably.\n\
  \n## When to Use\n- `mcp__claude-in-chrome__*` tools fail with \"Browser extension\
  \ is not connected\"\n- Browser automation works erratically or times out\n- After\
  \ updating Claude Code or Claude.app\n- When switching between Claude Code CLI and\
  \ Claude.app (Cowork)\n- Native host process is running but MCP tools still fail\n\
  \n## When NOT to Use\n\n- **Linux or Windows users** - This skill covers macOS-specific\
  \ paths and tools (`~/Library/Application Support/`, `osascript`)\n- General Chrome\
  \ automation issues unrelated to the Claude extension\n- Claude.app desktop issues\
  \ (not browser-related)\n- Network connectivity problems\n- Chrome extension installation\
  \ issues (use Chrome Web Store support)\n\n## The Claude.app vs Claude Code Conflict\
  \ (Primary Issue)\n\n**Background:** When Claude.app added Cowork support (browser\
  \ automation from the desktop app), it introduced a competing native messaging host\
  \ that conflicts with Claude Code CLI.\n\n### Two Native Hosts, Two Socket Formats\n\
  \n| Component | Native Host Binary | Socket Location |\n|-----------|-------------------|-----------------|\n\
  | **Claude.app (Cowork)** | `/Applications/Claude.app/Contents/Helpers/chrome-native-host`\
  \ | `/tmp/claude-mcp-browser-bridge-$USER/<PID>.sock` |\n| **Claude Code CLI** |\
  \ `~/.local/share/claude/versions/<version> --chrome-native-host` | `$TMPDIR/claude-mcp-browser-bridge-$USER`\
  \ (single file) |\n\n### Why They Conflict\n\n1. Both register native messaging\
  \ configs in Chrome:\n   - `com.anthropic.claude_browser_extension.json` → Claude.app\
  \ helper\n   - `com.anthropic.claude_code_browser_extension.json` → Claude Code\
  \ wrapper\n\n2. Chrome extension requests a native host by name\n3. If the wrong\
  \ config is active, the wrong binary runs\n4. The wrong binary creates sockets in\
  \ a format/location the MCP client doesn't expect\n5. Result: \"Browser extension\
  \ is not connected\" even though everything appears to be running\n\n### The Fix:\
  \ Disable Claude.app's Native Host\n\n**If you use Claude Code CLI for browser automation\
  \ (not Cowork):**\n\n```bash\n# Disable the Claude.app native messaging config\n\
  mv ~/Library/Application\\ Support/Google/Chrome/NativeMessagingHosts/com.anthropic.claude_browser_extension.json\
  \ \\\n   ~/Library/Application\\ Support/Google/Chrome/NativeMessagingHosts/com.anthropic.claude_browser_extension.json.disabled\n\
  \n# Ensure the Claude Code config exists and points to the wrapper\ncat ~/Library/Application\\\
  \ Support/Google/Chrome/NativeMessagingHosts/com.anthropic.claude_code_browser_extension.json\n\
  ```\n\n**If you use Cowork (Claude.app) for browser automation:**\n\n```bash\n#\
  \ Disable the Claude Code native messaging config\n\n## Diretrizes do \n\
