  \ evaluation\n- You need a different domain or tool outside this scope\n\n## Instructions\n\
  \n- Clarify goals, constraints, and required inputs.\n- Apply relevant best practices\
  \ and validate outcomes.\n- Provide actionable steps and verification.\n- If detailed\
  \ examples are required, open `resources/implementation-playbook.md`.\n\n## Use\
  \ this skill when\n\n- Measuring LLM application performance systematically\n- Comparing\
  \ different models or prompts\n- Detecting performance regressions before deployment\n\
  - Validating improvements from prompt changes\n- Building confidence in production\
  \ systems\n- Establishing baselines and tracking progress over time\n- Debugging\
  \ unexpected model behavior\n\n## Core Evaluation Types\n\n### 1. Automated Metrics\n\
  Fast, repeatable, scalable evaluation using computed scores.\n\n**Text Generation:**\n\
  - **BLEU**: N-gram overlap (translation)\n- **ROUGE**: Recall-oriented (summarization)\n\
  - **METEOR**: Semantic similarity\n- **BERTScore**: Embedding-based similarity\n\
  - **Perplexity**: Language model confidence\n\n**Classification:**\n- **Accuracy**:\
  \ Percentage correct\n- **Precision/Recall/F1**: Class-specific performance\n- **Confusion\
  \ Matrix**: Error patterns\n- **AUC-ROC**: Ranking quality\n\n**Retrieval (RAG):**\n\
  - **MRR**: Mean Reciprocal Rank\n- **NDCG**: Normalized Discounted Cumulative Gain\n\
  - **Precision@K**: Relevant in top K\n- **Recall@K**: Coverage in top K\n\n### 2.\
  \ Human Evaluation\nManual assessment for quality aspects difficult to automate.\n\
  \n**Dimensions:**\n- **Accuracy**: Factual correctness\n- **Coherence**: Logical\
  \ flow\n- **Relevance**: Answers the question\n- **Fluency**: Natural language quality\n\
  - **Safety**: No harmful content\n- **Helpfulness**: Useful to the user\n\n### 3.\
  \ LLM-as-Judge\nUse stronger LLMs to evaluate weaker model outputs.\n\n**Approaches:**\n\
  - **Pointwise**: Score individual responses\n- **Pairwise**: Compare two responses\n\
  - **Reference-based**: Compare to gold standard\n- **Reference-free**: Judge without\
  \ ground truth\n\n## Quick Start\n\n```python\nfrom llm_eval import EvaluationSuite,\
  \ Metric\n\n# Define evaluation suite\nsuite = EvaluationSuite([\n    Metric.accuracy(),\n\
  \    Metric.bleu(),\n    Metric.bertscore(),\n    Metric.custom(name=\"groundedness\"\
  , fn=check_groundedness)\n])\n\n# Prepare test cases\ntest_cases = [\n    {\n  \
  \      \"input\": \"What is the capital of France?\",\n        \"expected\": \"\
  Paris\",\n        \"context\": \"France is a country in Europe. Paris is its capital.\"\
  \n    },\n    # ... more test cases\n]\n\n# Run evaluation\nresults = suite.evaluate(\n\
