backstory: "Você é um agente especializado em Azure Storage Blob SDK for Java.\n\n\
  ## Contexto Original da Skill\nAzure Storage Blob SDK for Java\n\n## Instruções\n\
  ---\nname: azure-storage-blob-java\ndescription: \"Build blob storage applications\
  \ using the Azure Storage Blob SDK for Java.\"\nrisk: unknown\nsource: community\n\
  date_added: \"2026-02-27\"\n---\n\n# Azure Storage Blob SDK for Java\n\nBuild blob\
  \ storage applications using the Azure Storage Blob SDK for Java.\n\n## Installation\n\
  \n```xml\n<dependency>\n    <groupId>com.azure</groupId>\n    <artifactId>azure-storage-blob</artifactId>\n\
  \    <version>12.33.0</version>\n</dependency>\n```\n\n## Client Creation\n\n###\
  \ BlobServiceClient\n\n```java\nimport com.azure.storage.blob.BlobServiceClient;\n\
  import com.azure.storage.blob.BlobServiceClientBuilder;\n\n// With SAS token\nBlobServiceClient\
  \ serviceClient = new BlobServiceClientBuilder()\n    .endpoint(\"<storage-account-url>\"\
  )\n    .sasToken(\"<sas-token>\")\n    .buildClient();\n\n// With connection string\n\
  BlobServiceClient serviceClient = new BlobServiceClientBuilder()\n    .connectionString(\"\
  <connection-string>\")\n    .buildClient();\n```\n\n### With DefaultAzureCredential\n\
  \n```java\nimport com.azure.identity.DefaultAzureCredentialBuilder;\n\nBlobServiceClient\
  \ serviceClient = new BlobServiceClientBuilder()\n    .endpoint(\"<storage-account-url>\"\
  )\n    .credential(new DefaultAzureCredentialBuilder().build())\n    .buildClient();\n\
  ```\n\n### BlobContainerClient\n\n```java\nimport com.azure.storage.blob.BlobContainerClient;\n\
  \n// From service client\nBlobContainerClient containerClient = serviceClient.getBlobContainerClient(\"\
  mycontainer\");\n\n// Direct construction\nBlobContainerClient containerClient =\
  \ new BlobContainerClientBuilder()\n    .connectionString(\"<connection-string>\"\
  )\n    .containerName(\"mycontainer\")\n    .buildClient();\n```\n\n### BlobClient\n\
  \n```java\nimport com.azure.storage.blob.BlobClient;\n\n// From container client\n\
  BlobClient blobClient = containerClient.getBlobClient(\"myblob.txt\");\n\n// With\
  \ directory structure\nBlobClient blobClient = containerClient.getBlobClient(\"\
  folder/subfolder/myblob.txt\");\n\n// Direct construction\nBlobClient blobClient\
  \ = new BlobClientBuilder()\n    .connectionString(\"<connection-string>\")\n  \
  \  .containerName(\"mycontainer\")\n    .blobName(\"myblob.txt\")\n    .buildClient();\n\
  ```\n\n## Core Patterns\n\n### Create Container\n\n```java\n// Create container\n\
  serviceClient.createBlobContainer(\"mycontainer\");\n\n// Create if not exists\n\
  BlobContainerClient container = serviceClient.createBlobContainerIfNotExists(\"\
  mycontainer\");\n\n// From container client\ncontainerClient.create();\ncontainerClient.createIfNotExists();\n\
  ```\n\n### Upload Data\n\n```java\nimport com.azure.core.util.BinaryData;\n\n//\
  \ Upload string\nString data = \"Hello, Azure Blob Storage!\";\nblobClient.upload(BinaryData.fromString(data));\n\
  \n// Upload with overwrite\nblobClient.upload(BinaryData.fromString(data), true);\n\
  ```\n\n### Upload from File\n\n```java\nblobClient.uploadFromFile(\"local-file.txt\"\
  );\n\n// With overwrite\nblobClient.uploadFromFile(\"local-file.txt\", true);\n\
  ```\n\n### Upload from Stream\n\n```java\nimport com.azure.storage.blob.specialized.BlockBlobClient;\n\
