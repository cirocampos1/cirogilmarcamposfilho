  2026-03-21\"\nlicense: Complete terms in LICENSE.txt\n---\n\n# Building LLM-Powered\
  \ Applications with Claude\n\nThis skill helps you build LLM-powered applications\
  \ with Claude. Choose the right surface based on your needs, detect the project\
  \ language, then read the relevant language-specific documentation.\n\n## When to\
  \ Use\n\n- Use when building with the Claude API, Anthropic SDKs, or the Agent SDK.\n\
  - Use when code imports `anthropic`, `@anthropic-ai/sdk`, or related Claude SDK\
  \ packages.\n- Do not use for general coding work unrelated to Claude integrations.\n\
  \n## Defaults\n\nUnless the user requests otherwise:\n\nFor the Claude model version,\
  \ please use Claude Opus 4.6, which you can access via the exact model string `claude-opus-4-6`.\
  \ Please default to using adaptive thinking (`thinking: {type: \"adaptive\"}`) for\
  \ anything remotely complicated. And finally, please default to streaming for any\
  \ request that may involve long input, long output, or high `max_tokens` ÔÇö it prevents\
  \ hitting request timeouts. Use the SDK's `.get_final_message()` / `.finalMessage()`\
  \ helper to get the complete response if you don't need to handle individual stream\
  \ events\n\n---\n\n## Language Detection\n\nBefore reading code examples, determine\
  \ which language the user is working in:\n\n1. **Look at project files** to infer\
  \ the language:\n\n   - `*.py`, `requirements.txt`, `pyproject.toml`, `setup.py`,\
  \ `Pipfile` ÔåÆ **Python** ÔÇö read from `python/`\n   - `*.ts`, `*.tsx`, `package.json`,\
  \ `tsconfig.json` ÔåÆ **TypeScript** ÔÇö read from `typescript/`\n   - `*.js`, `*.jsx`\
  \ (no `.ts` files present) ÔåÆ **TypeScript** ÔÇö JS uses the same SDK, read from `typescript/`\n\
  \   - `*.java`, `pom.xml`, `build.gradle` ÔåÆ **Java** ÔÇö read from `java/`\n   - `*.kt`,\
  \ `*.kts`, `build.gradle.kts` ÔåÆ **Java** ÔÇö Kotlin uses the Java SDK, read from `java/`\n\
  \   - `*.scala`, `build.sbt` ÔåÆ **Java** ÔÇö Scala uses the Java SDK, read from `java/`\n\
  \   - `*.go`, `go.mod` ÔåÆ **Go** ÔÇö read from `go/`\n   - `*.rb`, `Gemfile` ÔåÆ **Ruby**\
  \ ÔÇö read from `ruby/`\n   - `*.cs`, `*.csproj` ÔåÆ **C#** ÔÇö read from `csharp/`\n\
  \   - `*.php`, `composer.json` ÔåÆ **PHP** ÔÇö read from `php/`\n\n2. **If multiple\
  \ languages detected** (e.g., both Python and TypeScript files):\n\n   - Check which\
  \ language the user's current file or question relates to\n   - If still ambiguous,\
  \ ask: \"I detected both Python and TypeScript files. Which language are you using\
  \ for the Claude API integration?\"\n\n3. **If language can't be inferred** (empty\
  \ project, no source files, or unsupported language):\n\n   - Use AskUserQuestion\
  \ with options: Python, TypeScript, Java, Go, Ruby, cURL/raw HTTP, C#, PHP\n   -\
