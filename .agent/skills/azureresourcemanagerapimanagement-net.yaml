  \            ├── ApiManagementUserResource\n            ├── ApiManagementGroupResource\n\
  \            ├── ApiManagementBackendResource\n            ├── ApiManagementGatewayResource\n\
  \            ├── ApiManagementCertificateResource\n            ├── ApiManagementNamedValueResource\n\
  \            └── ApiManagementLoggerResource\n```\n\n## Core Workflow\n\n### 1.\
