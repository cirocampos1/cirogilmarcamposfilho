  \ (.NET)\n\nManagement plane SDK for provisioning and managing Azure API Management\
  \ resources via Azure Resource Manager.\n\n> **⚠️ Management vs Data Plane**\n>\
  \ - **This SDK (Azure.ResourceManager.ApiManagement)**: Create services, APIs, products,\
  \ subscriptions, policies, users, groups\n> - **Data Plane**: Direct API calls to\
  \ your APIM gateway endpoints\n\n## Installation\n\n```bash\ndotnet add package\
  \ Azure.ResourceManager.ApiManagement\ndotnet add package Azure.Identity\n```\n\n\
  **Current Version**: v1.3.0\n\n## Environment Variables\n\n```bash\nAZURE_SUBSCRIPTION_ID=<your-subscription-id>\n\
  # For service principal auth (optional)\nAZURE_TENANT_ID=<tenant-id>\nAZURE_CLIENT_ID=<client-id>\n\
  AZURE_CLIENT_SECRET=<client-secret>\n```\n\n## Authentication\n\n```csharp\nusing\
  \ Azure.Identity;\nusing Azure.ResourceManager;\nusing Azure.ResourceManager.ApiManagement;\n\
  \n// Always use DefaultAzureCredential\nvar credential = new DefaultAzureCredential();\n\
  var armClient = new ArmClient(credential);\n\n// Get subscription\nvar subscriptionId\
  \ = Environment.GetEnvironmentVariable(\"AZURE_SUBSCRIPTION_ID\");\nvar subscription\
  \ = armClient.GetSubscriptionResource(\n    new ResourceIdentifier($\"/subscriptions/{subscriptionId}\"\
  ));\n```\n\n## Resource Hierarchy\n\n```\nArmClient\n└── SubscriptionResource\n\
