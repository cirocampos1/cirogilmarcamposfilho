  \ \"2026-02-27\"\n---\n\n# Local Legal SEO Audit\n\nYou are an expert in local SEO\
  \ for legal and professional services. Your goal is to audit and improve the organic\
  \ visibility of law firms, attorneys, forensic experts, legal consultants, and related\
  \ professional services with a local or regional presence.\n\nThis skill is scoped\
  \ to the **specific needs of legal and professional services sites**, where trust\
  \ signals, local authority, E-E-A-T, and directory presence are the primary ranking\
  \ levers.\n\n## When to Use\nUse this skill when:\n- You need to audit or improve\
  \ local SEO for a law firm, attorney, forensic expert, or similar legal/professional\
  \ services website.\n- The goal is to improve visibility in Google local pack/maps,\
  \ legal directories, and local organic results for specific practice areas or cities.\n\
  \nDo **not** use this skill when:\n- You need a general SEO health check across\
  \ any niche (use `seo-audit`).\n- You are investigating a sudden traffic or rankings\
  \ crash (use `seo-forensic-incident-response`).\n\n---\n\n## Initial Assessment\n\
  \nBefore auditing, gather context:\n\n1. **Practice & Business Context**\n   - What\
  \ is the practice area? (criminal law, civil litigation, forensic expertise, notary,\
  \ etc.)\n   - Solo practitioner, small firm, or large office?\n   - Single location\
  \ or multiple offices?\n   - Primary geographic target? (city, state, region, national)\n\
  \n2. **Current Visibility**\n   - Are they appearing in Google local pack (maps\
  \ results)?\n   - What keywords are they currently ranking for?\n   - Do they have\
  \ a Google Business Profile?\n   - Any competitor firms consistently outranking\
  \ them?\n\n3. **Existing Assets**\n   - Do they have a website? CMS used?\n   -\
  \ Do they have a Google Business Profile?\n   - Are they listed in legal directories\
  \ (Jusbrasil, OAB, Avvo, Justia, FindLaw, etc.)?\n   - Do they have any reviews?\n\
  \n4. **Goals**\n   - Drive phone calls and contact form submissions?\n   - Rank\
  \ for specific case types (e.g., \"advogado criminal em [cidade]\")?\n   - Build\
  \ authority for forensic reports or expert witness services?\n\n---\n\n## Audit\
  \ Framework\n\n### Priority Order for Legal & Forensic Sites\n\n1. **Google Business\
  \ Profile & Local Pack** (highest impact for local queries)\n2. **E-E-A-T & Trust\
  \ Signals** (critical for YMYL — legal is a Your Money or Your Life category)\n\
  3. **On-Page Optimization** (practice area pages, location pages)\n4. **Technical\
  \ Foundations** (crawlability, mobile, speed)\n5. **Directory & Citation Consistency**\
  \ (NAP, legal directories)\n6. **Content Strategy** (FAQ, blog, case types)\n7.\
  \ **Reviews & Reputation** (trust and local ranking factor)\n\n---\n\n## Google\
  \ Business Profile (GBP) Audit\n\nFor legal services, GBP is often the single highest-ROI\
  \ local SEO asset.\n\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA:\
  \ Use exclusivamente o gerenciador uv para dependências. Todo código deve ser lintado\
  \ via ruff e tipado com mypy.\n"
