  # Azure.AI.Projects (.NET)\n\nHigh-level SDK for Azure AI Foundry project operations\
  \ including agents, connections, datasets, deployments, evaluations, and indexes.\n\
  \n## Installation\n\n```bash\ndotnet add package Azure.AI.Projects\ndotnet add package\
  \ Azure.Identity\n\n# Optional: For versioned agents with OpenAI extensions\ndotnet\
  \ add package Azure.AI.Projects.OpenAI --prerelease\n\n# Optional: For low-level\
  \ agent operations\ndotnet add package Azure.AI.Agents.Persistent --prerelease\n\
  ```\n\n**Current Versions**: GA v1.1.0, Preview v1.2.0-beta.5\n\n## Environment\
  \ Variables\n\n```bash\nPROJECT_ENDPOINT=https://<resource>.services.ai.azure.com/api/projects/<project>\n\
  MODEL_DEPLOYMENT_NAME=gpt-4o-mini\nCONNECTION_NAME=<your-connection-name>\nAI_SEARCH_CONNECTION_NAME=<ai-search-connection>\n\
  ```\n\n## Authentication\n\n```csharp\nusing Azure.Identity;\nusing Azure.AI.Projects;\n\
  \nvar endpoint = Environment.GetEnvironmentVariable(\"PROJECT_ENDPOINT\");\nAIProjectClient\
  \ projectClient = new AIProjectClient(\n    new Uri(endpoint), \n    new DefaultAzureCredential());\n\
  ```\n\n## Client Hierarchy\n\n```\nAIProjectClient\n├── Agents          → AIProjectAgentsOperations\
  \ (versioned agents)\n├── Connections     → ConnectionsClient\n├── Datasets    \
  \    → DatasetsClient\n├── Deployments     → DeploymentsClient\n├── Evaluations\
  \     → EvaluationsClient\n├── Evaluators      → EvaluatorsClient\n├── Indexes \
  \        → IndexesClient\n├── Telemetry       → AIProjectTelemetry\n├── OpenAI \
  \         → ProjectOpenAIClient (preview)\n└── GetPersistentAgentsClient() → PersistentAgentsClient\n\
  ```\n\n## Core Workflows\n\n### 1. Get Persistent Agents Client\n\n```csharp\n//\
  \ Get low-level agents client from project client\nPersistentAgentsClient agentsClient\
  \ = projectClient.GetPersistentAgentsClient();\n\n// Create agent\nPersistentAgent\
  \ agent = await agentsClient.Administration.CreateAgentAsync(\n    model: \"gpt-4o-mini\"\
  ,\n    name: \"Math Tutor\",\n    instructions: \"You are a personal math tutor.\"\
  );\n\n// Create thread and run\nPersistentAgentThread thread = await agentsClient.Threads.CreateThreadAsync();\n\
  await agentsClient.Messages.CreateMessageAsync(thread.Id, MessageRole.User, \"Solve\
  \ 3x + 11 = 14\");\nThreadRun run = await agentsClient.Runs.CreateRunAsync(thread.Id,\
  \ agent.Id);\n\n// Poll for completion\ndo\n{\n    await Task.Delay(500);\n    run\
  \ = await agentsClient.Runs.GetRunAsync(thread.Id, run.Id);\n}\nwhile (run.Status\
  \ == RunStatus.Queued || run.Status == RunStatus.InProgress);\n\n// Get messages\n\
  await foreach (var msg in agentsClient.Messages.GetMessagesAsync(thread.Id))\n{\n\
  \    foreach (var content in msg.ContentItems)\n    {\n        if (content is MessageTextContent\
  \ textContent)\n            Console.WriteLine(textContent.Text);\n    }\n}\n\n//\
  \ Cleanup\nawait agentsClient.Threads.DeleteThreadAs\n\n## Diretrizes do \n\
  \n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente o gerenciador uv para dependências.\
  \ Todo código deve ser lintado via ruff e tipado com mypy.\n"
