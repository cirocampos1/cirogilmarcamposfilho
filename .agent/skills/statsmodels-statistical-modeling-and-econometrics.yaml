  source: community\n---\n\n# Statsmodels: Statistical Modeling and Econometrics\n\
  \n## Overview\n\nStatsmodels is Python's premier library for statistical modeling,\
  \ providing tools for estimation, inference, and diagnostics across a wide range\
  \ of statistical methods. Apply this skill for rigorous statistical analysis, from\
  \ simple linear regression to complex time series models and econometric analyses.\n\
  \n## When to Use This Skill\n\nThis skill should be used when:\n- Fitting regression\
  \ models (OLS, WLS, GLS, quantile regression)\n- Performing generalized linear modeling\
  \ (logistic, Poisson, Gamma, etc.)\n- Analyzing discrete outcomes (binary, multinomial,\
  \ count, ordinal)\n- Conducting time series analysis (ARIMA, SARIMAX, VAR, forecasting)\n\
  - Running statistical tests and diagnostics\n- Testing model assumptions (heteroskedasticity,\
  \ autocorrelation, normality)\n- Detecting outliers and influential observations\n\
  - Comparing models (AIC/BIC, likelihood ratio tests)\n- Estimating causal effects\n\
  - Producing publication-ready statistical tables and inference\n\n## Quick Start\
  \ Guide\n\n### Linear Regression (OLS)\n\n```python\nimport statsmodels.api as sm\n\
  import numpy as np\nimport pandas as pd\n\n# Prepare data - ALWAYS add constant\
  \ for intercept\nX = sm.add_constant(X_data)\n\n# Fit OLS model\nmodel = sm.OLS(y,\
  \ X)\nresults = model.fit()\n\n# View comprehensive results\nprint(results.summary())\n\
  \n# Key results\nprint(f\"R-squared: {results.rsquared:.4f}\")\nprint(f\"Coefficients:\\\
  \\n{results.params}\")\nprint(f\"P-values:\\\\n{results.pvalues}\")\n\n# Predictions\
  \ with confidence intervals\npredictions = results.get_prediction(X_new)\npred_summary\
  \ = predictions.summary_frame()\nprint(pred_summary)  # includes mean, CI, prediction\
  \ intervals\n\n# Diagnostics\nfrom statsmodels.stats.diagnostic import het_breuschpagan\n\
  bp_test = het_breuschpagan(results.resid, X)\nprint(f\"Breusch-Pagan p-value: {bp_test[1]:.4f}\"\
  )\n\n# Visualize residuals\nimport matplotlib.pyplot as plt\nplt.scatter(results.fittedvalues,\
  \ results.resid)\nplt.axhline(y=0, color='r', linestyle='--')\nplt.xlabel('Fitted\
  \ values')\nplt.ylabel('Residuals')\nplt.show()\n```\n\n### Logistic Regression\
  \ (Binary Outcomes)\n\n```python\nfrom statsmodels.discrete.discrete_model import\
  \ Logit\n\n# Add constant\nX = sm.add_constant(X_data)\n\n# Fit logit model\nmodel\
  \ = Logit(y_binary, X)\nresults = model.fit()\n\nprint(results.summary())\n\n# Odds\
  \ ratios\nodds_ratios = np.exp(results.params)\nprint(\"Odds ratios:\\\\n\", odds_ratios)\n\
  \n# Predicted probabilities\nprobs = results.predict(X)\n\n# Binary predictions\
  \ (0.5 threshold)\npredictions = (probs > 0.5).astype(int)\n\n# Model evaluation\n\
  from sklearn.metrics import classification_report, roc_auc_score\n\nprint(classification_report(y_binary,\
  \ predictions))\nprint(f\"AUC: {\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ\
