  source: community\ndate_added: '2026-02-27'\n---\n\n# Azure.ResourceManager.DurableTask\
  \ (.NET)\n\nManagement plane SDK for provisioning and managing Azure Durable Task\
  \ Scheduler resources via Azure Resource Manager.\n\n> **⚠️ Management vs Data Plane**\n\
  > - **This SDK (Azure.ResourceManager.DurableTask)**: Create schedulers, task hubs,\
  \ configure retention policies\n> - **Data Plane SDK (Microsoft.DurableTask.Client.AzureManaged)**:\
  \ Start orchestrations, query instances, send events\n\n## Installation\n\n```bash\n\
  dotnet add package Azure.ResourceManager.DurableTask\ndotnet add package Azure.Identity\n\
  ```\n\n**Current Versions**: Stable v1.0.0 (2025-11-03), Preview v1.0.0-beta.1 (2025-04-24)\n\
  **API Version**: 2025-11-01\n\n## Environment Variables\n\n```bash\nAZURE_SUBSCRIPTION_ID=<your-subscription-id>\n\
  AZURE_RESOURCE_GROUP=<your-resource-group>\n# For service principal auth (optional)\n\
  AZURE_TENANT_ID=<tenant-id>\nAZURE_CLIENT_ID=<client-id>\nAZURE_CLIENT_SECRET=<client-secret>\n\
  ```\n\n## Authentication\n\n```csharp\nusing Azure.Identity;\nusing Azure.ResourceManager;\n\
  using Azure.ResourceManager.DurableTask;\n\n// Always use DefaultAzureCredential\n\
  var credential = new DefaultAzureCredential();\nvar armClient = new ArmClient(credential);\n\
  \n// Get subscription\nvar subscriptionId = Environment.GetEnvironmentVariable(\"\
  AZURE_SUBSCRIPTION_ID\");\nvar subscription = armClient.GetSubscriptionResource(\n\
  \    new ResourceIdentifier($\"/subscriptions/{subscriptionId}\"));\n```\n\n## Resource\
  \ Hierarchy\n\n```\nArmClient\n└── SubscriptionResource\n    └── ResourceGroupResource\n\
  \        └── DurableTaskSchedulerResource\n            ├── DurableTaskHubResource\n\
  \            └── DurableTaskRetentionPolicyResource\n```\n\n## Core Workflow\n\n\
  ### 1. Create Durable Task Scheduler\n\n```csharp\nusing Azure.ResourceManager.DurableTask;\n\
  using Azure.ResourceManager.DurableTask.Models;\n\n// Get resource group\nvar resourceGroup\
  \ = await subscription\n    .GetResourceGroupAsync(\"my-resource-group\");\n\n//\
  \ Define scheduler with Dedicated SKU\nvar schedulerData = new DurableTaskSchedulerData(AzureLocation.EastUS)\n\
  {\n    Properties = new DurableTaskSchedulerProperties\n    {\n        Sku = new\
  \ DurableTaskSchedulerSku(DurableTaskSchedulerSkuName.Dedicated)\n        {\n  \
  \          Capacity = 1  // Number of instances\n        },\n        // Optional:\
  \ IP allowlist for network security\n        IPAllowlist = { \"10.0.0.0/24\", \"\
  192.168.1.0/24\" }\n    }\n};\n\n// Create scheduler (long-running operation)\n\
  var schedulerCollection = resourceGroup.Value.GetDurableTaskSchedulers();\nvar operation\
  \ = await schedulerCollection.CreateOrUpdateAsync(\n    WaitUntil.Completed,\n \
  \   \"my-scheduler\",\n    schedulerData);\n\nDurableTaskSchedulerResource scheduler\
  \ = operation.Value;\nConsole.WriteLine($\"Scheduler created: {scheduler.Data.Name}\"\
  );\nConsole.WriteLine($\"Endpoint: {scheduler.Data.Properties.Endpoint}\");\n```\n\
