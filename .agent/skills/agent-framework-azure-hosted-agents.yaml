  source: community\ndate_added: \"2026-02-27\"\n---\n\n# Agent Framework Azure Hosted\
  \ Agents\n\nBuild persistent agents on Azure AI Foundry using the Microsoft Agent\
  \ Framework Python SDK.\n\n## Architecture\n\n```\nUser Query → AzureAIAgentsProvider\
  \ → Azure AI Agent Service (Persistent)\n                    ↓\n              Agent.run()\
  \ / Agent.run_stream()\n                    ↓\n              Tools: Functions |\
  \ Hosted (Code/Search/Web) | MCP\n                    ↓\n              AgentThread\
  \ (conversation persistence)\n```\n\n## Installation\n\n```bash\n# Full framework\
  \ (recommended)\npip install agent-framework --pre\n\n# Or Azure-specific package\
  \ only\npip install agent-framework-azure-ai --pre\n```\n\n## Environment Variables\n\
  \n```bash\nexport AZURE_AI_PROJECT_ENDPOINT=\"https://<project>.services.ai.azure.com/api/projects/<project-id>\"\
  \nexport AZURE_AI_MODEL_DEPLOYMENT_NAME=\"gpt-4o-mini\"\nexport BING_CONNECTION_ID=\"\
  your-bing-connection-id\"  # For web search\n```\n\n## Authentication\n\n```python\n\
  from azure.identity.aio import AzureCliCredential, DefaultAzureCredential\n\n# Development\n\
  credential = AzureCliCredential()\n\n# Production\ncredential = DefaultAzureCredential()\n\
  ```\n\n## Core Workflow\n\n### Basic Agent\n\n```python\nimport asyncio\nfrom agent_framework.azure\
  \ import AzureAIAgentsProvider\nfrom azure.identity.aio import AzureCliCredential\n\
  \nasync def main():\n    async with (\n        AzureCliCredential() as credential,\n\
  \        AzureAIAgentsProvider(credential=credential) as provider,\n    ):\n   \
  \     agent = await provider.create_agent(\n            name=\"MyAgent\",\n    \
  \        instructions=\"You are a helpful assistant.\",\n        )\n        \n \
  \       result = await agent.run(\"Hello!\")\n        print(result.text)\n\nasyncio.run(main())\n\
  ```\n\n### Agent with Function Tools\n\n```python\nfrom typing import Annotated\n\
  from pydantic import Field\nfrom agent_framework.azure import AzureAIAgentsProvider\n\
  from azure.identity.aio import AzureCliCredential\n\ndef get_weather(\n    location:\
  \ Annotated[str, Field(description=\"City name to get weather for\")],\n) -> str:\n\
  \    \"\"\"Get the current weather for a location.\"\"\"\n    return f\"Weather\
  \ in {location}: 72°F, sunny\"\n\ndef get_current_time() -> str:\n    \"\"\"Get\
  \ the current UTC time.\"\"\"\n    from datetime import datetime, timezone\n   \
  \ return datetime.now(timezone.utc).strftime(\"%Y-%m-%d %H:%M:%S UTC\")\n\nasync\
  \ def main():\n    async with (\n        AzureCliCredential() as credential,\n \
  \       AzureAIAgentsProvider(credential=credential) as provider,\n    ):\n    \
  \    agent = await provider.create_agent(\n            name=\"WeatherAgent\",\n\
  \            instructions=\"You help with weather and time queries.\",\n       \
  \     tools=[get_weather, get_current_time],  # Pass functions directly\n      \
  \  )\n        \n        result = await agent.run(\"What's the weather in Seattle?\"\
  )\n        print(result.text)\n```\n\n### Agent with Hosted Tools\n\n```pyt\n\n\
