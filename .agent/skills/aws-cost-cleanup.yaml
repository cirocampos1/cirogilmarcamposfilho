  \ community\ndate_added: \"2026-02-27\"\n---\n\n# AWS Cost Cleanup\n\nAutomate the\
  \ identification and removal of unused AWS resources to eliminate waste.\n\n## When\
  \ to Use This Skill\n\nUse this skill when you need to automatically clean up unused\
  \ AWS resources to reduce costs and eliminate waste.\n\n## Automated Cleanup Targets\n\
  \n**Storage**\n- Unattached EBS volumes\n- Old EBS snapshots (>90 days)\n- Incomplete\
  \ multipart S3 uploads\n- Old S3 versions in versioned buckets\n\n**Compute**\n\
  - Stopped EC2 instances (>30 days)\n- Unused AMIs and associated snapshots\n- Unused\
  \ Elastic IPs\n\n**Networking**\n- Unused Elastic Load Balancers\n- Unused NAT Gateways\n\
  - Orphaned ENIs\n\n## Cleanup Scripts\n\n### Safe Cleanup (Dry-Run First)\n\n```bash\n\
  #!/bin/bash\n# cleanup-unused-ebs.sh\n\necho \"Finding unattached EBS volumes...\"\
  \nVOLUMES=$(aws ec2 describe-volumes \\\n  --filters Name=status,Values=available\
  \ \\\n  --query 'Volumes[*].VolumeId' \\\n  --output text)\n\nfor vol in $VOLUMES;\
  \ do\n  echo \"Would delete: $vol\"\n  # Uncomment to actually delete:\n  # aws\
  \ ec2 delete-volume --volume-id $vol\ndone\n```\n\n```bash\n#!/bin/bash\n# cleanup-old-snapshots.sh\n\
  \nCUTOFF_DATE=$(date -d '90 days ago' --iso-8601)\n\naws ec2 describe-snapshots\
  \ --owner-ids self \\\n  --query \"Snapshots[?StartTime<='$CUTOFF_DATE'].[SnapshotId,StartTime,VolumeSize]\"\
  \ \\\n  --output text | while read snap_id start_time size; do\n  \n  echo \"Snapshot:\
  \ $snap_id (Created: $start_time, Size: ${size}GB)\"\n  # Uncomment to delete:\n\
  \  # aws ec2 delete-snapshot --snapshot-id $snap_id\ndone\n```\n\n```bash\n#!/bin/bash\n\
  # release-unused-eips.sh\n\naws ec2 describe-addresses \\\n  --query 'Addresses[?AssociationId==null].[AllocationId,PublicIp]'\
  \ \\\n  --output text | while read alloc_id public_ip; do\n  \n  echo \"Would release:\
  \ $public_ip ($alloc_id)\"\n  # Uncomment to release:\n  # aws ec2 release-address\
  \ --allocation-id $alloc_id\ndone\n```\n\n### S3 Lifecycle Automation\n\n```bash\n\
  # Apply lifecycle policy to transition old objects to cheaper storage\ncat > lifecycle-policy.json\
  \ <<EOF\n{\n  \"Rules\": [\n    {\n      \"Id\": \"Archive old objects\",\n    \
  \  \"Status\": \"Enabled\",\n      \"Transitions\": [\n        {\n          \"Days\"\
  : 90,\n          \"StorageClass\": \"STANDARD_IA\"\n        },\n        {\n    \
