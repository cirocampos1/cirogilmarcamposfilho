  \n## Use this skill when\n\n- Choosing embedding models for RAG\n- Optimizing chunking\
  \ strategies\n- Fine-tuning embeddings for domains\n- Comparing embedding model\
  \ performance\n- Reducing embedding dimensions\n- Handling multilingual content\n\
  \n## Core Concepts\n\n### 1. Embedding Model Comparison\n\n| Model | Dimensions\
  \ | Max Tokens | Best For |\n|-------|------------|------------|----------|\n| **text-embedding-3-large**\
  \ | 3072 | 8191 | High accuracy |\n| **text-embedding-3-small** | 1536 | 8191 |\
  \ Cost-effective |\n| **voyage-2** | 1024 | 4000 | Code, legal |\n| **bge-large-en-v1.5**\
  \ | 1024 | 512 | Open source |\n| **all-MiniLM-L6-v2** | 384 | 256 | Fast, lightweight\
  \ |\n| **multilingual-e5-large** | 1024 | 512 | Multi-language |\n\n### 2. Embedding\
  \ Pipeline\n\n```\nDocument → Chunking → Preprocessing → Embedding Model → Vector\n\
  \                ↓\n        [Overlap, Size]  [Clean, Normalize]  [API/Local]\n```\n\
  \n## Templates\n\n### Template 1: OpenAI Embeddings\n\n```python\nfrom openai import\
  \ OpenAI\nfrom typing import List\nimport numpy as np\n\nclient = OpenAI()\n\ndef\
  \ get_embeddings(\n    texts: List[str],\n    model: str = \"text-embedding-3-small\"\
  ,\n    dimensions: int = None\n) -> List[List[float]]:\n    \"\"\"Get embeddings\
  \ from OpenAI.\"\"\"\n    # Handle batching for large lists\n    batch_size = 100\n\
  \    all_embeddings = []\n\n    for i in range(0, len(texts), batch_size):\n   \
  \     batch = texts[i:i + batch_size]\n\n        kwargs = {\"input\": batch, \"\
  model\": model}\n        if dimensions:\n            kwargs[\"dimensions\"] = dimensions\n\
  \n        response = client.embeddings.create(**kwargs)\n        embeddings = [item.embedding\
  \ for item in response.data]\n        all_embeddings.extend(embeddings)\n\n    return\
  \ all_embeddings\n\n\ndef get_embedding(text: str, **kwargs) -> List[float]:\n \
  \   \"\"\"Get single embedding.\"\"\"\n    return get_embeddings([text], **kwargs)[0]\n\
  \n\n# Dimension reduction with OpenAI\ndef get_reduced_embedding(text: str, dimensions:\
  \ int = 512) -> List[float]:\n    \"\"\"Get embedding with reduced dimensions (Matryoshka).\"\
  \"\"\n    return get_embedding(\n        text,\n        model=\"text-embedding-3-small\"\
  ,\n        dimensions=dimensions\n    )\n```\n\n### Template 2: Local Embeddings\
