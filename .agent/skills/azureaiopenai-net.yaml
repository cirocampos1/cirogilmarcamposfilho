  ---\n\n# Azure.AI.OpenAI (.NET)\n\nClient library for Azure OpenAI Service providing\
  \ access to OpenAI models including GPT-4, GPT-4o, embeddings, DALL-E, and Whisper.\n\
  \n## Installation\n\n```bash\ndotnet add package Azure.AI.OpenAI\n\n# For OpenAI\
  \ (non-Azure) compatibility\ndotnet add package OpenAI\n```\n\n**Current Version**:\
  \ 2.1.0 (stable)\n\n## Environment Variables\n\n```bash\nAZURE_OPENAI_ENDPOINT=https://<resource-name>.openai.azure.com\n\
  AZURE_OPENAI_API_KEY=<api-key>                    # For key-based auth\nAZURE_OPENAI_DEPLOYMENT_NAME=gpt-4o-mini\
  \          # Your deployment name\n```\n\n## Client Hierarchy\n\n```\nAzureOpenAIClient\
  \ (top-level)\n├── GetChatClient(deploymentName)      → ChatClient\n├── GetEmbeddingClient(deploymentName)\
  \ → EmbeddingClient\n├── GetImageClient(deploymentName)     → ImageClient\n├── GetAudioClient(deploymentName)\
  \     → AudioClient\n└── GetAssistantClient()               → AssistantClient\n\
  ```\n\n## Authentication\n\n### API Key Authentication\n\n```csharp\nusing Azure;\n\
  using Azure.AI.OpenAI;\n\nAzureOpenAIClient client = new(\n    new Uri(Environment.GetEnvironmentVariable(\"\
  AZURE_OPENAI_ENDPOINT\")!),\n    new AzureKeyCredential(Environment.GetEnvironmentVariable(\"\
  AZURE_OPENAI_API_KEY\")!));\n```\n\n### Microsoft Entra ID (Recommended for Production)\n\
  \n```csharp\nusing Azure.Identity;\nusing Azure.AI.OpenAI;\n\nAzureOpenAIClient\
  \ client = new(\n    new Uri(Environment.GetEnvironmentVariable(\"AZURE_OPENAI_ENDPOINT\"\
  )!),\n    new DefaultAzureCredential());\n```\n\n### Using OpenAI SDK Directly with\
  \ Azure\n\n```csharp\nusing Azure.Identity;\nusing OpenAI;\nusing OpenAI.Chat;\n\
  using System.ClientModel.Primitives;\n\n#pragma warning disable OPENAI001\n\nBearerTokenPolicy\
  \ tokenPolicy = new(\n    new DefaultAzureCredential(),\n    \"https://cognitiveservices.azure.com/.default\"\
  );\n\nChatClient client = new(\n    model: \"gpt-4o-mini\",\n    authenticationPolicy:\
  \ tokenPolicy,\n    options: new OpenAIClientOptions()\n    {\n        Endpoint\
  \ = new Uri(\"https://YOUR-RESOURCE.openai.azure.com/openai/v1\")\n    });\n```\n\
  \n## Chat Completions\n\n### Basic Chat\n\n```csharp\nusing Azure.AI.OpenAI;\nusing\
  \ OpenAI.Chat;\n\nAzureOpenAIClient azureClient = new(\n    new Uri(endpoint),\n\
  \    new DefaultAzureCredential());\n\nChatClient chatClient = azureClient.GetChatClient(\"\
  gpt-4o-mini\");\n\nChatCompletion completion = chatClient.CompleteChat(\n[\n   \
  \ new SystemChatMessage(\"You are a helpful assistant.\"),\n    new UserChatMessage(\"\
  What is Azure OpenAI?\")\n]);\n\nConsole.WriteLine(completion.Content[0].Text);\n\
  ```\n\n### Async Chat\n\n```csharp\nChatCompletion completion = await chatClient.CompleteChatAsync(\n\
  [\n    new SystemChatMessage(\"You are a helpful assistant.\"),\n    new UserChatMessage(\"\
  Explain cloud computing in simple terms.\")\n]);\n\nConsole.WriteLine($\"Response:\
  \ {co\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente\
  \ o gerenciador uv para dependências. Todo código deve ser lintado via ruff e tipado\
  \ com mypy.\n"
