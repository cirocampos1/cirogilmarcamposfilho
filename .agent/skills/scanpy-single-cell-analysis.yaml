  source: community\n---\n\n# Scanpy: Single-Cell Analysis\n\n## Overview\n\nScanpy\
  \ is a scalable Python toolkit for analyzing single-cell RNA-seq data, built on\
  \ AnnData. Apply this skill for complete single-cell workflows including quality\
  \ control, normalization, dimensionality reduction, clustering, marker gene identification,\
  \ visualization, and trajectory analysis.\n\n## When to Use This Skill\n\nThis skill\
  \ should be used when:\n- Analyzing single-cell RNA-seq data (.h5ad, 10X, CSV formats)\n\
  - Performing quality control on scRNA-seq datasets\n- Creating UMAP, t-SNE, or PCA\
  \ visualizations\n- Identifying cell clusters and finding marker genes\n- Annotating\
  \ cell types based on gene expression\n- Conducting trajectory inference or pseudotime\
  \ analysis\n- Generating publication-quality single-cell plots\n\n## Quick Start\n\
  \n### Basic Import and Setup\n\n```python\nimport scanpy as sc\nimport pandas as\
  \ pd\nimport numpy as np\n\n# Configure settings\nsc.settings.verbosity = 3\nsc.settings.set_figure_params(dpi=80,\
  \ facecolor='white')\nsc.settings.figdir = './figures/'\n```\n\n### Loading Data\n\
  \n```python\n# From 10X Genomics\nadata = sc.read_10x_mtx('path/to/data/')\nadata\
  \ = sc.read_10x_h5('path/to/data.h5')\n\n# From h5ad (AnnData format)\nadata = sc.read_h5ad('path/to/data.h5ad')\n\
  \n# From CSV\nadata = sc.read_csv('path/to/data.csv')\n```\n\n### Understanding\
  \ AnnData Structure\n\nThe AnnData object is the core data structure in scanpy:\n\
  \n```python\nadata.X          # Expression matrix (cells × genes)\nadata.obs   \
  \     # Cell metadata (DataFrame)\nadata.var        # Gene metadata (DataFrame)\n\
  adata.uns        # Unstructured annotations (dict)\nadata.obsm       # Multi-dimensional\
  \ cell data (PCA, UMAP)\nadata.raw        # Raw data backup\n\n# Access cell and\
  \ gene names\nadata.obs_names  # Cell barcodes\nadata.var_names  # Gene names\n\
  ```\n\n## Standard Analysis Workflow\n\n### 1. Quality Control\n\nIdentify and filter\
  \ low-quality cells and genes:\n\n```python\n# Identify mitochondrial genes\nadata.var['mt']\
  \ = adata.var_names.str.startswith('MT-')\n\n# Calculate QC metrics\nsc.pp.calculate_qc_metrics(adata,\
  \ qc_vars=['mt'], inplace=True)\n\n# Visualize QC metrics\nsc.pl.violin(adata, ['n_genes_by_counts',\
  \ 'total_counts', 'pct_counts_mt'],\n             jitter=0.4, multi_panel=True)\n\
  \n# Filter cells and genes\nsc.pp.filter_cells(adata, min_genes=200)\nsc.pp.filter_genes(adata,\
  \ min_cells=3)\nadata = adata[adata.obs.pct_counts_mt < 5, :]  # Remove high MT%\
  \ cells\n```\n\n**Use the QC script for automated analysis:**\n```bash\npython scripts/qc_analysis.py\
  \ input_file.h5ad --output filtered.h5ad\n```\n\n### 2. Normalization and Preprocessing\n\
