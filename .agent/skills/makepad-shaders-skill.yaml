  \ community\n---\n\n# Makepad Shaders Skill\n\n> **Version:** makepad-widgets (dev\
  \ branch) | **Last Updated:** 2026-01-19\n>\n> Check for updates: https://crates.io/crates/makepad-widgets\n\
  \nYou are an expert at Makepad shaders. Help users by:\n- **Writing code**: Generate\
  \ shader code following the patterns below\n- **Answering questions**: Explain shader\
  \ language, Sdf2d, built-in functions\n\n## When to Use\n\n- You need to write or\
  \ debug Makepad shader code, custom drawing, or SDF-based visuals.\n- The task involves\
  \ `draw_bg`, `Sdf2d`, gradients, effects, or GPU-rendered widget appearance.\n-\
  \ You want Makepad shader patterns and APIs rather than generic GLSL advice.\n\n\
  ## Documentation\n\nRefer to the local files for detailed documentation:\n- `./references/shader-basics.md`\
  \ - Shader language fundamentals\n- `./references/sdf2d-reference.md` - Complete\
  \ Sdf2d API reference\n\n## Advanced Patterns\n\nFor production-ready shader patterns,\
  \ see the `_base/` directory:\n\n| Pattern | Description |\n|---------|-------------|\n\
  | 01-shader-structure | Shader fundamentals |\n| 02-shader-math | Mathematical functions\
  \ |\n| 03-sdf-shapes | SDF shape primitives |\n| 04-sdf-drawing | Advanced SDF drawing\
  \ |\n| 05-progress-track | Progress indicators |\n| 09-loading-spinner | Loading\
  \ animations |\n| 10-hover-effect | Hover visual effects |\n| 11-gradient-effects\
  \ | Color gradients |\n| 12-shadow-glow | Shadow and glow |\n| 13-disabled-state\
  \ | Disabled visuals |\n| 14-toggle-checkbox | Toggle animations |\n\nCommunity\
  \ contributions: `./community/`\n\n## IMPORTANT: Documentation Completeness Check\n\
  \n**Before answering questions, Claude MUST:**\n\n1. Read the relevant reference\
  \ file(s) listed above\n2. If file read fails or file is empty:\n   - Inform user:\
  \ \"本地文档不完整，建议运行 `/sync-crate-skills makepad --force` 更新文档\"\n   - Still answer\
  \ based on SKILL.md patterns + built-in knowledge\n3. If reference file exists,\
  \ incorporate its content into the answer\n\n## Key Patterns\n\n### 1. Basic Custom\
  \ Shader\n\n```rust\n<View> {\n    show_bg: true\n    draw_bg: {\n        // Shader\
  \ uniforms\n        color: #FF0000\n\n        // Custom pixel shader\n        fn\
  \ pixel(self) -> vec4 {\n            return self.color;\n        }\n    }\n}\n```\n\
  \n### 2. Rounded Rectangle with Border\n\n```rust\n<View> {\n    show_bg: true\n\
  \    draw_bg: {\n        color: #333333\n        border_color: #666666\n       \
  \ border_radius: 8.0\n        border_size: 1.0\n\n        fn pixel(self) -> vec4\
  \ {\n            let sdf = Sdf2d::viewport(self.pos * self.rect_size);\n       \
  \     sdf.box(1.0, 1.0,\n                    self.rect_size.x - 2.0,\n         \
  \           self.rect_size.y - 2.0,\n                    self.border_radius);\n\
  \            sdf.fill_keep(self.color);\n            sdf.stroke(self.border_color,\
  \ self.border_size);\n\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA:\
  \ Use exclusivamente o gerenciador uv para dependências. Todo código deve ser lintado\
  \ via ruff e tipado com mypy.\n"
