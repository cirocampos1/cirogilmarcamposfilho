  ---\n\n# Linux Production Shell Scripts\n\n## Purpose\n\nProvide production-ready\
  \ shell script templates for common Linux system administration tasks including\
  \ backups, monitoring, user management, log analysis, and automation. These scripts\
  \ serve as building blocks for security operations and penetration testing environments.\n\
  \n## Prerequisites\n\n### Required Environment\n- Linux/Unix system (bash shell)\n\
  - Appropriate permissions for tasks\n- Required utilities installed (rsync, openssl,\
  \ etc.)\n\n### Required Knowledge\n- Basic bash scripting\n- Linux file system structure\n\
  - System administration concepts\n\n## Outputs and Deliverables\n\n1. **Backup Solutions**\
  \ - Automated file and database backups\n2. **Monitoring Scripts** - Resource usage\
  \ tracking\n3. **Automation Tools** - Scheduled task execution\n4. **Security Scripts**\
  \ - Password management, encryption\n\n## Core Workflow\n\n### Phase 1: File Backup\
  \ Scripts\n\n**Basic Directory Backup**\n```bash\n#!/bin/bash\nbackup_dir=\"/path/to/backup\"\
  \nsource_dir=\"/path/to/source\"\n\n# Create a timestamped backup of the source\
  \ directory\ntar -czf \"$backup_dir/backup_$(date +%Y%m%d_%H%M%S).tar.gz\" \"$source_dir\"\
  \necho \"Backup completed: backup_$(date +%Y%m%d_%H%M%S).tar.gz\"\n```\n\n**Remote\
  \ Server Backup**\n```bash\n#!/bin/bash\nsource_dir=\"/path/to/source\"\nremote_server=\"\
  user@remoteserver:/path/to/backup\"\n\n# Backup files/directories to a remote server\
  \ using rsync\nrsync -avz --progress \"$source_dir\" \"$remote_server\"\necho \"\
  Files backed up to remote server.\"\n```\n\n**Backup Rotation Script**\n```bash\n\
  #!/bin/bash\nbackup_dir=\"/path/to/backups\"\nmax_backups=5\n\n# Rotate backups\
  \ by deleting the oldest if more than max_backups\nwhile [ $(ls -1 \"$backup_dir\"\
  \ | wc -l) -gt \"$max_backups\" ]; do\n    oldest_backup=$(ls -1t \"$backup_dir\"\
  \ | tail -n 1)\n    rm -r \"$backup_dir/$oldest_backup\"\n    echo \"Removed old\
  \ backup: $oldest_backup\"\ndone\necho \"Backup rotation completed.\"\n```\n\n**Database\
  \ Backup Script**\n```bash\n#!/bin/bash\ndatabase_name=\"your_database\"\ndb_user=\"\
  username\"\ndb_pass=\"password\"\noutput_file=\"database_backup_$(date +%Y%m%d).sql\"\
  \n\n# Perform database backup using mysqldump\nmysqldump -u \"$db_user\" -p\"$db_pass\"\
  \ \"$database_name\" > \"$output_file\"\ngzip \"$output_file\"\necho \"Database\
  \ backup created: $output_file.gz\"\n```\n\n### Phase 2: System Monitoring Scripts\n\
  \n**CPU Usage Monitor**\n```bash\n#!/bin/bash\nthreshold=90\n\n# Monitor CPU usage\
  \ and trigger alert if threshold exceeded\ncpu_usage=$(top -bn1 | grep \"Cpu(s)\"\
  \ | awk '{print $2}' | cut -d. -f1)\n\nif [ \"$cpu_usage\" -gt \"$threshold\" ];\
  \ then\n    echo \"ALERT: High CPU usage detected: $cpu_usage%\"\n    # Add notification\
