  ---\n\n# Azure.ResourceManager.Redis (.NET)\n\nManagement plane SDK for provisioning\
  \ and managing Azure Cache for Redis resources via Azure Resource Manager.\n\n>\
  \ **⚠️ Management vs Data Plane**\n> - **This SDK (Azure.ResourceManager.Redis)**:\
  \ Create caches, configure firewall rules, manage access keys, set up geo-replication\n\
  > - **Data Plane SDK (StackExchange.Redis)**: Get/set keys, pub/sub, streams, Lua\
  \ scripts\n\n## Installation\n\n```bash\ndotnet add package Azure.ResourceManager.Redis\n\
  dotnet add package Azure.Identity\n```\n\n**Current Version**: 1.5.1 (Stable)  \n\
  **API Version**: 2024-11-01  \n**Target Frameworks**: .NET 8.0, .NET Standard 2.0\n\
  \n## Environment Variables\n\n```bash\nAZURE_SUBSCRIPTION_ID=<your-subscription-id>\n\
  # For service principal auth (optional)\nAZURE_TENANT_ID=<tenant-id>\nAZURE_CLIENT_ID=<client-id>\n\
  AZURE_CLIENT_SECRET=<client-secret>\n```\n\n## Authentication\n\n```csharp\nusing\
  \ Azure.Identity;\nusing Azure.ResourceManager;\nusing Azure.ResourceManager.Redis;\n\
  \n// Always use DefaultAzureCredential\nvar credential = new DefaultAzureCredential();\n\
  var armClient = new ArmClient(credential);\n\n// Get subscription\nvar subscriptionId\
  \ = Environment.GetEnvironmentVariable(\"AZURE_SUBSCRIPTION_ID\");\nvar subscription\
  \ = armClient.GetSubscriptionResource(\n    new ResourceIdentifier($\"/subscriptions/{subscriptionId}\"\
  ));\n```\n\n## Resource Hierarchy\n\n```\nArmClient\n└── SubscriptionResource\n\
  \    └── ResourceGroupResource\n        └── RedisResource\n            ├── RedisFirewallRuleResource\n\
  \            ├── RedisPatchScheduleResource\n            ├── RedisLinkedServerWithPropertyResource\n\
  \            ├── RedisPrivateEndpointConnectionResource\n            └── RedisCacheAccessPolicyResource\n\
  ```\n\n## Core Workflows\n\n### 1. Create Redis Cache\n\n```csharp\nusing Azure.ResourceManager.Redis;\n\
  using Azure.ResourceManager.Redis.Models;\n\n// Get resource group\nvar resourceGroup\
  \ = await subscription\n    .GetResourceGroupAsync(\"my-resource-group\");\n\n//\
  \ Define cache configuration\nvar cacheData = new RedisCreateOrUpdateContent(\n\
  \    location: AzureLocation.EastUS,\n    sku: new RedisSku(RedisSkuName.Standard,\
  \ RedisSkuFamily.BasicOrStandard, 1))\n{\n    EnableNonSslPort = false,\n    MinimumTlsVersion\
  \ = RedisTlsVersion.Tls1_2,\n    RedisConfiguration = new RedisCommonConfiguration\n\
  \    {\n        MaxMemoryPolicy = \"volatile-lru\"\n    },\n    Tags =\n    {\n\
  \        [\"environment\"] = \"production\"\n    }\n};\n\n// Create cache (long-running\
  \ operation)\nvar cacheCollection = resourceGroup.Value.GetAllRedis();\nvar operation\
  \ = await cacheCollection.CreateOrUpdateAsync(\n    WaitUntil.Completed,\n    \"\
  my-redis-cache\",\n    cacheData);\n\nRedisResource cache = operation.Value;\nConsole.WriteLine($\"\
  Cache created: {cache.Data.HostName}\");\n```\n\n### 2. Get Redis Cache\n\n```csharp\n\
