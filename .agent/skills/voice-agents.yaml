  \ 2026-02-27\n---\n\n# Voice Agents\n\nVoice agents represent the frontier of AI\
  \ interaction - humans speaking\nnaturally with AI systems. The challenge isn't\
  \ just speech recognition\nand synthesis, it's achieving natural conversation flow\
  \ with sub-800ms\nlatency while handling interruptions, background noise, and emotional\n\
  nuance.\n\nThis skill covers two architectures: speech-to-speech (OpenAI Realtime\
  \ API,\nlowest latency, most natural) and pipeline (STT→LLM→TTS, more control,\n\
  easier to debug). Key insight: latency is the constraint. Humans expect\nresponses\
  \ in 500ms. Every millisecond matters.\n\n84% of organizations are increasing voice\
  \ AI budgets in 2025. This is the\nyear voice agents go mainstream.\n\n## Principles\n\
  \n- Latency is the constraint - target <800ms end-to-end\n- Jitter (variance) matters\
  \ as much as absolute latency\n- VAD quality determines conversation flow\n- Interruption\
  \ handling makes or breaks the experience\n- Start with focused MVP, iterate based\
  \ on real conversations\n- Combine best-in-class components (Deepgram STT + ElevenLabs\
  \ TTS)\n\n## Capabilities\n\n- voice-agents\n- speech-to-speech\n- speech-to-text\n\
  - text-to-speech\n- conversational-ai\n- voice-activity-detection\n- turn-taking\n\
  - barge-in-detection\n- voice-interfaces\n\n## Scope\n\n- phone-system-integration\
  \ → backend\n- audio-processing-dsp → audio-specialist\n- music-generation → audio-specialist\n\
  - accessibility-compliance → accessibility-specialist\n\n## Tooling\n\n### Speech_to_speech\n\
  \n- OpenAI Realtime API - When: Lowest latency, most natural conversation Note:\
  \ gpt-4o-realtime-preview, native voice, sub-500ms\n- Pipecat - When: Open-source\
  \ voice orchestration Note: Daily-backed, enterprise-grade, modular\n\n### Speech_to_text\n\
  \n- OpenAI Whisper - When: Highest accuracy, multilingual Note: gpt-4o-transcribe\
  \ for best results\n- Deepgram Nova-3 - When: Production workloads, 54% lower WER\
  \ Note: 150-184ms TTFT, 90%+ accuracy on noisy audio\n- AssemblyAI - When: Real-time\
  \ streaming, speaker diarization Note: Good accuracy-latency balance\n\n### Text_to_speech\n\
  \n- ElevenLabs - When: Most natural voice, emotional control Note: Flash model 75ms\
  \ latency, V3 for expression\n- OpenAI TTS - When: Integrated with OpenAI stack\
  \ Note: gpt-4o-mini-tts, 13 voices, streaming\n- Deepgram Aura-2 - When: Cost-effective\
  \ production TTS Note: 40% cheaper than ElevenLabs, 184ms TTFB\n\n### Frameworks\n\
  \n- Pipecat - When: Open-source voice agent orchestration Note: Silero VAD, SmartTurn,\
  \ interruption handling\n- Vapi - When: Managed voice agent platform Note: No infrastructure\
  \ management\n- Retell AI - When: Low-latency voice agents Note: Best context preservation\
  \ on interruption\n\n## Patterns\n\n### Speech-to-Speech Architecture\n\nDirect\
  \ audio-to-audio processing for lowest latency\n\n**When to use**: Maximum naturalness,\
  \ emotional preservation, \n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE\
  \ ENGENHARIA: Use exclusivamente o gerenciador uv para dependências. Todo código\
  \ deve ser lintado via ruff e tipado com mypy.\n"
