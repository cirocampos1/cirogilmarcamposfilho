  \n# Telegram Bot API - Integracao Profissional\n\n## Overview\n\nIntegracao completa\
  \ com Telegram Bot API. Setup com BotFather, mensagens, webhooks, inline keyboards,\
  \ grupos, canais. Boilerplates Node.js e Python.\n\n## When to Use This Skill\n\n\
  - When the user mentions \"telegram\" or related topics\n- When the user mentions\
  \ \"bot telegram\" or related topics\n- When the user mentions \"telegram bot\"\
  \ or related topics\n- When the user mentions \"api telegram\" or related topics\n\
  - When the user mentions \"chatbot telegram\" or related topics\n- When the user\
  \ mentions \"mensagem telegram\" or related topics\n\n## Do Not Use This Skill When\n\
  \n- The task is unrelated to telegram\n- A simpler, more specific tool can handle\
  \ the request\n- The user needs general-purpose assistance without domain expertise\n\
  \n## How It Works\n\nSkill para implementar bots profissionais no Telegram usando\
  \ a Bot API oficial. Suporta Node.js/TypeScript e Python.\n\n## Overview\n\nA Telegram\
  \ Bot API permite criar bots que interagem com usuarios via mensagens, comandos,\
  \ inline keyboards, pagamentos e muito mais. Bots sao criados pelo @BotFather e\
  \ autenticados via token unico.\n\n**Base URL:** `https://api.telegram.org/bot<TOKEN>/METHOD_NAME`\n\
  **Metodos HTTP:** GET e POST\n**Formatos de parametros:** query string, application/x-www-form-urlencoded,\
  \ application/json, multipart/form-data (uploads)\n**Limite de arquivos:** 50MB\
  \ download, 20MB upload (via multipart), 50MB via URL\n\n**Portas suportadas para\
  \ webhooks:** 443, 80, 88, 8443\n\n**Pre-requisitos:**\n- Conta no Telegram\n- Bot\
  \ criado via @BotFather (fornece o token)\n- Token no formato: `123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11`\n\
  \nSe o usuario nao tem um bot criado, oriente a conversar com @BotFather no Telegram\
  \ e enviar `/newbot`.\n\n---\n\n## Decision Tree\n\n```\nO usuario precisa criar\
  \ um bot?\n├── SIM → Secao \"Setup com BotFather\" abaixo\n└── NAO → Qual linguagem?\n\
  \    ├── Node.js/TypeScript\n    └── Python\n    → O que quer fazer?\n       ├──\
  \ Enviar mensagens → Secao \"Tipos de Mensagem\"\n       ├── Receber mensagens →\
  \ Secao \"Receber Updates\"\n       ├── Teclados interativos → Secao \"Keyboards\"\
  \n       ├── Gerenciar grupos/canais → references/chat-management.md\n       ├──\
  \ Webhook setup → references/webhook-setup.md\n       ├── Inline mode → references/advanced-features.md\n\
  \       ├── Pagamentos → references/advanced-features.md\n       ├── Bot de atendimento\
  \ com IA → Secao \"Automacao com IA\"\n       └── Referencia completa da API → references/api-reference.md\n\
  ```\n\nPara iniciar um projeto do zero com boilerplate pronto:\n```bash\npython\
  \ scripts/setup_project.py --language nodejs --path ./meu-bot-telegram\n\n## Ou\n\
  \npython \n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use\
  \ exclusivamente o gerenciador uv para dependências. Todo código deve ser lintado\
  \ via ruff e tipado com mypy.\n"
