  \    skill-author: K-Dense Inc.\nrisk: unknown\nsource: community\n---\n\n# Seaborn\
  \ Statistical Visualization\n\n## When to Use\n\n- You need publication-quality\
  \ statistical graphics directly from tabular datasets.\n- You are exploring multivariate\
  \ relationships, distributions, or grouped comparisons with minimal plotting code.\n\
  - You want seaborn's dataset-oriented API and statistical defaults on top of matplotlib.\n\
  \n## Overview\n\nSeaborn is a Python visualization library for creating publication-quality\
  \ statistical graphics. Use this skill for dataset-oriented plotting, multivariate\
  \ analysis, automatic statistical estimation, and complex multi-panel figures with\
  \ minimal code.\n\n## Design Philosophy\n\nSeaborn follows these core principles:\n\
  \n1. **Dataset-oriented**: Work directly with DataFrames and named variables rather\
  \ than abstract coordinates\n2. **Semantic mapping**: Automatically translate data\
  \ values into visual properties (colors, sizes, styles)\n3. **Statistical awareness**:\
  \ Built-in aggregation, error estimation, and confidence intervals\n4. **Aesthetic\
  \ defaults**: Publication-ready themes and color palettes out of the box\n5. **Matplotlib\
  \ integration**: Full compatibility with matplotlib customization when needed\n\n\
  ## Quick Start\n\n```python\nimport seaborn as sns\nimport matplotlib.pyplot as\
  \ plt\nimport pandas as pd\n\n# Load example dataset\ndf = sns.load_dataset('tips')\n\
  \n# Create a simple visualization\nsns.scatterplot(data=df, x='total_bill', y='tip',\
  \ hue='day')\nplt.show()\n```\n\n## Core Plotting Interfaces\n\n### Function Interface\
  \ (Traditional)\n\nThe function interface provides specialized plotting functions\
  \ organized by visualization type. Each category has **axes-level** functions (plot\
  \ to single axes) and **figure-level** functions (manage entire figure with faceting).\n\
  \n**When to use:**\n- Quick exploratory analysis\n- Single-purpose visualizations\n\
  - When you need a specific plot type\n\n### Objects Interface (Modern)\n\nThe `seaborn.objects`\
  \ interface provides a declarative, composable API similar to ggplot2. Build visualizations\
  \ by chaining methods to specify data mappings, marks, transformations, and scales.\n\
  \n**When to use:**\n- Complex layered visualizations\n- When you need fine-grained\
  \ control over transformations\n- Building custom plot types\n- Programmatic plot\
  \ generation\n\n```python\nfrom seaborn import objects as so\n\n# Declarative syntax\n\
  (\n    so.Plot(data=df, x='total_bill', y='tip')\n    .add(so.Dot(), color='day')\n\
  \    .add(so.Line(), so.PolyFit())\n)\n```\n\n## Plotting Functions by Category\n\
  \n### Relational Plots (Relationships Between Variables)\n\n**Use for:** Exploring\
  \ how two or more variables relate to each other\n\n- `scatterplot()` - Display\n\
