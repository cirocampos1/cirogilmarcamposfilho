  # Context Degradation Patterns


  Language models exhibit predictable degradation patterns as context length increases.
  Understanding these patterns is essential for diagnosing failures and designing
  resilient systems. Context degradation is not a binary state but a continuum of
  performance degradation that manifests in several distinct ways.


  ## When to Use

  Activate this skill when:

  - Agent performance degrades unexpectedly during long conversations

  - Debugging cases where agents produce incorrect or irrelevant outputs

  - Designing systems that must handle large contexts reliably

  - Evaluating context engineering choices for production systems

  - Investigating "lost in middle" phenomena in agent outputs

  - Analyzing context-related failures in agent behavior


  ## Core Concepts


  Context degradation manifests through several distinct patterns. The lost-in-middle
  phenomenon causes information in the center of context to receive less attention.
  Context poisoning occurs when errors compound through repeated reference. Context
  distraction happens when irrelevant information overwhelms relevant content. Context
  confusion arises when the model cannot determine which context applies. Context
  clash develops when accumulated information directly conflicts.


  These patterns are predictable and can be mitigated through architectural patterns
  like compaction, masking, partitioning, and isolation.


  ## Detailed Topics


  ### The Lost-in-Middle Phenomenon


  The most well-documented degradation pattern is the "lost-in-middle" effect, where
  models demonstrate U-shaped attention curves. Information at the beginning and end
  of context receives reliable attention, while information buried in the middle suffers
  from dramatically reduced recall accuracy.


  **Empirical Evidence**

  Research demonstrates that relevant information placed in the middle of context
  experiences 10-40% lower recall accuracy compared to the same information at the
  beginning or end. This is not a failure of the model but a consequence of attention
  mechanics and training data distributions.


  Models allocate massive attention to the first token (often the BOS token) to stabilize
  internal states. This creates an "attention sink" that soaks up attention budget.
  As context grows, the limited budget is stretched thinner, and middle tokens fail
  to garner sufficient attention weight for reliable retrieval.


  **Practical Implications**

  Design context placement with attention patterns in mind. Place critical information
  at the beginning or end of context. Consider whether information will be queried
  directly or needs to support reasoning—if the latter, placement matters less but
  overall signal quality matters more.


