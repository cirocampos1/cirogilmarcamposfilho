  2026-02-27\"\n---\n\n# Azure Event Hubs SDK for TypeScript\n\nHigh-throughput event\
  \ streaming and real-time data ingestion.\n\n## Installation\n\n```bash\nnpm install\
  \ @azure/event-hubs @azure/identity\n```\n\nFor checkpointing with consumer groups:\n\
  ```bash\nnpm install @azure/eventhubs-checkpointstore-blob @azure/storage-blob\n\
  ```\n\n## Environment Variables\n\n```bash\nEVENTHUB_NAMESPACE=<namespace>.servicebus.windows.net\n\
  EVENTHUB_NAME=my-eventhub\nSTORAGE_ACCOUNT_NAME=<storage-account>\nSTORAGE_CONTAINER_NAME=checkpoints\n\
  ```\n\n## Authentication\n\n```typescript\nimport { EventHubProducerClient, EventHubConsumerClient\
  \ } from \"@azure/event-hubs\";\nimport { DefaultAzureCredential } from \"@azure/identity\"\
  ;\n\nconst fullyQualifiedNamespace = process.env.EVENTHUB_NAMESPACE!;\nconst eventHubName\
  \ = process.env.EVENTHUB_NAME!;\nconst credential = new DefaultAzureCredential();\n\
  \n// Producer\nconst producer = new EventHubProducerClient(fullyQualifiedNamespace,\
  \ eventHubName, credential);\n\n// Consumer\nconst consumer = new EventHubConsumerClient(\n\
  \  \"$Default\", // Consumer group\n  fullyQualifiedNamespace,\n  eventHubName,\n\
  \  credential\n);\n```\n\n## Core Workflow\n\n### Send Events\n\n```typescript\n\
  const producer = new EventHubProducerClient(namespace, eventHubName, credential);\n\
  \n// Create batch and add events\nconst batch = await producer.createBatch();\n\
  batch.tryAdd({ body: { temperature: 72.5, deviceId: \"sensor-1\" } });\nbatch.tryAdd({\
  \ body: { temperature: 68.2, deviceId: \"sensor-2\" } });\n\nawait producer.sendBatch(batch);\n\
  await producer.close();\n```\n\n### Send to Specific Partition\n\n```typescript\n\
  // By partition ID\nconst batch = await producer.createBatch({ partitionId: \"0\"\
  \ });\n\n// By partition key (consistent hashing)\nconst batch = await producer.createBatch({\
  \ partitionKey: \"device-123\" });\n```\n\n### Receive Events (Simple)\n\n```typescript\n\
  const consumer = new EventHubConsumerClient(\"$Default\", namespace, eventHubName,\
  \ credential);\n\nconst subscription = consumer.subscribe({\n  processEvents: async\
  \ (events, context) => {\n    for (const event of events) {\n      console.log(`Partition:\
  \ ${context.partitionId}, Body: ${JSON.stringify(event.body)}`);\n    }\n  },\n\
  \  processError: async (err, context) => {\n    console.error(`Error on partition\
  \ ${context.partitionId}: ${err.message}`);\n  },\n});\n\n// Stop after some time\n\
  setTimeout(async () => {\n  await subscription.close();\n  await consumer.close();\n\
  }, 60000);\n```\n\n### Receive with Checkpointing (Production)\n\n```typescript\n\
