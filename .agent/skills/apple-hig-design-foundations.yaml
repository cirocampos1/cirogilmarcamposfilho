  # Apple HIG: Design Foundations


  Check for `.claude/apple-design-context.md` before asking questions. Use existing
  context and only ask for information not already covered.


  ## Key Principles


  1. **Prioritize content over chrome.** Reduce visual clutter. Use system-provided
  materials and subtle separators rather than heavy borders and backgrounds.


  2. **Build in accessibility from the start.** Design for VoiceOver, Dynamic Type,
  Reduce Motion, Increase Contrast, and Switch Control from day one. Every interactive
  element needs an accessible label.


  3. **Use system colors and materials.** System colors adapt to light/dark mode,
  increased contrast, and vibrancy. Prefer semantic colors (`label`, `secondaryLabel`,
  `systemBackground`) over hard-coded values.


  4. **Use platform fonts and icons.** SF Pro, SF Compact, SF Mono by default. New
  York for serif. Follow the type hierarchy at recommended sizes. Use SF Symbols for
  iconography.


  5. **Match platform conventions.** Align look and behavior with system standards.
  Provide direct, responsive manipulation and clear feedback for every action.


  6. **Respect privacy.** Request permissions only when needed, explain why clearly,
  provide value before asking for data. Design for minimal data collection.


  7. **Support internationalization.** Accommodate text expansion, right-to-left scripts,
  and varying date/number formats. Use Auto Layout for dynamic content sizing.


  8. **Use motion purposefully.** Animation should communicate meaning and spatial
  relationships. Honor Reduce Motion by providing crossfade alternatives.


