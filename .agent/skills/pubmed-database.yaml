  license: Unknown\nmetadata:\n    skill-author: K-Dense Inc.\nrisk: unknown\nsource:\
  \ community\n---\n\n# PubMed Database\n\n## Overview\n\nPubMed is the U.S. National\
  \ Library of Medicine's comprehensive database providing free access to MEDLINE\
  \ and life sciences literature. Construct advanced queries with Boolean operators,\
  \ MeSH terms, and field tags, access data programmatically via E-utilities API for\
  \ systematic reviews and literature analysis.\n\n## When to Use This Skill\n\nThis\
  \ skill should be used when:\n- Searching for biomedical or life sciences research\
  \ articles\n- Constructing complex search queries with Boolean operators, field\
  \ tags, or MeSH terms\n- Conducting systematic literature reviews or meta-analyses\n\
  - Accessing PubMed data programmatically via the E-utilities API\n- Finding articles\
  \ by specific criteria (author, journal, publication date, article type)\n- Retrieving\
  \ citation information, abstracts, or full-text articles\n- Working with PMIDs (PubMed\
  \ IDs) or DOIs\n- Creating automated workflows for literature monitoring or data\
  \ extraction\n\n## Core Capabilities\n\n### 1. Advanced Search Query Construction\n\
  \nConstruct sophisticated PubMed queries using Boolean operators, field tags, and\
  \ specialized syntax.\n\n**Basic Search Strategies**:\n- Combine concepts with Boolean\
  \ operators (AND, OR, NOT)\n- Use field tags to limit searches to specific record\
  \ parts\n- Employ phrase searching with double quotes for exact matches\n- Apply\
  \ wildcards for term variations\n- Use proximity searching for terms within specified\
  \ distances\n\n**Example Queries**:\n```\n# Recent systematic reviews on diabetes\
  \ treatment\ndiabetes mellitus[mh] AND treatment[tiab] AND systematic review[pt]\
  \ AND 2023:2024[dp]\n\n# Clinical trials comparing two drugs\n(metformin[nm] OR\
  \ insulin[nm]) AND diabetes mellitus, type 2[mh] AND randomized controlled trial[pt]\n\
  \n# Author-specific research\nsmith ja[au] AND cancer[tiab] AND 2023[dp] AND english[la]\n\
  ```\n\n**When to consult search_syntax.md**:\n- Need comprehensive list of available\
  \ field tags\n- Require detailed explanation of search operators\n- Constructing\
  \ complex proximity searches\n- Understanding automatic term mapping behavior\n\
  - Need specific syntax for date ranges, wildcards, or special characters\n\nGrep\
  \ pattern for field tags: `\\[au\\]|\\[ti\\]|\\[ab\\]|\\[mh\\]|\\[pt\\]|\\[dp\\\
  ]`\n\n### 2. MeSH Terms and Controlled Vocabulary\n\nUse Medical Subject Headings\
  \ (MeSH) for precise, consistent searching across the biomedical literature.\n\n\
  **MeSH Searching**:\n- [mh] tag searches MeSH terms with automatic inclusion of\
  \ narrower terms\n- [majr] tag limits to articles where the topic is the main focus\n\
  - Combine MeSH terms with subheadings for specificity (e.g., diabetes mellitus/therapy[mh])\n\
