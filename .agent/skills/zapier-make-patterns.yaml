  \ (Apache 2.0)\ndate_added: 2026-02-27\n---\n\n# Zapier & Make Patterns\n\nNo-code\
  \ automation democratizes workflow building. Zapier and Make (formerly\nIntegromat)\
  \ let non-developers automate business processes without writing\ncode. But no-code\
  \ doesn't mean no-complexity - these platforms have their\nown patterns, pitfalls,\
  \ and breaking points.\n\nThis skill covers when to use which platform, how to build\
  \ reliable\nautomations, and when to graduate to code-based solutions. Key insight:\n\
  Zapier optimizes for simplicity and integrations (7000+ apps), Make\noptimizes for\
  \ power and cost-efficiency (visual branching, operations-based\npricing).\n\nCritical\
  \ distinction: No-code works until it doesn't. Know the limits.\n\n## Principles\n\
  \n- Start simple, add complexity only when needed\n- Test with real data before\
  \ going live\n- Document every automation with clear naming\n- Monitor errors -\
  \ 95% error rate auto-disables Zaps\n- Know when to graduate to code-based solutions\n\
  - Operations/tasks cost money - design efficiently\n\n## Capabilities\n\n- zapier\n\
  - make\n- integromat\n- no-code-automation\n- zaps\n- scenarios\n- workflow-builders\n\
  - business-process-automation\n\n## Scope\n\n- code-based-workflows → workflow-automation\n\
  - browser-automation → browser-automation\n- custom-integrations → backend\n- api-development\
  \ → api-designer\n\n## Tooling\n\n### Platforms\n\n- Zapier - When: Simple automations,\
  \ maximum app coverage, beginners Note: 7000+ integrations, linear workflows, task-based\
  \ pricing\n- Make - When: Complex workflows, visual branching, budget-conscious\
  \ Note: Visual scenarios, operations pricing, powerful data handling\n- n8n - When:\
  \ Self-hosted, code-friendly, unlimited operations Note: Open-source, can add custom\
  \ code, technical users\n\n### Ai_features\n\n- Zapier Agents - When: AI-powered\
  \ autonomous automation Note: Natural language instructions, 7000+ app access\n\
  - Zapier Copilot - When: Building Zaps with AI assistance Note: Describes workflow,\
  \ AI builds it\n- Zapier MCP - When: LLM tools accessing Zapier actions Note: 30,000+\
  \ actions available to AI models\n\n## Patterns\n\n### Basic Trigger-Action Pattern\n\
  \nSingle trigger leads to one or more actions\n\n**When to use**: Simple notifications,\
  \ data sync, basic workflows\n\n# BASIC TRIGGER-ACTION:\n\n\"\"\"\n[Trigger] → [Action]\n\
  \  e.g., New Email → Create Task\n\"\"\"\n\n## Zapier Example\n\"\"\"\nZap Name:\
  \ \"Gmail New Email → Todoist Task\"\n\nTRIGGER: Gmail - New Email\n  - From: specific-sender@example.com\n\
  \  - Has attachment: yes\n\nACTION: Todoist - Create Task\n  - Project: Inbox\n\
  \  - Content: {{Email Subject}}\n  - Description: From: {{Email From}}\n  - Due\
  \ date: Tomorrow\n\"\"\"\n\n## Make Example\n\"\"\"\nScenario: \"Gmai\n\n## Diretrizes\
  \ do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente o gerenciador\
  \ uv para dependências. Todo código deve ser lintado via ruff e tipado com mypy.\n"
