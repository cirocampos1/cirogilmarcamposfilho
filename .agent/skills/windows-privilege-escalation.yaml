  author: zebbern\ndate_added: \"2026-02-27\"\n---\n\n> AUTHORIZED USE ONLY: Use this\
  \ skill only for authorized security assessments, defensive validation, or controlled\
  \ educational environments.\n\n# Windows Privilege Escalation\n\n## Purpose\n\n\
  Provide systematic methodologies for discovering and exploiting privilege escalation\
  \ vulnerabilities on Windows systems during penetration testing engagements. This\
  \ skill covers system enumeration, credential harvesting, service exploitation,\
  \ token impersonation, kernel exploits, and various misconfigurations that enable\
  \ escalation from standard user to Administrator or SYSTEM privileges.\n\n## Inputs\
  \ / Prerequisites\n\n- **Initial Access**: Shell or RDP access as standard user\
  \ on Windows system\n- **Enumeration Tools**: WinPEAS, PowerUp, Seatbelt, or manual\
  \ commands\n- **Exploit Binaries**: Pre-compiled exploits or ability to transfer\
  \ tools\n- **Knowledge**: Understanding of Windows security model and privileges\n\
  - **Authorization**: Written permission for penetration testing activities\n\n##\
  \ Outputs / Deliverables\n\n- **Privilege Escalation Path**: Identified vector to\
  \ higher privileges\n- **Credential Dump**: Harvested passwords, hashes, or tokens\n\
  - **Elevated Shell**: Command execution as Administrator or SYSTEM\n- **Vulnerability\
  \ Report**: Documentation of misconfigurations and exploits\n- **Remediation Recommendations**:\
  \ Fixes for identified weaknesses\n\n## Core Workflow\n\n### 1. System Enumeration\n\
  \n#### Basic System Information\n```powershell\n# OS version and patches\nsysteminfo\
  \ | findstr /B /C:\"OS Name\" /C:\"OS Version\"\nwmic qfe\n\n# Architecture\nwmic\
  \ os get osarchitecture\necho %PROCESSOR_ARCHITECTURE%\n\n# Environment variables\n\
  set\nGet-ChildItem Env: | ft Key,Value\n\n# List drives\nwmic logicaldisk get caption,description,providername\n\
  ```\n\n#### User Enumeration\n```powershell\n# Current user\nwhoami\necho %USERNAME%\n\
  \n# User privileges\nwhoami /priv\nwhoami /groups\nwhoami /all\n\n# All users\n\
  net user\nGet-LocalUser | ft Name,Enabled,LastLogon\n\n# User details\nnet user\
  \ administrator\nnet user %USERNAME%\n\n# Local groups\nnet localgroup\nnet localgroup\
  \ administrators\nGet-LocalGroupMember Administrators | ft Name,PrincipalSource\n\
  ```\n\n#### Network Enumeration\n```powershell\n# Network interfaces\nipconfig /all\n\
  Get-NetIPConfiguration | ft InterfaceAlias,InterfaceDescription,IPv4Address\n\n\
  # Routing table\nroute print\nGet-NetRoute -AddressFamily IPv4 | ft DestinationPrefix,NextHop,RouteMetric\n\
  \n# ARP table\narp -A\n\n# Active connections\nnetstat -ano\n\n# Network shares\n\
  net share\n\n# Domain Controllers\nnltest /DCLIST:DomainName\n```\n\n#### Antivirus\
  \ Enumeration\n```powershell\n# Check AV products\nWMIC /Node:localhost /Namespace:\\\
  \\root\\SecurityCenter2 Path AntivirusProduct Get displayName\n```\n\n### 2. Credential\
  \ Harvesting\n\n#### \n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA:\
  \ Use exclusivamente o gerenciador uv para dependências. Todo código deve ser lintado\
  \ via ruff e tipado com mypy.\n"
