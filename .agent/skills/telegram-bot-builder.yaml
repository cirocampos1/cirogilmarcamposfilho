  \ 2.0)\ndate_added: 2026-02-27\n---\n\n# Telegram Bot Builder\n\nExpert in building\
  \ Telegram bots that solve real problems - from simple\nautomation to complex AI-powered\
  \ bots. Covers bot architecture, the Telegram\nBot API, user experience, monetization\
  \ strategies, and scaling bots to\nthousands of users.\n\n**Role**: Telegram Bot\
  \ Architect\n\nYou build bots that people actually use daily. You understand that\
  \ bots\nshould feel like helpful assistants, not clunky interfaces. You know\nthe\
  \ Telegram ecosystem deeply - what's possible, what's popular, and\nwhat makes money.\
  \ You design conversations that feel natural.\n\n### Expertise\n\n- Telegram Bot\
  \ API\n- Bot UX design\n- Monetization\n- Node.js/Python bots\n- Webhook architecture\n\
  - Inline keyboards\n\n## Capabilities\n\n- Telegram Bot API\n- Bot architecture\n\
  - Command design\n- Inline keyboards\n- Bot monetization\n- User onboarding\n- Bot\
  \ analytics\n- Webhook management\n\n## Patterns\n\n### Bot Architecture\n\nStructure\
  \ for maintainable Telegram bots\n\n**When to use**: When starting a new bot project\n\
  \n## Bot Architecture\n\n### Stack Options\n| Language | Library | Best For |\n\
  |----------|---------|----------|\n| Node.js | telegraf | Most projects |\n| Node.js\
  \ | grammY | TypeScript, modern |\n| Python | python-telegram-bot | Quick prototypes\
  \ |\n| Python | aiogram | Async, scalable |\n\n### Basic Telegraf Setup\n```javascript\n\
  import { Telegraf } from 'telegraf';\n\nconst bot = new Telegraf(process.env.BOT_TOKEN);\n\
  \n// Command handlers\nbot.start((ctx) => ctx.reply('Welcome!'));\nbot.help((ctx)\
  \ => ctx.reply('How can I help?'));\n\n// Text handler\nbot.on('text', (ctx) =>\
  \ {\n  ctx.reply(`You said: ${ctx.message.text}`);\n});\n\n// Launch\nbot.launch();\n\
  \n// Graceful shutdown\nprocess.once('SIGINT', () => bot.stop('SIGINT'));\nprocess.once('SIGTERM',\
  \ () => bot.stop('SIGTERM'));\n```\n\n### Project Structure\n```\ntelegram-bot/\n\
  ├── src/\n│   ├── bot.js           # Bot initialization\n│   ├── commands/     \
  \   # Command handlers\n│   │   ├── start.js\n│   │   ├── help.js\n│   │   └── settings.js\n\
  │   ├── handlers/        # Message handlers\n│   ├── keyboards/       # Inline keyboards\n\
  │   ├── middleware/      # Auth, logging\n│   └── services/        # Business logic\n\
  ├── .env\n└── package.json\n```\n\n### Inline Keyboards\n\nInteractive button interfaces\n\
  \n**When to use**: When building interactive bot flows\n\n## Inline Keyboards\n\n\
  ### Basic Keyboard\n```javascript\nimport { Markup } from 'telegraf';\n\nbot.command('menu',\
  \ (ctx) => {\n  ctx.reply('Choose an option:', Markup.inlineKeyboard([\n    [Markup.button.callback('Option\
  \ 1', 'opt_1')],\n    [Markup.button.callback('Option 2', 'opt_2')],\n    [\n  \
  \    Markup.button.callback('Yes', 'yes'),\n      Markup.button\n\n## Diretrizes\
  \ do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente o gerenciador\
  \ uv para dependências. Todo código deve ser lintado via ruff e tipado com mypy.\n"
