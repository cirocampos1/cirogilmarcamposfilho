backstory: "Você é um agente especializado em Dispatching Parallel Agents.\n\n## Contexto\
  \ Original da Skill\nDispatching Parallel Agents\n\n## Instruções\n---\nname: dispatching-parallel-agents\n\
  description: \"Use when facing 2+ independent tasks that can be worked on without\
  \ shared state or sequential dependencies\"\nrisk: unknown\nsource: community\n\
  date_added: \"2026-02-27\"\n---\n\n# Dispatching Parallel Agents\n\n## Overview\n\
  \nWhen you have multiple unrelated failures (different test files, different subsystems,\
  \ different bugs), investigating them sequentially wastes time. Each investigation\
  \ is independent and can happen in parallel.\n\n**Core principle:** Dispatch one\
  \ agent per independent problem domain. Let them work concurrently.\n\n## When to\
  \ Use\n```dot\ndigraph when_to_use {\n    \"Multiple failures?\" [shape=diamond];\n\
  \    \"Are they independent?\" [shape=diamond];\n    \"Single agent investigates\
  \ all\" [shape=box];\n    \"One agent per problem domain\" [shape=box];\n    \"\
  Can they work in parallel?\" [shape=diamond];\n    \"Sequential agents\" [shape=box];\n\
  \    \"Parallel dispatch\" [shape=box];\n\n    \"Multiple failures?\" -> \"Are they\
  \ independent?\" [label=\"yes\"];\n    \"Are they independent?\" -> \"Single agent\
  \ investigates all\" [label=\"no - related\"];\n    \"Are they independent?\" ->\
  \ \"Can they work in parallel?\" [label=\"yes\"];\n    \"Can they work in parallel?\"\
  \ -> \"Parallel dispatch\" [label=\"yes\"];\n    \"Can they work in parallel?\"\
  \ -> \"Sequential agents\" [label=\"no - shared state\"];\n}\n```\n\n**Use when:**\n\
  - 3+ test files failing with different root causes\n- Multiple subsystems broken\
  \ independently\n- Each problem can be understood without context from others\n\
  - No shared state between investigations\n\n**Don't use when:**\n- Failures are\
  \ related (fix one might fix others)\n- Need to understand full system state\n-\
  \ Agents would interfere with each other\n\n## The Pattern\n\n### 1. Identify Independent\
  \ Domains\n\nGroup failures by what's broken:\n- File A tests: Tool approval flow\n\
  - File B tests: Batch completion behavior\n- File C tests: Abort functionality\n\
  \nEach domain is independent - fixing tool approval doesn't affect abort tests.\n\
  \n### 2. Create Focused Agent Tasks\n\nEach agent gets:\n- **Specific scope:** One\
  \ test file or subsystem\n- **Clear goal:** Make these tests pass\n- **Constraints:**\
  \ Don't change other code\n- **Expected output:** Summary of what you found and\
  \ fixed\n\n### 3. Dispatch in Parallel\n\n```typescript\n// In Claude Code / AI\
  \ environment\nTask(\"Fix agent-tool-abort.test.ts failures\")\nTask(\"Fix batch-completion-behavior.test.ts\
  \ failures\")\nTask(\"Fix tool-approval-race-conditions.test.ts failures\")\n//\
  \ All three run concurrently\n```\n\n### 4. Review and Integrate\n\nWhen agents\
  \ return:\n- Read each summary\n- Verify fixes don't conflict\n- Run full test suite\n\
  - Integrate all changes\n\n## Agent Prompt Structure\n\nGood agent prompts are:\n\
  1. **Focused** - One clear problem domain\n2. **Self-contained** - All context needed\
  \ to understand the problem\n3. **Specific about output** - What should the agent\
  \ return?\n\n```markdown\nFix the 3 failing tests in src/agents/agent-tool-abort.test.ts:\n\
  \n1. \"should abort tool with partial output capture\" - expects 'interrupte\n\n\
