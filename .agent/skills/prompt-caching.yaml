  \n## Scope\n\n- Does_not_cover: CDN caching, Database query caching, Static asset\
  \ caching\n- Boundaries: Focus is LLM-specific caching, Covers prompt and response\
  \ caching\n\n## Ecosystem\n\n### Primary_tools\n\n- Anthropic Prompt Caching - Native\
  \ prompt caching in Claude API\n- Redis - In-memory cache for responses\n- OpenAI\
  \ Caching - Automatic caching in OpenAI API\n\n## Patterns\n\n### Anthropic Prompt\
  \ Caching\n\nUse Claude's native prompt caching for repeated prefixes\n\n**When\
  \ to use**: Using Claude API with stable system prompts or context\n\nimport Anthropic\
  \ from '@anthropic-ai/sdk';\n\nconst client = new Anthropic();\n\n// Cache the stable\
  \ parts of your prompt\nasync function queryWithCaching(userQuery: string) {\n \
  \   const response = await client.messages.create({\n        model: \"claude-sonnet-4-20250514\"\
  ,\n        max_tokens: 1024,\n        system: [\n            {\n               \
  \ type: \"text\",\n                text: LONG_SYSTEM_PROMPT,  // Your detailed instructions\n\
  \                cache_control: { type: \"ephemeral\" }  // Cache this!\n      \
  \      },\n            {\n                type: \"text\",\n                text:\
  \ KNOWLEDGE_BASE,  // Large static context\n                cache_control: { type:\
  \ \"ephemeral\" }\n            }\n        ],\n        messages: [\n            {\
  \ role: \"user\", content: userQuery }  // Dynamic part\n        ]\n    });\n\n\
  \    // Check cache usage\n    console.log(`Cache read: ${response.usage.cache_read_input_tokens}`);\n\
  \    console.log(`Cache write: ${response.usage.cache_creation_input_tokens}`);\n\
  \n    return response;\n}\n\n// Cost savings: 90% reduction on cached tokens\n//\
  \ Latency savings: Up to 2x faster\n\n### Response Caching\n\nCache full LLM responses\
  \ for identical or similar queries\n\n**When to use**: Same queries asked repeatedly\n\
  \nimport { createHash } from 'crypto';\nimport Redis from 'ioredis';\n\nconst redis\
  \ = new Redis(process.env.REDIS_URL);\n\nclass ResponseCache {\n    private ttl\
  \ = 3600;  // 1 hour default\n\n    // Exact match caching\n    async getCached(prompt:\
  \ string): Promise<string | null> {\n        const key = this.hashPrompt(prompt);\n\
  \        return await redis.get(`response:${key}`);\n    }\n\n    async setCached(prompt:\
  \ string, response: string): Promise<void> {\n        const key = this.hashPrompt(prompt);\n\
  \        await redis.set(`response:${key}`, response, 'EX', this.ttl);\n    }\n\n\
