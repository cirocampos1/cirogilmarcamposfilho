  \ (Apache 2.0)\ndate_added: 2026-02-27\n---\n\n# Prompt Caching\n\nCaching strategies\
  \ for LLM prompts including Anthropic prompt caching, response caching, and CAG\
  \ (Cache Augmented Generation)\n\n## Capabilities\n\n- prompt-cache\n- response-cache\n\
  - kv-cache\n- cag-patterns\n- cache-invalidation\n\n## Prerequisites\n\n- Knowledge:\
