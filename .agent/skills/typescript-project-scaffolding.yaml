  \ component libraries\n- **Node.js API**: Express/Fastify backends, microservices\n\
  - **Library**: Reusable packages, utilities, tools\n- **CLI**: Command-line tools,\
  \ automation scripts\n\n### 2. Initialize Project with pnpm\n\n```bash\n# Install\
