  \ community\ndate_added: '2026-02-27'\n---\n\n# @azure/storage-blob (TypeScript/JavaScript)\n\
  \nSDK for Azure Blob Storage operations â€” upload, download, list, and manage blobs\
  \ and containers.\n\n## Installation\n\n```bash\nnpm install @azure/storage-blob\
  \ @azure/identity\n```\n\n**Current Version**: 12.x  \n**Node.js**: >= 18.0.0\n\n\
  ## Environment Variables\n\n```bash\nAZURE_STORAGE_ACCOUNT_NAME=<account-name>\n\
  AZURE_STORAGE_ACCOUNT_KEY=<account-key>\n# OR connection string\nAZURE_STORAGE_CONNECTION_STRING=DefaultEndpointsProtocol=https;AccountName=...\n\
  ```\n\n## Authentication\n\n### DefaultAzureCredential (Recommended)\n\n```typescript\n\
  import { BlobServiceClient } from \"@azure/storage-blob\";\nimport { DefaultAzureCredential\
  \ } from \"@azure/identity\";\n\nconst accountName = process.env.AZURE_STORAGE_ACCOUNT_NAME!;\n\
  const client = new BlobServiceClient(\n  `https://${accountName}.blob.core.windows.net`,\n\
  \  new DefaultAzureCredential()\n);\n```\n\n### Connection String\n\n```typescript\n\
  import { BlobServiceClient } from \"@azure/storage-blob\";\n\nconst client = BlobServiceClient.fromConnectionString(\n\
  \  process.env.AZURE_STORAGE_CONNECTION_STRING!\n);\n```\n\n### StorageSharedKeyCredential\
  \ (Node.js only)\n\n```typescript\nimport { BlobServiceClient, StorageSharedKeyCredential\
  \ } from \"@azure/storage-blob\";\n\nconst accountName = process.env.AZURE_STORAGE_ACCOUNT_NAME!;\n\
  const accountKey = process.env.AZURE_STORAGE_ACCOUNT_KEY!;\n\nconst sharedKeyCredential\
  \ = new StorageSharedKeyCredential(accountName, accountKey);\nconst client = new\
  \ BlobServiceClient(\n  `https://${accountName}.blob.core.windows.net`,\n  sharedKeyCredential\n\
  );\n```\n\n### SAS Token\n\n```typescript\nimport { BlobServiceClient } from \"\
  @azure/storage-blob\";\n\nconst accountName = process.env.AZURE_STORAGE_ACCOUNT_NAME!;\n\
  const sasToken = process.env.AZURE_STORAGE_SAS_TOKEN!; // starts with \"?\"\n\n\
  const client = new BlobServiceClient(\n  `https://${accountName}.blob.core.windows.net${sasToken}`\n\
  );\n```\n\n## Client Hierarchy\n\n```\nBlobServiceClient (account level)\nâ””â”€â”€ ContainerClient\
  \ (container level)\n    â””â”€â”€ BlobClient (blob level)\n        â”śâ”€â”€ BlockBlobClient\
  \ (block blobs - most common)\n        â”śâ”€â”€ AppendBlobClient (append-only blobs)\n\
  \        â””â”€â”€ PageBlobClient (page blobs - VHDs)\n```\n\n## Container Operations\n\
  \n### Create Container\n\n```typescript\nconst containerClient = client.getContainerClient(\"\
  my-container\");\nawait containerClient.create();\n\n// Or create if not exists\n\
  await containerClient.createIfNotExists();\n```\n\n### List Containers\n\n```typescript\n\
  for await (const container of client.listContainers()) {\n  console.log(container.name);\n\
  }\n\n// With prefix filter\nfor await (const container of client.listContainers({\
  \ prefix: \"logs-\" })) {\n  console.log(container.name);\n}\n```\n\n### Delete\
  \ Container\n\n```typescript\nawait containerClient.delet\n\n## Diretrizes do \n\
