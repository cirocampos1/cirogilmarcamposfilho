  \n# Matplotlib\n\n## Overview\n\nMatplotlib is Python's foundational visualization\
  \ library for creating static, animated, and interactive plots. This skill provides\
  \ guidance on using matplotlib effectively, covering both the pyplot interface (MATLAB-style)\
  \ and the object-oriented API (Figure/Axes), along with best practices for creating\
  \ publication-quality visualizations.\n\n## When to Use This Skill\n\nThis skill\
  \ should be used when:\n- Creating any type of plot or chart (line, scatter, bar,\
  \ histogram, heatmap, contour, etc.)\n- Generating scientific or statistical visualizations\n\
  - Customizing plot appearance (colors, styles, labels, legends)\n- Creating multi-panel\
  \ figures with subplots\n- Exporting visualizations to various formats (PNG, PDF,\
  \ SVG, etc.)\n- Building interactive plots or animations\n- Working with 3D visualizations\n\
  - Integrating plots into Jupyter notebooks or GUI applications\n\n## Core Concepts\n\
  \n### The Matplotlib Hierarchy\n\nMatplotlib uses a hierarchical structure of objects:\n\
  \n1. **Figure** - The top-level container for all plot elements\n2. **Axes** - The\
  \ actual plotting area where data is displayed (one Figure can contain multiple\
  \ Axes)\n3. **Artist** - Everything visible on the figure (lines, text, ticks, etc.)\n\
  4. **Axis** - The number line objects (x-axis, y-axis) that handle ticks and labels\n\
  \n### Two Interfaces\n\n**1. pyplot Interface (Implicit, MATLAB-style)**\n```python\n\
  import matplotlib.pyplot as plt\n\nplt.plot([1, 2, 3, 4])\nplt.ylabel('some numbers')\n\
  plt.show()\n```\n- Convenient for quick, simple plots\n- Maintains state automatically\n\
  - Good for interactive work and simple scripts\n\n**2. Object-Oriented Interface\
  \ (Explicit)**\n```python\nimport matplotlib.pyplot as plt\n\nfig, ax = plt.subplots()\n\
  ax.plot([1, 2, 3, 4])\nax.set_ylabel('some numbers')\nplt.show()\n```\n- **Recommended\
  \ for most use cases**\n- More explicit control over figure and axes\n- Better for\
  \ complex figures with multiple subplots\n- Easier to maintain and debug\n\n## Common\
  \ Workflows\n\n### 1. Basic Plot Creation\n\n**Single plot workflow:**\n```python\n\
  import matplotlib.pyplot as plt\nimport numpy as np\n\n# Create figure and axes\
  \ (OO interface - RECOMMENDED)\nfig, ax = plt.subplots(figsize=(10, 6))\n\n# Generate\
  \ and plot data\nx = np.linspace(0, 2*np.pi, 100)\nax.plot(x, np.sin(x), label='sin(x)')\n\
  ax.plot(x, np.cos(x), label='cos(x)')\n\n# Customize\nax.set_xlabel('x')\nax.set_ylabel('y')\n\
  ax.set_title('Trigonometric Functions')\nax.legend()\nax.grid(True, alpha=0.3)\n\
  \n# Save and/or display\nplt.savefig('plot.png', dpi=300, bbox_inches='tight')\n\
  plt.show()\n```\n\n### 2. Multiple Subplots\n\n**Creating subplot layouts:**\n```python\n\
