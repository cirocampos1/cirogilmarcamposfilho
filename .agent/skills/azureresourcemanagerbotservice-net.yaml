  risk: unknown\nsource: community\ndate_added: '2026-02-27'\n---\n\n# Azure.ResourceManager.BotService\
  \ (.NET)\n\nManagement plane SDK for provisioning and managing Azure Bot Service\
  \ resources via Azure Resource Manager.\n\n## Installation\n\n```bash\ndotnet add\
  \ package Azure.ResourceManager.BotService\ndotnet add package Azure.Identity\n\
  ```\n\n**Current Versions**: Stable v1.1.1, Preview v1.1.0-beta.1\n\n## Environment\
  \ Variables\n\n```bash\nAZURE_SUBSCRIPTION_ID=<your-subscription-id>\n# For service\
  \ principal auth (optional)\nAZURE_TENANT_ID=<tenant-id>\nAZURE_CLIENT_ID=<client-id>\n\
  AZURE_CLIENT_SECRET=<client-secret>\n```\n\n## Authentication\n\n```csharp\nusing\
  \ Azure.Identity;\nusing Azure.ResourceManager;\nusing Azure.ResourceManager.BotService;\n\
  \n// Authenticate using DefaultAzureCredential\nvar credential = new DefaultAzureCredential();\n\
  ArmClient armClient = new ArmClient(credential);\n\n// Get subscription and resource\
  \ group\nSubscriptionResource subscription = await armClient.GetDefaultSubscriptionAsync();\n\
  ResourceGroupResource resourceGroup = await subscription.GetResourceGroups().GetAsync(\"\
