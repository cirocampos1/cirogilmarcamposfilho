  \    Sku = new BotServiceSku(BotServiceSkuName.F0),\n    Properties = new BotProperties(\n\
  \        displayName: \"MyBot\",\n        endpoint: new Uri(\"https://mybot.azurewebsites.net/api/messages\"\
  ),\n        msaAppId: \"<your-msa-app-id>\")\n    {\n        Description = \"My\
  \ Azure Bot\",\n        MsaAppType = BotMsaAppType.MultiTenant\n    }\n};\n\n//\
