  \ (Apache 2.0)\ndate_added: 2026-02-27\n---\n\n# Agent Memory Systems\n\nMemory\
  \ is the cornerstone of intelligent agents. Without it, every interaction\nstarts\
  \ from zero. This skill covers the architecture of agent memory: short-term\n(context\
  \ window), long-term (vector stores), and the cognitive architectures\nthat organize\
  \ them.\n\nKey insight: Memory isn't just storage - it's retrieval. A million stored\
  \ facts\nmean nothing if you can't find the right one. Chunking, embedding, and\
  \ retrieval\nstrategies determine whether your agent remembers or forgets.\n\nThe\
  \ field is fragmented with inconsistent terminology. We use the CoALA cognitive\n\
  architecture framework: semantic memory (facts), episodic memory (experiences),\n\
  and procedural memory (how-to knowledge).\n\n## Principles\n\n- Memory quality =\
  \ retrieval quality, not storage quantity\n- Chunk for retrieval, not for storage\n\
  - Context isolation is the enemy of memory\n- Right memory type for right information\n\
  - Decay old memories - not everything should be forever\n- Test retrieval accuracy\
  \ before production\n- Background memory formation beats real-time\n\n## Capabilities\n\
  \n- agent-memory\n- long-term-memory\n- short-term-memory\n- working-memory\n- episodic-memory\n\
  - semantic-memory\n- procedural-memory\n- memory-retrieval\n- memory-formation\n\
  - memory-decay\n\n## Scope\n\n- vector-database-operations → data-engineer\n- rag-pipeline-architecture\
  \ → llm-architect\n- embedding-model-selection → ml-engineer\n- knowledge-graph-design\
  \ → knowledge-engineer\n\n## Tooling\n\n### Memory_frameworks\n\n- LangMem (LangChain)\
  \ - When: LangGraph agents with persistent memory Note: Semantic, episodic, procedural\
  \ memory types\n- MemGPT / Letta - When: Virtual context management, OS-style memory\
  \ Note: Hierarchical memory tiers, automatic paging\n- Mem0 - When: User memory\
  \ layer for personalization Note: Designed for user preferences and history\n\n\
  ### Vector_stores\n\n- Pinecone - When: Managed, enterprise-scale (billions of vectors)\
  \ Note: Best query performance, highest cost\n- Qdrant - When: Complex metadata\
  \ filtering, open-source Note: Rust-based, excellent filtering\n- Weaviate - When:\
  \ Hybrid search, knowledge graph features Note: GraphQL interface, good for relationships\n\
  - ChromaDB - When: Prototyping, small/medium apps Note: Developer-friendly, ~20ms\
  \ p50 at 100K vectors\n- pgvector - When: Already using PostgreSQL, simpler setup\
  \ Note: Good for <1M vectors, familiar tooling\n\n### Embedding_models\n\n- OpenAI\
  \ text-embedding-3-large - When: Best quality, 3072 dimensions Note: $0.13/1M tokens\n\
  - OpenAI text-embedding-3-small - When: Good balance, 1536 dimensions Note: $0.02/1M\
  \ tokens, 5x cheaper\n- nomic-embed-text-v1.5 - When: O\n\n## Diretrizes do \n\
