  \ community\ndate_added: \"2026-02-27\"\n---\n\n# Angular Migration\n\nMaster AngularJS\
  \ to Angular migration, including hybrid apps, component conversion, dependency\
  \ injection changes, and routing migration.\n\n## Use this skill when\n\n- Migrating\
  \ AngularJS (1.x) applications to Angular (2+)\n- Running hybrid AngularJS/Angular\
  \ applications\n- Converting directives to components\n- Modernizing dependency\
  \ injection\n- Migrating routing systems\n- Updating to latest Angular versions\n\
  - Implementing Angular best practices\n\n## Do not use this skill when\n\n- You\
  \ are not migrating from AngularJS to Angular\n- The app is already on a modern\
  \ Angular version\n- You need only a small UI fix without framework changes\n\n\
  ## Instructions\n\n1. Assess the AngularJS codebase, dependencies, and migration\
  \ risks.\n2. Choose a migration strategy (hybrid vs rewrite) and define milestones.\n\
  3. Set up ngUpgrade and migrate modules, components, and routing.\n4. Validate with\
  \ tests and plan a safe cutover.\n\n## Safety\n\n- Avoid big-bang cutovers without\
  \ rollback and staging validation.\n- Keep hybrid compatibility testing during incremental\
  \ migration.\n\n## Migration Strategies\n\n### 1. Big Bang (Complete Rewrite)\n\
  - Rewrite entire app in Angular\n- Parallel development\n- Switch over at once\n\
  - **Best for:** Small apps, green field projects\n\n### 2. Incremental (Hybrid Approach)\n\
  - Run AngularJS and Angular side-by-side\n- Migrate feature by feature\n- ngUpgrade\
  \ for interop\n- **Best for:** Large apps, continuous delivery\n\n### 3. Vertical\
  \ Slice\n- Migrate one feature completely\n- New features in Angular, maintain old\
  \ in AngularJS\n- Gradually replace\n- **Best for:** Medium apps, distinct features\n\
  \n## Hybrid App Setup\n\n```typescript\n// main.ts - Bootstrap hybrid app\nimport\
  \ { platformBrowserDynamic } from '@angular/platform-browser-dynamic';\nimport {\
  \ UpgradeModule } from '@angular/upgrade/static';\nimport { AppModule } from './app/app.module';\n\
  \nplatformBrowserDynamic()\n  .bootstrapModule(AppModule)\n  .then(platformRef =>\
  \ {\n    const upgrade = platformRef.injector.get(UpgradeModule);\n    // Bootstrap\
  \ AngularJS\n    upgrade.bootstrap(document.body, ['myAngularJSApp'], { strictDi:\
  \ true });\n  });\n```\n\n```typescript\n// app.module.ts\nimport { NgModule } from\
  \ '@angular/core';\nimport { BrowserModule } from '@angular/platform-browser';\n\
  import { UpgradeModule } from '@angular/upgrade/static';\n\n@NgModule({\n  imports:\
  \ [\n    BrowserModule,\n    UpgradeModule\n  ]\n})\nexport class AppModule {\n\
  \  constructor(private upgrade: UpgradeModule) {}\n\n  ngDoBootstrap() {\n    //\
  \ Bootstrapped manually in main.ts\n  }\n}\n```\n\n## Component Migration\n\n###\
