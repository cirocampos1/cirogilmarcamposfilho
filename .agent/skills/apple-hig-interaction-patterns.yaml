  ---\n\n# Apple HIG: Interaction Patterns\n\nCheck for `.claude/apple-design-context.md`\
  \ before asking questions. Use existing context and only ask for information not\
  \ already covered.\n\n## Key Principles\n\n1. **Minimize modality.** Use modality\
  \ only when it is critical to get attention, a task must be completed or abandoned,\
  \ or saving changes is essential. Prefer non-modal alternatives.\n\n2. **Provide\
  \ clear feedback.** Every action should produce visible, audible, or haptic response.\
  \ Activity indicators for indeterminate waits, progress bars for determinate, haptics\
  \ for physical confirmation.\n\n3. **Support undo over confirmation dialogs.** Destructive\
  \ actions should be reversible when possible. Undo is almost always better than\
  \ \"Are you sure?\"\n\n4. **Launch quickly.** Display a launch screen that transitions\
  \ seamlessly into the first screen. No splash screens with logos. Restore previous\
  \ state.\n\n5. **Defer sign-in.** Let users explore before requiring account creation.\
  \ Support Sign in with Apple and passkeys.\n\n6. **Keep onboarding brief.** Three\
  \ screens max. Let users skip. Teach through progressive disclosure and contextual\
  \ hints.\n\n7. **Use progressive disclosure.** Show essentials first, let users\
  \ drill into details. Don't overwhelm with every option on one screen.\n\n8. **Respect\
  \ user attention.** Consolidate notifications, minimize interruptions, give users\
  \ control over alerts. Never use notifications for marketing.\n\n## Reference Index\n\
