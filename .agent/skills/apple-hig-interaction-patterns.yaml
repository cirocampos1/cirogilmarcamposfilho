  \ pickers, steppers, input validation, keyboard types, autofill |\n| [feedback.md](references/feedback.md)\
  \ | Feedback | Alerts, action sheets, haptic patterns, sound feedback, visual indicators\
  \ |\n| [file-management.md](references/file-management.md) | File Management | Document\
  \ browser, file providers, iCloud integration, document lifecycle |\n| [going-full-screen.md](references/going-full-screen.md)\
