  source: community\ndate_added: '2026-02-27'\n---\n\n# Azure Key Vault SDK for Python\n\
  \nSecure storage and management for secrets, cryptographic keys, and certificates.\n\
  \n## Installation\n\n```bash\n# Secrets\npip install azure-keyvault-secrets azure-identity\n\
  \n# Keys (cryptographic operations)\npip install azure-keyvault-keys azure-identity\n\
  \n# Certificates\npip install azure-keyvault-certificates azure-identity\n\n# All\n\
  pip install azure-keyvault-secrets azure-keyvault-keys azure-keyvault-certificates\
  \ azure-identity\n```\n\n## Environment Variables\n\n```bash\nAZURE_KEYVAULT_URL=https://<vault-name>.vault.azure.net/\n\
  ```\n\n## Secrets\n\n### SecretClient Setup\n\n```python\nfrom azure.identity import\
  \ DefaultAzureCredential\nfrom azure.keyvault.secrets import SecretClient\n\ncredential\
  \ = DefaultAzureCredential()\nvault_url = \"https://<vault-name>.vault.azure.net/\"\
  \n\nclient = SecretClient(vault_url=vault_url, credential=credential)\n```\n\n###\
  \ Secret Operations\n\n```python\n# Set secret\nsecret = client.set_secret(\"database-password\"\
  , \"super-secret-value\")\nprint(f\"Created: {secret.name}, version: {secret.properties.version}\"\
  )\n\n# Get secret\nsecret = client.get_secret(\"database-password\")\nprint(f\"\
  Value: {secret.value}\")\n\n# Get specific version\nsecret = client.get_secret(\"\
  database-password\", version=\"abc123\")\n\n# List secrets (names only, not values)\n\
  for secret_properties in client.list_properties_of_secrets():\n    print(f\"Secret:\
  \ {secret_properties.name}\")\n\n# List versions\nfor version in client.list_properties_of_secret_versions(\"\
  database-password\"):\n    print(f\"Version: {version.version}, Created: {version.created_on}\"\
  )\n\n# Delete secret (soft delete)\npoller = client.begin_delete_secret(\"database-password\"\
  )\ndeleted_secret = poller.result()\n\n# Purge (permanent delete, if soft-delete\
  \ enabled)\nclient.purge_deleted_secret(\"database-password\")\n\n# Recover deleted\
  \ secret\nclient.begin_recover_deleted_secret(\"database-password\").result()\n\
  ```\n\n## Keys\n\n### KeyClient Setup\n\n```python\nfrom azure.identity import DefaultAzureCredential\n\
  from azure.keyvault.keys import KeyClient\n\ncredential = DefaultAzureCredential()\n\
  vault_url = \"https://<vault-name>.vault.azure.net/\"\n\nclient = KeyClient(vault_url=vault_url,\
  \ credential=credential)\n```\n\n### Key Operations\n\n```python\nfrom azure.keyvault.keys\
  \ import KeyType\n\n# Create RSA key\nrsa_key = client.create_rsa_key(\"rsa-key\"\
  , size=2048)\n\n# Create EC key\nec_key = client.create_ec_key(\"ec-key\", curve=\"\
  P-256\")\n\n# Get key\nkey = client.get_key(\"rsa-key\")\nprint(f\"Key type: {key.key_type}\"\
  )\n\n# List keys\nfor key_properties in client.list_properties_of_keys():\n    print(f\"\
  Key: {key_properties.name}\")\n\n# Delete key\npoller = client.begin_delete_key(\"\
  rsa-key\")\ndeleted_key = poller.result()\n```\n\n### Cryptographic Operations\n\
