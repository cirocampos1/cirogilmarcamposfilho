  \n# Polars\n\n## When to Use\n\n- You need a faster in-memory DataFrame workflow\
  \ than pandas for data that still fits in RAM.\n- You are building ETL, analytics,\
  \ or transformation pipelines that benefit from lazy evaluation and parallel execution.\n\
  - You want expression-based tabular operations on top of Apache Arrow semantics.\n\
  \n## Overview\n\nPolars is a lightning-fast DataFrame library for Python and Rust\
  \ built on Apache Arrow. Work with Polars' expression-based API, lazy evaluation\
  \ framework, and high-performance data manipulation capabilities for efficient data\
  \ processing, pandas migration, and data pipeline optimization.\n\n## Quick Start\n\
  \n### Installation and Basic Usage\n\nInstall Polars:\n```python\nuv pip install\
  \ polars\n```\n\nBasic DataFrame creation and operations:\n```python\nimport polars\
  \ as pl\n\n# Create DataFrame\ndf = pl.DataFrame({\n    \"name\": [\"Alice\", \"\
  Bob\", \"Charlie\"],\n    \"age\": [25, 30, 35],\n    \"city\": [\"NY\", \"LA\"\
  , \"SF\"]\n})\n\n# Select columns\ndf.select(\"name\", \"age\")\n\n# Filter rows\n\
  df.filter(pl.col(\"age\") > 25)\n\n# Add computed columns\ndf.with_columns(\n  \
  \  age_plus_10=pl.col(\"age\") + 10\n)\n```\n\n## Core Concepts\n\n### Expressions\n\
  \nExpressions are the fundamental building blocks of Polars operations. They describe\
  \ transformations on data and can be composed, reused, and optimized.\n\n**Key principles:**\n\
  - Use `pl.col(\"column_name\")` to reference columns\n- Chain methods to build complex\
  \ transformations\n- Expressions are lazy and only execute within contexts (select,\
  \ with_columns, filter, group_by)\n\n**Example:**\n```python\n# Expression-based\
  \ computation\ndf.select(\n    pl.col(\"name\"),\n    (pl.col(\"age\") * 12).alias(\"\
  age_in_months\")\n)\n```\n\n### Lazy vs Eager Evaluation\n\n**Eager (DataFrame):**\
  \ Operations execute immediately\n```python\ndf = pl.read_csv(\"file.csv\")  # Reads\
  \ immediately\nresult = df.filter(pl.col(\"age\") > 25)  # Executes immediately\n\
  ```\n\n**Lazy (LazyFrame):** Operations build a query plan, optimized before execution\n\
  ```python\nlf = pl.scan_csv(\"file.csv\")  # Doesn't read yet\nresult = lf.filter(pl.col(\"\
  age\") > 25).select(\"name\", \"age\")\ndf = result.collect()  # Now executes optimized\
  \ query\n```\n\n**When to use lazy:**\n- Working with large datasets\n- Complex\
  \ query pipelines\n- When only some columns/rows are needed\n- Performance is critical\n\
  \n**Benefits of lazy evaluation:**\n- Automatic query optimization\n- Predicate\
  \ pushdown\n- Projection pushdown\n- Parallel execution\n\nFor detailed concepts,\
  \ load `references/core_concepts.md`.\n\n## Common Operations\n\n### Select\nSelect\
