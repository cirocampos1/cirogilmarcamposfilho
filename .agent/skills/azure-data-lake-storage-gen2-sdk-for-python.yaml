  date_added: '2026-02-27'\n---\n\n# Azure Data Lake Storage Gen2 SDK for Python\n\
  \nHierarchical file system for big data analytics workloads.\n\n## Installation\n\
  \n```bash\npip install azure-storage-file-datalake azure-identity\n```\n\n## Environment\
  \ Variables\n\n```bash\nAZURE_STORAGE_ACCOUNT_URL=https://<account>.dfs.core.windows.net\n\
  ```\n\n## Authentication\n\n```python\nfrom azure.identity import DefaultAzureCredential\n\
  from azure.storage.filedatalake import DataLakeServiceClient\n\ncredential = DefaultAzureCredential()\n\
  account_url = \"https://<account>.dfs.core.windows.net\"\n\nservice_client = DataLakeServiceClient(account_url=account_url,\
  \ credential=credential)\n```\n\n## Client Hierarchy\n\n| Client | Purpose |\n|--------|---------|\n\
  | `DataLakeServiceClient` | Account-level operations |\n| `FileSystemClient` | Container\
  \ (file system) operations |\n| `DataLakeDirectoryClient` | Directory operations\
  \ |\n| `DataLakeFileClient` | File operations |\n\n## File System Operations\n\n\
  ```python\n# Create file system (container)\nfile_system_client = service_client.create_file_system(\"\
  myfilesystem\")\n\n# Get existing\nfile_system_client = service_client.get_file_system_client(\"\
  myfilesystem\")\n\n# Delete\nservice_client.delete_file_system(\"myfilesystem\"\
  )\n\n# List file systems\nfor fs in service_client.list_file_systems():\n    print(fs.name)\n\
  ```\n\n## Directory Operations\n\n```python\nfile_system_client = service_client.get_file_system_client(\"\
  myfilesystem\")\n\n# Create directory\ndirectory_client = file_system_client.create_directory(\"\
  mydir\")\n\n# Create nested directories\ndirectory_client = file_system_client.create_directory(\"\
  path/to/nested/dir\")\n\n# Get directory client\ndirectory_client = file_system_client.get_directory_client(\"\
  mydir\")\n\n# Delete directory\ndirectory_client.delete_directory()\n\n# Rename/move\
  \ directory\ndirectory_client.rename_directory(new_name=\"myfilesystem/newname\"\
  )\n```\n\n## File Operations\n\n### Upload File\n\n```python\n# Get file client\n\
  file_client = file_system_client.get_file_client(\"path/to/file.txt\")\n\n# Upload\
  \ from local file\nwith open(\"local-file.txt\", \"rb\") as data:\n    file_client.upload_data(data,\
  \ overwrite=True)\n\n# Upload bytes\nfile_client.upload_data(b\"Hello, Data Lake!\"\
  , overwrite=True)\n\n# Append data (for large files)\nfile_client.append_data(data=b\"\
  chunk1\", offset=0, length=6)\nfile_client.append_data(data=b\"chunk2\", offset=6,\
  \ length=6)\nfile_client.flush_data(12)  # Commit the data\n```\n\n### Download\
  \ File\n\n```python\nfile_client = file_system_client.get_file_client(\"path/to/file.txt\"\
  )\n\n# Download all content\ndownload = file_client.download_file()\ncontent = download.readall()\n\
  \n# Download to file\nwith open(\"downloaded.txt\", \"wb\") as f:\n    download\
  \ = file_client.download_file()\n    download.readinto(f)\n\n# Download range\n\
  download = file_client.download_file(offset=0, length=10\n\n## Diretrizes do \n\
