  ## Contexto Original da Skill\nPragmatic Functional Programming\n\n## Instruções\n\
  ---\nname: fp-pragmatic\ndescription: A practical, jargon-free guide to functional\
  \ programming - the 80/20 approach that gets results without the academic overhead\n\
  risk: unknown\nsource: community\nversion: 1.0.0\nauthor: kadu\ntags:\n  - fp-ts\n\
  \  - functional-programming\n  - typescript\n  - pragmatic\n  - beginner-friendly\n\
  \  - best-practices\n---\n\n# Pragmatic Functional Programming\n\n**Read this first.**\
  \ This guide cuts through the academic jargon and shows you what actually matters.\
  \ No category theory. No abstract nonsense. Just patterns that make your code better.\n\
  \n## When to Use\n\n- You want a pragmatic starting point for fp-ts or functional\
  \ programming in TypeScript.\n- The task is exploratory or educational and needs\
  \ an 80/20 view of what is actually worth adopting.\n- You need guidance on when\
  \ FP helps and when it is better to keep code simple.\n\n## The Golden Rule\n\n\
  > **If functional programming makes your code harder to read, don't use it.**\n\n\
  FP is a tool, not a religion. Use it when it helps. Skip it when it doesn't.\n\n\
  ---\n\n## The 80/20 of FP\n\nThese five patterns give you most of the benefits.\
  \ Master these before exploring anything else.\n\n### 1. Pipe: Chain Operations\
  \ Clearly\n\nInstead of nesting function calls or creating intermediate variables,\
  \ chain operations in reading order.\n\n```typescript\nimport { pipe } from 'fp-ts/function'\n\
  \n// Before: Hard to read (inside-out)\nconst result = format(validate(parse(input)))\n\
  \n// Before: Too many variables\nconst parsed = parse(input)\nconst validated =\
  \ validate(parsed)\nconst result = format(validated)\n\n// After: Clear, linear\
  \ flow\nconst result = pipe(\n  input,\n  parse,\n  validate,\n  format\n)\n```\n\
  \n**When to use pipe:**\n- 3+ transformations on the same data\n- You find yourself\
  \ naming throwaway variables\n- Logic reads better top-to-bottom\n\n**When to skip\
  \ pipe:**\n- Just 1-2 operations (direct call is fine)\n- The operations don't naturally\
  \ chain\n\n### 2. Option: Handle Missing Values Without null Checks\n\nStop writing\
  \ `if (x !== null && x !== undefined)` everywhere.\n\n```typescript\nimport * as\
  \ O from 'fp-ts/Option'\nimport { pipe } from 'fp-ts/function'\n\n// Before: Defensive\
  \ null checking\nfunction getUserCity(user: User | null): string {\n  if (user ===\
  \ null) return 'Unknown'\n  if (user.address === null) return 'Unknown'\n  if (user.address.city\
  \ === null) return 'Unknown'\n  return user.address.city\n}\n\n// After: Chain through\
  \ potential missing values\nconst getUserCity = (user: User | null): string =>\n\
  \  pipe(\n    O.fromNullable(user),\n    O.flatMap(u => O.fromNullable(u.address)),\n\
  \    O.flatMap(a => O.fromNullable(a.city)),\n    O.getOrElse(() => 'Unknown')\n\
  \  )\n```\n\n**Plain language translation:**\n- `O.fromNullable(x)` = \"wrap this\
  \ value, treating null/undefined as 'nothing'\"\n- `O.flatMap(fn)` = \"if we have\
  \ something, apply this function\"\n- `O.getOrElse(() => default)` = \"unwrap, or\
  \ use this default if nothing\"\n\n### 3. Either: Make Errors Explicit\n\nStop throwing\
  \ exceptions for expected failures. Return errors as values.\n\n```typesc\n\n##\
  \ Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente\
  \ o gerenciador uv para dependências. Todo código deve ser lintado via ruff e tipado\
  \ com mypy.\n"
