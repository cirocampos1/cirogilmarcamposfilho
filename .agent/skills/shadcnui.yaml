  # shadcn/ui


  A framework for building ui, components and design systems. Components are added
  as source code to the user''s project via the CLI.


  > **IMPORTANT:** Run all CLI commands using the project''s package runner: `npx
  shadcn@latest`, `pnpm dlx shadcn@latest`, or `bunx --bun shadcn@latest` ‚Äî based
  on the project''s `packageManager`. Examples below use `npx shadcn@latest` but substitute
  the correct runner for the project.


  ## When to Use

  - Use when adding new components from shadcn/ui or community registries.

  - Use when styling, composing, or debugging existing shadcn/ui components.

  - Use when initializing a new project or switching design system presets.

  - Use to retrieve component documentation, examples, and API references.


  ## Current Project Context


  ```json

  !`npx shadcn@latest info --json 2>/dev/null || echo ''{"error": "No shadcn project
  found. Run shadcn init first."}''`

  ```


  The JSON above contains the project config and installed components. Use `npx shadcn@latest
  docs <component>` to get documentation and example URLs for any component.


  ## Principles


  1. **Use existing components first.** Use `npx shadcn@latest search` to check registries
  before writing custom UI. Check community registries too.

  2. **Compose, don''t reinvent.** Settings page = Tabs + Card + form controls. Dashboard
  = Sidebar + Card + Chart + Table.

  3. **Use built-in variants before custom styles.** `variant="outline"`, `size="sm"`,
  etc.

  4. **Use semantic colors.** `bg-primary`, `text-muted-foreground` ‚Äî never raw values
  like `bg-blue-500`.


  ## Critical Rules


  These rules are **always enforced**. Each links to a file with Incorrect/Correct
  code pairs.


  ### Styling & Tailwind ‚Üí [styling.md](./rules/styling.md)


  - **`className` for layout, not styling.** Never override component colors or typography.

  - **No `space-x-*` or `space-y-*`.** Use `flex` with `gap-*`. For vertical stacks,
  `flex flex-col gap-*`.

  - **Use `size-*` when width and height are equal.** `size-10` not `w-10 h-10`.

  - **Use `truncate` shorthand.** Not `overflow-hidden text-ellipsis whitespace-nowrap`.

  - **No manual `dark:` color overrides.** Use semantic tokens (`bg-background`, `text-muted-foreground`).

  - **Use `cn()` for conditional classes.** Don''t write manual template literal ternaries.

  - **No manual `z-index` on overlay components.** Dialog, Sheet, Popover, etc. handle
  their own stacking.


  ### Forms & Inputs ‚Üí [forms.md](./rules/forms.md)


  - **Forms use `FieldGroup` + `Field`.** Never use raw `div` with `space-y-*` or
  `grid gap-*` for form layout.

  - **`InputGroup` uses `InputGroupInput`/`InputGroupTextarea`.** Never raw `Input`/`Textarea`
  inside `InputGroup`.

