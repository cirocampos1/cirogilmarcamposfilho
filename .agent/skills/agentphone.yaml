  metadata: {\"api_base\": \"https://api.agentphone.to/v1\"}\n---\n\n# AgentPhone\n\
  \nAgentPhone is an API-first telephony platform for AI agents. Give your agents\
  \ phone numbers, voice calls, and SMS — all managed through a simple API.\n\n##\
  \ When to Use\n\n- Use when the user wants to create or manage AI phone agents,\
  \ voice agents, or telephony automations\n- Use when the user needs to buy, assign,\
  \ release, or inspect phone numbers tied to an agent workflow\n- Use when the user\
  \ wants to place outbound calls, inspect transcripts, or send and receive SMS through\
  \ AgentPhone\n- Use when the user is configuring webhooks, hosted voice mode, or\
  \ account-level usage for AgentPhone\n- Use only with explicit user intent before\
  \ actions that spend money, send messages, place calls, or release phone numbers\n\
  \n**Base URL:** `https://api.agentphone.to/v1`\n\n**Docs:** [docs.agentphone.to](https://docs.agentphone.to)\n\
  \n**Console:** [agentphone.to](https://agentphone.to)\n\n---\n\n## How It Works\n\
  \nAgentPhone lets you create AI agents that can make and receive phone calls and\
  \ SMS messages. Here's the full lifecycle:\n\n1. You sign up at [agentphone.to](https://agentphone.to)\
  \ and get an API key\n2. You create an **Agent** — this is the AI persona that handles\
  \ calls and messages\n3. You buy a **Phone Number** and attach it to the agent\n\
  4. You configure a **Webhook** (for custom logic) or use **Hosted Mode** (built-in\
  \ LLM handles the conversation)\n5. Your agent can now make outbound calls, receive\
  \ inbound calls, and send/receive SMS\n\n```\nAccount\n└── Agent (AI persona — owns\
  \ numbers, handles calls/SMS)\n    ├── Phone Number (attached to agent)\n    │ \
  \  ├── Call (inbound/outbound voice)\n    │   │   └── Transcript (call recording\
  \ text)\n    │   └── Message (SMS)\n    │       └── Conversation (threaded SMS exchange)\n\
  \    └── Webhook (per-agent event delivery)\nWebhook (project-level event delivery)\n\
  ```\n\n### Voice Modes\n\nAgents operate in one of two modes:\n\n- **`hosted`**\
  \ — The built-in LLM handles the conversation autonomously using the agent's `system_prompt`.\
  \ No server required. This is the easiest way to get started — just set a prompt\
  \ and make a call.\n- **`webhook`** (default) — Inbound call/SMS events are forwarded\
  \ to your webhook URL for custom handling. Use this when you need full control over\
  \ the conversation logic.\n\n---\n\n## Quick Start\n\n### Step 1: Get Your API Key\n\
  \nSign up at [agentphone.to](https://agentphone.to). Your API key will look like\
  \ `sk_live_abc123...`.\n\n### Step 2: Create an Agent\n\n```bash\ncurl -X POST https://api.agentphone.to/v1/agents\
  \ \\\n  -H \"Authorization: Bearer YOUR_API_KEY\" \\\n  -H \"Content-Type: appl\n\
  \n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente\
  \ o gerenciador uv para dependências. Todo código deve ser lintado via ruff e tipado\
  \ com mypy.\n"
