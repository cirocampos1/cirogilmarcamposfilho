  date_added: \"2026-02-27\"\n---\n\n# Gemini API Development Skill\n\n## Overview\n\
  \nThe Gemini API provides access to Google's most advanced AI models. Key capabilities\
  \ include:\n- **Text generation** - Chat, completion, summarization\n- **Multimodal\
  \ understanding** - Process images, audio, video, and documents\n- **Function calling**\
  \ - Let the model invoke your functions\n- **Structured output** - Generate valid\
  \ JSON matching your schema\n- **Code execution** - Run Python code in a sandboxed\
  \ environment\n- **Context caching** - Cache large contexts for efficiency\n- **Embeddings**\
  \ - Generate text embeddings for semantic search\n\n## Current Gemini Models\n\n\
  - `gemini-3-pro-preview`: 1M tokens, complex reasoning, coding, research\n- `gemini-3-flash-preview`:\
  \ 1M tokens, fast, balanced performance, multimodal\n- `gemini-3-pro-image-preview`:\
  \ 65k / 32k tokens, image generation and editing\n\n\n> [!IMPORTANT]\n> Models like\
  \ `gemini-2.5-*`, `gemini-2.0-*`, `gemini-1.5-*` are legacy and deprecated. Use\
  \ the new models above. Your knowledge is outdated.\n\n## SDKs\n\n- **Python**:\
  \ `google-genai` install with `pip install google-genai`\n- **JavaScript/TypeScript**:\
  \ `@google/genai` install with `npm install @google/genai`\n- **Go**: `google.golang.org/genai`\
  \ install with `go get google.golang.org/genai`\n\n> [!WARNING]\n> Legacy SDKs `google-generativeai`\
  \ (Python) and `@google/generative-ai` (JS) are deprecated. Migrate to the new SDKs\
  \ above urgently by following the Migration Guide.\n\n## Quick Start\n\n### Python\n\
  ```python\nfrom google import genai\n\nclient = genai.Client()\nresponse = client.models.generate_content(\n\
  \    model=\"gemini-3-flash-preview\",\n    contents=\"Explain quantum computing\"\
  \n)\nprint(response.text)\n```\n\n### JavaScript/TypeScript\n```typescript\nimport\
  \ { GoogleGenAI } from \"@google/genai\";\n\nconst ai = new GoogleGenAI({});\nconst\
  \ response = await ai.models.generateContent({\n  model: \"gemini-3-flash-preview\"\
  ,\n  contents: \"Explain quantum computing\"\n});\nconsole.log(response.text);\n\
  ```\n\n### Go\n```go\npackage main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\t\"log\"\
  \n\t\"google.golang.org/genai\"\n)\n\nfunc main() {\n\tctx := context.Background()\n\
  \tclient, err := genai.NewClient(ctx, nil)\n\tif err != nil {\n\t\tlog.Fatal(err)\n\
  \t}\n\n\tresp, err := client.Models.GenerateContent(ctx, \"gemini-3-flash-preview\"\
  , genai.Text(\"Explain quantum computing\"), nil)\n\tif err != nil {\n\t\tlog.Fatal(err)\n\
  \t}\n\n\tfmt.Println(resp.Text)\n}\n```\n\n## API spec (source of truth)\n\n**Always\
