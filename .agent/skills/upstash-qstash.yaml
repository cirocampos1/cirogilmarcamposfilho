  \ vibeship-spawner-skills (Apache 2.0)\ndate_added: 2026-02-27\n---\n\n# Upstash\
  \ QStash\n\nUpstash QStash expert for serverless message queues, scheduled jobs,\
  \ and\nreliable HTTP-based task delivery without managing infrastructure.\n\n##\
  \ Principles\n\n- HTTP is the interface - if it speaks HTTPS, it speaks QStash\n\
  - Endpoints must be public - QStash calls your URLs from the cloud\n- Verify signatures\
  \ always - never trust unverified webhooks\n- Schedules are fire-and-forget - QStash\
  \ handles the cron\n- Retries are built-in - but configure them for your use case\n\
  - Delays are free - schedule seconds to days in the future\n- Callbacks complete\
  \ the loop - know when delivery succeeds or fails\n- Deduplication prevents double-processing\
  \ - use message IDs\n\n## Capabilities\n\n- qstash-messaging\n- scheduled-http-calls\n\
  - serverless-cron\n- webhook-delivery\n- message-deduplication\n- callback-handling\n\
  - delay-scheduling\n- url-groups\n\n## Scope\n\n- complex-workflows -> inngest\n\
  - redis-queues -> bullmq-specialist\n- event-sourcing -> event-architect\n- workflow-orchestration\
  \ -> temporal-craftsman\n\n## Tooling\n\n### Core\n\n- qstash-sdk\n- upstash-console\n\
  \n### Frameworks\n\n- nextjs\n- cloudflare-workers\n- vercel-functions\n- aws-lambda\n\
  - netlify-functions\n\n### Patterns\n\n- scheduled-jobs\n- delayed-messages\n- webhook-fanout\n\
  - callback-verification\n\n### Related\n\n- upstash-redis\n- upstash-kafka\n\n##\
  \ Patterns\n\n### Basic Message Publishing\n\nSending messages to be delivered to\
  \ endpoints\n\n**When to use**: Need reliable async HTTP calls\n\nimport { Client\
  \ } from '@upstash/qstash';\n\nconst qstash = new Client({\n  token: process.env.QSTASH_TOKEN!,\n\
  });\n\n// Simple message to endpoint\nawait qstash.publishJSON({\n  url: 'https://myapp.com/api/process',\n\
  \  body: {\n    userId: '123',\n    action: 'welcome-email',\n  },\n});\n\n// With\
  \ delay (process in 1 hour)\nawait qstash.publishJSON({\n  url: 'https://myapp.com/api/reminder',\n\
  \  body: { userId: '123' },\n  delay: 60 * 60,  // seconds\n});\n\n// With specific\
  \ delivery time\nawait qstash.publishJSON({\n  url: 'https://myapp.com/api/scheduled',\n\
  \  body: { report: 'daily' },\n  notBefore: Math.floor(Date.now() / 1000) + 86400,\
  \  // tomorrow\n});\n\n### Scheduled Cron Jobs\n\nSetting up recurring scheduled\
  \ tasks\n\n**When to use**: Need periodic background jobs without infrastructure\n\
  \nimport { Client } from '@upstash/qstash';\n\nconst qstash = new Client({\n  token:\
  \ process.env.QSTASH_TOKEN!,\n});\n\n// Create a scheduled job\nconst schedule =\
  \ await qstash.schedules.create({\n  destination: 'https://myapp.com/api/cron/daily-report',\n\
  \  cron: '0 9 * * *',  // Every day at 9 AM UTC\n  body: JSON.stringify({ type:\
  \ 'daily' }),\n  headers: {\n    'Content-Type': 'application/json',\n  },\n});\n\
  \nconsole.log('Schedule created:', schedule.scheduleId);\n\n// List all schedules\n\
