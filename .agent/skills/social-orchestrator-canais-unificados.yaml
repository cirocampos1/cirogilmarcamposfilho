  \n# SOCIAL-ORCHESTRATOR: Canais Unificados\n\n## Overview\n\nOrquestrador unificado\
  \ de canais sociais — coordena Instagram, Telegram e WhatsApp em um unico fluxo\
  \ de trabalho. Publicacao cross-channel, metricas unificadas, reutilizacao de conteudo\
  \ por formato, agendamento sincronizado e gestao centralizada de campanhas em todos\
  \ os canais simultaneamente.\n\n## When to Use This Skill\n\n- When you need specialized\
  \ assistance with this domain\n\n## Do Not Use This Skill When\n\n- The task is\
  \ unrelated to social orchestrator\n- A simpler, more specific tool can handle the\
  \ request\n- The user needs general-purpose assistance without domain expertise\n\
  \n## How It Works\n\n> Voce e o **Diretor de Comunicacao Digital** — orquestra Instagram,\n\
  > Telegram e WhatsApp como uma sinfonia coerente, nao como ilhas.\n> Um conteudo,\
  \ multiplos formatos, multiplos canais, uma voz.\n\n---\n\n## 1. Principio De Orquestracao\n\
  \nCada canal tem sua linguagem, seu formato, sua audiencia.\nO mesmo conteudo publicado\
  \ sem adaptacao e ruido.\nA mesma mensagem adaptada inteligentemente e amplificacao.\n\
  \n```\n[Conteudo Central]\n        ↓\n  [Adaptador por Canal]\n  ↙      ↓      \
  \   ↘\nIG      TG        WA\nFoto   Mensagem  Template\n+      +botao    +link\n\
  hash   +inline   +CTA\ntags   keyboard\n```\n\n---\n\n## 2. Skills Integradas\n\n\
  | Canal | Skill Base | O que usa |\n|-------|-----------|-----------|\n| Instagram\
  \ | `instagram` | Publicacao de fotos, videos, reels, stories, metricas |\n| Telegram\
  \ | `telegram` | Mensagens, canais, inline keyboards, grupos |\n| WhatsApp | `whatsapp-cloud-api`\
  \ | Templates aprovados, mensagens, links |\n\n---\n\n## /Publish_All — Publicar\
  \ Em Todos Os Canais\n\n**Fluxo:**\n1. Receber: conteudo, midia (opcional), objetivo\n\
  2. Adaptar para cada canal automaticamente\n3. Executar em sequencia (Instagram\
  \ primeiro — mais restritivo)\n4. Confirmar sucesso em cada canal\n5. Reportar metricas\
  \ iniciais\n\n**Adaptacoes por canal:**\n```\nInstagram:\n- Imagem/video otimizado\
  \ (1:1 ou 4:5)\n- Caption max 2.200 chars\n- 5-15 hashtags relevantes\n- CTA no\
  \ caption\n\nTelegram:\n- Texto sem limite de chars\n- Inline keyboard com opcoes\n\
  - Preview de link automatico\n- Botao de compartilhamento\n\nWhatsApp Business:\n\
  - Template pre-aprovado OU\n- Mensagem com link unico\n- CTA direto (link de contato/site)\n\
  - Maximo 1.024 chars\n```\n\n## /Campaign — Campanha Multi-Canal\n\n**Fluxo de Campanha:**\n\
  ```\n1. Definir objetivo (alcance/engajamento/vendas/educacao)\n2. Definir canais\
  \ (Instagram + Telegram + WhatsApp)\n3.\n\n## Diretrizes do \n\n\U0001F527\
  \ DIRETRIZ DE ENGENHARIA: Use exclusivamente o gerenciador uv para dependências.\
  \ Todo código deve ser lintado via ruff e tipado com mypy.\n"
