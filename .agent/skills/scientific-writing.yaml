  \ Inc.\nrisk: unknown\nsource: community\n---\n\n# Scientific Writing\n\n## Overview\n\
  \n**This is the core skill for the deep research and writing tool**—combining AI-driven\
  \ deep research with well-formatted written outputs. Every document produced is\
  \ backed by comprehensive literature search and verified citations through the research-lookup\
  \ skill.\n\nScientific writing is a process for communicating research with precision\
  \ and clarity. Write manuscripts using IMRAD structure, citations (APA/AMA/Vancouver),\
  \ figures/tables, and reporting guidelines (CONSORT/STROBE/PRISMA). Apply this skill\
  \ for research papers and journal submissions.\n\n**Critical Principle: Always write\
  \ in full paragraphs with flowing prose. Never submit bullet points in the final\
  \ manuscript.** Use a two-stage process: first create section outlines with key\
  \ points using research-lookup, then convert those outlines into complete paragraphs.\n\
  \n## When to Use This Skill\n\nThis skill should be used when:\n- Writing or revising\
  \ any section of a scientific manuscript (abstract, introduction, methods, results,\
  \ discussion)\n- Structuring a research paper using IMRAD or other standard formats\n\
  - Formatting citations and references in specific styles (APA, AMA, Vancouver, Chicago,\
  \ IEEE)\n- Creating, formatting, or improving figures, tables, and data visualizations\n\
  - Applying study-specific reporting guidelines (CONSORT for trials, STROBE for observational\
  \ studies, PRISMA for reviews)\n- Drafting abstracts that meet journal requirements\
  \ (structured or unstructured)\n- Preparing manuscripts for submission to specific\
  \ journals\n- Improving writing clarity, conciseness, and precision\n- Ensuring\
  \ proper use of field-specific terminology and nomenclature\n- Addressing reviewer\
  \ comments and revising manuscripts\n\n## Visual Enhancement with Scientific Schematics\n\
  \n**⚠️ MANDATORY: Every scientific paper MUST include a graphical abstract plus\
  \ 1-2 additional AI-generated figures using the scientific-schematics skill.**\n\
  \nThis is not optional. Scientific papers without visual elements are incomplete.\
  \ Before finalizing any document:\n1. **ALWAYS generate a graphical abstract** as\
  \ the first visual element\n2. Generate at minimum ONE additional schematic or diagram\
  \ using scientific-schematics\n3. Prefer 3-4 total figures for comprehensive papers\
  \ (graphical abstract + methods flowchart + results visualization + conceptual diagram)\n\
  \n### Graphical Abstract (REQUIRED)\n\n**Every scientific writeup MUST include a\
  \ graphical abstract.** This is a visual summary of your paper that:\n- Appears\
  \ before or immediately after the text abstract\n- Captures the entire paper's key\
  \ message in one image\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA:\
  \ Use exclusivamente o gerenciador uv para dependências. Todo código deve ser lintado\
  \ via ruff e tipado com mypy.\n"
