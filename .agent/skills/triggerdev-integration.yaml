  ---\n\n# Trigger.dev Integration\n\nTrigger.dev expert for background jobs, AI workflows,\
  \ and reliable async\nexecution with excellent developer experience and TypeScript-first\
  \ design.\n\n## Principles\n\n- Tasks are the building blocks - each task is independently\
  \ retryable\n- Runs are durable - state survives crashes and restarts\n- Integrations\
  \ are first-class - use built-in API wrappers for reliability\n- Logs are your debugging\
  \ lifeline - log liberally in tasks\n- Concurrency protects your resources - always\
  \ set limits\n- Delays and schedules are built-in - no external cron needed\n- AI-ready\
  \ by design - long-running AI tasks just work\n- Local development matches production\
  \ - use the CLI\n\n## Capabilities\n\n- trigger-dev-tasks\n- ai-background-jobs\n\
  - integration-tasks\n- scheduled-triggers\n- webhook-handlers\n- long-running-tasks\n\
  - task-queues\n- batch-processing\n\n## Scope\n\n- redis-queues -> bullmq-specialist\n\
  - pure-event-driven -> inngest\n- workflow-orchestration -> temporal-craftsman\n\
  - infrastructure -> infra-architect\n\n## Tooling\n\n### Core\n\n- trigger-dev-sdk\n\
  - trigger-cli\n\n### Frameworks\n\n- nextjs\n- remix\n- express\n- hono\n\n### Integrations\n\
  \n- openai\n- anthropic\n- resend\n- stripe\n- slack\n- supabase\n\n### Deployment\n\
  \n- trigger-cloud\n- self-hosted\n- docker\n\n## Patterns\n\n### Basic Task Setup\n\
  \nSetting up Trigger.dev in a Next.js project\n\n**When to use**: Starting with\
  \ Trigger.dev in any project\n\n// trigger.config.ts\nimport { defineConfig } from\
  \ '@trigger.dev/sdk/v3';\n\nexport default defineConfig({\n  project: 'my-project',\n\
  \  runtime: 'node',\n  logLevel: 'log',\n  retries: {\n    enabledInDev: true,\n\
  \    default: {\n      maxAttempts: 3,\n      minTimeoutInMs: 1000,\n      maxTimeoutInMs:\
  \ 10000,\n      factor: 2,\n    },\n  },\n});\n\n// src/trigger/tasks.ts\nimport\
  \ { task, logger } from '@trigger.dev/sdk/v3';\n\nexport const helloWorld = task({\n\
  \  id: 'hello-world',\n  run: async (payload: { name: string }) => {\n    logger.log('Processing\
  \ hello world', { payload });\n\n    // Simulate work\n    await new Promise(resolve\
  \ => setTimeout(resolve, 1000));\n\n    return { message: `Hello, ${payload.name}!`\
  \ };\n  },\n});\n\n// Triggering from your app\nimport { helloWorld } from '@/trigger/tasks';\n\
  \n// Fire and forget\nawait helloWorld.trigger({ name: 'World' });\n\n// Wait for\
  \ result\nconst handle = await helloWorld.trigger({ name: 'World' });\nconst result\
  \ = await handle.wait();\n\n### AI Task with OpenAI Integration\n\nUsing built-in\
  \ OpenAI integration with automatic retries\n\n**When to use**: Building AI-powered\
  \ background tasks\n\nimport { task, logger } from '@trigger.dev/sdk/v3';\nimport\
  \ { openai } from '@trigger.dev/openai';\n\n// Configure OpenAI with Trigger.dev\n\
  const openaiClient = openai.configure({\n  id: 'openai',\n  apiKey: process.env.OP\n\
  \n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente\
  \ o gerenciador uv para dependências. Todo código deve ser lintado via ruff e tipado\
  \ com mypy.\n"
