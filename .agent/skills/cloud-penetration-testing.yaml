  \n---\n\n> AUTHORIZED USE ONLY: Use this skill only for authorized security assessments,\
  \ defensive validation, or controlled educational environments.\n\n<!-- security-allowlist:\
  \ curl-pipe-bash -->\n\n# Cloud Penetration Testing\n\n## Purpose\n\nConduct comprehensive\
  \ security assessments of cloud infrastructure across Microsoft Azure, Amazon Web\
  \ Services (AWS), and Google Cloud Platform (GCP). This skill covers reconnaissance,\
  \ authentication testing, resource enumeration, privilege escalation, data extraction,\
  \ and persistence techniques for authorized cloud security engagements.\n\n## Prerequisites\n\
  \n### Required Tools\n```bash\n# Azure tools\nInstall-Module -Name Az -AllowClobber\
  \ -Force\nInstall-Module -Name MSOnline -Force\nInstall-Module -Name AzureAD -Force\n\
  \n# AWS CLI\ncurl \"https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip\" -o\
  \ \"awscliv2.zip\"\nunzip awscliv2.zip && sudo ./aws/install\n\n# GCP CLI\ncurl\
  \ https://sdk.cloud.google.com | bash\ngcloud init\n\n# Additional tools\npip install\
  \ scoutsuite pacu\n```\n\n### Required Knowledge\n- Cloud architecture fundamentals\n\
  - Identity and Access Management (IAM)\n- API authentication mechanisms\n- DevOps\
  \ and automation concepts\n\n### Required Access\n- Written authorization for testing\n\
  - Test credentials or access tokens\n- Defined scope and rules of engagement\n\n\
  ## Outputs and Deliverables\n\n1. **Cloud Security Assessment Report** - Comprehensive\
  \ findings and risk ratings\n2. **Resource Inventory** - Enumerated services, storage,\
  \ and compute instances\n3. **Credential Findings** - Exposed secrets, keys, and\
  \ misconfigurations\n4. **Remediation Recommendations** - Hardening guidance per\
  \ platform\n\n## Core Workflow\n\n### Phase 1: Reconnaissance\n\nGather initial\
  \ information about target cloud presence:\n\n```bash\n# Azure: Get federation info\n\
  curl \"https://login.microsoftonline.com/getuserrealm.srf?login=user@target.com&xml=1\"\
  \n\n# Azure: Get Tenant ID\ncurl \"https://login.microsoftonline.com/target.com/v2.0/.well-known/openid-configuration\"\
  \n\n# Enumerate cloud resources by company name\npython3 cloud_enum.py -k targetcompany\n\
  \n# Check IP against cloud providers\ncat ips.txt | python3 ip2provider.py\n```\n\
  \n### Phase 2: Azure Authentication\n\nAuthenticate to Azure environments:\n\n```powershell\n\
  # Az PowerShell Module\nImport-Module Az\nConnect-AzAccount\n\n# With credentials\
  \ (may bypass MFA)\n$credential = Get-Credential\nConnect-AzAccount -Credential\
  \ $credential\n\n# Import stolen context\nImport-AzContext -Profile 'C:\\Temp\\\
  StolenToken.json'\n\n# Export context for persistence\nSave-AzContext -Path C:\\\
  Temp\\AzureAccessToken.json\n\n# MSOnline Module\nImport-Module MSOnline\nConnect-MsolService\n\
