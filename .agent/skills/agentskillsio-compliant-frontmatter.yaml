  \ \"2.1\"\n---\n\n# Clarity Gate v2.1\n\n**Purpose:** Pre-ingestion verification\
  \ system that enforces epistemic quality before documents enter RAG knowledge bases.\
  \ Produces Clarity-Gated Documents (CGD) compliant with the Clarity Gate Format\
  \ Specification v2.1.\n\n**Core Question:** \"If another LLM reads this document,\
  \ will it mistake assumptions for facts?\"\n\n**Core Principle:** *\"Detection finds\
  \ what is; enforcement ensures what should be. In practice: find the missing uncertainty\
  \ markers before they become confident hallucinations.\"*\n\n---\n\n## What's New\
  \ in v2.1\n\n| Feature | Description |\n|---------|-------------|\n| **Claim Completion\
  \ Status** | PENDING/VERIFIED determined by field presence (no explicit status field)\
  \ |\n| **Source Field Semantics** | Actionable source (PENDING) vs. what-was-found\
  \ (VERIFIED) |\n| **Claim ID Format Guidance** | Hash-based IDs preferred, collision\
  \ analysis for scale |\n| **Body Structure Requirements** | HITL Verification Record\
  \ section mandatory when claims exist |\n| **New Validation Codes** | E-ST10, W-ST11,\
  \ W-HC01, W-HC02, E-SC06 (FORMAT_SPEC); E-TB01-07 (SOT validation) |\n| **Bundled\
  \ Scripts** | `claim_id.py` and `document_hash.py` for deterministic computations\
  \ |\n\n---\n\n## Specifications\n\nThis skill implements and references:\n\n| Specification\
  \ | Version | Location |\n|---------------|---------|----------|\n| Clarity Gate\
  \ Format (Unified) | v2.1 | docs/CLARITY_GATE_FORMAT_SPEC.md |\n\n**Note:** v2.0\
  \ unifies CGD and SOT into a single `.cgd.md` format. SOT is now a CGD with an optional\
  \ `tier:` block.\n\n---\n\n## Validation Codes\n\nClarity Gate defines validation\
  \ codes for structural and semantic checks per FORMAT_SPEC v2.1:\n\n### HITL Claim\
  \ Validation (§1.3.2-1.3.3)\n| Code | Check | Severity |\n|------|-------|----------|\n\
  | **W-HC01** | Partial `confirmed-by`/`confirmed-date` fields | WARNING |\n| **W-HC02**\
  \ | Vague source (e.g., \"industry reports\", \"TBD\") | WARNING |\n| **E-SC06**\
  \ | Schema error in `hitl-claims` structure | ERROR |\n\n### Body Structure (§1.2.1)\n\
  | Code | Check | Severity |\n|------|-------|----------|\n| **E-ST10** | Missing\
