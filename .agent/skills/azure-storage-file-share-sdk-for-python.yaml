  risk: unknown\nsource: community\ndate_added: '2026-02-27'\n---\n\n# Azure Storage\
  \ File Share SDK for Python\n\nManage SMB file shares for cloud-native and lift-and-shift\
  \ scenarios.\n\n## Installation\n\n```bash\npip install azure-storage-file-share\n\
  ```\n\n## Environment Variables\n\n```bash\nAZURE_STORAGE_CONNECTION_STRING=DefaultEndpointsProtocol=https;AccountName=...;AccountKey=...\n\
  # Or\nAZURE_STORAGE_ACCOUNT_URL=https://<account>.file.core.windows.net\n```\n\n\
  ## Authentication\n\n### Connection String\n\n```python\nfrom azure.storage.fileshare\
  \ import ShareServiceClient\n\nservice = ShareServiceClient.from_connection_string(\n\
  \    os.environ[\"AZURE_STORAGE_CONNECTION_STRING\"]\n)\n```\n\n### Entra ID\n\n\
  ```python\nfrom azure.storage.fileshare import ShareServiceClient\nfrom azure.identity\
  \ import DefaultAzureCredential\n\nservice = ShareServiceClient(\n    account_url=os.environ[\"\
  AZURE_STORAGE_ACCOUNT_URL\"],\n    credential=DefaultAzureCredential()\n)\n```\n\
  \n## Share Operations\n\n### Create Share\n\n```python\nshare = service.create_share(\"\
  my-share\")\n```\n\n### List Shares\n\n```python\nfor share in service.list_shares():\n\
  \    print(f\"{share.name}: {share.quota} GB\")\n```\n\n### Get Share Client\n\n\
  ```python\nshare_client = service.get_share_client(\"my-share\")\n```\n\n### Delete\
  \ Share\n\n```python\nservice.delete_share(\"my-share\")\n```\n\n## Directory Operations\n\
  \n### Create Directory\n\n```python\nshare_client = service.get_share_client(\"\
  my-share\")\nshare_client.create_directory(\"my-directory\")\n\n# Nested directory\n\
  share_client.create_directory(\"my-directory/sub-directory\")\n```\n\n### List Directories\
  \ and Files\n\n```python\ndirectory_client = share_client.get_directory_client(\"\
  my-directory\")\n\nfor item in directory_client.list_directories_and_files():\n\
  \    if item[\"is_directory\"]:\n        print(f\"[DIR] {item['name']}\")\n    else:\n\
  \        print(f\"[FILE] {item['name']} ({item['size']} bytes)\")\n```\n\n### Delete\
  \ Directory\n\n```python\nshare_client.delete_directory(\"my-directory\")\n```\n\
  \n## File Operations\n\n### Upload File\n\n```python\nfile_client = share_client.get_file_client(\"\
  my-directory/file.txt\")\n\n# From string\nfile_client.upload_file(\"Hello, World!\"\
  )\n\n# From file\nwith open(\"local-file.txt\", \"rb\") as f:\n    file_client.upload_file(f)\n\
  \n# From bytes\nfile_client.upload_file(b\"Binary content\")\n```\n\n### Download\
  \ File\n\n```python\nfile_client = share_client.get_file_client(\"my-directory/file.txt\"\
  )\n\n# To bytes\ndata = file_client.download_file().readall()\n\n# To file\nwith\
  \ open(\"downloaded.txt\", \"wb\") as f:\n    data = file_client.download_file()\n\
  \    data.readinto(f)\n\n# Stream chunks\ndownload = file_client.download_file()\n\
  for chunk in download.chunks():\n    process(chunk)\n```\n\n### Get File Properties\n\
