  date_added: \"2026-02-27\"\n---\n\n# DocuSign Automation via Rube MCP\n\nAutomate\
  \ DocuSign e-signature workflows through Composio's DocuSign toolkit via Rube MCP.\n\
  \n## Prerequisites\n\n- Rube MCP must be connected (RUBE_SEARCH_TOOLS available)\n\
  - Active DocuSign connection via `RUBE_MANAGE_CONNECTIONS` with toolkit `docusign`\n\
  - Always call `RUBE_SEARCH_TOOLS` first to get current tool schemas\n\n## Setup\n\
  \n**Get Rube MCP**: Add `https://rube.app/mcp` as an MCP server in your client configuration.\
  \ No API keys needed â€” just add the endpoint and it works.\n\n\n1. Verify Rube MCP\
  \ is available by confirming `RUBE_SEARCH_TOOLS` responds\n2. Call `RUBE_MANAGE_CONNECTIONS`\
  \ with toolkit `docusign`\n3. If connection is not ACTIVE, follow the returned auth\
  \ link to complete DocuSign OAuth\n4. Confirm connection status shows ACTIVE before\
  \ running any workflows\n\n## Core Workflows\n\n### 1. Browse and Select Templates\n\
  \n**When to use**: User wants to find available document templates for sending\n\
  \n**Tool sequence**:\n1. `DOCUSIGN_LIST_ALL_TEMPLATES` - List all available templates\
  \ [Required]\n2. `DOCUSIGN_GET_TEMPLATE` - Get detailed template information [Optional]\n\
  \n**Key parameters**:\n- For listing: Optional search/filter parameters\n- For details:\
  \ `templateId` (from list results)\n- Response includes template `templateId`, `name`,\
  \ `description`, roles, and fields\n\n**Pitfalls**:\n- Template IDs are GUIDs (e.g.,\
  \ '12345678-abcd-1234-efgh-123456789012')\n- Templates define recipient roles with\
  \ signing tabs; understand roles before creating envelopes\n- Large template libraries\
  \ require pagination; check for continuation tokens\n- Template access depends on\
  \ account permissions\n\n### 2. Create and Send Envelopes from Templates\n\n**When\
  \ to use**: User wants to send documents for signature using a pre-built template\n\
  \n**Tool sequence**:\n1. `DOCUSIGN_LIST_ALL_TEMPLATES` - Find the template to use\
  \ [Prerequisite]\n2. `DOCUSIGN_GET_TEMPLATE` - Review template roles and fields\
  \ [Optional]\n3. `DOCUSIGN_CREATE_ENVELOPE_FROM_TEMPLATE` - Create the envelope\
  \ [Required]\n4. `DOCUSIGN_SEND_ENVELOPE` - Send the envelope for signing [Required]\n\
  \n**Key parameters**:\n- For CREATE_ENVELOPE_FROM_TEMPLATE:\n  - `templateId`: Template\
  \ to use\n  - `templateRoles`: Array of role assignments with `roleName`, `name`,\
  \ `email`\n  - `status`: 'created' (draft) or 'sent' (send immediately)\n  - `emailSubject`:\
  \ Custom subject line for the signing email\n  - `emailBlurb`: Custom message in\
  \ the signing email\n- For SEND_ENVELOPE:\n  - `envelopeId`: Envelope ID from creation\
  \ response\n\n**Pitfalls**:\n- `templateRoles` must match the role names defined\
  \ in the template exactly (case-sensitive)\n- Setting `status` to 'sent' during\
  \ creation sends immediately; use 'created' for drafts\n- If status is 'sent' at\
  \ creation, no need to\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA:\
  \ Use exclusivamente o gerenciador uv para dependĂŞncias. Todo cĂłdigo deve ser lintado\
