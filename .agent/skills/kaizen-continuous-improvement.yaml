  date_added: \"2026-02-27\"\n---\n\n# Kaizen: Continuous Improvement\n\n## Overview\n\
  \nSmall improvements, continuously. Error-proof by design. Follow what works. Build\
  \ only what's needed.\n\n**Core principle:** Many small improvements beat one big\
  \ change. Prevent errors at design time, not with fixes.\n\n## When to Use\n**Always\
  \ applied for:**\n\n- Code implementation and refactoring\n- Architecture and design\
  \ decisions\n- Process and workflow improvements\n- Error handling and validation\n\
  \n**Philosophy:** Quality through incremental progress and prevention, not perfection\
  \ through massive effort.\n\n## The Four Pillars\n\n### 1. Continuous Improvement\
  \ (Kaizen)\n\nSmall, frequent improvements compound into major gains.\n\n#### Principles\n\
  \n**Incremental over revolutionary:**\n\n- Make smallest viable change that improves\
  \ quality\n- One improvement at a time\n- Verify each change before next\n- Build\
  \ momentum through small wins\n\n**Always leave code better:**\n\n- Fix small issues\
  \ as you encounter them\n- Refactor while you work (within scope)\n- Update outdated\
  \ comments\n- Remove dead code when you see it\n\n**Iterative refinement:**\n\n\
  - First version: make it work\n- Second pass: make it clear\n- Third pass: make\
  \ it efficient\n- Don't try all three at once\n\n<Good>\n```typescript\n// Iteration\
  \ 1: Make it work\nconst calculateTotal = (items: Item[]) => {\n  let total = 0;\n\
  \  for (let i = 0; i < items.length; i++) {\n    total += items[i].price * items[i].quantity;\n\
  \  }\n  return total;\n};\n\n// Iteration 2: Make it clear (refactor)\nconst calculateTotal\
  \ = (items: Item[]): number => {\nreturn items.reduce((total, item) => {\nreturn\
  \ total + (item.price \\* item.quantity);\n}, 0);\n};\n\n// Iteration 3: Make it\
  \ robust (add validation)\nconst calculateTotal = (items: Item[]): number => {\n\
  if (!items?.length) return 0;\n\nreturn items.reduce((total, item) => {\nif (item.price\
  \ < 0 || item.quantity < 0) {\nthrow new Error('Price and quantity must be non-negative');\n\
  }\nreturn total + (item.price \\* item.quantity);\n}, 0);\n};\n\n````\nEach step\
  \ is complete, tested, and working\n</Good>\n\n<Bad>\n```typescript\n// Trying to\
  \ do everything at once\nconst calculateTotal = (items: Item[]): number => {\n \
  \ // Validate, optimize, add features, handle edge cases all together\n  if (!items?.length)\
  \ return 0;\n  const validItems = items.filter(item => {\n    if (item.price < 0)\
  \ throw new Error('Negative price');\n    if (item.quantity < 0) throw new Error('Negative\
  \ quantity');\n    return item.quantity > 0; // Also filtering zero quantities\n\
  \  });\n  // Plus caching, plus logging, plus currency conversion...\n  return validItems.reduce(...);\
  \ // Too many concerns at once\n};\n````\n\nOverwhelming, error-prone, hard to verify\n\
  </Bad>\n\n#### In Practice\n\n**When implementing features:**\n\n1. Start with simplest\
  \ version that works\n2. \n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE\
  \ ENGENHARIA: Use exclusivamente o gerenciador uv para dependências. Todo código\
  \ deve ser lintado via ruff e tipado com mypy.\n"
