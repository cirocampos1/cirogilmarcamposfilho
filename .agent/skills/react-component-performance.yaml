  \n# React Component Performance\n\n## Overview\n\nIdentify render hotspots, isolate\
  \ expensive updates, and apply targeted optimizations without changing UI behavior.\n\
  \n## When to Use\n\n- When the user asks to profile or improve a slow React component.\n\
  - When you need to reduce re-renders, list lag, or expensive render work in React\
  \ UI.\n\n## Workflow\n\n1. Reproduce or describe the slowdown.\n2. Identify what\
  \ triggers re-renders (state updates, props churn, effects).\n3. Isolate fast-changing\
  \ state from heavy subtrees.\n4. Stabilize props and handlers; memoize where it\
  \ pays off.\n5. Reduce expensive work (computation, DOM size, list length).\n6.\
  \ **Validate**: open React DevTools Profiler → record the interaction → inspect\
  \ the Flamegraph for components rendering longer than ~16 ms → compare against a\
  \ pre-optimization baseline recording.\n\n## Checklist\n\n- Measure: use React DevTools\
  \ Profiler or log renders; capture baseline.\n- Find churn: identify state updated\
  \ on a timer, scroll, input, or animation.\n- Split: move ticking state into a child;\
  \ keep heavy lists static.\n- Memoize: wrap leaf rows with `memo` only when props\
  \ are stable.\n- Stabilize props: use `useCallback`/`useMemo` for handlers and derived\
  \ values.\n- Avoid derived work in render: precompute, or compute inside memoized\
  \ helpers.\n- Control list size: window/virtualize long lists; avoid rendering hidden\
  \ items.\n- Keys: ensure stable keys; avoid index when order can change.\n- Effects:\
  \ verify dependency arrays; avoid effects that re-run on every render.\n- Style/layout:\
  \ watch for expensive layout thrash or large Markdown/diff renders.\n\n## Optimization\
  \ Patterns\n\n### Isolate ticking state\n\nMove a timer or animation counter into\
  \ a child so the parent list never re-renders on each tick.\n\n```tsx\n// ❌ Before\
  \ – entire parent (and list) re-renders every second\nfunction Dashboard({ items\
  \ }: { items: Item[] }) {\n  const [tick, setTick] = useState(0);\n  useEffect(()\
  \ => {\n    const id = setInterval(() => setTick(t => t + 1), 1000);\n    return\
  \ () => clearInterval(id);\n  }, []);\n  return (\n    <>\n      <Clock tick={tick}\
  \ />\n      <ExpensiveList items={items} /> {/* re-renders every second */}\n  \
  \  </>\n  );\n}\n\n// ✅ After – only <Clock> re-renders; list is untouched\nfunction\
  \ Clock() {\n  const [tick, setTick] = useState(0);\n  useEffect(() => {\n    const\
  \ id = setInterval(() => setTick(t => t + 1), 1000);\n    return () => clearInterval(id);\n\
  \  }, []);\n  return <span>{tick}s</span>;\n}\n\nfunction Dashboard({ items }: {\
  \ items: Item[] }) {\n  return (\n    <>\n      <Clock />\n      <ExpensiveList\
  \ items={items} />\n    </>\n  );\n}\n```\n\n### Stabilize callbacks with `useCallback`\
