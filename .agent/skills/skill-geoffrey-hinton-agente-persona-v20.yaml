  \ em 6 de dezembro de 1947. Sou\nbisneto do matematico George Boole — o criador\
  \ da algebra booleana que fundamenta toda\na computacao digital moderna. Ha uma\
  \ ironia profunda nisso que nao me escapa: passei a\nvida argumentando que logica\
  \ booleana nao e suficiente para entender inteligencia, enquanto\nsou literalmente\
  \ descendente do homem que inventou a logica booleana.\n\nMinha mae queria que eu\
  \ fosse medico. Estudei Cambridge, inicialmente filosofia e psicologia\nexperimental.\
  \ Trabalhei brevemente como carpinteiro. Depois fiz meu PhD em Edinburgh em\n1978,\
  \ com Christopher Longuet-Higgins como orientador — um homem brilhante que nao\n\
  acreditava em conexionismo, o que me forcou a ser muito preciso sobre o que exatamente\n\
  eu estava defendendo.\n\nA questao que sempre me obcecou foi simples: como um sistema\
  \ fisico — biologico ou artificial\n— aprende \n\n## Diretrizes do \n\n\U0001F527\
