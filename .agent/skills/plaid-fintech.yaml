  \ (Apache 2.0)\ndate_added: 2026-02-27\n---\n\n# Plaid Fintech\n\nExpert patterns\
  \ for Plaid API integration including Link token flows,\ntransactions sync, identity\
  \ verification, Auth for ACH, balance checks,\nwebhook handling, and fintech compliance\
  \ best practices.\n\n## Patterns\n\n### Link Token Creation and Exchange\n\nCreate\
  \ a link_token for Plaid Link, exchange public_token for access_token.\nLink tokens\
  \ are short-lived, one-time use. Access tokens don't expire but\nmay need updating\
  \ when users change passwords.\n\n// server.ts - Link token creation endpoint\n\
  import { Configuration, PlaidApi, PlaidEnvironments, Products, CountryCode } from\
  \ 'plaid';\n\nconst configuration = new Configuration({\n  basePath: PlaidEnvironments[process.env.PLAID_ENV\
  \ || 'sandbox'],\n  baseOptions: {\n    headers: {\n      'PLAID-CLIENT-ID': process.env.PLAID_CLIENT_ID,\n\
  \      'PLAID-SECRET': process.env.PLAID_SECRET,\n    },\n  },\n});\n\nconst plaidClient\
  \ = new PlaidApi(configuration);\n\n// Create link token for new user\napp.post('/api/plaid/create-link-token',\
  \ async (req, res) => {\n  const { userId } = req.body;\n\n  try {\n    const response\
  \ = await plaidClient.linkTokenCreate({\n      user: {\n        client_user_id:\
  \ userId,  // Your internal user ID\n      },\n      client_name: 'My Finance App',\n\
  \      products: [Products.Transactions],\n      country_codes: [CountryCode.Us],\n\
  \      language: 'en',\n      webhook: 'https://yourapp.com/api/plaid/webhooks',\n\
  \      // Request 180 days for recurring transactions\n      transactions: {\n \
  \       days_requested: 180,\n      },\n    });\n\n    res.json({ link_token: response.data.link_token\
  \ });\n  } catch (error) {\n    console.error('Link token creation failed:', error);\n\
  \    res.status(500).json({ error: 'Failed to create link token' });\n  }\n});\n\
  \n// Exchange public token for access token\napp.post('/api/plaid/exchange-token',\
  \ async (req, res) => {\n  const { publicToken, userId } = req.body;\n\n  try {\n\
  \    // Exchange for permanent access token\n    const exchangeResponse = await\
  \ plaidClient.itemPublicTokenExchange({\n      public_token: publicToken,\n    });\n\
  \n    const { access_token, item_id } = exchangeResponse.data;\n\n    // Store securely\
  \ - access_token doesn't expire!\n    await db.plaidItem.create({\n      data: {\n\
  \        userId,\n        itemId: item_id,\n        accessToken: await encrypt(access_token),\
  \  // Encrypt at rest\n        status: 'ACTIVE',\n        products: ['transactions'],\n\
  \      },\n    });\n\n    // Trigger initial transaction sync\n    await initiateTransactionSync(item_id,\
  \ access_token);\n\n    res.json({ success: true, itemId: item_id });\n  } catch\
  \ (error) {\n    console.error('Token exchange failed:', error);\n    res.status(500).json({\
  \ error: 'Failed to exchange token' });\n  }\n});\n\n## Diretrizes do \n\
  \n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente o gerenciador uv para dependências.\
  \ Todo código deve ser lintado via ruff e tipado com mypy.\n"
