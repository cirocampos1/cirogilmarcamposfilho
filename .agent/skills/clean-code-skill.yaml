  \ \"This skill embodies the principles of \\\"Clean Code\\\" by Robert C. Martin\
  \ (Uncle Bob). Use it to transform \\\"code that works\\\" into \\\"code that is\
  \ clean.\\\"\"\nrisk: safe\nsource: \"ClawForge (https://github.com/jackjin1997/ClawForge)\"\
  \ndate_added: \"2026-02-27\"\n---\n\n# Clean Code Skill\n\nThis skill embodies the\
  \ principles of \"Clean Code\" by Robert C. Martin (Uncle Bob). Use it to transform\
  \ \"code that works\" into \"code that is clean.\"\n\n## \U0001F9E0 Core Philosophy\n\
  > \"Code is clean if it can be read, and enhanced by a developer other than its\
  \ original author.\" — Grady Booch\n\n## When to Use\nUse this skill when:\n- **Writing\
  \ new code**: To ensure high quality from the start.\n- **Reviewing Pull Requests**:\
  \ To provide constructive, principle-based feedback.\n- **Refactoring legacy code**:\
  \ To identify and remove code smells.\n- **Improving team standards**: To align\
  \ on industry-standard best practices.\n\n## 1. Meaningful Names\n- **Use Intention-Revealing\
  \ Names**: `elapsedTimeInDays` instead of `d`.\n- **Avoid Disinformation**: Don't\
  \ use `accountList` if it's actually a `Map`.\n- **Make Meaningful Distinctions**:\
  \ Avoid `ProductData` vs `ProductInfo`.\n- **Use Pronounceable/Searchable Names**:\
  \ Avoid `genymdhms`.\n- **Class Names**: Use nouns (`Customer`, `WikiPage`). Avoid\
  \ `Manager`, `Data`.\n- **Method Names**: Use verbs (`postPayment`, `deletePage`).\n\
  \n## 2. Functions\n- **Small!**: Functions should be shorter than you think.\n-\
  \ **Do One Thing**: A function should do only one thing, and do it well.\n- **One\
  \ Level of Abstraction**: Don't mix high-level business logic with low-level details\
  \ (like regex).\n- **Descriptive Names**: `isPasswordValid` is better than `check`.\n\
  - **Arguments**: 0 is ideal, 1-2 is okay, 3+ requires a very strong justification.\n\
  - **No Side Effects**: Functions shouldn't secretly change global state.\n\n## 3.\
  \ Comments\n- **Don't Comment Bad Code—Rewrite It**: Most comments are a sign of\
  \ failure to express ourselves in code.\n- **Explain Yourself in Code**: \n  ```python\n\
  \  # Check if employee is eligible for full benefits\n  if employee.flags & HOURLY\
  \ and employee.age > 65:\n  ```\n  vs\n  ```python\n  if employee.isEligibleForFullBenefits():\n\
  \  ```\n- **Good Comments**: Legal, Informative (regex intent), Clarification (external\
  \ libraries), TODOs.\n- **Bad Comments**: Mumbling, Redundant, Misleading, Mandated,\
  \ Noise, Position Markers.\n\n## 4. Formatting\n- **The Newspaper Metaphor**: High-level\
  \ concepts at the top, details at the bottom.\n- **Vertical Density**: Related lines\
  \ should be close to each other.\n- **Distance**: Variables should be declared near\
  \ their usage.\n- **Indentation**: Essential for structural readability.\n\n## 5.\
  \ Objects and Data Structures\n- **Data Abstraction**: Hide the implementation behind\
  \ interfaces.\n- **The Law of Demeter**: A module should not know about the innards\
  \ of the objects it manipulates. Avoid `a.getB().getC().doSomething()`.\n- **Data\
  \ Transfer Objects (DTO)**: Classes with public variables and no functions.\n\n\
  #\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente\
  \ o gerenciador uv para dependências. Todo código deve ser lintado via ruff e tipado\
  \ com mypy.\n"
