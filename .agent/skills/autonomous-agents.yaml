  \ (Apache 2.0)\ndate_added: 2026-02-27\n---\n\n# Autonomous Agents\n\nAutonomous\
  \ agents are AI systems that can independently decompose goals,\nplan actions, execute\
  \ tools, and self-correct without constant human guidance.\nThe challenge isn't\
  \ making them capable - it's making them reliable. Every\nextra decision multiplies\
  \ failure probability.\n\nThis skill covers agent loops (ReAct, Plan-Execute), goal\
  \ decomposition,\nreflection patterns, and production reliability. Key insight:\
  \ compounding\nerror rates kill autonomous agents. A 95% success rate per step drops\
  \ to\n60% by step 10. Build for reliability first, autonomy second.\n\n2025 lesson:\
  \ The winners are constrained, domain-specific agents with clear\nboundaries, not\
  \ \"autonomous everything.\" Treat AI outputs as proposals,\nnot truth.\n\n## Principles\n\
  \n- Reliability over autonomy - every step compounds error probability\n- Constrain\
  \ scope - domain-specific beats general-purpose\n- Treat outputs as proposals, not\
  \ truth\n- Build guardrails before expanding capabilities\n- Human-in-the-loop for\
  \ critical decisions is non-negotiable\n- Log everything - every action must be\
  \ auditable\n- Fail safely with rollback, not silently with corruption\n\n## Capabilities\n\
  \n- autonomous-agents\n- agent-loops\n- goal-decomposition\n- self-correction\n\
  - reflection-patterns\n- react-pattern\n- plan-execute\n- agent-reliability\n- agent-guardrails\n\
  \n## Scope\n\n- multi-agent-systems → multi-agent-orchestration\n- tool-building\
  \ → agent-tool-builder\n- memory-systems → agent-memory-systems\n- workflow-orchestration\
  \ → workflow-automation\n\n## Tooling\n\n### Frameworks\n\n- LangGraph - When: Production\
  \ agents with state management Note: 1.0 released Oct 2025, checkpointing, human-in-loop\n\
  - AutoGPT - When: Research/experimentation, open-ended exploration Note: Needs external\
  \ guardrails for production\n- CrewAI - When: Role-based agent teams Note: Good\
  \ for specialized agent collaboration\n- Claude Agent SDK - When: Anthropic ecosystem\
  \ agents Note: Computer use, tool execution\n\n### Patterns\n\n- ReAct - When: Reasoning\
  \ + Acting in alternating steps Note: Foundation for most modern agents\n- Plan-Execute\
  \ - When: Separate planning from execution Note: Better for complex multi-step tasks\n\
  - Reflection - When: Self-evaluation and correction Note: Evaluator-optimizer loop\n\
  \n## Patterns\n\n### ReAct Agent Loop\n\nAlternating reasoning and action steps\n\
  \n**When to use**: Interactive problem-solving, tool use, exploration\n\n# REACT\
  \ PATTERN:\n\n\"\"\"\nThe ReAct loop:\n1. Thought: Reason about what to do next\n\
  2. Action: Choose and execute a tool\n3. Observation: Receive result\n4. Repeat\
  \ until goal achieved\n\nKey: Explicit reasoning traces ma\n\n## Diretrizes do \n\
