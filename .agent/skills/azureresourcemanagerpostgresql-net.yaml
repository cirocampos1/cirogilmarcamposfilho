  \n# Azure.ResourceManager.PostgreSql (.NET)\n\nAzure Resource Manager SDK for managing\
  \ PostgreSQL Flexible Server deployments.\n\n## Installation\n\n```bash\ndotnet\
  \ add package Azure.ResourceManager.PostgreSql\ndotnet add package Azure.Identity\n\
  ```\n\n**Current Version**: v1.2.0 (GA)  \n**API Version**: 2023-12-01-preview\n\
  \n> **Note**: This skill focuses on PostgreSQL Flexible Server. Single Server is\
  \ deprecated and scheduled for retirement.\n\n## Environment Variables\n\n```bash\n\
  AZURE_SUBSCRIPTION_ID=<your-subscription-id>\nAZURE_RESOURCE_GROUP=<your-resource-group>\n\
  AZURE_POSTGRESQL_SERVER_NAME=<your-postgresql-server>\n```\n\n## Authentication\n\
  \n```csharp\nusing Azure.Identity;\nusing Azure.ResourceManager;\nusing Azure.ResourceManager.PostgreSql;\n\
  using Azure.ResourceManager.PostgreSql.FlexibleServers;\n\nArmClient client = new\
  \ ArmClient(new DefaultAzureCredential());\n```\n\n## Resource Hierarchy\n\n```\n\
  Subscription\n└── ResourceGroup\n    └── PostgreSqlFlexibleServer              #\
  \ PostgreSQL Flexible Server instance\n        ├── PostgreSqlFlexibleServerDatabase\
  \  # Database within the server\n        ├── PostgreSqlFlexibleServerFirewallRule\
  \ # IP firewall rules\n        ├── PostgreSqlFlexibleServerConfiguration # Server\
  \ parameters\n        ├── PostgreSqlFlexibleServerBackup    # Backup information\n\
  \        ├── PostgreSqlFlexibleServerActiveDirectoryAdministrator # Entra ID admin\n\
  \        └── PostgreSqlFlexibleServerVirtualEndpoint # Read replica endpoints\n\
  ```\n\n## Core Workflows\n\n### 1. Create PostgreSQL Flexible Server\n\n```csharp\n\
  using Azure.ResourceManager.PostgreSql.FlexibleServers;\nusing Azure.ResourceManager.PostgreSql.FlexibleServers.Models;\n\
  \nResourceGroupResource resourceGroup = await client\n    .GetDefaultSubscriptionAsync()\n\
  \    .Result\n    .GetResourceGroupAsync(\"my-resource-group\");\n\nPostgreSqlFlexibleServerCollection\
  \ servers = resourceGroup.GetPostgreSqlFlexibleServers();\n\nPostgreSqlFlexibleServerData\
  \ data = new PostgreSqlFlexibleServerData(AzureLocation.EastUS)\n{\n    Sku = new\
  \ PostgreSqlFlexibleServerSku(\"Standard_D2ds_v4\", PostgreSqlFlexibleServerSkuTier.GeneralPurpose),\n\
  \    AdministratorLogin = \"pgadmin\",\n    AdministratorLoginPassword = \"YourSecurePassword123!\"\
  ,\n    Version = PostgreSqlFlexibleServerVersion.Ver16,\n    Storage = new PostgreSqlFlexibleServerStorage\n\
  \    {\n        StorageSizeInGB = 128,\n        AutoGrow = StorageAutoGrow.Enabled,\n\
  \        Tier = PostgreSqlStorageTierName.P30\n    },\n    Backup = new PostgreSqlFlexibleServerBackupProperties\n\
  \    {\n        BackupRetentionDays = 7,\n        GeoRedundantBackup = PostgreSqlFlexibleServerGeoRedundantBackupEnum.Disabled\n\
  \    },\n    HighAvailability = new PostgreSqlFlexibleServerHighAvailability\n \
  \   {\n        Mode = PostgreSqlFlexibleServerHighAvailabilityMode.ZoneRedundant,\n\
  \        Stan\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA:\
  \ Use exclusivamente o gerenciador uv para dependências. Todo código deve ser lintado\
  \ via ruff e tipado com mypy.\n"
