backstory: "Você é um agente especializado em Azure API Management SDK for Python.\n\
  \n## Contexto Original da Skill\nAzure API Management SDK for Python\n\n## Instruções\n\
  ---\nname: azure-mgmt-apimanagement-py\ndescription: Azure API Management SDK for\
  \ Python. Use for managing APIM services, APIs, products, subscriptions, and policies.\n\
  risk: unknown\nsource: community\ndate_added: '2026-02-27'\n---\n\n# Azure API Management\
  \ SDK for Python\n\nManage Azure API Management services, APIs, products, and policies.\n\
  \n## Installation\n\n```bash\npip install azure-mgmt-apimanagement\npip install\
  \ azure-identity\n```\n\n## Environment Variables\n\n```bash\nAZURE_SUBSCRIPTION_ID=your-subscription-id\n\
  ```\n\n## Authentication\n\n```python\nfrom azure.identity import DefaultAzureCredential\n\
  from azure.mgmt.apimanagement import ApiManagementClient\nimport os\n\nclient =\
  \ ApiManagementClient(\n    credential=DefaultAzureCredential(),\n    subscription_id=os.environ[\"\
  AZURE_SUBSCRIPTION_ID\"]\n)\n```\n\n## Create APIM Service\n\n```python\nfrom azure.mgmt.apimanagement.models\
  \ import (\n    ApiManagementServiceResource,\n    ApiManagementServiceSkuProperties,\n\
  \    SkuType\n)\n\nservice = client.api_management_service.begin_create_or_update(\n\
  \    resource_group_name=\"my-resource-group\",\n    service_name=\"my-apim\",\n\
  \    parameters=ApiManagementServiceResource(\n        location=\"eastus\",\n  \
  \      publisher_email=\"admin@example.com\",\n        publisher_name=\"My Organization\"\
  ,\n        sku=ApiManagementServiceSkuProperties(\n            name=SkuType.DEVELOPER,\n\
  \            capacity=1\n        )\n    )\n).result()\n\nprint(f\"Created APIM:\
  \ {service.name}\")\n```\n\n## Import API from OpenAPI\n\n```python\nfrom azure.mgmt.apimanagement.models\
  \ import (\n    ApiCreateOrUpdateParameter,\n    ContentFormat,\n    Protocol\n\
  )\n\napi = client.api.begin_create_or_update(\n    resource_group_name=\"my-resource-group\"\
  ,\n    service_name=\"my-apim\",\n    api_id=\"my-api\",\n    parameters=ApiCreateOrUpdateParameter(\n\
  \        display_name=\"My API\",\n        path=\"myapi\",\n        protocols=[Protocol.HTTPS],\n\
  \        format=ContentFormat.OPENAPI_JSON,\n        value='{\"openapi\": \"3.0.0\"\
  , \"info\": {\"title\": \"My API\", \"version\": \"1.0\"}, \"paths\": {\"/health\"\
  : {\"get\": {\"responses\": {\"200\": {\"description\": \"OK\"}}}}}}'\n    )\n).result()\n\
  \nprint(f\"Imported API: {api.display_name}\")\n```\n\n## Import API from URL\n\n\
  ```python\napi = client.api.begin_create_or_update(\n    resource_group_name=\"\
  my-resource-group\",\n    service_name=\"my-apim\",\n    api_id=\"petstore\",\n\
  \    parameters=ApiCreateOrUpdateParameter(\n        display_name=\"Petstore API\"\
  ,\n        path=\"petstore\",\n        protocols=[Protocol.HTTPS],\n        format=ContentFormat.OPENAPI_LINK,\n\
  \        value=\"https://petstore.swagger.io/v2/swagger.json\"\n    )\n).result()\n\
  ```\n\n## List APIs\n\n```python\napis = client.api.list_by_service(\n    resource_group_name=\"\
  my-resource-group\",\n    service_name=\"my-apim\"\n)\n\nfor api in apis:\n    print(f\"\
  {api.name}: {api.display_name} - {api.path}\")\n```\n\n## Create Product\n\n```python\n\
