  \ community\ndate_added: \"2026-02-27\"\n---\n\n# Azure Developer CLI (azd) Container\
  \ Apps Deployment\n\nDeploy containerized frontend + backend applications to Azure\
  \ Container Apps with remote builds, managed identity, and idempotent infrastructure.\n\
  \n## Quick Start\n\n```bash\n# Initialize and deploy\nazd auth login\nazd init \
  \                   # Creates azure.yaml and .azure/ folder\nazd env new <env-name>\
  \      # Create environment (dev, staging, prod)\nazd up                      #\
  \ Provision infra + build + deploy\n```\n\n## Core File Structure\n\n```\nproject/\n\
  в”њв”Ђв”Ђ azure.yaml              # azd service definitions + hooks\nв”њв”Ђв”Ђ infra/\nв”‚   в”њв”Ђв”Ђ\
  \ main.bicep          # Root infrastructure module\nв”‚   в”њв”Ђв”Ђ main.parameters.json\
  \ # Parameter injection from env vars\nв”‚   в””в”Ђв”Ђ modules/\nв”‚       в”њв”Ђв”Ђ container-apps-environment.bicep\n\
  в”‚       в””в”Ђв”Ђ container-app.bicep\nв”њв”Ђв”Ђ .azure/\nв”‚   в”њв”Ђв”Ђ config.json         # Default\
  \ environment pointer\nв”‚   в””в”Ђв”Ђ <env-name>/\nв”‚       в”њв”Ђв”Ђ .env            # Environment-specific\
  \ values (azd-managed)\nв”‚       в””в”Ђв”Ђ config.json     # Environment metadata\nв””в”Ђв”Ђ\
  \ src/\n    в”њв”Ђв”Ђ frontend/Dockerfile\n    в””в”Ђв”Ђ backend/Dockerfile\n```\n\n## azure.yaml\
  \ Configuration\n\n### Minimal Configuration\n\n```yaml\nname: azd-deployment\n\
  services:\n  backend:\n    project: ./src/backend\n    language: python\n    host:\
  \ containerapp\n    docker:\n      path: ./Dockerfile\n      remoteBuild: true\n\
  ```\n\n### Full Configuration with Hooks\n\n```yaml\nname: azd-deployment\nmetadata:\n\
  \  template: my-project@1.0.0\n\ninfra:\n  provider: bicep\n  path: ./infra\n\n\
  azure:\n  location: eastus2\n\nservices:\n  frontend:\n    project: ./src/frontend\n\
  \    language: ts\n    host: containerapp\n    docker:\n      path: ./Dockerfile\n\
  \      context: .\n      remoteBuild: true\n\n  backend:\n    project: ./src/backend\n\
  \    language: python\n    host: containerapp\n    docker:\n      path: ./Dockerfile\n\
  \      context: .\n      remoteBuild: true\n\nhooks:\n  preprovision:\n    shell:\
  \ sh\n    run: |\n      echo \"Before provisioning...\"\n      \n  postprovision:\n\
  \    shell: sh\n    run: |\n      echo \"After provisioning - set up RBAC, etc.\"\
  \n      \n  postdeploy:\n    shell: sh\n    run: |\n      echo \"Frontend: ${SERVICE_FRONTEND_URI}\"\
  \n      echo \"Backend: ${SERVICE_BACKEND_URI}\"\n```\n\n### Key azure.yaml Options\n\
  \n| Option | Description |\n|--------|-------------|\n| `remoteBuild: true` | Build\
  \ images in Azure Container Registry (recommended) |\n| `context: .` | Docker build\
  \ context relative to project path |\n| `host: containerapp` | Deploy to Azure Container\
  \ Apps |\n| `infra.provider: bicep` | Use Bicep for infrastructure |\n\n## Environment\
  \ Variables Flow\n\n### Three-Level Configuration\n\n1. **Local `.env`** - For local\
  \ development only\n2. **`.azure/<env>/.env`** - azd-managed, auto-populated from\
  \ Bicep outputs\n3. **`main.parameters.json`** - Maps env vars to Bicep parameters\n\
