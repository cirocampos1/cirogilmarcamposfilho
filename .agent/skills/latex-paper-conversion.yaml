  \n# LaTeX Paper Conversion\n\n## Overview\n\nThis skill automates the tedious and\
  \ recurring process of converting an academic paper written in LaTeX from one publisher's\
  \ template to another. Different journals (e.g., Springer, MDPI, IEEE) have vastly\
  \ different structural requirements, document classes, margin settings, and bibliography\
  \ styles. This skill streamlines these conversions by executing a structured multi-stage\
  \ workflow, extracting content, mapping it to a new template, and resolving common\
  \ compilation errors.\n\n## When to Use This Skill\n\n- Use when the user requests\
  \ to port an existing LaTeX paper to a new journal's format.\n- Use when the user\
  \ provides an existing `.tex` file and a new template directory.\n- Use when the\
  \ user mentions converting from format A (e.g., IPOL/Neural Processing) to format\
  \ B (e.g., MDPI).\n\n## How It Works\n\n### Step 1: Pre-requisites & Assessment\n\
  Identify the **Source LaTeX file** and asking the user for the **Target Template\
  \ Directory**. Understand the core layout mapping (single-column vs. double-column,\
  \ bibliography style).\n\n### Step 2: Extraction & Injection Script Generation\n\
  Create a Python script (e.g., `convert_format.py`) to parse the source LaTeX file.\
  \ Use Regular Expressions to extract core text blocks. Merge the new template's\
  \ `preamble`, the extracted `body`, and the `backmatter`. Write this to a new file\
  \ in an output directory.\n\n### Step 3: Systematic Fixing\nPerform generic fixes\
  \ on the extracted body text before writing the final file, or in subsequent calls:\n\
  - Convert math environment cases (e.g., `\\begin{theorem}` to `\\begin{Theorem}`).\n\
  - Adjust aggressive float placements (e.g., `[!t]` or `[h!]`) to template-supported\
  \ options. Avoid forcing `[H]` unless the `float` package is explicitly loaded.\n\
  - Ensure `\\includegraphics` paths are relative to the new `.tex` file location.\n\
  - Convert `\\begin{tabular}` to `\\begin{tabularx}{\\textwidth}` or use `\\resizebox`\
  \ if moving to a double-column layout.\n\n### Step 4: Compilation & Debugging\n\
  Run a build cycle (`pdflatex` -> `bibtex` -> `pdflatex`). Check the `.log` file\
  \ using `grep` or `rg` to systematically fix any packages conflicts, undefined commands,\
  \ or compilation halts.\n\n## Examples\n\n### Example 1: Converting IPOL to MDPI\n\
  \\```\nUSER: \"I need to convert my paper 'SAHQR_Paper.tex' to the MDPI format located\
  \ in the 'MDPI_template_ACS' folder.\"\nAGENT: *Triggers latex-paper-conversion\
  \ skill*\n1. Analyzes source `.tex` and target `template.tex`.\n2. Creates Python\
  \ script to extract Introduction through Conclusion.\n3. Injects content into MDPI\
  \ template.\n4. Updates image paths and table float parameters `[h!]` to `[H]`.\n\
  5. Compiles \n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA:\
  \ Use exclusivamente o gerenciador uv para dependências. Todo código deve ser lintado\
  \ via ruff e tipado com mypy.\n"
