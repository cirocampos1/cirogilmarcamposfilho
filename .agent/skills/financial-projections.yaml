  ---\n\n# Financial Projections\n\nCreate a comprehensive 3-5 year financial model\
  \ with revenue projections, cost structure, headcount planning, cash flow analysis,\
  \ and three-scenario modeling (conservative, base, optimistic) for startup financial\
  \ planning and fundraising.\n\n## Use this skill when\n\n- Working on financial\
  \ projections tasks or workflows\n- Needing guidance, best practices, or checklists\
  \ for financial projections\n\n## Do not use this skill when\n\n- The task is unrelated\
  \ to financial projections\n- You need a different domain or tool outside this scope\n\
  \n## Instructions\n\n- Clarify goals, constraints, and required inputs.\n- Apply\
  \ relevant best practices and validate outcomes.\n- Provide actionable steps and\
  \ verification.\n- If detailed examples are required, open `resources/implementation-playbook.md`.\n\
  \n## What This Command Does\n\nThis command builds a complete financial model including:\n\
  1. Cohort-based revenue projections\n2. Detailed cost structure (COGS, S&M, R&D,\
  \ G&A)\n3. Headcount planning by role\n4. Monthly cash flow analysis\n5. Key metrics\
  \ (CAC, LTV, burn rate, runway)\n6. Three-scenario analysis\n\n## Instructions for\
  \ Claude\n\nWhen this command is invoked, follow these steps:\n\n### Step 1: Gather\
  \ Model Inputs\n\nAsk the user for essential information:\n\n**Business Model:**\n\
  - Revenue model (SaaS, marketplace, transaction, etc.)\n- Pricing structure (tiers,\
  \ average price)\n- Target customer segments\n\n**Starting Point:**\n- Current MRR/ARR\
  \ (if any)\n- Current customer count\n- Current team size\n- Current cash balance\n\
  \n**Growth Assumptions:**\n- Expected monthly customer acquisition\n- Customer retention/churn\
  \ rate\n- Average contract value (ACV)\n- Sales cycle length\n\n**Cost Assumptions:**\n\
  - Gross margin or COGS %\n- S&M budget or CAC target\n- Current burn rate (if applicable)\n\
  \n**Funding:**\n- Planned fundraising (amount, timing)\n- Pre/post-money valuation\n\
  \n### Step 2: Activate startup-financial-modeling Skill\n\nThe startup-financial-modeling\
  \ skill provides frameworks. Reference it for:\n- Revenue modeling approaches\n\
  - Cost structure templates\n- Headcount planning guidance\n- Scenario analysis methods\n\
  \n### Step 3: Build Revenue Model\n\n**Use Cohort-Based Approach:**\n\nFor each\
  \ month, track:\n1. New customers acquired\n2. Existing customers retained (apply\
  \ churn)\n3. Revenue per cohort (customers × ARPU)\n4. Expansion revenue (upsells)\n\
  \n**Formula:**\n```\nMRR (Month N) = Σ across all cohorts:\n  (Cohort Size × Retention\
  \ Rate × ARPU) + Expansion\n```\n\n**Project:**\n- Monthly detail for Year 1-2\n\
  - Quarterly detail for Year 3\n- Annual for Years 4-5\n\n### Step 4: Model Cost\
  \ Structure\n\nBreak down operating expenses:\n\n**1. Cost of Goods Sold (COGS)**\n\
