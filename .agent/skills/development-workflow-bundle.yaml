  \ \"2026-02-27\"\n---\n\n# Development Workflow Bundle\n\n## Overview\n\nConsolidated\
  \ workflow for end-to-end software development covering web, mobile, and backend\
  \ development. This bundle orchestrates skills for building production-ready applications\
  \ from scaffolding to deployment.\n\n## When to Use This Workflow\n\nUse this workflow\
  \ when:\n- Building new web or mobile applications\n- Adding features to existing\
  \ applications\n- Refactoring or modernizing legacy code\n- Setting up new projects\
  \ with best practices\n- Full-stack feature development\n- Cross-platform application\
  \ development\n\n## Workflow Phases\n\n### Phase 1: Project Setup and Scaffolding\n\
  \n#### Skills to Invoke\n- `app-builder` - Main application building orchestrator\n\
  - `senior-fullstack` - Full-stack development guidance\n- `environment-setup-guide`\
  \ - Development environment setup\n- `concise-planning` - Task planning and breakdown\n\
  \n#### Actions\n1. Determine project type (web, mobile, full-stack)\n2. Select technology\
  \ stack\n3. Scaffold project structure\n4. Configure development environment\n5.\
  \ Set up version control and CI/CD\n\n#### Copy-Paste Prompts\n```\nUse @app-builder\
  \ to scaffold a new React + Node.js full-stack application\n```\n\n```\nUse @senior-fullstack\
  \ to set up a Next.js 14 project with App Router\n```\n\n```\nUse @environment-setup-guide\
  \ to configure my development environment\n```\n\n### Phase 2: Frontend Development\n\
  \n#### Skills to Invoke\n- `frontend-developer` - React/Next.js component development\n\
  - `frontend-design` - UI/UX design implementation\n- `react-patterns` - Modern React\
  \ patterns\n- `typescript-pro` - TypeScript best practices\n- `tailwind-patterns`\
  \ - Tailwind CSS styling\n- `nextjs-app-router-patterns` - Next.js 14+ patterns\n\
  \n#### Actions\n1. Design component architecture\n2. Implement UI components\n3.\
  \ Set up state management\n4. Configure routing\n5. Apply styling and theming\n\
  6. Implement responsive design\n\n#### Copy-Paste Prompts\n```\nUse @frontend-developer\
  \ to create a dashboard component with React and TypeScript\n```\n\n```\nUse @react-patterns\
  \ to implement proper state management with Zustand\n```\n\n```\nUse @tailwind-patterns\
  \ to style components with a consistent design system\n```\n\n### Phase 3: Backend\
  \ Development\n\n#### Skills to Invoke\n- `backend-architect` - Backend architecture\
  \ design\n- `backend-dev-guidelines` - Backend development standards\n- `nodejs-backend-patterns`\
  \ - Node.js/Express patterns\n- `fastapi-pro` - FastAPI development\n- `api-design-principles`\
  \ - REST/GraphQL API design\n- `auth-implementation-patterns` - Authentication implementation\n\
  \n#### Actions\n1. Design API architecture\n2. Implement REST/GraphQL endpoints\n\
  3. Set up database connections\n4. Implement authentication/authorization\n5. Configure\
  \ middleware\n6. Set up error \n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ\
  \ DE ENGENHARIA: Use exclusivamente o gerenciador uv para dependências. Todo código\
  \ deve ser lintado via ruff e tipado com mypy.\n"
