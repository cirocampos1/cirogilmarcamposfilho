  risk: unknown\nsource: community\ndate_added: '2026-02-27'\n---\n\n# Azure.ResourceManager.MySql\
  \ (.NET)\n\nAzure Resource Manager SDK for managing MySQL Flexible Server deployments.\n\
  \n## Installation\n\n```bash\ndotnet add package Azure.ResourceManager.MySql\ndotnet\
  \ add package Azure.Identity\n```\n\n**Current Version**: v1.2.0 (GA)  \n**API Version**:\
  \ 2023-12-30\n\n> **Note**: This skill focuses on MySQL Flexible Server. Single\
  \ Server is deprecated and scheduled for retirement.\n\n## Environment Variables\n\
  \n```bash\nAZURE_SUBSCRIPTION_ID=<your-subscription-id>\nAZURE_RESOURCE_GROUP=<your-resource-group>\n\
  AZURE_MYSQL_SERVER_NAME=<your-mysql-server>\n```\n\n## Authentication\n\n```csharp\n\
  using Azure.Identity;\nusing Azure.ResourceManager;\nusing Azure.ResourceManager.MySql;\n\
  using Azure.ResourceManager.MySql.FlexibleServers;\n\nArmClient client = new ArmClient(new\
  \ DefaultAzureCredential());\n```\n\n## Resource Hierarchy\n\n```\nSubscription\n\
  └── ResourceGroup\n    └── MySqlFlexibleServer                 # MySQL Flexible\
  \ Server instance\n        ├── MySqlFlexibleServerDatabase     # Database within\
  \ the server\n        ├── MySqlFlexibleServerFirewallRule # IP firewall rules\n\
  \        ├── MySqlFlexibleServerConfiguration # Server parameters\n        ├── MySqlFlexibleServerBackup\
  \       # Backup information\n        ├── MySqlFlexibleServerMaintenanceWindow #\
  \ Maintenance schedule\n        └── MySqlFlexibleServerAadAdministrator # Entra\
  \ ID admin\n```\n\n## Core Workflows\n\n### 1. Create MySQL Flexible Server\n\n\
  ```csharp\nusing Azure.ResourceManager.MySql.FlexibleServers;\nusing Azure.ResourceManager.MySql.FlexibleServers.Models;\n\
  \nResourceGroupResource resourceGroup = await client\n    .GetDefaultSubscriptionAsync()\n\
  \    .Result\n    .GetResourceGroupAsync(\"my-resource-group\");\n\nMySqlFlexibleServerCollection\
  \ servers = resourceGroup.GetMySqlFlexibleServers();\n\nMySqlFlexibleServerData\
  \ data = new MySqlFlexibleServerData(AzureLocation.EastUS)\n{\n    Sku = new MySqlFlexibleServerSku(\"\
  Standard_D2ds_v4\", MySqlFlexibleServerSkuTier.GeneralPurpose),\n    AdministratorLogin\
  \ = \"mysqladmin\",\n    AdministratorLoginPassword = \"YourSecurePassword123!\"\
  ,\n    Version = MySqlFlexibleServerVersion.Ver8_0_21,\n    Storage = new MySqlFlexibleServerStorage\n\
  \    {\n        StorageSizeInGB = 128,\n        AutoGrow = MySqlFlexibleServerEnableStatusEnum.Enabled,\n\
  \        Iops = 3000\n    },\n    Backup = new MySqlFlexibleServerBackupProperties\n\
  \    {\n        BackupRetentionDays = 7,\n        GeoRedundantBackup = MySqlFlexibleServerEnableStatusEnum.Disabled\n\
  \    },\n    HighAvailability = new MySqlFlexibleServerHighAvailability\n    {\n\
  \        Mode = MySqlFlexibleServerHighAvailabilityMode.ZoneRedundant,\n       \
  \ StandbyAvailabilityZone = \"2\"\n    },\n    AvailabilityZone = \"1\"\n};\n\n\
  ArmOperation<MySqlFlexibleServerResource> operation = await servers\n    .CreateOrUpdateAsync(WaitUntil.Completed,\
  \ \"my-mys\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use\
