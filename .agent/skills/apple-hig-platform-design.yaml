  # Apple HIG: Platform Design


  Check for `.claude/apple-design-context.md` before asking questions. Use existing
  context and only ask for information not already covered.


  ## Key Principles


  1. **Each platform has a distinct identity.** Do not port designs between platforms.
  Respect each platform''s conventions, interaction models, and user expectations.


  2. **iOS: touch-first.** Direct manipulation on a handheld screen. Optimize for
  one-handed use. Navigation uses tab bars and push/pop stacks.


  3. **iPadOS: expanded canvas.** Support Split View, Slide Over, and Stage Manager.
  Use sidebars and multi-column layouts. Support pointer and keyboard alongside touch.


  4. **macOS: pointer and keyboard.** Dense information display is acceptable. Use
  menu bars, toolbars, and keyboard shortcuts extensively. Windows are resizable with
  precise control.


  5. **tvOS: remote and focus.** Viewed from a distance. Design for the Siri Remote
  with focus-based navigation. Large text, simple layouts, linear navigation.


  6. **visionOS: spatial interaction.** 3D environment using windows, volumes, and
  spaces. Eye tracking for targeting, indirect gestures for interaction. Respect ergonomic
  comfort zones.


  7. **watchOS: glanceable and brief.** Information consumable at a glance. Brief
  interactions. Digital Crown, haptics, and complications for timely content.


  8. **Games: own paradigm.** Free to define in-game interaction models, but still
  respect platform conventions for system interactions (notifications, accessibility,
  controllers).


