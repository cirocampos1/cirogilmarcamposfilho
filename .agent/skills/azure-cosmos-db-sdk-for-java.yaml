  risk: unknown\nsource: community\ndate_added: '2026-02-27'\n---\n\n# Azure Cosmos\
  \ DB SDK for Java\n\nClient library for Azure Cosmos DB NoSQL API with global distribution\
  \ and reactive patterns.\n\n## Installation\n\n```xml\n<dependency>\n    <groupId>com.azure</groupId>\n\
  \    <artifactId>azure-cosmos</artifactId>\n    <version>LATEST</version>\n</dependency>\n\
  ```\n\nOr use Azure SDK BOM:\n\n```xml\n<dependencyManagement>\n    <dependencies>\n\
  \        <dependency>\n            <groupId>com.azure</groupId>\n            <artifactId>azure-sdk-bom</artifactId>\n\
  \            <version>{bom_version}</version>\n            <type>pom</type>\n  \
  \          <scope>import</scope>\n        </dependency>\n    </dependencies>\n</dependencyManagement>\n\
  \n<dependencies>\n    <dependency>\n        <groupId>com.azure</groupId>\n     \
  \   <artifactId>azure-cosmos</artifactId>\n    </dependency>\n</dependencies>\n\
  ```\n\n## Environment Variables\n\n```bash\nCOSMOS_ENDPOINT=https://<account>.documents.azure.com:443/\n\
  COSMOS_KEY=<your-primary-key>\n```\n\n## Authentication\n\n### Key-based Authentication\n\
  \n```java\nimport com.azure.cosmos.CosmosClient;\nimport com.azure.cosmos.CosmosClientBuilder;\n\
  \nCosmosClient client = new CosmosClientBuilder()\n    .endpoint(System.getenv(\"\
  COSMOS_ENDPOINT\"))\n    .key(System.getenv(\"COSMOS_KEY\"))\n    .buildClient();\n\
  ```\n\n### Async Client\n\n```java\nimport com.azure.cosmos.CosmosAsyncClient;\n\
  \nCosmosAsyncClient asyncClient = new CosmosClientBuilder()\n    .endpoint(serviceEndpoint)\n\
  \    .key(key)\n    .buildAsyncClient();\n```\n\n### With Customizations\n\n```java\n\
  import com.azure.cosmos.ConsistencyLevel;\nimport java.util.Arrays;\n\nCosmosClient\
  \ client = new CosmosClientBuilder()\n    .endpoint(serviceEndpoint)\n    .key(key)\n\
  \    .directMode(directConnectionConfig, gatewayConnectionConfig)\n    .consistencyLevel(ConsistencyLevel.SESSION)\n\
  \    .connectionSharingAcrossClientsEnabled(true)\n    .contentResponseOnWriteEnabled(true)\n\
  \    .userAgentSuffix(\"my-application\")\n    .preferredRegions(Arrays.asList(\"\
  West US\", \"East US\"))\n    .buildClient();\n```\n\n## Client Hierarchy\n\n| Class\
  \ | Purpose |\n|-------|---------|\n| `CosmosClient` / `CosmosAsyncClient` | Account-level\
  \ operations |\n| `CosmosDatabase` / `CosmosAsyncDatabase` | Database operations\
  \ |\n| `CosmosContainer` / `CosmosAsyncContainer` | Container/item operations |\n\
  \n## Core Workflow\n\n### Create Database\n\n```java\n// Sync\nclient.createDatabaseIfNotExists(\"\
  myDatabase\")\n    .map(response -> client.getDatabase(response.getProperties().getId()));\n\
  \n// Async with chaining\nasyncClient.createDatabaseIfNotExists(\"myDatabase\")\n\
  \    .map(response -> asyncClient.getDatabase(response.getProperties().getId()))\n\
  \    .subscribe(database -> System.out.println(\"Created: \" + database.getId()));\n\
  ```\n\n### Create Container\n\n```java\nasyncClient.createDatabaseIfNotExists(\"\
