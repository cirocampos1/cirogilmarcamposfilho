  2026-02-27\"\n---\n\n# Azure Communication CallingServer (Java) - DEPRECATED\n\n\
  > **âš ď¸Ź DEPRECATED**: This SDK has been renamed to **Call Automation**. For new projects,\
  \ use `azure-communication-callautomation` instead. This skill is for maintaining\
  \ legacy code only.\n\n## Migration to Call Automation\n\n```xml\n<!-- OLD (deprecated)\
  \ -->\n<dependency>\n    <groupId>com.azure</groupId>\n    <artifactId>azure-communication-callingserver</artifactId>\n\
  \    <version>1.0.0-beta.5</version>\n</dependency>\n\n<!-- NEW (use this instead)\
  \ -->\n<dependency>\n    <groupId>com.azure</groupId>\n    <artifactId>azure-communication-callautomation</artifactId>\n\
  \    <version>1.6.0</version>\n</dependency>\n```\n\n## Class Name Changes\n\n|\
  \ CallingServer (Old) | Call Automation (New) |\n|---------------------|----------------------|\n\
  | `CallingServerClient` | `CallAutomationClient` |\n| `CallingServerClientBuilder`\
  \ | `CallAutomationClientBuilder` |\n| `CallConnection` | `CallConnection` (same)\
  \ |\n| `ServerCall` | Removed - use `CallConnection` |\n\n## Legacy Client Creation\n\
  \n```java\n// OLD WAY (deprecated)\nimport com.azure.communication.callingserver.CallingServerClient;\n\
  import com.azure.communication.callingserver.CallingServerClientBuilder;\n\nCallingServerClient\
  \ client = new CallingServerClientBuilder()\n    .connectionString(\"<connection-string>\"\
  )\n    .buildClient();\n\n// NEW WAY\nimport com.azure.communication.callautomation.CallAutomationClient;\n\
  import com.azure.communication.callautomation.CallAutomationClientBuilder;\n\nCallAutomationClient\
  \ client = new CallAutomationClientBuilder()\n    .connectionString(\"<connection-string>\"\
  )\n    .buildClient();\n```\n\n## Legacy Recording\n\n```java\n// OLD WAY\nStartRecordingOptions\
  \ options = new StartRecordingOptions(serverCallId)\n    .setRecordingStateCallbackUri(callbackUri);\n\
  \nStartCallRecordingResult result = client.startRecording(options);\nString recordingId\
  \ = result.getRecordingId();\n\nclient.pauseRecording(recordingId);\nclient.resumeRecording(recordingId);\n\
  client.stopRecording(recordingId);\n\n// NEW WAY - see azure-communication-callautomation\
  \ skill\n```\n\n## For New Development\n\n**Do not use this SDK for new projects.**\
  \ \n\nSee the `azure-communication-callautomation-java` skill for:\n- Making outbound\
  \ calls\n- Answering incoming calls\n- Call recording\n- DTMF recognition\n- Text-to-speech\
  \ / speech-to-text\n- Adding/removing participants\n- Call transfer\n\n## Trigger\
  \ Phrases\n\n- \"callingserver legacy\", \"deprecated calling SDK\"\n- \"migrate\
  \ callingserver to callautomation\"\n\n## When to Use\nThis skill is applicable\
  \ to execute the workflow or actions described in the overview.\n\n\n## Diretrizes\
