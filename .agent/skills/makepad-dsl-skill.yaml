  \n> **Version:** makepad-widgets (dev branch) | **Last Updated:** 2026-01-19\n>\n\
  > Check for updates: https://crates.io/crates/makepad-widgets\n\nYou are an expert\
  \ at the Rust `makepad-widgets` crate DSL. Help users by:\n- **Writing code**: Generate\
  \ DSL code following the patterns below\n- **Answering questions**: Explain DSL\
  \ syntax, inheritance, property overriding\n\n## When to Use\n\n- You need help\
  \ with Makepad `live_design!` syntax, object definitions, or inheritance patterns.\n\
  - The task involves widget declarations, property overrides, prototypes, or DSL\
  \ composition rules.\n- You want Makepad DSL-specific examples rather than generic\
  \ Rust syntax advice.\n\n## Documentation\n\nRefer to the local files for detailed\
  \ documentation:\n- `./references/dsl-syntax.md` - Complete DSL syntax reference\n\
  - `./references/inheritance.md` - Inheritance patterns and examples\n\n## IMPORTANT:\
  \ Documentation Completeness Check\n\n**Before answering questions, Claude MUST:**\n\
  \n1. Read the relevant reference file(s) listed above\n2. If file read fails or\
  \ file is empty:\n   - Inform user: \"本地文档不完整，建议运行 `/sync-crate-skills makepad --force`\
  \ 更新文档\"\n   - Still answer based on SKILL.md patterns + built-in knowledge\n3.\
  \ If reference file exists, incorporate its content into the answer\n\n## Key Patterns\n\
  \n### 1. Anonymous Object\n\n```rust\n{\n    width: 100.0\n    height: 50.0\n  \
  \  color: #FF0000\n}\n```\n\n### 2. Named Object (Prototype)\n\n```rust\nMyButton\
  \ = {\n    width: Fit\n    height: 40.0\n    padding: 10.0\n    draw_bg: { color:\
  \ #333333 }\n}\n```\n\n### 3. Inheritance with Override\n\n```rust\nPrimaryButton\
  \ = <MyButton> {\n    draw_bg: { color: #0066CC }  // Override parent color\n  \
  \  draw_text: { color: #FFFFFF }  // Add new property\n}\n```\n\n### 4. Widget Instantiation\n\
  \n```rust\n<View> {\n    // Inherits from View prototype\n    width: Fill\n    height:\
  \ Fill\n\n    <Button> { text: \"Click Me\" }  // Child widget\n    <Label> { text:\
  \ \"Hello\" }      // Another child\n}\n```\n\n### 5. Linking Rust Struct to DSL\n\
  \n```rust\n// In live_design!\nMyWidget = {{MyWidget}} {\n    // DSL properties\n\
  \    width: 100.0\n}\n\n// In Rust\n#[derive(Live, LiveHook, Widget)]\npub struct\
  \ MyWidget {\n    #[deref] view: View,\n    #[live] width: f64,\n}\n```\n\n## DSL\
  \ Syntax Reference\n\n| Syntax | Description | Example |\n|--------|-------------|---------|\n\
  | `{ ... }` | Anonymous object | `{ width: 100.0 }` |\n| `Name = { ... }` | Named\
  \ prototype | `MyStyle = { color: #FFF }` |\n| `<Name> { ... }` | Inherit from prototype\
  \ | `<MyStyle> { size: 10.0 }` |\n| `{{RustType}}` | Link to Rust struct | `App\
  \ = {{App}} { ... }` |\n| `name = <Widget>` | Named child widget | `btn = <Button>\
  \ { }` |\n| `dep(\"...\")` | Resource dependency | `dep(\"\n\n## Diretrizes do \n\
  \n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente o gerenciador uv para dependências.\
