  ---\n\n# Azure.Security.KeyVault.Keys (.NET)\n\nClient library for managing cryptographic\
  \ keys in Azure Key Vault and Managed HSM.\n\n## Installation\n\n```bash\ndotnet\
  \ add package Azure.Security.KeyVault.Keys\ndotnet add package Azure.Identity\n\
  ```\n\n**Current Version**: 4.7.0 (stable)\n\n## Environment Variables\n\n```bash\n\
  KEY_VAULT_NAME=<your-key-vault-name>\n# Or full URI\nAZURE_KEYVAULT_URL=https://<vault-name>.vault.azure.net\n\
  ```\n\n## Client Hierarchy\n\n```\nKeyClient (key management)\n├── CreateKey / CreateRsaKey\
  \ / CreateEcKey\n├── GetKey / GetKeys\n├── UpdateKeyProperties\n├── DeleteKey /\
  \ PurgeDeletedKey\n├── BackupKey / RestoreKey\n└── GetCryptographyClient() → CryptographyClient\n\
  \nCryptographyClient (cryptographic operations)\n├── Encrypt / Decrypt\n├── WrapKey\
  \ / UnwrapKey\n├── Sign / Verify\n└── SignData / VerifyData\n\nKeyResolver (key\
  \ resolution)\n└── Resolve(keyId) → CryptographyClient\n```\n\n## Authentication\n\
  \n### DefaultAzureCredential (Recommended)\n\n```csharp\nusing Azure.Identity;\n\
  using Azure.Security.KeyVault.Keys;\n\nvar keyVaultName = Environment.GetEnvironmentVariable(\"\
  KEY_VAULT_NAME\");\nvar kvUri = $\"https://{keyVaultName}.vault.azure.net\";\n\n\
  var client = new KeyClient(new Uri(kvUri), new DefaultAzureCredential());\n```\n\
  \n### Service Principal\n\n```csharp\nvar credential = new ClientSecretCredential(\n\
  \    tenantId: \"<tenant-id>\",\n    clientId: \"<client-id>\",\n    clientSecret:\
  \ \"<client-secret>\");\n\nvar client = new KeyClient(new Uri(kvUri), credential);\n\
  ```\n\n## Key Management\n\n### Create Keys\n\n```csharp\n// Create RSA key\nKeyVaultKey\
  \ rsaKey = await client.CreateKeyAsync(\"my-rsa-key\", KeyType.Rsa);\nConsole.WriteLine($\"\
  Created key: {rsaKey.Name}, Type: {rsaKey.KeyType}\");\n\n// Create RSA key with\
  \ options\nvar rsaOptions = new CreateRsaKeyOptions(\"my-rsa-key-2048\")\n{\n  \
  \  KeySize = 2048,\n    HardwareProtected = false, // true for HSM-backed\n    ExpiresOn\
  \ = DateTimeOffset.UtcNow.AddYears(1),\n    NotBefore = DateTimeOffset.UtcNow,\n\
  \    Enabled = true\n};\nrsaOptions.KeyOperations.Add(KeyOperation.Encrypt);\nrsaOptions.KeyOperations.Add(KeyOperation.Decrypt);\n\
  \nKeyVaultKey rsaKey2 = await client.CreateRsaKeyAsync(rsaOptions);\n\n// Create\
  \ EC key\nvar ecOptions = new CreateEcKeyOptions(\"my-ec-key\")\n{\n    CurveName\
  \ = KeyCurveName.P256,\n    HardwareProtected = true // HSM-backed\n};\nKeyVaultKey\
  \ ecKey = await client.CreateEcKeyAsync(ecOptions);\n\n// Create Oct (symmetric)\
  \ key for wrap/unwrap\nvar octOptions = new CreateOctKeyOptions(\"my-oct-key\")\n\
  {\n    KeySize = 256,\n    HardwareProtected = true\n};\nKeyVaultKey octKey = await\
  \ client.CreateOctKeyAsync(octOptions);\n```\n\n### Retrieve Keys\n\n```csharp\n\
