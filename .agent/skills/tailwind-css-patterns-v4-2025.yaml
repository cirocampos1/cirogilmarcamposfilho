  \nrisk: unknown\nsource: community\ndate_added: \"2026-02-27\"\n---\n\n# Tailwind\
  \ CSS Patterns (v4 - 2025)\n\n> Modern utility-first CSS with CSS-native configuration.\n\
  \n## When to Use\nUse this skill when configuring Tailwind v4, using CSS-first theme\
  \ and design tokens, or implementing container queries and modern Tailwind patterns.\n\
  \n---\n\n## 1. Tailwind v4 Architecture\n\n### What Changed from v3\n\n| v3 (Legacy)\
  \ | v4 (Current) |\n|-------------|--------------|\n| `tailwind.config.js` | CSS-based\
  \ `@theme` directive |\n| PostCSS plugin | Oxide engine (10x faster) |\n| JIT mode\
  \ | Native, always-on |\n| Plugin system | CSS-native features |\n| `@apply` directive\
  \ | Still works, discouraged |\n\n### v4 Core Concepts\n\n| Concept | Description\
  \ |\n|---------|-------------|\n| **CSS-first** | Configuration in CSS, not JavaScript\
  \ |\n| **Oxide Engine** | Rust-based compiler, much faster |\n| **Native Nesting**\
  \ | CSS nesting without PostCSS |\n| **CSS Variables** | All tokens exposed as `--*`\
  \ vars |\n\n---\n\n## 2. CSS-Based Configuration\n\n### Theme Definition\n\n```\n\
  @theme {\n  /* Colors - use semantic names */\n  --color-primary: oklch(0.7 0.15\
  \ 250);\n  --color-surface: oklch(0.98 0 0);\n  --color-surface-dark: oklch(0.15\
  \ 0 0);\n  \n  /* Spacing scale */\n  --spacing-xs: 0.25rem;\n  --spacing-sm: 0.5rem;\n\
  \  --spacing-md: 1rem;\n  --spacing-lg: 2rem;\n  \n  /* Typography */\n  --font-sans:\
  \ 'Inter', system-ui, sans-serif;\n  --font-mono: 'JetBrains Mono', monospace;\n\
  }\n```\n\n### When to Extend vs Override\n\n| Action | Use When |\n|--------|----------|\n\
  | **Extend** | Adding new values alongside defaults |\n| **Override** | Replacing\
  \ default scale entirely |\n| **Semantic tokens** | Project-specific naming (primary,\
  \ surface) |\n\n---\n\n## 3. Container Queries (v4 Native)\n\n### Breakpoint vs\
  \ Container\n\n| Type | Responds To |\n|------|-------------|\n| **Breakpoint**\
  \ (`md:`) | Viewport width |\n| **Container** (`@container`) | Parent element width\
  \ |\n\n### Container Query Usage\n\n| Pattern | Classes |\n|---------|---------|\n\
  | Define container | `@container` on parent |\n| Container breakpoint | `@sm:`,\
  \ `@md:`, `@lg:` on children |\n| Named containers | `@container/card` for specificity\
  \ |\n\n### When to Use\n\n| Scenario | Use |\n|----------|-----|\n| Page-level layouts\
  \ | Viewport breakpoints |\n| Component-level responsive | Container queries |\n\
  | Reusable components | Container queries (context-independent) |\n\n---\n\n## 4.\
  \ Responsive Design\n\n### Breakpoint System\n\n| Prefix | Min Width | Target |\n\
  |--------|-----------|--------|\n| (none) | 0px | Mobile-first base |\n| `sm:` |\
  \ 640px | Large phone / small tablet |\n| `md:` | 768px | Tablet |\n| `lg:` | 1024px\
  \ | Laptop |\n| `xl:` | 1280px | Desktop |\n| `2xl:` | 1536px | Large desktop |\n\
  \n### Mobile-First Principle\n\n1. Write mobile styles first (no prefix)\n2. Add\
  \ larger screen overrides with prefixes\n3. Example: `w-full md:w-1/2 lg:w-1/3`\n\
  \n---\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente\
  \ o gerenciador uv para dependências. Todo código deve ser lintado via ruff e tipado\
  \ com mypy.\n"
