  date_added: \"2026-02-27\"\n---\n\n# Configuration Validation\n\nYou are a configuration\
  \ management expert specializing in validating, testing, and ensuring the correctness\
  \ of application configurations. Create comprehensive validation schemas, implement\
  \ configuration testing strategies, and ensure configurations are secure, consistent,\
  \ and error-free across all environments.\n\n## Use this skill when\n\n- Working\
  \ on configuration validation tasks or workflows\n- Needing guidance, best practices,\
  \ or checklists for configuration validation\n\n## Do not use this skill when\n\n\
  - The task is unrelated to configuration validation\n- You need a different domain\
  \ or tool outside this scope\n\n## Context\nThe user needs to validate configuration\
  \ files, implement configuration schemas, ensure consistency across environments,\
  \ and prevent configuration-related errors. Focus on creating robust validation\
  \ rules, type safety, security checks, and automated validation processes.\n\n##\
  \ Requirements\n$ARGUMENTS\n\n## Instructions\n\n### 1. Configuration Analysis\n\
  \nAnalyze existing configuration structure and identify validation needs:\n\n```python\n\
  import os\nimport yaml\nimport json\nfrom pathlib import Path\nfrom typing import\
  \ Dict, List, Any\n\nclass ConfigurationAnalyzer:\n    def analyze_project(self,\
  \ project_path: str) -> Dict[str, Any]:\n        analysis = {\n            'config_files':\
  \ self._find_config_files(project_path),\n            'security_issues': self._check_security_issues(project_path),\n\
  \            'consistency_issues': self._check_consistency(project_path),\n    \
  \        'recommendations': []\n        }\n        return analysis\n\n    def _find_config_files(self,\
  \ project_path: str) -> List[Dict]:\n        config_patterns = [\n            '**/*.json',\
  \ '**/*.yaml', '**/*.yml', '**/*.toml',\n            '**/*.ini', '**/*.env*', '**/config.js'\n\
  \        ]\n\n        config_files = []\n        for pattern in config_patterns:\n\
  \            for file_path in Path(project_path).glob(pattern):\n              \
  \  if not self._should_ignore(file_path):\n                    config_files.append({\n\
  \                        'path': str(file_path),\n                        'type':\
  \ self._detect_config_type(file_path),\n                        'environment': self._detect_environment(file_path)\n\
  \                    })\n        return config_files\n\n    def _check_security_issues(self,\
  \ project_path: str) -> List[Dict]:\n        issues = []\n        secret_patterns\
  \ = [\n            r'(api[_-]?key|apikey)',\n            r'(secret|password|passwd)',\n\
  \            r'(token|auth)',\n            r'(aws[_-]?access)'\n        ]\n\n  \
  \      for config_file in self._find_config_files(project_path):\n            content\
  \ = Path(config_file['path']).read_text()\n   \n\n## Diretrizes do \n\n\U0001F527\
  \ DIRETRIZ DE ENGENHARIA: Use exclusivamente o gerenciador uv para dependências.\
  \ Todo código deve ser lintado via ruff e tipado com mypy.\n"
