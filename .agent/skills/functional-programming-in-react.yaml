  risk: unknown\nsource: community\nversion: 2.0.0\nauthor: fp-ts-skills\ntags: [fp-ts,\
  \ react, typescript, hooks, state-management, forms, data-fetching, remote-data,\
  \ react-19, next-js]\n---\n\n# Functional Programming in React\n\nPractical patterns\
  \ for React apps. No jargon, just code that works.\n\n---\n\n## Quick Reference\n\
  \n| Pattern | Use When |\n|---------|----------|\n| `Option` | Value might be missing\
  \ (user not loaded yet) |\n| `Either` | Operation might fail (form validation) |\n\
  | `TaskEither` | Async operation might fail (API calls) |\n| `RemoteData` | Need\
  \ to show loading/error/success states |\n| `pipe` | Chaining multiple transformations\
  \ |\n\n---\n\n## 1. State with Option (Maybe It's There, Maybe Not)\n\nUse `Option`\
  \ instead of `null | undefined` for clearer intent.\n\n### Basic Pattern\n\n```typescript\n\
  import { useState } from 'react'\nimport * as O from 'fp-ts/Option'\nimport { pipe\
  \ } from 'fp-ts/function'\n\ninterface User {\n  id: string\n  name: string\n  email:\
  \ string\n}\n\nfunction UserProfile() {\n  // Option says \"this might not exist\
  \ yet\"\n  const [user, setUser] = useState<O.Option<User>>(O.none)\n\n  const handleLogin\
  \ = (userData: User) => {\n    setUser(O.some(userData))\n  }\n\n  const handleLogout\
  \ = () => {\n    setUser(O.none)\n  }\n\n  return pipe(\n    user,\n    O.match(\n\
  \      // When there's no user\n      () => <button onClick={() => handleLogin({\
  \ id: '1', name: 'Alice', email: 'alice@example.com' })}>\n        Log In\n    \
  \  </button>,\n      // When there's a user\n      (u) => (\n        <div>\n   \
  \       <p>Welcome, {u.name}!</p>\n          <button onClick={handleLogout}>Log\
  \ Out</button>\n        </div>\n      )\n    )\n  )\n}\n```\n\n### Chaining Optional\
  \ Values\n\n```typescript\nimport * as O from 'fp-ts/Option'\nimport { pipe } from\
  \ 'fp-ts/function'\n\ninterface Profile {\n  user: O.Option<{\n    name: string\n\
  \    settings: O.Option<{\n      theme: string\n    }>\n  }>\n}\n\nfunction getTheme(profile:\
  \ Profile): string {\n  return pipe(\n    profile.user,\n    O.flatMap(u => u.settings),\n\
  \    O.map(s => s.theme),\n    O.getOrElse(() => 'light') // default\n  )\n}\n```\n\
  \n---\n\n## 2. Form Validation with Either\n\nEither is perfect for validation:\
  \ `Left` = errors, `Right` = valid data.\n\n### Simple Form Validation\n\n```typescript\n\
  import * as E from 'fp-ts/Either'\nimport * as A from 'fp-ts/Array'\nimport { pipe\
  \ } from 'fp-ts/function'\n\n// Validation functions return Either<ErrorMessage,\
  \ ValidValue>\nconst validateEmail = (email: string): E.Either<string, string> =>\n\
