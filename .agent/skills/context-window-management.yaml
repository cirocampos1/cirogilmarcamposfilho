  \ (Apache 2.0)\ndate_added: 2026-02-27\n---\n\n# Context Window Management\n\nStrategies\
  \ for managing LLM context windows including summarization, trimming, routing, and\
  \ avoiding context rot\n\n## Capabilities\n\n- context-engineering\n- context-summarization\n\
  - context-trimming\n- context-routing\n- token-counting\n- context-prioritization\n\
  \n## Prerequisites\n\n- Knowledge: LLM fundamentals, Tokenization basics, Prompt\
  \ engineering\n- Skills_recommended: prompt-engineering\n\n## Scope\n\n- Does_not_cover:\
  \ RAG implementation details, Model fine-tuning, Embedding models\n- Boundaries:\
  \ Focus is context optimization, Covers strategies not specific implementations\n\
  \n## Ecosystem\n\n### Primary_tools\n\n- tiktoken - OpenAI's tokenizer for counting\
  \ tokens\n- LangChain - Framework with context management utilities\n- Claude API\
  \ - 200K+ context with caching support\n\n## Patterns\n\n### Tiered Context Strategy\n\
  \nDifferent strategies based on context size\n\n**When to use**: Building any multi-turn\
  \ conversation system\n\ninterface ContextTier {\n    maxTokens: number;\n    strategy:\
  \ 'full' | 'summarize' | 'rag';\n    model: string;\n}\n\nconst TIERS: ContextTier[]\
  \ = [\n    { maxTokens: 8000, strategy: 'full', model: 'claude-3-haiku' },\n   \
  \ { maxTokens: 32000, strategy: 'full', model: 'claude-3-5-sonnet' },\n    { maxTokens:\
  \ 100000, strategy: 'summarize', model: 'claude-3-5-sonnet' },\n    { maxTokens:\
  \ Infinity, strategy: 'rag', model: 'claude-3-5-sonnet' }\n];\n\nasync function\
  \ selectStrategy(messages: Message[]): ContextTier {\n    const tokens = await countTokens(messages);\n\
  \n    for (const tier of TIERS) {\n        if (tokens <= tier.maxTokens) {\n   \
  \         return tier;\n        }\n    }\n    return TIERS[TIERS.length - 1];\n\
  }\n\nasync function prepareContext(messages: Message[]): PreparedContext {\n   \
  \ const tier = await selectStrategy(messages);\n\n    switch (tier.strategy) {\n\
  \        case 'full':\n            return { messages, model: tier.model };\n\n \
  \       case 'summarize':\n            const summary = await summarizeOldMessages(messages);\n\
  \            return { messages: [summary, ...recentMessages(messages)], model: tier.model\
  \ };\n\n        case 'rag':\n            const relevant = await retrieveRelevant(messages);\n\
  \            return { messages: [...relevant, ...recentMessages(messages)], model:\
  \ tier.model };\n    }\n}\n\n### Serial Position Optimization\n\nPlace important\
  \ content at start and end\n\n**When to use**: Constructing prompts with significant\
  \ context\n\n// LLMs weight beginning and end more heavily\n// Structure prompts\
  \ to leverage this\n\nfunction buildOptimalPrompt(components: {\n    systemPrompt:\
  \ string;\n    criticalContext: string;\n    conversationHistory: Message[];\n \
  \   currentQuery: string;\n}): string {\n    // START: System instructions (always\
  \ first)\n    const parts = [components.systemPrompt];\n\n    // CRIT\n\n## Diretrizes\
  \ do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente o gerenciador\
  \ uv para dependências. Todo código deve ser lintado via ruff e tipado com mypy.\n"
