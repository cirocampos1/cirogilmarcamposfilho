  \ += 0.01;\n  renderer.render(scene, camera);\n}\nanimate();\n\n// Handle resize\n\
  window.addEventListener(\"resize\", () => {\n  camera.aspect = window.innerWidth\
  \ / window.innerHeight;\n  camera.updateProjectionMatrix();\n  renderer.setSize(window.innerWidth,\
  \ window.innerHeight);\n});\n```\n\n## Core Classes\n\n### Scene\n\nContainer for\
  \ all 3D objects, lights, and cameras.\n\n```javascript\nconst scene = new THREE.Scene();\n\
  scene.background = new THREE.Color(0x000000); // Solid color\nscene.background =\
  \ texture; // Skybox texture\nscene.background = cubeTexture; // Cubemap\nscene.environment\
  \ = envMap; // Environment map for PBR\nscene.fog = new THREE.Fog(0xffffff, 1, 100);\
  \ // Linear fog\nscene.fog = new THREE.FogExp2(0xffffff, 0.02); // Exponential fog\n\
  ```\n\n### Cameras\n\n**PerspectiveCamera** - Most common, simulates human eye.\n\
  \n```javascript\n// PerspectiveCamera(fov, aspect, near, far)\nconst camera = new\
  \ THREE.PerspectiveCamera(\n  75, // Field of view (degrees)\n  window.innerWidth\
  \ / window.innerHeight, // Aspect ratio\n  0.1, // Near clipping plane\n  1000,\
  \ // Far clipping plane\n);\n\ncamera.position.set(0, 5, 10);\ncamera.lookAt(0,\
