  \ JavaScript Mastery\n\n> 33+ essential JavaScript concepts every developer should\
  \ know, inspired by [33-js-concepts](https://github.com/leonardomso/33-js-concepts).\n\
  \n## When to Use This Skill\n\nUse this skill when:\n\n- Explaining JavaScript concepts\n\
  - Debugging tricky JS behavior\n- Teaching JavaScript fundamentals\n- Reviewing\
  \ code for JS best practices\n- Understanding language quirks\n\n---\n\n## 1. Fundamentals\n\
  \n### 1.1 Primitive Types\n\nJavaScript has 7 primitive types:\n\n```javascript\n\
  // String\nconst str = \"hello\";\n\n// Number (integers and floats)\nconst num\
  \ = 42;\nconst float = 3.14;\n\n// BigInt (for large integers)\nconst big = 9007199254740991n;\n\
  \n// Boolean\nconst bool = true;\n\n// Undefined\nlet undef; // undefined\n\n//\
  \ Null\nconst empty = null;\n\n// Symbol (unique identifiers)\nconst sym = Symbol(\"\
  description\");\n```\n\n**Key points**:\n\n- Primitives are immutable\n- Passed\
  \ by value\n- `typeof null === \"object\"` is a historical bug\n\n### 1.2 Type Coercion\n\
  \nJavaScript implicitly converts types:\n\n```javascript\n// String coercion\n\"\
  5\" + 3; // \"53\" (number → string)\n\"5\" - 3; // 2    (string → number)\n\n//\
  \ Boolean coercion\nBoolean(\"\"); // false\nBoolean(\"hello\"); // true\nBoolean(0);\
  \ // false\nBoolean([]); // true (!)\n\n// Equality coercion\n\"5\" == 5; // true\
  \  (coerces)\n\"5\" === 5; // false (strict)\n```\n\n**Falsy values** (8 total):\n\
  `false`, `0`, `-0`, `0n`, `\"\"`, `null`, `undefined`, `NaN`\n\n### 1.3 Equality\
  \ Operators\n\n```javascript\n// == (loose equality) - coerces types\nnull == undefined;\
  \ // true\n\"1\" == 1; // true\n\n// === (strict equality) - no coercion\nnull ===\
  \ undefined; // false\n\"1\" === 1; // false\n\n// Object.is() - handles edge cases\n\
  Object.is(NaN, NaN); // true (NaN === NaN is false!)\nObject.is(-0, 0); // false\
  \ (0 === -0 is true!)\n```\n\n**Rule**: Always use `===` unless you have a specific\
  \ reason not to.\n\n---\n\n## 2. Scope & Closures\n\n### 2.1 Scope Types\n\n```javascript\n\
  // Global scope\nvar globalVar = \"global\";\n\nfunction outer() {\n  // Function\
  \ scope\n  var functionVar = \"function\";\n\n  if (true) {\n    // Block scope\
  \ (let/const only)\n    let blockVar = \"block\";\n    const alsoBlock = \"block\"\
  ;\n    var notBlock = \"function\"; // var ignores blocks!\n  }\n}\n```\n\n### 2.2\
  \ Closures\n\nA closure is a function that remembers its lexical scope:\n\n```javascript\n\
  function createCounter() {\n  let count = 0; // \"closed over\" variable\n\n  return\
  \ {\n    increment() {\n      return ++count;\n    },\n    decrement() {\n     \
  \ return --count;\n    },\n    getCount() {\n      return count;\n    },\n  };\n\
  }\n\nconst counter = createCounter();\ncounter.increment(); // 1\ncounter.increment();\
  \ // 2\ncounter.getCount(); // 2\n```\n\n**Common use cases**:\n\n- Data privacy\
  \ (module pattern)\n- Function factories\n- Partial application\n- Memoization\n\
