  \nrisk: unknown\nsource: community\n---\n\n# Odoo EDI Connector\n\n## Overview\n\
  \nElectronic Data Interchange (EDI) is the standard for automated B2B document exchange\
  \ — purchase orders, invoices, ASNs (Advance Shipping Notices). This skill guides\
  \ you through mapping EDI transactions (ANSI X12 or EDIFACT) to Odoo business objects,\
  \ setting up trading partner configurations, and automating inbound/outbound document\
  \ flows.\n\n## When to Use This Skill\n\n- A retail partner requires EDI 850 (Purchase\
  \ Orders) to do business with you.\n- You need to send EDI 856 (ASN) when goods\
  \ are shipped.\n- Automating EDI 810 (Invoice) generation from Odoo confirmed deliveries.\n\
  - Mapping EDI fields to Odoo fields for a new trading partner.\n\n## How It Works\n\
  \n1. **Activate**: Mention `@odoo-edi-connector` and specify the EDI transaction\
  \ set and trading partner.\n2. **Map**: Receive a complete field mapping table between\
  \ EDI segments and Odoo fields.\n3. **Automate**: Get Python code to parse incoming\
  \ EDI files and create Odoo records.\n\n## EDI ↔ Odoo Object Mapping\n\n| EDI Transaction\
  \ | Odoo Object |\n|---|---|\n| 850 Purchase Order | `sale.order` (inbound customer\
  \ PO) |\n| 855 PO Acknowledgment | Confirmation email / SO confirmation |\n| 856\
  \ ASN (Advance Ship Notice) | `stock.picking` (delivery order) |\n| 810 Invoice\
  \ | `account.move` (customer invoice) |\n| 846 Inventory Inquiry | `product.product`\
  \ stock levels |\n| 997 Functional Acknowledgment | Automated receipt confirmation\
  \ |\n\n## Examples\n\n### Example 1: Parse EDI 850 and Create Odoo Sale Order (Python)\n\
  \n```python\nfrom pyx12 import x12file  # pip install pyx12\nfrom datetime import\
  \ datetime\n\nimport xmlrpc.client\nimport os\n\nodoo_url = os.getenv(\"ODOO_URL\"\
  )\ndb = os.getenv(\"ODOO_DB\")\npwd = os.getenv(\"ODOO_API_KEY\") \nuid = int(os.getenv(\"\
  ODOO_UID\", \"2\"))\n\nmodels = xmlrpc.client.ServerProxy(f\"{odoo_url}/xmlrpc/2/object\"\
  )\n\ndef process_850(edi_file_path):\n    \"\"\"Parse X12 850 Purchase Order and\
  \ create Odoo Sale Order\"\"\"\n    with x12file.X12File(edi_file_path) as f:\n\
  \        for transaction in f.get_transaction_sets():\n            # Extract header\
  \ info (BEG segment)                     \n            po_number = transaction['BEG'][3]\
  \    # Purchase Order Number                                                   \
  \ \n            po_date   = transaction['BEG'][5]    # Purchase Order Date \n\n\
  \            # IDEMPOTENCY CHECK: Verify PO doesn't already exist in Odoo\n    \
  \        existing = models.execute_kw(db, uid, pwd, 'sale.order', 'search', [\n\
  \                [['client_order_ref', '=', po_number]]\n            ])\n      \
  \      if existing:\n                print(f\"Skipping: PO {po_number} already exists.\"\
  )\n                continue \n\n            # Extract partner (N1 segment — Buyer)\n\
  \n\n                        # Extract partner (N1 segment — Buyer)             \
