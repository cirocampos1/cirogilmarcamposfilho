  \n## Installation\n\n```bash\npip install azure-search-documents\n```\n\n## Environment\
  \ Variables\n\n```bash\nAZURE_SEARCH_ENDPOINT=https://<service-name>.search.windows.net\n\
  AZURE_SEARCH_API_KEY=<your-api-key>\nAZURE_SEARCH_INDEX_NAME=<your-index-name>\n\
  ```\n\n## Authentication\n\n### API Key\n\n```python\nfrom azure.search.documents\
