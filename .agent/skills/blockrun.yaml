  date_added: \"2026-02-27\"\n---\n\n# BlockRun\n\n**BlockRun works with Claude Code\
  \ and Google Antigravity.**\n\nYou can't generate images. You have no real-time\
  \ X/Twitter access. BlockRun gives you these capabilities.\n\n## Philosophy\n\n\
  You have a wallet. When you need a capability you lack, you pay for it autonomously.\n\
  \n| You Need | You Call | Pricing |\n|----------|----------|---------|\n| Image\
  \ generation | DALL-E | $0.04/image |\n| Real-time X data | Grok + Live Search |\
  \ $0.025/source |\n| Second opinion | GPT-5.2 | $1.75/M input, $14/M output |\n\
  | Cheaper processing | DeepSeek | $0.14/M input, $0.28/M output |\n\n**How it works:**\
  \ BlockRun uses x402 micropayments to route your requests to OpenAI, xAI, Google,\
  \ and other providers. No API keys needed - your wallet pays per token.\n\n## Budget\
  \ Control (Optional)\n\nIf the user specifies a budget (e.g., \"use at most $1\"\
  ), track spending and stop when budget is reached:\n\n```python\nfrom blockrun_llm\
  \ import setup_agent_wallet\n\nclient = setup_agent_wallet()\nbudget = 1.0  # User's\
  \ budget\n\n# Before each call, check if within budget\nspending = client.get_spending()\n\
  if spending['total_usd'] >= budget:\n    print(f\"Budget reached: ${spending['total_usd']:.4f}\
  \ spent\")\n    # Stop making calls\nelse:\n    response = client.chat(\"openai/gpt-5.2\"\
  , \"Hello!\")\n\n# At the end, report spending\nspending = client.get_spending()\n\
  print(f\"\U0001F4B0 Total spent: ${spending['total_usd']:.4f} across {spending['calls']}\
  \ calls\")\n```\n\n## When to Use\n| Trigger | Your Action |\n|---------|-------------|\n\
  | User explicitly requests (\"blockrun second opinion with GPT on...\", \"use grok\
  \ to check...\", \"generate image with dall-e\") | Execute via BlockRun |\n| User\
  \ needs something you can't do (images, live X data) | Suggest BlockRun, wait for\
  \ confirmation |\n| You can handle the task fine | Do it yourself, don't mention\
  \ BlockRun |\n\n## Example User Prompts\n\nUsers will say things like:\n\n| User\
  \ Says | What You Do |\n|-----------|-------------|\n| \"blockrun generate an image\
  \ of a sunset\" | Call DALL-E via ImageClient |\n| \"use grok to check what's trending\
  \ on X\" | Call Grok with `search=True` |\n| \"blockrun GPT review this code\" |\
  \ Call GPT-5.2 via LLMClient |\n| \"what's the latest news about AI agents?\" |\
  \ Suggest Grok (you lack real-time data) |\n| \"generate a logo for my startup\"\
  \ | Suggest DALL-E (you can't generate images) |\n| \"blockrun check my balance\"\
  \ | Show wallet balance via `get_balance()` |\n| \"blockrun deepseek summarize this\
  \ file\" | Call DeepSeek for cost savings |\n\n## Wallet & Balance\n\nUse `setup_agent_wallet()`\
  \ to auto-create a wallet and get a client. This shows the QR code and welcome message\
  \ on first use.\n\n**Initialize client (always start with this):**\n```python\n\
  from blockrun_llm import setup_agent_wallet\n\nclient = setup_agent_wallet()  #\
  \ Auto-creates wallet, shows QR if new\n```\n\n**Check balance (when user asks \"\
  show balance\", \"check wallet\", et\n\n## Diretrizes do \n\n\U0001F527\
