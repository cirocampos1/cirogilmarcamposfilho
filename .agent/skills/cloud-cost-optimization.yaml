  \n# Cloud Cost Optimization\n\nStrategies and patterns for optimizing cloud costs\
  \ across AWS, Azure, and GCP.\n\n## Do not use this skill when\n\n- The task is\
  \ unrelated to cloud cost optimization\n- You need a different domain or tool outside\
  \ this scope\n\n## Instructions\n\n- Clarify goals, constraints, and required inputs.\n\
  - Apply relevant best practices and validate outcomes.\n- Provide actionable steps\
  \ and verification.\n- If detailed examples are required, open `resources/implementation-playbook.md`.\n\
  \n## Purpose\n\nImplement systematic cost optimization strategies to reduce cloud\
  \ spending while maintaining performance and reliability.\n\n## Use this skill when\n\
  \n- Reduce cloud spending\n- Right-size resources\n- Implement cost governance\n\
  - Optimize multi-cloud costs\n- Meet budget constraints\n\n## Cost Optimization\
  \ Framework\n\n### 1. Visibility\n- Implement cost allocation tags\n- Use cloud\
  \ cost management tools\n- Set up budget alerts\n- Create cost dashboards\n\n###\
  \ 2. Right-Sizing\n- Analyze resource utilization\n- Downsize over-provisioned resources\n\
  - Use auto-scaling\n- Remove idle resources\n\n### 3. Pricing Models\n- Use reserved\
  \ capacity\n- Leverage spot/preemptible instances\n- Implement savings plans\n-\
  \ Use committed use discounts\n\n### 4. Architecture Optimization\n- Use managed\
  \ services\n- Implement caching\n- Optimize data transfer\n- Use lifecycle policies\n\
  \n## AWS Cost Optimization\n\n### Reserved Instances\n```\nSavings: 30-72% vs On-Demand\n\
  Term: 1 or 3 years\nPayment: All/Partial/No upfront\nFlexibility: Standard or Convertible\n\
  ```\n\n### Savings Plans\n```\nCompute Savings Plans: 66% savings\nEC2 Instance\
  \ Savings Plans: 72% savings\nApplies to: EC2, Fargate, Lambda\nFlexible across:\
  \ Instance families, regions, OS\n```\n\n### Spot Instances\n```\nSavings: Up to\
  \ 90% vs On-Demand\nBest for: Batch jobs, CI/CD, stateless workloads\nRisk: 2-minute\
  \ interruption notice\nStrategy: Mix with On-Demand for resilience\n```\n\n### S3\
  \ Cost Optimization\n```hcl\nresource \"aws_s3_bucket_lifecycle_configuration\"\
  \ \"example\" {\n  bucket = aws_s3_bucket.example.id\n\n  rule {\n    id     = \"\
  transition-to-ia\"\n    status = \"Enabled\"\n\n    transition {\n      days   \
  \       = 30\n      storage_class = \"STANDARD_IA\"\n    }\n\n    transition {\n\
  \      days          = 90\n      storage_class = \"GLACIER\"\n    }\n\n    expiration\
  \ {\n      days = 365\n    }\n  }\n}\n```\n\n## Azure Cost Optimization\n\n### Reserved\
  \ VM Instances\n- 1 or 3 year terms\n- Up to 72% savings\n- Flexible sizing\n- Exchangeable\n\
  \n### Azure Hybrid Benefit\n- Use existing Windows Server licenses\n- Up to 80%\
  \ savings with RI\n- Available for Windows and SQL Server\n\n### Azure Advisor Recommendations\n\
  - Right-size VMs\n- Delete unused resources\n- Use reserved capacity\n- Optimize\
  \ storage\n\n## GCP Cost Optimization\n\n### Committed Use Discounts\n- 1 or 3 year\
  \ commitment\n- Up to 57% savings\n- Applies to vCPUs and \n\n## Diretrizes do \n\
