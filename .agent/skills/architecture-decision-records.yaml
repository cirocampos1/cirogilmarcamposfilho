  name: architecture-decision-records\ndescription: \"Comprehensive patterns for creating,\
  \ maintaining, and managing Architecture Decision Records (ADRs) that capture the\
  \ context and rationale behind significant technical decisions.\"\nrisk: unknown\n\
  source: community\ndate_added: \"2026-02-27\"\n---\n\n# Architecture Decision Records\n\
  \nComprehensive patterns for creating, maintaining, and managing Architecture Decision\
  \ Records (ADRs) that capture the context and rationale behind significant technical\
  \ decisions.\n\n## Use this skill when\n\n- Making significant architectural decisions\n\
  - Documenting technology choices\n- Recording design trade-offs\n- Onboarding new\
  \ team members\n- Reviewing historical decisions\n- Establishing decision-making\
  \ processes\n\n## Do not use this skill when\n\n- You only need to document small\
  \ implementation details\n- The change is a minor patch or routine maintenance\n\
  - There is no architectural decision to capture\n\n## Instructions\n\n1. Capture\
  \ the decision context, constraints, and drivers.\n2. Document considered options\
  \ with tradeoffs.\n3. Record the decision, rationale, and consequences.\n4. Link\
  \ related ADRs and update status over time.\n\n## Core Concepts\n\n### 1. What is\
  \ an ADR?\n\nAn Architecture Decision Record captures:\n- **Context**: Why we needed\
  \ to make a decision\n- **Decision**: What we decided\n- **Consequences**: What\
  \ happens as a result\n\n### 2. When to Write an ADR\n\n| Write ADR | Skip ADR |\n\
  |-----------|----------|\n| New framework adoption | Minor version upgrades |\n\
  | Database technology choice | Bug fixes |\n| API design patterns | Implementation\
  \ details |\n| Security architecture | Routine maintenance |\n| Integration patterns\
  \ | Configuration changes |\n\n### 3. ADR Lifecycle\n\n```\nProposed → Accepted\
  \ → Deprecated → Superseded\n              ↓\n           Rejected\n```\n\n## Templates\n\
  \n### Template 1: Standard ADR (MADR Format)\n\n```markdown\n# ADR-0001: Use PostgreSQL\
  \ as Primary Database\n\n## Status\n\nAccepted\n\n## Context\n\nWe need to select\
  \ a primary database for our new e-commerce platform. The system\nwill handle:\n\
  - ~10,000 concurrent users\n- Complex product catalog with hierarchical categories\n\
  - Transaction processing for orders and payments\n- Full-text search for products\n\
  - Geospatial queries for store locator\n\nThe team has experience with MySQL, PostgreSQL,\
  \ and MongoDB. We need ACID\ncompliance for financial transactions.\n\n## Decision\
  \ Drivers\n\n* **Must have ACID compliance** for payment processing\n* **Must support\
  \ complex queries** for reporting\n* **Should support full-text search** to reduce\
  \ infrastructure complexity\n* **Should have good JSON support** for flexible product\
  \ attributes\n* **Team familiarity** reduces onboarding time\n\n## Considered Options\n\
  \n### Option 1: PostgreSQL\n- **Pros**: ACID compliant, excellent JSON support (JSONB),\
  \ built-in full-text\n  search, PostGIS for geospatial, team has experience\n- **Cons**:\
  \ Slightly more complex replication setup than MySQL\n\n### Option 2: MySQL\n- **Pros**:\
  \ Very familiar to team, simple replicati\n\n## Diretrizes do \n\n\U0001F527\
  \ DIRETRIZ DE ENGENHARIA: Use exclusivamente o gerenciador uv para dependências.\
  \ Todo código deve ser lintado via ruff e tipado com mypy.\n"
