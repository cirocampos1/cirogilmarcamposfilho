  # Azure Identity SDK for Python\n\nAuthentication library for Azure SDK clients\
  \ using Microsoft Entra ID (formerly Azure AD).\n\n## Installation\n\n```bash\n\
  pip install azure-identity\n```\n\n## Environment Variables\n\n```bash\n# Service\
  \ Principal (for production/CI)\nAZURE_TENANT_ID=<your-tenant-id>\nAZURE_CLIENT_ID=<your-client-id>\n\
  AZURE_CLIENT_SECRET=<your-client-secret>\n\n# User-assigned Managed Identity (optional)\n\
  AZURE_CLIENT_ID=<managed-identity-client-id>\n```\n\n## DefaultAzureCredential\n\
  \nThe recommended credential for most scenarios. Tries multiple authentication methods\
  \ in order:\n\n```python\nfrom azure.identity import DefaultAzureCredential\nfrom\
  \ azure.storage.blob import BlobServiceClient\n\n# Works in local dev AND production\
  \ without code changes\ncredential = DefaultAzureCredential()\n\nclient = BlobServiceClient(\n\
  \    account_url=\"https://<account>.blob.core.windows.net\",\n    credential=credential\n\
  )\n```\n\n### Credential Chain Order\n\n| Order | Credential | Environment |\n|-------|-----------|-------------|\n\
  | 1 | EnvironmentCredential | CI/CD, containers |\n| 2 | WorkloadIdentityCredential\
  \ | Kubernetes |\n| 3 | ManagedIdentityCredential | Azure VMs, App Service, Functions\
  \ |\n| 4 | SharedTokenCacheCredential | Windows only |\n| 5 | VisualStudioCodeCredential\
  \ | VS Code with Azure extension |\n| 6 | AzureCliCredential | `az login` |\n| 7\
  \ | AzurePowerShellCredential | `Connect-AzAccount` |\n| 8 | AzureDeveloperCliCredential\
  \ | `azd auth login` |\n\n### Customizing DefaultAzureCredential\n\n```python\n\
  # Exclude credentials you don't need\ncredential = DefaultAzureCredential(\n   \
  \ exclude_environment_credential=True,\n    exclude_shared_token_cache_credential=True,\n\
  \    managed_identity_client_id=\"<user-assigned-mi-client-id>\"  # For user-assigned\
  \ MI\n)\n\n# Enable interactive browser (disabled by default)\ncredential = DefaultAzureCredential(\n\
  \    exclude_interactive_browser_credential=False\n)\n```\n\n## Specific Credential\
  \ Types\n\n### ManagedIdentityCredential\n\nFor Azure-hosted resources (VMs, App\
  \ Service, Functions, AKS):\n\n```python\nfrom azure.identity import ManagedIdentityCredential\n\
  \n# System-assigned managed identity\ncredential = ManagedIdentityCredential()\n\
  \n# User-assigned managed identity\ncredential = ManagedIdentityCredential(\n  \
  \  client_id=\"<user-assigned-mi-client-id>\"\n)\n```\n\n### ClientSecretCredential\n\
  \nFor service principal with secret:\n\n```python\nfrom azure.identity import ClientSecretCredential\n\
  \ncredential = ClientSecretCredential(\n    tenant_id=os.environ[\"AZURE_TENANT_ID\"\
  ],\n    client_id=os.environ[\"AZURE_CLIENT_ID\"],\n    client_secret=os.environ[\"\
  AZURE_CLIENT_SECRET\"]\n)\n```\n\n### AzureCliCredential\n\nUses the account from\
  \ `az login`:\n\n```python\nfrom azure.identity import AzureCliCredential\n\ncredential\
  \ = AzureCliCredential()\n```\n\n### ChainedToke\n\n## Diretrizes do \n\n\
