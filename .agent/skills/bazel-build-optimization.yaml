  - Optimizing build times\n- Writing custom Bazel rules\n- Debugging build issues\n\
  - Migrating to Bazel\n\n## Core Concepts\n\n### 1. Bazel Architecture\n\n```\nworkspace/\n\
  ├── WORKSPACE.bazel       # External dependencies\n├── .bazelrc              # Build\
  \ configurations\n├── .bazelversion         # Bazel version\n├── BUILD.bazel   \
  \        # Root build file\n├── apps/\n│   └── web/\n│       └── BUILD.bazel\n├──\
  \ libs/\n│   └── utils/\n│       └── BUILD.bazel\n└── tools/\n    └── bazel/\n \
  \       └── rules/\n```\n\n### 2. Key Concepts\n\n| Concept | Description |\n|---------|-------------|\n\
  | **Target** | Buildable unit (library, binary, test) |\n| **Package** | Directory\
  \ with BUILD file |\n| **Label** | Target identifier `//path/to:target` |\n| **Rule**\
  \ | Defines how to build a target |\n| **Aspect** | Cross-cutting build behavior\
  \ |\n\n## Templates\n\n### Template 1: WORKSPACE Configuration\n\n```python\n# WORKSPACE.bazel\n\
  workspace(name = \"myproject\")\n\nload(\"@bazel_tools//tools/build_defs/repo:http.bzl\"\
  , \"http_archive\")\n\n# Rules for JavaScript/TypeScript\nhttp_archive(\n    name\
  \ = \"aspect_rules_js\",\n    sha256 = \"...\",\n    strip_prefix = \"rules_js-1.34.0\"\
  ,\n    url = \"https://github.com/aspect-build/rules_js/releases/download/v1.34.0/rules_js-v1.34.0.tar.gz\"\
  ,\n)\n\nload(\"@aspect_rules_js//js:repositories.bzl\", \"rules_js_dependencies\"\
  )\nrules_js_dependencies()\n\nload(\"@rules_nodejs//nodejs:repositories.bzl\", \"\
  nodejs_register_toolchains\")\nnodejs_register_toolchains(\n    name = \"nodejs\"\
  ,\n    node_version = \"20.9.0\",\n)\n\nload(\"@aspect_rules_js//npm:repositories.bzl\"\
  , \"npm_translate_lock\")\nnpm_translate_lock(\n    name = \"npm\",\n    pnpm_lock\
  \ = \"//:pnpm-lock.yaml\",\n    verify_node_modules_ignored = \"//:.bazelignore\"\
  ,\n)\n\nload(\"@npm//:repositories.bzl\", \"npm_repositories\")\nnpm_repositories()\n\
  \n# Rules for Python\nhttp_archive(\n    name = \"rules_python\",\n    sha256 =\
  \ \"...\",\n    strip_prefix = \"rules_python-0.27.0\",\n    url = \"https://github.com/bazelbuild/rules_python/releases/download/0.27.0/rules_python-0.27.0.tar.gz\"\
  ,\n)\n\nload(\"@rules_python//python:repositories.bzl\", \"py_repositories\")\n\
  py_repositories()\n```\n\n### Template 2: .bazelrc Configuration\n\n```bash\n# .bazelrc\n\
