  date_added: '2026-02-27'\n---\n\n# @azure/cosmos (TypeScript/JavaScript)\n\nData\
  \ plane SDK for Azure Cosmos DB NoSQL API operations — CRUD on documents, queries,\
  \ bulk operations.\n\n> **⚠️ Data vs Management Plane**\n> - **This SDK (@azure/cosmos)**:\
  \ CRUD operations on documents, queries, stored procedures\n> - **Management SDK\
  \ (@azure/arm-cosmosdb)**: Create accounts, databases, containers via ARM\n\n##\
  \ Installation\n\n```bash\nnpm install @azure/cosmos @azure/identity\n```\n\n**Current\
  \ Version**: 4.9.0  \n**Node.js**: >= 20.0.0\n\n## Environment Variables\n\n```bash\n\
  COSMOS_ENDPOINT=https://<account>.documents.azure.com:443/\nCOSMOS_DATABASE=<database-name>\n\
  COSMOS_CONTAINER=<container-name>\n# For key-based auth only (prefer AAD)\nCOSMOS_KEY=<account-key>\n\
  ```\n\n## Authentication\n\n### AAD with DefaultAzureCredential (Recommended)\n\n\
  ```typescript\nimport { CosmosClient } from \"@azure/cosmos\";\nimport { DefaultAzureCredential\
  \ } from \"@azure/identity\";\n\nconst client = new CosmosClient({\n  endpoint:\
  \ process.env.COSMOS_ENDPOINT!,\n  aadCredentials: new DefaultAzureCredential(),\n\
  });\n```\n\n### Key-Based Authentication\n\n```typescript\nimport { CosmosClient\
  \ } from \"@azure/cosmos\";\n\n// Option 1: Endpoint + Key\nconst client = new CosmosClient({\n\
  \  endpoint: process.env.COSMOS_ENDPOINT!,\n  key: process.env.COSMOS_KEY!,\n});\n\
  \n// Option 2: Connection String\nconst client = new CosmosClient(process.env.COSMOS_CONNECTION_STRING!);\n\
  ```\n\n## Resource Hierarchy\n\n```\nCosmosClient\n└── Database\n    └── Container\n\
  \        ├── Items (documents)\n        ├── Scripts (stored procedures, triggers,\
  \ UDFs)\n        └── Conflicts\n```\n\n## Core Operations\n\n### Database & Container\
  \ Setup\n\n```typescript\nconst { database } = await client.databases.createIfNotExists({\n\
  \  id: \"my-database\",\n});\n\nconst { container } = await database.containers.createIfNotExists({\n\
  \  id: \"my-container\",\n  partitionKey: { paths: [\"/partitionKey\"] },\n});\n\
  ```\n\n### Create Document\n\n```typescript\ninterface Product {\n  id: string;\n\
  \  partitionKey: string;\n  name: string;\n  price: number;\n}\n\nconst item: Product\
  \ = {\n  id: \"product-1\",\n  partitionKey: \"electronics\",\n  name: \"Laptop\"\
  ,\n  price: 999.99,\n};\n\nconst { resource } = await container.items.create<Product>(item);\n\
  ```\n\n### Read Document\n\n```typescript\nconst { resource } = await container\n\
  \  .item(\"product-1\", \"electronics\") // id, partitionKey\n  .read<Product>();\n\
  \nif (resource) {\n  console.log(resource.name);\n}\n```\n\n### Update Document\
  \ (Replace)\n\n```typescript\nconst { resource: existing } = await container\n \
  \ .item(\"product-1\", \"electronics\")\n  .read<Product>();\n\nif (existing) {\n\
  \  existing.price = 899.99;\n  const { resource: updated } = await container\n \
  \   .item(\"product-1\", \"electronics\")\n    .replace<Product>(existing);\n}\n\
  ```\n\n### Upsert Document\n\n```types\n\n## Diretrizes do \n\n\U0001F527\
