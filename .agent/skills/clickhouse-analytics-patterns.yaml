  \n---\n\n# ClickHouse Analytics Patterns\n\nClickHouse-specific patterns for high-performance\
  \ analytics and data engineering.\n\n## Overview\n\nClickHouse is a column-oriented\
  \ database management system (DBMS) for online analytical processing (OLAP). It's\
  \ optimized for fast analytical queries on large datasets.\n\n**Key Features:**\n\
  - Column-oriented storage\n- Data compression\n- Parallel query execution\n- Distributed\
  \ queries\n- Real-time analytics\n\n## Table Design Patterns\n\n### MergeTree Engine\
  \ (Most Common)\n\n```sql\nCREATE TABLE markets_analytics (\n    date Date,\n  \
  \  market_id String,\n    market_name String,\n    volume UInt64,\n    trades UInt32,\n\
  \    unique_traders UInt32,\n    avg_trade_size Float64,\n    created_at DateTime\n\
  ) ENGINE = MergeTree()\nPARTITION BY toYYYYMM(date)\nORDER BY (date, market_id)\n\
  SETTINGS index_granularity = 8192;\n```\n\n### ReplacingMergeTree (Deduplication)\n\
  \n```sql\n-- For data that may have duplicates (e.g., from multiple sources)\nCREATE\
  \ TABLE user_events (\n    event_id String,\n    user_id String,\n    event_type\
  \ String,\n    timestamp DateTime,\n    properties String\n) ENGINE = ReplacingMergeTree()\n\
  PARTITION BY toYYYYMM(timestamp)\nORDER BY (user_id, event_id, timestamp)\nPRIMARY\
  \ KEY (user_id, event_id);\n```\n\n### AggregatingMergeTree (Pre-aggregation)\n\n\
  ```sql\n-- For maintaining aggregated metrics\nCREATE TABLE market_stats_hourly\
  \ (\n    hour DateTime,\n    market_id String,\n    total_volume AggregateFunction(sum,\
  \ UInt64),\n    total_trades AggregateFunction(count, UInt32),\n    unique_users\
  \ AggregateFunction(uniq, String)\n) ENGINE = AggregatingMergeTree()\nPARTITION\
  \ BY toYYYYMM(hour)\nORDER BY (hour, market_id);\n\n-- Query aggregated data\nSELECT\n\
  \    hour,\n    market_id,\n    sumMerge(total_volume) AS volume,\n    countMerge(total_trades)\
  \ AS trades,\n    uniqMerge(unique_users) AS users\nFROM market_stats_hourly\nWHERE\
  \ hour >= toStartOfHour(now() - INTERVAL 24 HOUR)\nGROUP BY hour, market_id\nORDER\
  \ BY hour DESC;\n```\n\n## Query Optimization Patterns\n\n### Efficient Filtering\n\
  \n```sql\n-- ✅ GOOD: Use indexed columns first\nSELECT *\nFROM markets_analytics\n\
  WHERE date >= '2025-01-01'\n  AND market_id = 'market-123'\n  AND volume > 1000\n\
  ORDER BY date DESC\nLIMIT 100;\n\n-- ❌ BAD: Filter on non-indexed columns first\n\
  SELECT *\nFROM markets_analytics\nWHERE volume > 1000\n  AND market_name LIKE '%election%'\n\
  \  AND date >= '2025-01-01';\n```\n\n### Aggregations\n\n```sql\n-- ✅ GOOD: Use\
  \ ClickHouse-specific aggregation functions\nSELECT\n    toStartOfDay(created_at)\
  \ AS day,\n    market_id,\n    sum(volume) AS total_volume,\n    count() AS total_trades,\n\
  \    uniq(trader_id) AS unique_traders,\n    avg(trade_size) AS avg_size\nFROM trades\n\
  WHERE created_at >= today() - INTERVAL 7 DAY\nGROUP BY day, market_id\nORDER BY\
  \ day DESC, total_volume DESC;\n\n-- ✅ Use quanti\n\n## Diretrizes do \n\
  \n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente o gerenciador uv para dependências.\
  \ Todo código deve ser lintado via ruff e tipado com mypy.\n"
