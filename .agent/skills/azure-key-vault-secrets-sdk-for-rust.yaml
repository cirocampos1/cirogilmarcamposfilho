  # Azure Key Vault Secrets SDK for Rust\n\nClient library for Azure Key Vault Secrets\
  \ — secure storage for passwords, API keys, and other secrets.\n\n## Installation\n\
  \n```sh\ncargo add azure_security_keyvault_secrets azure_identity\n```\n\n## Environment\
  \ Variables\n\n```bash\nAZURE_KEYVAULT_URL=https://<vault-name>.vault.azure.net/\n\
  ```\n\n## Authentication\n\n```rust\nuse azure_identity::DeveloperToolsCredential;\n\
  use azure_security_keyvault_secrets::SecretClient;\n\nlet credential = DeveloperToolsCredential::new(None)?;\n\
  let client = SecretClient::new(\n    \"https://<vault-name>.vault.azure.net/\",\n\
  \    credential.clone(),\n    None,\n)?;\n```\n\n## Core Operations\n\n### Get Secret\n\
  \n```rust\nlet secret = client\n    .get_secret(\"secret-name\", None)\n    .await?\n\
  \    .into_model()?;\n\nprintln!(\"Secret value: {:?}\", secret.value);\n```\n\n\
  ### Set Secret\n\n```rust\nuse azure_security_keyvault_secrets::models::SetSecretParameters;\n\
  \nlet params = SetSecretParameters {\n    value: Some(\"secret-value\".into()),\n\
  \    ..Default::default()\n};\n\nlet secret = client\n    .set_secret(\"secret-name\"\
  , params.try_into()?, None)\n    .await?\n    .into_model()?;\n```\n\n### Update\
  \ Secret Properties\n\n```rust\nuse azure_security_keyvault_secrets::models::UpdateSecretPropertiesParameters;\n\
  use std::collections::HashMap;\n\nlet params = UpdateSecretPropertiesParameters\
  \ {\n    content_type: Some(\"text/plain\".into()),\n    tags: Some(HashMap::from([(\"\
  env\".into(), \"prod\".into())])),\n    ..Default::default()\n};\n\nclient\n   \
  \ .update_secret_properties(\"secret-name\", params.try_into()?, None)\n    .await?;\n\
  ```\n\n### Delete Secret\n\n```rust\nclient.delete_secret(\"secret-name\", None).await?;\n\
  ```\n\n### List Secrets\n\n```rust\nuse azure_security_keyvault_secrets::ResourceExt;\n\
  use futures::TryStreamExt;\n\nlet mut pager = client.list_secret_properties(None)?.into_stream();\n\
  while let Some(secret) = pager.try_next().await? {\n    let name = secret.resource_id()?.name;\n\
  \    println!(\"Secret: {}\", name);\n}\n```\n\n### Get Specific Version\n\n```rust\n\
  use azure_security_keyvault_secrets::models::SecretClientGetSecretOptions;\n\nlet\
  \ options = SecretClientGetSecretOptions {\n    secret_version: Some(\"version-id\"\
  .into()),\n    ..Default::default()\n};\n\nlet secret = client\n    .get_secret(\"\
  secret-name\", Some(options))\n    .await?\n    .into_model()?;\n```\n\n## Best\
  \ Practices\n\n1. **Use Entra ID auth** — `DeveloperToolsCredential` for dev, `ManagedIdentityCredential`\
  \ for production\n2. **Use `into_model()?`** — to deserialize responses\n3. **Use\
  \ `ResourceExt` trait** — for extracting names from IDs\n4. **Handle soft delete**\
  \ — deleted secrets can be recovered within retention period\n5. **Set content type**\
  \ — helps identify secret format\n6. **Use tags** — for organizing\n\n## Diretrizes\
  \ do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente o gerenciador\
  \ uv para dependências. Todo código deve ser lintado via ruff e tipado com mypy.\n"
