  \n- Clarify goals, constraints, and required inputs.\n- Apply relevant best practices\
  \ and validate outcomes.\n- Provide actionable steps and verification.\n- If detailed\
  \ examples are required, open `resources/implementation-playbook.md`.\n\n## Overview\n\
  \nFinancial modeling provides the quantitative foundation for startup strategy,\
  \ fundraising, and operational planning. Create realistic projections using cohort-based\
  \ revenue modeling, detailed cost structures, and scenario analysis to support decision-making\
  \ and investor presentations.\n\n## Core Components\n\n### Revenue Model\n\n**Cohort-Based\
  \ Projections:**\nBuild revenue from customer acquisition and retention by cohort.\n\
  \n**Formula:**\n```\nMRR = Σ (Cohort Size × Retention Rate × ARPU)\nARR = MRR ×\
  \ 12\n```\n\n**Key Inputs:**\n- Monthly new customer acquisitions\n- Customer retention\
  \ rates by month\n- Average revenue per user (ARPU)\n- Pricing and packaging assumptions\n\
  - Expansion revenue (upsells, cross-sells)\n\n### Cost Structure\n\n**Operating\
  \ Expenses Categories:**\n\n1. **Cost of Goods Sold (COGS)**\n   - Hosting and infrastructure\n\
  \   - Payment processing fees\n   - Customer support (variable portion)\n   - Third-party\
  \ services per customer\n\n2. **Sales & Marketing (S&M)**\n   - Customer acquisition\
  \ cost (CAC)\n   - Marketing programs and advertising\n   - Sales team compensation\n\
  \   - Marketing tools and software\n\n3. **Research & Development (R&D)**\n   -\
  \ Engineering team compensation\n   - Product management\n   - Design and UX\n \
  \  - Development tools and infrastructure\n\n4. **General & Administrative (G&A)**\n\
  \   - Executive team\n   - Finance, legal, HR\n   - Office and facilities\n   -\
  \ Insurance and compliance\n\n### Cash Flow Analysis\n\n**Components:**\n- Beginning\
  \ cash balance\n- Cash inflows (revenue, fundraising)\n- Cash outflows (operating\
  \ expenses, CapEx)\n- Ending cash balance\n- Monthly burn rate\n- Runway (months\
  \ of cash remaining)\n\n**Formula:**\n```\nRunway = Current Cash Balance / Monthly\
  \ Burn Rate\nMonthly Burn = Monthly Revenue - Monthly Expenses\n```\n\n### Headcount\
  \ Planning\n\n**Role-Based Hiring Plan:**\nTrack headcount by department and role.\n\
  \n**Key Metrics:**\n- Fully-loaded cost per employee\n- Revenue per employee\n-\
