  date_added: \"2026-02-27\"\n---\n\n# Unreal Engine C++ Pro\n\nThis skill provides\
  \ expert-level guidelines for developing with Unreal Engine 5 using C++. It focuses\
  \ on writing robust, performant, and standard-compliant code.\n\n## When to Use\n\
  Use this skill when:\n- Developing C++ code for Unreal Engine 5.x projects\n- Writing\
  \ Actors, Components, or UObject-derived classes\n- Optimizing performance-critical\
  \ code in Unreal Engine\n- Debugging memory leaks or garbage collection issues\n\
  - Implementing Blueprint-exposed functionality\n- Following Epic Games' coding standards\
  \ and conventions\n- Working with Unreal's reflection system (UCLASS, USTRUCT, UFUNCTION)\n\
  - Managing asset loading and soft references\n\nDo not use this skill when:\n- Working\
  \ with Blueprint-only projects (no C++ code)\n- Developing for Unreal Engine versions\
  \ prior to 5.x\n- Working on non-Unreal game engines\n- The task is unrelated to\
  \ Unreal Engine development\n\n## Core Principles\n\n1.  **UObject & Garbage Collection**:\n\
  \    *   Always use `UPROPERTY()` for `UObject*` member variables to ensure they\
  \ are tracked by the Garbage Collector (GC).\n    *   Use `TStrongObjectPtr<>` if\
  \ you need to keep a root reference outside of a UObject graph, but prefer `addToRoot()`\
  \ generally.\n    *   Understand the `IsValid()` check vs `nullptr`. `IsValid()`\
  \ handles pending kill state safely.\n\n2.  **Unreal Reflection System**:\n    *\
  \   Use `UCLASS()`, `USTRUCT()`, `UENUM()`, `UFUNCTION()` to expose types to the\
  \ reflection system and Blueprints.\n    *   Minimize `BlueprintReadWrite` when\
  \ possible; prefer `BlueprintReadOnly` for state that shouldn't be trampled by logic\
  \ in UI/Level BPs.\n\n3.  **Performance First**:\n    *   **Tick**: Disable Ticking\
  \ (`bCanEverTick = false`) by default. Only enable it if absolutely necessary. Prefer\
  \ timers (`GetWorldTimerManager()`) or event-driven logic.\n    *   **Casting**:\
  \ Avoid `Cast<T>()` in hot loops. Cache references in `BeginPlay`.\n    *   **Structs\
  \ vs Classes**: Use `F` structs for data-heavy, non-UObject types to reduce overhead.\n\
  \n## Naming Conventions (Strict)\n\nFollow Epic Games' coding standard:\n\n*   **Templates**:\
  \ Prefix with `T` (e.g., `TArray`, `TMap`).\n*   **UObject**: Prefix with `U` (e.g.,\
  \ `UCharacterMovementComponent`).\n*   **AActor**: Prefix with `A` (e.g., `AMyGameMode`).\n\
  *   **SWidget**: Prefix with `S` (Slate widgets).\n*   **Structs**: Prefix with\
  \ `F` (e.g., `FVector`).\n*   **Enums**: Prefix with `E` (e.g., `EWeaponState`).\n\
  *   **Interfaces**: Prefix with `I` (e.g., `IInteractable`).\n*   **Booleans**:\
  \ Prefix with `b` (e.g., `bIsDead`).\n\n## Common Patterns\n\n### 1. Robust Component\
