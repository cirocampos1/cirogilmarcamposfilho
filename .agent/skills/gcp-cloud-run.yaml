  ---\n\n# GCP Cloud Run\n\nSpecialized skill for building production-ready serverless\
  \ applications on GCP.\nCovers Cloud Run services (containerized), Cloud Run Functions\
  \ (event-driven),\ncold start optimization, and event-driven architecture with Pub/Sub.\n\
  \n## Principles\n\n- Cloud Run for containers, Functions for simple event handlers\n\
  - Optimize for cold starts with startup CPU boost and min instances\n- Set concurrency\
  \ based on workload (start with 8, adjust)\n- Memory includes /tmp filesystem -\
  \ plan accordingly\n- Use VPC Connector only when needed (adds latency)\n- Containers\
  \ should start fast and be stateless\n- Handle signals gracefully for clean shutdown\n\
  \n## Patterns\n\n### Cloud Run Service Pattern\n\nContainerized web service on Cloud\
  \ Run\n\n**When to use**: Web applications and APIs,Need any runtime or library,Complex\
  \ services with multiple endpoints,Stateless containerized workloads\n\n```dockerfile\n\
  # Dockerfile - Multi-stage build for smaller image\nFROM node:20-slim AS builder\n\
  WORKDIR /app\nCOPY package*.json ./\nRUN npm ci --only=production\n\nFROM node:20-slim\n\
  WORKDIR /app\n\n# Copy only production dependencies\nCOPY --from=builder /app/node_modules\
  \ ./node_modules\nCOPY src ./src\nCOPY package.json ./\n\n# Cloud Run uses PORT\
  \ env variable\nENV PORT=8080\nEXPOSE 8080\n\n# Run as non-root user\nUSER node\n\
  \nCMD [\"node\", \"src/index.js\"]\n```\n\n```javascript\n// src/index.js\nconst\
  \ express = require('express');\nconst app = express();\n\napp.use(express.json());\n\
  \n// Health check endpoint\napp.get('/health', (req, res) => {\n  res.status(200).send('OK');\n\
  });\n\n// API routes\napp.get('/api/items/:id', async (req, res) => {\n  try {\n\
  \    const item = await getItem(req.params.id);\n    res.json(item);\n  } catch\
  \ (error) {\n    console.error('Error:', error);\n    res.status(500).json({ error:\
  \ 'Internal server error' });\n  }\n});\n\n// Graceful shutdown\nprocess.on('SIGTERM',\
  \ () => {\n  console.log('SIGTERM received, shutting down gracefully');\n  server.close(()\
  \ => {\n    console.log('Server closed');\n    process.exit(0);\n  });\n});\n\n\
  const PORT = process.env.PORT || 8080;\nconst server = app.listen(PORT, () => {\n\
  \  console.log(`Server listening on port ${PORT}`);\n});\n```\n\n```yaml\n# cloudbuild.yaml\n\
  steps:\n  # Build the container image\n  - name: 'gcr.io/cloud-builders/docker'\n\
  \    args: ['build', '-t', 'gcr.io/$PROJECT_ID/my-service:$COMMIT_SHA', '.']\n\n\
  \  # Push the container image\n  - name: 'gcr.io/cloud-builders/docker'\n    args:\
  \ ['push', 'gcr.io/$PROJECT_ID/my-service:$COMMIT_SHA']\n\n  # Deploy to Cloud Run\n\
  \  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'\n    entrypoint: gcloud\n\
  \    args:\n      - 'run'\n      - 'deploy'\n      - 'my-service'\n      - '--image=g\n\
  \n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente\
