  \ -->\n\n# ⚡ Bun Development\n\n> Fast, modern JavaScript/TypeScript development\
  \ with the Bun runtime, inspired by [oven-sh/bun](https://github.com/oven-sh/bun).\n\
  \n## When to Use This Skill\n\nUse this skill when:\n\n- Starting new JS/TS projects\
  \ with Bun\n- Migrating from Node.js to Bun\n- Optimizing development speed\n- Using\
  \ Bun's built-in tools (bundler, test runner)\n- Troubleshooting Bun-specific issues\n\
  \n---\n\n## 1. Getting Started\n\n### 1.1 Installation\n\n```bash\n# macOS / Linux\n\
  curl -fsSL https://bun.sh/install | bash\n\n# Windows\npowershell -c \"irm bun.sh/install.ps1\
  \ | iex\"\n\n# Homebrew\nbrew tap oven-sh/bun\nbrew install bun\n\n# npm (if needed)\n\
  npm install -g bun\n\n# Upgrade\nbun upgrade\n```\n\n### 1.2 Why Bun?\n\n| Feature\
  \         | Bun            | Node.js                     |\n| :-------------- |\
  \ :------------- | :-------------------------- |\n| Startup time    | ~25ms    \
  \      | ~100ms+                     |\n| Package install | 10-100x faster | Baseline\
  \                    |\n| TypeScript      | Native         | Requires transpiler\
  \         |\n| JSX             | Native         | Requires transpiler         |\n\
  | Test runner     | Built-in       | External (Jest, Vitest)     |\n| Bundler  \
  \       | Built-in       | External (Webpack, esbuild) |\n\n---\n\n## 2. Project\
  \ Setup\n\n### 2.1 Create New Project\n\n```bash\n# Initialize project\nbun init\n\
  \n# Creates:\n# ├── package.json\n# ├── tsconfig.json\n# ├── index.ts\n# └── README.md\n\
  \n# With specific template\nbun create <template> <project-name>\n\n# Examples\n\
  bun create react my-app        # React app\nbun create next my-app         # Next.js\
  \ app\nbun create vite my-app         # Vite app\nbun create elysia my-api     \
  \  # Elysia API\n```\n\n### 2.2 package.json\n\n```json\n{\n  \"name\": \"my-bun-project\"\
  ,\n  \"version\": \"1.0.0\",\n  \"module\": \"index.ts\",\n  \"type\": \"module\"\
  ,\n  \"scripts\": {\n    \"dev\": \"bun run --watch index.ts\",\n    \"start\":\
  \ \"bun run index.ts\",\n    \"test\": \"bun test\",\n    \"build\": \"bun build\
  \ ./index.ts --outdir ./dist\",\n    \"lint\": \"bunx eslint .\"\n  },\n  \"devDependencies\"\
  : {\n    \"@types/bun\": \"latest\"\n  },\n  \"peerDependencies\": {\n    \"typescript\"\
  : \"^5.0.0\"\n  }\n}\n```\n\n### 2.3 tsconfig.json (Bun-optimized)\n\n```json\n\
  {\n  \"compilerOptions\": {\n    \"lib\": [\"ESNext\"],\n    \"module\": \"esnext\"\
  ,\n    \"target\": \"esnext\",\n    \"moduleResolution\": \"bundler\",\n    \"moduleDetection\"\
  : \"force\",\n    \"allowImportingTsExtensions\": true,\n    \"noEmit\": true,\n\
  \    \"composite\": true,\n    \"strict\": true,\n    \"downlevelIteration\": true,\n\
  \    \"skipLibCheck\": true,\n    \"jsx\": \"react-jsx\",\n    \"allowSyntheticDefaultImports\"\
  : true,\n    \"forceConsistentCasingInFileNames\": true,\n    \"allowJs\": true,\n\
  \    \"types\": [\"bun-types\"]\n  }\n}\n```\n\n---\n\n## 3. Package Management\n\
