  \ (Apache 2.0)\ndate_added: 2026-02-27\n---\n\n# Firebase\n\nFirebase gives you\
  \ a complete backend in minutes - auth, database, storage,\nfunctions, hosting.\
  \ But the ease of setup hides real complexity. Security rules\nare your last line\
  \ of defense, and they're often wrong. Firestore queries are\nlimited, and you learn\
  \ this after you've designed your data model.\n\nThis skill covers Firebase Authentication,\
  \ Firestore, Realtime Database, Cloud\nFunctions, Cloud Storage, and Firebase Hosting.\
  \ Key insight: Firebase is\noptimized for read-heavy, denormalized data. If you're\
  \ thinking relationally,\nyou're thinking wrong.\n\n2025 lesson: Firestore pricing\
  \ can surprise you. Reads are cheap until they're\nnot. A poorly designed listener\
  \ can cost more than a dedicated database. Plan\nyour data model for your query\
  \ patterns, not your data relationships.\n\n## Principles\n\n- Design data for queries,\
  \ not relationships\n- Security rules are mandatory, not optional\n- Denormalize\
  \ aggressively - duplication is cheap, joins are expensive\n- Batch writes and transactions\
  \ for consistency\n- Use offline persistence wisely - it's not free\n- Cloud Functions\
  \ for what clients shouldn't do\n- Environment-based config, never hardcode keys\
  \ in client\n\n## Capabilities\n\n- firebase-auth\n- firestore\n- firebase-realtime-database\n\
  - firebase-cloud-functions\n- firebase-storage\n- firebase-hosting\n- firebase-security-rules\n\
  - firebase-admin-sdk\n- firebase-emulators\n\n## Scope\n\n- general-backend-architecture\
  \ -> backend\n- payment-processing -> stripe\n- email-sending -> email\n- advanced-auth-flows\
  \ -> authentication-oauth\n- kubernetes-deployment -> devops\n\n## Tooling\n\n###\
  \ Core\n\n- firebase - When: Client-side SDK Note: Modular SDK - tree-shakeable\n\
  - firebase-admin - When: Server-side / Cloud Functions Note: Full access, bypasses\
  \ security rules\n- firebase-functions - When: Cloud Functions v2 Note: v2 functions\
  \ are recommended\n\n### Testing\n\n- @firebase/rules-unit-testing - When: Testing\
  \ security rules Note: Essential - rules bugs are security bugs\n- firebase-tools\
  \ - When: Emulator suite Note: Local development without hitting production\n\n\
  ### Frameworks\n\n- reactfire - When: React + Firebase Note: Hooks-based, handles\
  \ subscriptions\n- vuefire - When: Vue + Firebase Note: Vue-specific bindings\n\
  - angularfire - When: Angular + Firebase Note: Official Angular bindings\n\n## Patterns\n\
  \n### Modular SDK Import\n\nImport only what you need for smaller bundles\n\n**When\
  \ to use**: Client-side Firebase usage\n\n# MODULAR IMPORTS:\n\n\"\"\"\nFirebase\
  \ v9+ uses modular SDK. Import only what you need.\nThis enables tree-shaking and\
  \ smaller bundles.\n\"\"\"\n\n// WRONG: v8-compat style (larger bundle)\nimport\
  \ firebase from 'firebase/compat/app';\nimport 'firebase/compat/fi\n\n## Diretrizes\
  \ do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente o gerenciador\
  \ uv para dependências. Todo código deve ser lintado via ruff e tipado com mypy.\n"
