  \ personal\ndate_added: \"2026-02-27\"\n---\n\n# LibreOffice Impress\n\n## Overview\n\
  \nLibreOffice Impress skill for creating, editing, converting, and automating presentation\
  \ workflows using the native ODP (OpenDocument Presentation) format.\n\n## When\
  \ to Use This Skill\n\nUse this skill when:\n- Creating new presentations in ODP\
  \ format\n- Converting between ODP, PPTX, PDF formats\n- Automating slide generation\
  \ from templates\n- Batch processing presentation operations\n- Creating presentation\
  \ templates\n\n## Core Capabilities\n\n### 1. Presentation Creation\n- Create new\
  \ ODP presentations from scratch\n- Generate presentations from templates\n- Create\
  \ slide masters and layouts\n- Build interactive presentations\n\n### 2. Format\
  \ Conversion\n- ODP to other formats: PPTX, PDF, HTML, SWF\n- Other formats to ODP:\
  \ PPTX, PPT, PDF\n- Batch conversion of multiple files\n\n### 3. Slide Automation\n\
  - Template-based slide generation\n- Batch slide creation from data\n- Automated\
  \ content insertion\n- Dynamic chart generation\n\n### 4. Content Manipulation\n\
  - Text and image insertion\n- Shape and diagram creation\n- Animation and transition\
  \ control\n- Speaker notes management\n\n### 5. Integration\n- Command-line automation\
  \ via soffice\n- Python scripting with UNO\n- Integration with workflow tools\n\n\
  ## Workflows\n\n### Creating a New Presentation\n\n#### Method 1: Command-Line\n\
  ```bash\nsoffice --impress template.odp\n```\n\n#### Method 2: Python with UNO\n\
  ```python\nimport uno\n\ndef create_presentation():\n    local_ctx = uno.getComponentContext()\n\
  \    resolver = local_ctx.ServiceManager.createInstanceWithContext(\n        \"\
  com.sun.star.bridge.UnoUrlResolver\", local_ctx\n    )\n    ctx = resolver.resolve(\n\
  \        \"uno:socket,host=localhost,port=8100;urp;StarOffice.ComponentContext\"\
  \n    )\n    smgr = ctx.ServiceManager\n    doc = smgr.createInstanceWithContext(\"\
  com.sun.star.presentation.PresentationDocument\", ctx)\n    slides = doc.getDrawPages()\n\
  \    slide = slides.getByIndex(0)\n    doc.storeToURL(\"file:///path/to/presentation.odp\"\
  , ())\n    doc.close(True)\n```\n\n### Converting Presentations\n\n```bash\n# ODP\
  \ to PPTX\nsoffice --headless --convert-to pptx presentation.odp\n\n# ODP to PDF\n\
  soffice --headless --convert-to pdf presentation.odp\n\n# PPTX to ODP\nsoffice --headless\
  \ --convert-to odp presentation.pptx\n\n# Batch convert\nfor file in *.odp; do\n\
  \    soffice --headless --convert-to pdf \"$file\"\ndone\n```\n\n### Template-Based\
