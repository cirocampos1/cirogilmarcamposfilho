  \ Instruções\n---\nname: azure-ai-ml-py\ndescription: Azure Machine Learning SDK\
  \ v2 for Python. Use for ML workspaces, jobs, models, datasets, compute, and pipelines.\n\
  risk: unknown\nsource: community\ndate_added: '2026-02-27'\n---\n\n# Azure Machine\
  \ Learning SDK v2 for Python\n\nClient library for managing Azure ML resources:\
  \ workspaces, jobs, models, data, and compute.\n\n## Installation\n\n```bash\npip\
  \ install azure-ai-ml\n```\n\n## Environment Variables\n\n```bash\nAZURE_SUBSCRIPTION_ID=<your-subscription-id>\n\
  AZURE_RESOURCE_GROUP=<your-resource-group>\nAZURE_ML_WORKSPACE_NAME=<your-workspace-name>\n\
  ```\n\n## Authentication\n\n```python\nfrom azure.ai.ml import MLClient\nfrom azure.identity\
  \ import DefaultAzureCredential\n\nml_client = MLClient(\n    credential=DefaultAzureCredential(),\n\
  \    subscription_id=os.environ[\"AZURE_SUBSCRIPTION_ID\"],\n    resource_group_name=os.environ[\"\
  AZURE_RESOURCE_GROUP\"],\n    workspace_name=os.environ[\"AZURE_ML_WORKSPACE_NAME\"\
  ]\n)\n```\n\n### From Config File\n\n```python\nfrom azure.ai.ml import MLClient\n\
  from azure.identity import DefaultAzureCredential\n\n# Uses config.json in current\
  \ directory or parent\nml_client = MLClient.from_config(\n    credential=DefaultAzureCredential()\n\
  )\n```\n\n## Workspace Management\n\n### Create Workspace\n\n```python\nfrom azure.ai.ml.entities\
  \ import Workspace\n\nws = Workspace(\n    name=\"my-workspace\",\n    location=\"\
  eastus\",\n    display_name=\"My Workspace\",\n    description=\"ML workspace for\
  \ experiments\",\n    tags={\"purpose\": \"demo\"}\n)\n\nml_client.workspaces.begin_create(ws).result()\n\
  ```\n\n### List Workspaces\n\n```python\nfor ws in ml_client.workspaces.list():\n\
  \    print(f\"{ws.name}: {ws.location}\")\n```\n\n## Data Assets\n\n### Register\
  \ Data\n\n```python\nfrom azure.ai.ml.entities import Data\nfrom azure.ai.ml.constants\
  \ import AssetTypes\n\n# Register a file\nmy_data = Data(\n    name=\"my-dataset\"\
  ,\n    version=\"1\",\n    path=\"azureml://datastores/workspaceblobstore/paths/data/train.csv\"\
  ,\n    type=AssetTypes.URI_FILE,\n    description=\"Training data\"\n)\n\nml_client.data.create_or_update(my_data)\n\
  ```\n\n### Register Folder\n\n```python\nmy_data = Data(\n    name=\"my-folder-dataset\"\
  ,\n    version=\"1\",\n    path=\"azureml://datastores/workspaceblobstore/paths/data/\"\
  ,\n    type=AssetTypes.URI_FOLDER\n)\n\nml_client.data.create_or_update(my_data)\n\
  ```\n\n## Model Registry\n\n### Register Model\n\n```python\nfrom azure.ai.ml.entities\
  \ import Model\nfrom azure.ai.ml.constants import AssetTypes\n\nmodel = Model(\n\
  \    name=\"my-model\",\n    version=\"1\",\n    path=\"./model/\",\n    type=AssetTypes.CUSTOM_MODEL,\n\
  \    description=\"My trained model\"\n)\n\nml_client.models.create_or_update(model)\n\
  ```\n\n### List Models\n\n```python\nfor model in ml_client.models.list(name=\"\
  my-model\"):\n    print(f\"{model.name} v{model.version}\")\n```\n\n## Compute\n\
  \n### Create Compute Cluster\n\n```python\nfrom azure.ai.ml.entities import AmlCompute\n\
  \ncluster = AmlCompute(\n    name=\"cpu-cluster\",\n    type=\"amlcompute\",\n \
  \   size=\"Standard_DS3_v2\",\n    min_instances=0,\n    max_instances=4,\n    idle_time_before_scale_down=120\n\
  )\n\nml_client.compute.beg\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE\
  \ ENGENHARIA: Use exclusivamente o gerenciador uv para dependências. Todo código\
  \ deve ser lintado via ruff e tipado com mypy.\n"
