  \n# @azure/storage-file-share (TypeScript/JavaScript)\n\nSDK for Azure File Share\
  \ operations â€” SMB file shares, directories, and file operations.\n\n## Installation\n\
  \n```bash\nnpm install @azure/storage-file-share @azure/identity\n```\n\n**Current\
  \ Version**: 12.x  \n**Node.js**: >= 18.0.0\n\n## Environment Variables\n\n```bash\n\
  AZURE_STORAGE_ACCOUNT_NAME=<account-name>\nAZURE_STORAGE_ACCOUNT_KEY=<account-key>\n\
  # OR connection string\nAZURE_STORAGE_CONNECTION_STRING=DefaultEndpointsProtocol=https;AccountName=...\n\
  ```\n\n## Authentication\n\n### Connection String (Simplest)\n\n```typescript\n\
  import { ShareServiceClient } from \"@azure/storage-file-share\";\n\nconst client\
  \ = ShareServiceClient.fromConnectionString(\n  process.env.AZURE_STORAGE_CONNECTION_STRING!\n\
  );\n```\n\n### StorageSharedKeyCredential (Node.js only)\n\n```typescript\nimport\
  \ { ShareServiceClient, StorageSharedKeyCredential } from \"@azure/storage-file-share\"\
  ;\n\nconst accountName = process.env.AZURE_STORAGE_ACCOUNT_NAME!;\nconst accountKey\
  \ = process.env.AZURE_STORAGE_ACCOUNT_KEY!;\n\nconst sharedKeyCredential = new StorageSharedKeyCredential(accountName,\
  \ accountKey);\nconst client = new ShareServiceClient(\n  `https://${accountName}.file.core.windows.net`,\n\
  \  sharedKeyCredential\n);\n```\n\n### DefaultAzureCredential\n\n```typescript\n\
  import { ShareServiceClient } from \"@azure/storage-file-share\";\nimport { DefaultAzureCredential\
  \ } from \"@azure/identity\";\n\nconst accountName = process.env.AZURE_STORAGE_ACCOUNT_NAME!;\n\
  const client = new ShareServiceClient(\n  `https://${accountName}.file.core.windows.net`,\n\
  \  new DefaultAzureCredential()\n);\n```\n\n### SAS Token\n\n```typescript\nimport\
  \ { ShareServiceClient } from \"@azure/storage-file-share\";\n\nconst accountName\
  \ = process.env.AZURE_STORAGE_ACCOUNT_NAME!;\nconst sasToken = process.env.AZURE_STORAGE_SAS_TOKEN!;\n\
  \nconst client = new ShareServiceClient(\n  `https://${accountName}.file.core.windows.net${sasToken}`\n\
  );\n```\n\n## Client Hierarchy\n\n```\nShareServiceClient (account level)\nâ””â”€â”€ ShareClient\
  \ (share level)\n    â””â”€â”€ ShareDirectoryClient (directory level)\n        â””â”€â”€ ShareFileClient\
  \ (file level)\n```\n\n## Share Operations\n\n### Create Share\n\n```typescript\n\
  const shareClient = client.getShareClient(\"my-share\");\nawait shareClient.create();\n\
  \n// Create with quota (in GB)\nawait shareClient.create({ quota: 100 });\n```\n\
  \n### List Shares\n\n```typescript\nfor await (const share of client.listShares())\
  \ {\n  console.log(share.name, share.properties.quota);\n}\n\n// With prefix filter\n\
  for await (const share of client.listShares({ prefix: \"logs-\" })) {\n  console.log(share.name);\n\
  }\n```\n\n### Delete Share\n\n```typescript\nawait shareClient.delete();\n\n// Delete\
