backstory: "Você é um agente especializado em When to Use API Routes.\n\n## Contexto\
  \ Original da Skill\nWhen to Use API Routes\n\n## Instruções\n---\nname: expo-api-routes\n\
  description: Guidelines for creating API routes in Expo Router with EAS Hosting\n\
  risk: unknown\nsource: community\nversion: 1.0.0\nlicense: MIT\n---\n\n## When to\
  \ Use API Routes\n\nUse API routes when you need:\n\n- **Server-side secrets** —\
  \ API keys, database credentials, or tokens that must never reach the client\n-\
  \ **Database operations** — Direct database queries that shouldn't be exposed\n\
  - **Third-party API proxies** — Hide API keys when calling external services (OpenAI,\
  \ Stripe, etc.)\n- **Server-side validation** — Validate data before database writes\n\
  - **Webhook endpoints** — Receive callbacks from services like Stripe or GitHub\n\
  - **Rate limiting** — Control access at the server level\n- **Heavy computation**\
  \ — Offload processing that would be slow on mobile\n\n## When NOT to Use API Routes\n\
  \nAvoid API routes when:\n\n- **Data is already public** — Use direct fetch to public\
  \ APIs instead\n- **No secrets required** — Static data or client-safe operations\n\
  - **Real-time updates needed** — Use WebSockets or services like Supabase Realtime\n\
  - **Simple CRUD** — Consider Firebase, Supabase, or Convex for managed backends\n\
  - **File uploads** — Use direct-to-storage uploads (S3 presigned URLs, Cloudflare\
  \ R2)\n- **Authentication only** — Use Clerk, Auth0, or Firebase Auth instead\n\n\
  ## File Structure\n\nAPI routes live in the `app` directory with `+api.ts` suffix:\n\
  \n```\napp/\n  api/\n    hello+api.ts          → GET /api/hello\n    users+api.ts\
  \          → /api/users\n    users/[id]+api.ts     → /api/users/:id\n  (tabs)/\n\
  \    index.tsx\n```\n\n## Basic API Route\n\n```ts\n// app/api/hello+api.ts\nexport\
  \ function GET(request: Request) {\n  return Response.json({ message: \"Hello from\
  \ Expo!\" });\n}\n```\n\n## HTTP Methods\n\nExport named functions for each HTTP\
  \ method:\n\n```ts\n// app/api/items+api.ts\nexport function GET(request: Request)\
  \ {\n  return Response.json({ items: [] });\n}\n\nexport async function POST(request:\
  \ Request) {\n  const body = await request.json();\n  return Response.json({ created:\
  \ body }, { status: 201 });\n}\n\nexport async function PUT(request: Request) {\n\
  \  const body = await request.json();\n  return Response.json({ updated: body });\n\
  }\n\nexport async function DELETE(request: Request) {\n  return new Response(null,\
  \ { status: 204 });\n}\n```\n\n## Dynamic Routes\n\n```ts\n// app/api/users/[id]+api.ts\n\
  export function GET(request: Request, { id }: { id: string }) {\n  return Response.json({\
  \ userId: id });\n}\n```\n\n## Request Handling\n\n### Query Parameters\n\n```ts\n\
  export function GET(request: Request) {\n  const url = new URL(request.url);\n \
  \ const page = url.searchParams.get(\"page\") ?? \"1\";\n  const limit = url.searchParams.get(\"\
  limit\") ?? \"10\";\n\n  return Response.json({ page, limit });\n}\n```\n\n### Headers\n\
  \n```ts\nexport function GET(request: Request) {\n  const auth = request.headers.get(\"\
  Authorization\");\n\n  if (!auth) {\n    return Response.json({ error: \"Unauthorized\"\
  \ }, { status: 401 });\n  }\n\n  return Response.json({ authenticated: true });\n\
  }\n```\n\n### JSON Body\n\n```ts\nexport async\n\n## Diretrizes do \n\n\U0001F527\
