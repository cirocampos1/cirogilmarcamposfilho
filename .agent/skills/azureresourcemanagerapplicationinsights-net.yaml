  \ '2026-02-27'\n---\n\n# Azure.ResourceManager.ApplicationInsights (.NET)\n\nAzure\
  \ Resource Manager SDK for managing Application Insights resources for application\
  \ performance monitoring.\n\n## Installation\n\n```bash\ndotnet add package Azure.ResourceManager.ApplicationInsights\n\
  dotnet add package Azure.Identity\n```\n\n**Current Version**: v1.0.0 (GA)  \n**API\
  \ Version**: 2022-06-15\n\n## Environment Variables\n\n```bash\nAZURE_SUBSCRIPTION_ID=<your-subscription-id>\n\
  AZURE_RESOURCE_GROUP=<your-resource-group>\nAZURE_APPINSIGHTS_NAME=<your-appinsights-component>\n\
  ```\n\n## Authentication\n\n```csharp\nusing Azure.Identity;\nusing Azure.ResourceManager;\n\
  using Azure.ResourceManager.ApplicationInsights;\n\nArmClient client = new ArmClient(new\
  \ DefaultAzureCredential());\n```\n\n## Resource Hierarchy\n\n```\nSubscription\n\
  └── ResourceGroup\n    └── ApplicationInsightsComponent          # App Insights\
  \ resource\n        ├── ApplicationInsightsComponentApiKey  # API keys for programmatic\
  \ access\n        ├── ComponentLinkedStorageAccount      # Linked storage for data\
  \ export\n        └── (via component ID)\n            ├── WebTest              \
  \          # Availability tests\n            ├── Workbook                      \
  \ # Workbooks for analysis\n            ├── WorkbookTemplate               # Workbook\
  \ templates\n            └── MyWorkbook                     # Private workbooks\n\
  ```\n\n## Core Workflows\n\n### 1. Create Application Insights Component (Workspace-based)\n\
  \n```csharp\nusing Azure.ResourceManager.ApplicationInsights;\nusing Azure.ResourceManager.ApplicationInsights.Models;\n\
  \nResourceGroupResource resourceGroup = await client\n    .GetDefaultSubscriptionAsync()\n\
  \    .Result\n    .GetResourceGroupAsync(\"my-resource-group\");\n\nApplicationInsightsComponentCollection\
  \ components = resourceGroup.GetApplicationInsightsComponents();\n\n// Workspace-based\
  \ Application Insights (recommended)\nApplicationInsightsComponentData data = new\
  \ ApplicationInsightsComponentData(\n    AzureLocation.EastUS,\n    ApplicationInsightsApplicationType.Web)\n\
  {\n    Kind = \"web\",\n    WorkspaceResourceId = new ResourceIdentifier(\n    \
  \    \"/subscriptions/<sub-id>/resourceGroups/<rg>/providers/Microsoft.OperationalInsights/workspaces/<workspace-name>\"\
  ),\n    IngestionMode = IngestionMode.LogAnalytics,\n    PublicNetworkAccessForIngestion\
  \ = PublicNetworkAccessType.Enabled,\n    PublicNetworkAccessForQuery = PublicNetworkAccessType.Enabled,\n\
  \    RetentionInDays = 90,\n    SamplingPercentage = 100,\n    DisableIPMasking\
  \ = false,\n    ImmediatePurgeDataOn30Days = false,\n    Tags =\n    {\n       \
  \ { \"environment\", \"production\" },\n        { \"application\", \"mywebapp\"\
  \ }\n    }\n};\n\nArmOperation<ApplicationInsightsComponentResource> operation =\
  \ await components\n    .CreateOrUpdateAsync(WaitUntil.Completed, \"my-appinsights\"\
  , data);\n\nApplicationIn\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE\
  \ ENGENHARIA: Use exclusivamente o gerenciador uv para dependências. Todo código\
  \ deve ser lintado via ruff e tipado com mypy.\n"
