  date_added: \"2026-02-27\"\n---\n\n# LangChain Architecture\n\nMaster the LangChain\
  \ framework for building sophisticated LLM applications with agents, chains, memory,\
  \ and tool integration.\n\n## Do not use this skill when\n\n- The task is unrelated\
  \ to langchain architecture\n- You need a different domain or tool outside this\
  \ scope\n\n## Instructions\n\n- Clarify goals, constraints, and required inputs.\n\
  - Apply relevant best practices and validate outcomes.\n- Provide actionable steps\
  \ and verification.\n- If detailed examples are required, open `resources/implementation-playbook.md`.\n\
  \n## Use this skill when\n\n- Building autonomous AI agents with tool access\n-\
  \ Implementing complex multi-step LLM workflows\n- Managing conversation memory\
  \ and state\n- Integrating LLMs with external data sources and APIs\n- Creating\
  \ modular, reusable LLM application components\n- Implementing document processing\
  \ pipelines\n- Building production-grade LLM applications\n\n## Core Concepts\n\n\
  ### 1. Agents\nAutonomous systems that use LLMs to decide which actions to take.\n\
  \n**Agent Types:**\n- **ReAct**: Reasoning + Acting in interleaved manner\n- **OpenAI\
  \ Functions**: Leverages function calling API\n- **Structured Chat**: Handles multi-input\
  \ tools\n- **Conversational**: Optimized for chat interfaces\n- **Self-Ask with\
  \ Search**: Decomposes complex queries\n\n### 2. Chains\nSequences of calls to LLMs\
  \ or other utilities.\n\n**Chain Types:**\n- **LLMChain**: Basic prompt + LLM combination\n\
  - **SequentialChain**: Multiple chains in sequence\n- **RouterChain**: Routes inputs\
  \ to specialized chains\n- **TransformChain**: Data transformations between steps\n\
  - **MapReduceChain**: Parallel processing with aggregation\n\n### 3. Memory\nSystems\
  \ for maintaining context across interactions.\n\n**Memory Types:**\n- **ConversationBufferMemory**:\
  \ Stores all messages\n- **ConversationSummaryMemory**: Summarizes older messages\n\
  - **ConversationBufferWindowMemory**: Keeps last N messages\n- **EntityMemory**:\
  \ Tracks information about entities\n- **VectorStoreMemory**: Semantic similarity\
  \ retrieval\n\n### 4. Document Processing\nLoading, transforming, and storing documents\
  \ for retrieval.\n\n**Components:**\n- **Document Loaders**: Load from various sources\n\
  - **Text Splitters**: Chunk documents intelligently\n- **Vector Stores**: Store\
  \ and retrieve embeddings\n- **Retrievers**: Fetch relevant documents\n- **Indexes**:\
  \ Organize documents for efficient access\n\n### 5. Callbacks\nHooks for logging,\
  \ monitoring, and debugging.\n\n**Use Cases:**\n- Request/response logging\n- Token\
  \ usage tracking\n- Latency monitoring\n- Error handling\n- Custom metrics collection\n\
