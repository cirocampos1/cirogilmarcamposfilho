  - antigravity\n- cursor\n- gemini-cli\n- codex-cli\n---\n\n# EarLLM One — Build\
  \ & Maintain\n\n## Overview\n\nBuild, maintain, and extend the EarLLM One Android\
  \ project — a Kotlin/Compose app that connects Bluetooth earbuds to an LLM via voice\
  \ pipeline.\n\n## When to Use This Skill\n\n- When the user mentions \"earllm\"\
  \ or related topics\n- When the user mentions \"earbudllm\" or related topics\n\
  - When the user mentions \"earbud app\" or related topics\n- When the user mentions\
  \ \"voice pipeline kotlin\" or related topics\n- When the user mentions \"bluetooth\
  \ audio android\" or related topics\n- When the user mentions \"sco microphone\"\
  \ or related topics\n\n## Do Not Use This Skill When\n\n- The task is unrelated\
  \ to earllm build\n- A simpler, more specific tool can handle the request\n- The\
  \ user needs general-purpose assistance without domain expertise\n\n## How It Works\n\
  \nEarLLM One is a multi-module Android app (Kotlin + Jetpack Compose) that captures\
  \ voice from Bluetooth earbuds, transcribes it, sends it to an LLM, and speaks the\
  \ response back.\n\n## Project Location\n\n`C:\\Users\\renat\\earbudllm`\n\n## Module\
  \ Dependency Graph\n\n```\napp ──→ voice ──→ audio ──→ core-logging\n  │       │\n\
  \  ├──→ bluetooth ──→ core-logging\n  └──→ llm ──→ core-logging\n```\n\n## Modules\
  \ And Key Files\n\n| Module | Purpose | Key Files |\n|--------|---------|-----------|\n\
  | **core-logging** | Structured logging, performance tracking | `EarLogger.kt`,\
  \ `PerformanceTracker.kt` |\n| **bluetooth** | BT discovery, pairing, A2DP/HFP profiles\
  \ | `BluetoothController.kt`, `BluetoothState.kt`, `BluetoothPermissions.kt` |\n\
  | **audio** | Audio routing (SCO/BLE), capture, headset buttons | `AudioRouteController.kt`,\
  \ `VoiceCaptureController.kt`, `HeadsetButtonController.kt` |\n| **voice** | STT\
  \ (SpeechRecognizer + Vosk stub), TTS, pipeline | `SpeechToTextController.kt`, `TextToSpeechController.kt`,\
  \ `VoicePipeline.kt` |\n| **llm** | LLM interface, stub, OpenAI-compatible client\
  \ | `LlmClient.kt`, `StubLlmClient.kt`, `RealLlmClient.kt`, `SecureTokenStore.kt`\
  \ |\n| **app** | UI, ViewModel, Service, Settings, all screens | `MainViewModel.kt`,\
  \ `EarLlmForegroundService.kt`, 6 Compose screens |\n\n## Build Configuration\n\n\
  - **SDK**: minSdk 26, targetSdk 34, compileSdk 34\n- **Build tools**: AGP 8.2.2,\
  \ Kotlin 1.9.22, Gradle 8.5\n- **Compose BOM**: 2024.02.00\n- **Key deps**: OkHttp,\
  \ AndroidX Security (EncryptedSharedPreferences), DataStore, Media\n\n## Target\
  \ Hardware\n\n| Device | Model | Key Details |\n|--------|-------|-------------|\n\
  | Phone | Samsung Galaxy S24 Ultra | Android 14, One UI 6.1, Snapdragon 8 Gen 3\
  \ |\n| Earbuds | Xiaomi Redmi Buds 6 Pro | BT 5.3, A2DP/HFP/AVRCP, ANC, LDAC |\n\
