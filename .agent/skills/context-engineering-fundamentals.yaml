  ---\n\n# Context Engineering Fundamentals\n\nContext is the complete state available\
  \ to a language model at inference time. It includes everything the model can attend\
  \ to when generating responses: system instructions, tool definitions, retrieved\
  \ documents, message history, and tool outputs. Understanding context fundamentals\
  \ is prerequisite to effective context engineering.\n\n## When to Use\nActivate\
  \ this skill when:\n- Designing new agent systems or modifying existing architectures\n\
  - Debugging unexpected agent behavior that may relate to context\n- Optimizing context\
  \ usage to reduce token costs or improve performance\n- Onboarding new team members\
  \ to context engineering concepts\n- Reviewing context-related design decisions\n\
  \n## Core Concepts\n\nContext comprises several distinct components, each with different\
  \ characteristics and constraints. The attention mechanism creates a finite budget\
  \ that constrains effective context usage. Progressive disclosure manages this constraint\
  \ by loading information only as needed. The engineering discipline is curating\
  \ the smallest high-signal token set that achieves desired outcomes.\n\n## Detailed\
  \ Topics\n\n### The Anatomy of Context\n\n**System Prompts**\nSystem prompts establish\
  \ the agent's core identity, constraints, and behavioral guidelines. They are loaded\
  \ once at session start and typically persist throughout the conversation. System\
  \ prompts should be extremely clear and use simple, direct language at the right\
  \ altitude for the agent.\n\nThe right altitude balances two failure modes. At one\
  \ extreme, engineers hardcode complex brittle logic that creates fragility and maintenance\
  \ burden. At the other extreme, engineers provide vague high-level guidance that\
  \ fails to give concrete signals for desired outputs or falsely assumes shared context.\
  \ The optimal altitude strikes a balance: specific enough to guide behavior effectively,\
  \ yet flexible enough to provide strong heuristics.\n\nOrganize prompts into distinct\
  \ sections using XML tagging or Markdown headers to delineate background information,\
  \ instructions, tool guidance, and output description. The exact formatting matters\
  \ less as models become more capable, but structural clarity remains valuable.\n\
  \n**Tool Definitions**\nTool definitions specify the actions an agent can take.\
  \ Each tool includes a name, description, parameters, and return format. Tool definitions\
  \ live near the front of context after serialization, typically before or after\
  \ the system prompt.\n\nTool descriptions collectively steer agent behavior. Poor\
  \ descriptions force agents to guess; optimized descriptions include usage context,\
