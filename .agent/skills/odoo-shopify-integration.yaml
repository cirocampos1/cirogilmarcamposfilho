  \       [[['email', '=', shopify_order['customer']['email']]]],\n        {'fields':\
  \ ['id'], 'limit': 1}\n    )\n    partner_id = partner[0]['id'] if partner else\
  \ models.execute_kw(\n        db, uid, pwd, 'res.partner', 'create', [{\n      \
  \      'name': shopify_order['customer']['first_name'] + ' ' + shopify_order['customer']['last_name'],\n\
