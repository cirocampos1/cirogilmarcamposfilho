  \ with Shopify product availability.\n- Mapping Shopify product variants to Odoo\
  \ product templates.\n\n## How It Works\n\n1. **Activate**: Mention `@odoo-shopify-integration`\
  \ and describe your sync scenario.\n2. **Design**: Receive the data flow architecture\
  \ and field mapping.\n3. **Build**: Get code snippets for the Shopify webhook receiver\
  \ and Odoo API caller.\n\n## Data Flow Architecture\n\n```\nSHOPIFY            \
  \              ODOO\n--------                         ----\nProduct Catalog <──────sync──────\
  \  Product Templates + Variants\nInventory Level <──────sync──────  Stock Quants\
  \ (real-time)\nNew Order       ───────push──────> Sale Order (auto-confirmed)\n\
  Customer        ───────push──────> res.partner (created if new)\nFulfillment   \
  \  <──────push──────  Delivery Order validated\n```\n\n## Examples\n\n### Example\
