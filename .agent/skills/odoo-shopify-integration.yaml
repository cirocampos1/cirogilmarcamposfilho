  \    # Create Sale Order\n    order_id = models.execute_kw(db, uid, pwd, 'sale.order',\
  \ 'create', [{\n        'partner_id': partner_id,\n        'client_order_ref': f\"\
  Shopify #{shopify_order['order_number']}\",\n        'order_line': [(0, 0, {\n \
  \           'product_id': get_odoo_product_id(line['sku']),\n            'product_uom_qty':\
  \ line['quantity'],\n            'price_unit': float(line['price']),\n        })\
  \ for line in shopify_order['line_items']],\n    }])\n    return order_id\n\ndef\
