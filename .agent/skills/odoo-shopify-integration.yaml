  \nrisk: unknown\nsource: community\n---\n\n# Odoo ↔ Shopify Integration\n\n## Overview\n\
  \nThis skill guides you through integrating Odoo with Shopify — syncing your product\
  \ catalog, real-time inventory levels, incoming orders, and customer data. It covers\
  \ both using the official Odoo Shopify connector (Enterprise) and building a custom\
  \ integration via Shopify REST + Odoo XMLRPC APIs.\n\n## When to Use This Skill\n\
  \n- Selling on Shopify while managing inventory in Odoo.\n- Automatically creating\
