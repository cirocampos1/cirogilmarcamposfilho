  - claude-code\n- antigravity\n- cursor\n- gemini-cli\n- codex-cli\n---\n\n# LLM-OPS\
  \ -- IA de Producao\n\n## Overview\n\nLLM Operations -- RAG, embeddings, vector\
  \ databases, fine-tuning, prompt engineering avancado, custos de LLM, evals de qualidade\
  \ e arquiteturas de IA para producao. Ativar para: implementar RAG, criar pipeline\
  \ de embeddings, Pinecone/Chroma/pgvector, fine-tuning, prompt engineering, reducao\
  \ de custos de LLM, evals, cache semantico, streaming, agents.\n\n## When to Use\
  \ This Skill\n\n- When you need specialized assistance with this domain\n\n## Do\
  \ Not Use This Skill When\n\n- The task is unrelated to llm ops\n- A simpler, more\
  \ specific tool can handle the request\n- The user needs general-purpose assistance\
  \ without domain expertise\n\n## How It Works\n\n> A diferenca entre um prototipo\
  \ de IA e um produto de IA e operabilidade.\n> LLM-Ops e a engenharia que torna\
  \ IA confiavel, escalavel e economica.\n\n---\n\n## Arquitetura Rag Completa\n\n\
  [Documentos] -> [Chunking] -> [Embeddings] -> [Vector DB]\n                    \
  \                                  |\n    [Query] -> [Embed query] -> [Semantic\
  \ Search] -> [Top K chunks]\n                                                  \
  \        |\n                                           [LLM + Context] -> [Resposta]\n\
  \n## Pipeline De Indexacao\n\nfrom anthropic import Anthropic\n    import chromadb\n\
  \n    client = Anthropic()\n    chroma = chromadb.PersistentClient(path=\"./chroma_db\"\
  )\n\n    def chunk_text(text, chunk_size=500, overlap=50):\n        words = text.split()\n\
  \        chunks = []\n        for i in range(0, len(words), chunk_size - overlap):\n\
  \            chunk = \" \".join(words[i:i + chunk_size])\n            if chunk:\
  \ chunks.append(chunk)\n        return chunks\n\n    def index_document(doc_id,\
  \ content_text, metadata=None):\n        chunks = chunk_text(content_text)\n   \
  \     ids = [f\"{doc_id}_chunk_{i}\" for i in range(len(chunks))]\n        collection.upsert(ids=ids,\
  \ documents=chunks)\n        return len(chunks)\n\n## Pipeline De Query Com Rag\n\
  \ndef rag_query(query, top_k=5, system=None):\n        results = collection.query(\n\
  \            query_texts=[query], n_results=top_k,\n            include=[\"documents\"\
  , \"metadatas\", \"distances\"])\n        context_parts = []\n        for doc, meta,\
  \ dist in zip(results[\"documents\"][0],\n                                    results[\"\
  metadatas\"][0],\n                                    results[\"distances\"][0]):\n\
  \            if dist < 1.5:\n                src = meta.get(\"source\", \"doc\"\
  )\n                context_parts.append(f\"[Fonte: {src}]\n{doc}\")\n        context\
  \ = \"\n\n---\n\n\".join(context_parts)\n        response = client.messages.create(\n\
  \            model=\"claude-opus-4-20250805\", max_tokens=1024,\n\n## Diretrizes\
  \ do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente o gerenciador\
  \ uv para dependências. Todo código deve ser lintado via ruff e tipado com mypy.\n"
