  risk: unknown\nsource: community\n---\n\n# Robius Event and Action Patterns Skill\n\
  \nBest practices for event handling and action patterns in Makepad applications\
  \ based on Robrix and Moly codebases.\n\n**Source codebases:**\n- **Robrix**: Matrix\
  \ chat client - MessageAction, RoomsListAction, AppStateAction\n- **Moly**: AI chat\
  \ application - StoreAction, ChatAction, NavigationAction, Timer patterns\n\n##\
  \ When to Use\n\nUse this skill when:\n- Implementing custom actions in Makepad\n\
  - Handling events in widgets\n- Centralizing action handling in App\n- Widget-to-widget\
  \ communication\n- Keywords: makepad action, makepad event, widget action, handle_actions,\
  \ cx.widget_action\n\n## Custom Action Pattern\n\n### Defining Domain-Specific Actions\n\
  \n```rust\nuse makepad_widgets::*;\n\n/// Actions emitted by the Message widget\n\
  #[derive(Clone, DefaultNone, Debug)]\npub enum MessageAction {\n    /// User wants\
  \ to react to a message\n    React { details: MessageDetails, reaction: String },\n\
  \    /// User wants to reply to a message\n    Reply(MessageDetails),\n    /// User\
  \ wants to edit a message\n    Edit(MessageDetails),\n    /// User wants to delete\
  \ a message\n    Delete(MessageDetails),\n    /// User requested to open context\
  \ menu\n    OpenContextMenu { details: MessageDetails, abs_pos: DVec2 },\n    ///\
  \ Required default variant\n    None,\n}\n\n/// Data associated with a message action\n\
  #[derive(Clone, Debug)]\npub struct MessageDetails {\n    pub room_id: OwnedRoomId,\n\
  \    pub event_id: OwnedEventId,\n    pub content: String,\n    pub sender_id: OwnedUserId,\n\
  }\n```\n\n### Emitting Actions from Widgets\n\n```rust\nimpl Widget for Message\
  \ {\n    fn handle_event(&mut self, cx: &mut Cx, event: &Event, scope: &mut Scope)\
  \ {\n        self.view.handle_event(cx, event, scope);\n\n        let area = self.view.area();\n\
  \        match event.hits(cx, area) {\n            Hit::FingerDown(_fe) => {\n \
  \               cx.set_key_focus(area);\n            }\n            Hit::FingerUp(fe)\
  \ => {\n                if fe.is_over && fe.is_primary_hit() && fe.was_tap() {\n\
  \                    // Emit widget action\n                    cx.widget_action(\n\
  \                        self.widget_uid(),\n                        &scope.path,\n\
  \                        MessageAction::Reply(self.get_details()),\n           \
  \         );\n                }\n            }\n            Hit::FingerLongPress(lpe)\
  \ => {\n                cx.widget_action(\n                    self.widget_uid(),\n\
  \                    &scope.path,\n                    MessageAction::OpenContextMenu\
  \ {\n                        details: self.get_details(),\n                    \
  \    abs_pos: lpe.abs,\n                    },\n                );\n           \
  \ }\n            _ => {}\n        }\n    }\n}\n```\n\n## Centralized Action Handling\
