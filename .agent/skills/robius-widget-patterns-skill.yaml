  source: community\n---\n\n# Robius Widget Patterns Skill\n\nBest practices for designing\
  \ reusable Makepad widgets based on Robrix and Moly codebase patterns.\n\n**Source\
  \ codebases:**\n- **Robrix**: Matrix chat client - Avatar, RoomsList, RoomScreen\
  \ widgets\n- **Moly**: AI chat application - Slot, ChatLine, PromptInput, AdaptiveView\
  \ widgets\n\n## When to Use\n\nUse this skill when:\n- Creating reusable Makepad\
  \ widgets\n- Designing widget component APIs\n- Implementing text/image toggle patterns\n\
  - Dynamic styling in Makepad\n- Keywords: robrix widget, makepad component, reusable\
  \ widget, widget design pattern\n\n## Production Patterns\n\nFor production-ready\
  \ widget patterns, see the `_base/` directory:\n\n| Pattern | Description |\n|---------|-------------|\n\
  | 01-widget-extension | Add helper methods to widget references |\n| 02-modal-overlay\
  \ | Popups, dialogs using DrawList2d overlay |\n| 03-collapsible | Expandable/collapsible\
  \ sections |\n| 04-list-template | Dynamic lists with LivePtr templates |\n| 05-lru-view-cache\
  \ | Memory-efficient view caching |\n| 14-callout-tooltip | Tooltips with arrow\
  \ positioning |\n| 20-redraw-optimization | Efficient redraw patterns |\n| 15-dock-studio-layout\
  \ | IDE-style resizable panels |\n| 16-hover-effect | Hover effects with instance\
  \ variables |\n| 17-row-based-grid-layout | Dynamic grid layouts |\n| 18-drag-drop-reorder\
  \ | Drag-and-drop widget reordering |\n| 19-pageflip-optimization | PageFlip 切换优化，即刻销毁/缓存模式\
  \ |\n| 21-collapsible-row-portal-list | Auto-grouping consecutive items in portal\
  \ lists with FoldHeader |\n| 22-dropdown-overlay | Dropdown popups using DrawList2d\
  \ overlay (no layout push) |\n\n## Standard Widget Structure\n\n```rust\nuse makepad_widgets::*;\n\
  \nlive_design! {\n    use link::theme::*;\n    use link::widgets::*;\n\n    pub\
  \ MyWidget = {{MyWidget}} {\n        width: Fill, height: Fit,\n        flow: Down,\n\
  \n        // Child widgets defined in DSL\n        inner_view = <View> {\n     \
  \       // ...\n        }\n    }\n}\n\n#[derive(Live, LiveHook, Widget)]\npub struct\
  \ MyWidget {\n    #[deref] view: View,              // Delegate to inner View\n\n\
  \    #[live] some_property: f64,       // DSL-configurable property\n    #[live(100.0)]\
  \ default_val: f64,  // With default value\n\n    #[rust] internal_state: State,\
  \    // Rust-only state (not in DSL)\n\n    #[animator] animator: Animator,   //\
  \ For animations\n}\n\nimpl Widget for MyWidget {\n    fn handle_event(&mut self,\
  \ cx: &mut Cx, event: &Event, scope: &mut Scope) {\n        self.view.handle_event(cx,\
  \ event, scope);\n        // Custom event handling...\n    }\n\n    fn draw_walk(&mut\
  \ self, cx: &mut Cx2d, scope: &mut Scope, walk: Walk) -> DrawStep {\n        self.view.draw_walk(cx,\
  \ scope, walk)\n    }\n}\n```\n\n## Text/Image Toggle Pattern\n\nA common pattern\
  \ for widgets that show either text or an im\n\n## Diretrizes do \n\n\U0001F527\
