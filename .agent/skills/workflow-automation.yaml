  \ 2026-02-27\n---\n\n# Workflow Automation\n\nWorkflow automation is the infrastructure\
  \ that makes AI agents reliable.\nWithout durable execution, a network hiccup during\
  \ a 10-step payment\nflow means lost money and angry customers. With it, workflows\
  \ resume\nexactly where they left off.\n\nThis skill covers the platforms (n8n,\
  \ Temporal, Inngest) and patterns\n(sequential, parallel, orchestrator-worker) that\
  \ turn brittle scripts\ninto production-grade automation.\n\nKey insight: The platforms\
  \ make different tradeoffs. n8n optimizes for\naccessibility, Temporal for correctness,\
  \ Inngest for developer experience.\nPick based on your actual needs, not hype.\n\
  \n## Principles\n\n- Durable execution is non-negotiable for money or state-critical\
  \ workflows\n- Events are the universal language of workflow triggers\n- Steps are\
  \ checkpoints - each should be independently retryable\n- Start simple, add complexity\
  \ only when reliability demands it\n- Observability isn't optional - you need to\
  \ see where workflows fail\n- Workflows and agents co-evolve - design for both\n\
  \n## Capabilities\n\n- workflow-automation\n- workflow-orchestration\n- durable-execution\n\
  - event-driven-workflows\n- step-functions\n- job-queues\n- background-jobs\n- scheduled-tasks\n\
  \n## Scope\n\n- multi-agent-coordination → multi-agent-orchestration\n- ci-cd-pipelines\
  \ → devops\n- data-pipelines → data-engineer\n- api-design → api-designer\n\n##\
  \ Tooling\n\n### Platforms\n\n- n8n - When: Low-code automation, quick prototyping,\
  \ non-technical users Note: Self-hostable, 400+ integrations, great for visual workflows\n\
  - Temporal - When: Mission-critical workflows, financial transactions, microservices\
  \ Note: Strongest durability guarantees, steeper learning curve\n- Inngest - When:\
  \ Event-driven serverless, TypeScript codebases, AI workflows Note: Best developer\
  \ experience, works with any hosting\n- AWS Step Functions - When: AWS-native stacks,\
  \ existing Lambda functions Note: Tight AWS integration, JSON-based workflow definition\n\
  - Azure Durable Functions - When: Azure stacks, .NET or TypeScript Note: Good AI\
  \ agent support, checkpoint and replay\n\n## Patterns\n\n### Sequential Workflow\
  \ Pattern\n\nSteps execute in order, each output becomes next input\n\n**When to\
  \ use**: Content pipelines, data processing, ordered operations\n\n# SEQUENTIAL\
