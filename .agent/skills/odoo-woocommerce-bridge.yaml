  ---\n\n# Odoo ↔ WooCommerce Bridge\n\n## Overview\n\nThis skill guides you through\
  \ building a reliable sync bridge between Odoo (the back-office ERP) and WooCommerce\
  \ (the WordPress online store). It covers product catalog sync, real-time inventory\
  \ updates, order import, and customer record management.\n\n## When to Use This\
  \ Skill\n\n- Running a WooCommerce store with Odoo for inventory and fulfillment.\n\
  - Automatically pulling WooCommerce orders into Odoo as sale orders.\n- Keeping\
  \ WooCommerce product stock in sync with Odoo's warehouse.\n- Mapping WooCommerce\
  \ order statuses to Odoo delivery states.\n\n## How It Works\n\n1. **Activate**:\
  \ Mention `@odoo-woocommerce-bridge` and describe your sync requirements.\n2. **Design**:\
  \ Get the field mapping table between WooCommerce and Odoo objects.\n3. **Build**:\
  \ Receive Python integration scripts using the WooCommerce REST API.\n\n## Field\
  \ Mapping: WooCommerce → Odoo\n\n| WooCommerce | Odoo |\n|---|---|\n| `products`\
  \ | `product.template` + `product.product` |\n| `orders` | `sale.order` + `sale.order.line`\
  \ |\n| `customers` | `res.partner` |\n| `stock_quantity` | `stock.quant` |\n| `sku`\
  \ | `product.product.default_code` |\n| `order status: processing` | Sale Order:\
  \ `sale` (confirmed) |\n| `order status: completed` | Delivery: `done` |\n\n## Examples\n\
  \n### Example 1: Pull WooCommerce Orders into Odoo (Python)\n\n```python\nfrom woocommerce\
  \ import API\nimport xmlrpc.client\nimport os\n\n# WooCommerce client\nwcapi = API(\n\
  \    url=os.getenv(\"WC_URL\", \"https://mystore.com\"),\n    consumer_key=os.getenv(\"\
  WC_KEY\"),\n    consumer_secret=os.getenv(\"WC_SECRET\"),\n    version=\"wc/v3\"\
  \n)\n\n# Odoo client\nodoo_url = os.getenv(\"ODOO_URL\", \"https://myodoo.example.com\"\
  )\ndb = os.getenv(\"ODOO_DB\", \"my_db\")\nuid = int(os.getenv(\"ODOO_UID\", \"\
  2\"))\npwd = os.getenv(\"ODOO_PASSWORD\")\nmodels = xmlrpc.client.ServerProxy(f\"\
  {odoo_url}/xmlrpc/2/object\")\n\n\ndef sync_orders():\n    # Get unprocessed WooCommerce\
  \ orders\n    orders = wcapi.get(\"orders\", params={\"status\": \"processing\"\
  , \"per_page\": 50}).json()\n\n    for wc_order in orders:\n        # Find or create\
  \ Odoo partner\n        email = wc_order['billing']['email']\n        partner =\
  \ models.execute_kw(db, uid, pwd, 'res.partner', 'search',\n            [[['email',\
  \ '=', email]]])\n        if not partner:\n            partner_id = models.execute_kw(db,\
  \ uid, pwd, 'res.partner', 'create', [{\n                'name': f\"{wc_order['billing']['first_name']}\
  \ {wc_order['billing']['last_name']}\",\n                'email': email,\n     \
  \           'phone': wc_order['billing']['phone'],\n                'street': wc_order['billing']['address_1'],\n\
  \                'city': wc_order['billing']['city'],\n            }])\n       \
  \ else:\n            partner_id = partner[0]\n\n        # Create Sale Order in Odoo\n\
  \        order_lines = []\n        for item in wc_order['line_items\n\n## Diretrizes\
  \ do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente o gerenciador\
  \ uv para dependências. Todo código deve ser lintado via ruff e tipado com mypy.\n"
