  \nrisk: safe\nsource: self\ndate_added: \"2026-02-27\"\n---\n\n# Stitch UI Design\
  \ Prompting\n\nExpert guidance for crafting effective prompts in Google Stitch,\
  \ the AI-powered UI design tool by Google Labs. This skill helps create precise,\
  \ actionable prompts that generate high-quality UI designs for web and mobile applications.\n\
  \n## What is Google Stitch?\n\nGoogle Stitch is an experimental AI UI generator\
  \ powered by Gemini 2.5 Flash that transforms text prompts and visual references\
  \ into functional UI designs. It supports:\n\n- Text-to-UI generation from natural\
  \ language prompts\n- Image-to-UI conversion from sketches, wireframes, or screenshots\n\
  - Multi-screen app flows and responsive layouts\n- Export to HTML/CSS, Figma, and\
  \ code\n- Iterative refinement with variants and annotations\n\n## Core Prompting\
  \ Principles\n\n### 1. Be Specific and Detailed\n\nGeneric prompts yield generic\
  \ results. Specific prompts with clear requirements produce tailored, professional\
  \ designs.\n\n**Poor prompt:**\n```\nCreate a dashboard\n```\n\n**Effective prompt:**\n\
  ```\nMember dashboard with course modules grid, progress tracking bar, \nand community\
  \ feed sidebar using purple theme and card-based layout\n```\n\n**Why it works:**\
  \ Specifies components (modules, progress, feed), layout structure (grid, sidebar),\
  \ visual style (purple theme, cards), and context (member dashboard).\n\n### 2.\
  \ Define Visual Style and Theme\n\nAlways include color schemes, design aesthetics,\
  \ and visual direction to avoid generic AI outputs.\n\n**Components to specify:**\n\
  - Color palette (primary colors, accent colors)\n- Design style (minimalist, modern,\
  \ playful, professional, glassmorphic)\n- Typography preferences (if any)\n- Spacing\
  \ and density (compact, spacious, balanced)\n\n**Example:**\n```\nE-commerce product\
  \ page with hero image gallery, add-to-cart CTA, \nreviews section, and related\
  \ products carousel. Use clean minimalist \ndesign with sage green accents and generous\
  \ white space.\n```\n\n### 3. Structure Multi-Screen Flows Clearly\n\nFor apps with\
  \ multiple screens, list each screen as bullet points before generation.\n\n**Approach:**\n\
  ```\nFitness tracking app with:\n- Onboarding screen with goal selection\n- Home\
  \ dashboard with daily stats and activity rings\n- Workout library with category\
  \ filters\n- Profile screen with achievements and settings\n```\n\nStitch will ask\
  \ for confirmation before generating multiple screens, ensuring alignment with your\
  \ vision.\n\n### 4. Specify Platform and Responsive Behavior\n\nIndicate whether\
  \ the design is for mobile, tablet, desktop, or responsive web.\n\n**Examples:**\n\
  ```\nMobile app login screen (iOS style) with email/password fields and social auth\
  \ buttons\n\nResponsive landing page that adapts from mobile (320px) to desktop\
  \ (1440px) \nwith collapsi\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE\
  \ ENGENHARIA: Use exclusivamente o gerenciador uv para dependências. Todo código\
  \ deve ser lintado via ruff e tipado com mypy.\n"
