  # Confluence Automation via Rube MCP


  Automate Confluence operations including page creation and updates, content search
  with CQL, space management, label tagging, and page hierarchy navigation through
  Composio''s Confluence toolkit.


  ## Prerequisites


  - Rube MCP must be connected (RUBE_SEARCH_TOOLS available)

  - Active Confluence connection via `RUBE_MANAGE_CONNECTIONS` with toolkit `confluence`

  - Always call `RUBE_SEARCH_TOOLS` first to get current tool schemas


  ## Setup


  **Get Rube MCP**: Add `https://rube.app/mcp` as an MCP server in your client configuration.
  No API keys needed — just add the endpoint and it works.


  1. Verify Rube MCP is available by confirming `RUBE_SEARCH_TOOLS` responds

  2. Call `RUBE_MANAGE_CONNECTIONS` with toolkit `confluence`

  3. If connection is not ACTIVE, follow the returned auth link to complete Confluence
  OAuth

  4. Confirm connection status shows ACTIVE before running any workflows


  ## Core Workflows


  ### 1. Create and Update Pages


  **When to use**: User wants to create new documentation or update existing Confluence
  pages


  **Tool sequence**:

  1. `CONFLUENCE_GET_SPACES` - List spaces to find the target space ID [Prerequisite]

  2. `CONFLUENCE_SEARCH_CONTENT` - Find existing page to avoid duplicates or locate
  parent [Optional]

  3. `CONFLUENCE_GET_PAGE_BY_ID` - Get current page content and version number before
  updating [Prerequisite for updates]

  4. `CONFLUENCE_CREATE_PAGE` - Create a new page in a space [Required for creation]

  5. `CONFLUENCE_UPDATE_PAGE` - Update an existing page with new content and incremented
  version [Required for updates]

  6. `CONFLUENCE_ADD_CONTENT_LABEL` - Tag the page with labels after creation [Optional]


  **Key parameters**:

  - `spaceId`: Space ID or key (e.g., `"DOCS"`, `"12345678"`) -- space keys are auto-converted
  to IDs

  - `title`: Page title (must be unique within a space)

  - `parentId`: Parent page ID for creating child pages; omit to place under space
  homepage

  - `body.storage.value`: HTML/XHTML content in Confluence storage format

  - `body.storage.representation`: Must be `"storage"` for create operations

  - `version.number`: For updates, must be current version + 1

  - `version.message`: Optional change description


  **Pitfalls**:

  - Confluence enforces unique page titles per space; creating a page with a duplicate
  title will fail

  - `UPDATE_PAGE` requires `version.number` set to current version + 1; always fetch
  current version first with `GET_PAGE_BY_ID`

  - Content must be in Confluence storage format (XHTML), not plain text or Markdown

  - `CREATE_PAGE` uses `body.storage.value` while `UPDATE_PAGE` uses `body.value`
  with `body.representation`

  - `GET_PAGE_BY_ID` requires a numeric long ID, not a UUID or string


