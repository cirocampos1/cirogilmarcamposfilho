  \ processing pipelines\n- The user mentions Vocode, voice engines, or conversational\
  \ AI\n\n## Core Architecture Principles\n\n### The Worker Pipeline Pattern\n\nEvery\
  \ voice AI engine follows this pipeline:\n\n```\nAudio In → Transcriber → Agent\
  \ → Synthesizer → Audio Out\n           (Worker 1)   (Worker 2)  (Worker 3)\n```\n\
  \n**Key Benefits:**\n- **Decoupling**: Workers only know about their input/output\
  \ queues\n- **Concurrency**: All workers run simultaneously via asyncio\n- **Backpressure**:\
  \ Queues automatically handle rate differences\n- **Interruptibility**: Everything\
  \ can be stopped mid-stream\n\n### Base Worker Pattern\n\nEvery worker follows this\
  \ pattern:\n\n```python\nclass BaseWorker:\n    def __init__(self, input_queue,\
  \ output_queue):\n        self.input_queue = input_queue   # asyncio.Queue to consume\
  \ from\n        self.output_queue = output_queue # asyncio.Queue to produce to\n\
  \        self.active = False\n    \n    def start(self):\n        \"\"\"Start the\
  \ worker's processing loop\"\"\"\n        self.active = True\n        asyncio.create_task(self._run_loop())\n\
  \    \n    async def _run_loop(self):\n        \"\"\"Main processing loop - runs\
  \ forever until terminated\"\"\"\n        while self.active:\n            item =\
  \ await self.input_queue.get()  # Block until item arrives\n            await self.process(item)\
  \              # Process the item\n    \n    async def process(self, item):\n  \
