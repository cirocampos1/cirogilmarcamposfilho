  \ (Apache 2.0)\ndate_added: 2026-02-27\n---\n\n# Shopify Apps\n\nExpert patterns\
  \ for Shopify app development including Remix/React Router apps,\nembedded apps\
  \ with App Bridge, webhook handling, GraphQL Admin API,\nPolaris components, billing,\
  \ and app extensions.\n\n## Patterns\n\n### React Router App Setup\n\nModern Shopify\
  \ app template with React Router\n\n**When to use**: Starting a new Shopify app\n\
  \n### Template\n\n# Create new Shopify app with CLI\nnpm init @shopify/app@latest\
  \ my-shopify-app\n\n# Project structure\n# my-shopify-app/\n# ├── app/\n# │   ├──\
  \ routes/\n# │   │   ├── app._index.tsx        # Main app page\n# │   │   ├── app.tsx\
  \               # App layout with providers\n# │   │   ├── auth.$.tsx          \
  \  # Auth callback\n# │   │   └── webhooks.tsx          # Webhook handler\n# │ \
  \  ├── shopify.server.ts         # Server configuration\n# │   └── root.tsx    \
  \              # Root layout\n# ├── extensions/                   # App extensions\n\
  # ├── shopify.app.toml              # App configuration\n# └── package.json\n\n\
  // shopify.app.toml\nname = \"my-shopify-app\"\nclient_id = \"your-client-id\"\n\
  application_url = \"https://your-app.example.com\"\n\n[access_scopes]\nscopes =\
  \ \"read_products,write_products,read_orders\"\n\n[webhooks]\napi_version = \"2024-10\"\
  \n\n[webhooks.subscriptions]\ntopics = [\"orders/create\", \"products/update\"]\n\
  uri = \"/webhooks\"\n\n[auth]\nredirect_urls = [\"https://your-app.example.com/auth/callback\"\
  ]\n\n// app/shopify.server.ts\nimport \"@shopify/shopify-app-remix/adapters/node\"\
  ;\nimport {\n  LATEST_API_VERSION,\n  shopifyApp,\n  DeliveryMethod,\n} from \"\
  @shopify/shopify-app-remix/server\";\nimport { PrismaSessionStorage } from \"@shopify/shopify-app-session-storage-prisma\"\
  ;\nimport prisma from \"./db.server\";\n\nconst shopify = shopifyApp({\n  apiKey:\
  \ process.env.SHOPIFY_API_KEY!,\n  apiSecretKey: process.env.SHOPIFY_API_SECRET!,\n\
  \  scopes: process.env.SCOPES?.split(\",\"),\n  appUrl: process.env.SHOPIFY_APP_URL!,\n\
  \  authPathPrefix: \"/auth\",\n  sessionStorage: new PrismaSessionStorage(prisma),\n\
  \  distribution: AppDistribution.AppStore,\n  future: {\n    unstable_newEmbeddedAuthStrategy:\
  \ true,\n  },\n  ...(process.env.SHOP_CUSTOM_DOMAIN\n    ? { customShopDomains:\
  \ [process.env.SHOP_CUSTOM_DOMAIN] }\n    : {}),\n});\n\nexport default shopify;\n\
  export const apiVersion = LATEST_API_VERSION;\nexport const authenticate = shopify.authenticate;\n\
  export const sessionStorage = shopify.sessionStorage;\n\n### Notes\n\n- React Router\
  \ replaced Remix as recommended template (late 2024)\n- unstable_newEmbeddedAuthStrategy\
  \ enabled by default for new apps\n- Webhooks configured in shopify.app.toml, not\
  \ code\n- Run 'shopify app deploy' to apply configuration changes\n\n### Embedded\
  \ App with App Bridge\n\nRender app embedded in Shopify Admin\n\n**When to use**:\
  \ Buildin\n\n## Diretrizes do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use\
  \ exclusivamente o gerenciador uv para dependências. Todo código deve ser lintado\
  \ via ruff e tipado com mypy.\n"
