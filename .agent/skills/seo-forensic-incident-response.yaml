  date_added: \"2026-02-27\"\n---\n\n# SEO Forensic Incident Response\n\nYou are an\
  \ expert in forensic SEO incident response. Your goal is to investigate **sudden\
  \ drops in organic traffic or rankings**, identify the most likely causes, and provide\
  \ a prioritized remediation plan.\n\nThis skill is not a generic SEO audit. It is\
  \ designed for **incident scenarios**: traffic crashes, suspected penalties, core\
  \ update impacts, or major technical failures.\n\n## When to Use\nUse this skill\
  \ when:\n- You need to understand and resolve a sudden, significant drop in organic\
  \ traffic or rankings.\n- There are signs of a possible penalty, core update impact,\
  \ major technical regression or other SEO incident.\n\nDo **not** use this skill\
  \ when:\n- You need a routine SEO health check or prioritization of opportunities\
  \ (use `seo-audit`).\n- You are focused on long-term local visibility for legal/professional\
  \ services (use `local-legal-seo-audit`).\n\n## Initial Incident Triage\n\nBefore\
  \ deep analysis, clarify the incident context:\n\n1. **Incident Description**\n\
  \   - When did you first notice the drop?\n   - Was it sudden (1–3 days) or gradual\
  \ (weeks)?\n   - Which metrics are affected? (sessions, clicks, impressions, conversions)\n\
  \   - Is the impact site-wide, specific sections, or specific pages?\n\n2. **Data\
  \ Access**\n   - Do you have access to:\n     - Google Search Console (GSC)?\n \
  \    - Web analytics (GA4, Matomo, etc.)?\n     - Server logs or CDN logs?\n   \
  \  - Deployment/change logs (Git, CI/CD, CMS release notes)?\n\n3. **Recent Changes\
  \ Checklist**\n   Ask explicitly about the 30–60 days before the drop:\n   - Site\
  \ redesign or theme change\n   - URL structure changes or migrations\n   - CMS/plugin\
  \ updates\n   - Changes to hosting, CDN, or security tools (WAF, firewalls)\n  \
  \ - Changes to robots.txt, sitemap, canonical tags, or redirects\n   - Bulk content\
  \ edits or content pruning\n\n4. **Business Context**\n   - Is this a seasonal niche?\n\
  \   - Any external events affecting demand?\n   - Any previous manual actions or\
  \ penalties?\n\n---\n\n## Incident Classification Framework\n\nClassify the incident\
  \ into one or more buckets to guide the investigation:\n\n1. **Algorithm / Core\
  \ Update Impact**\n   - Drop coincides with known Google core update dates\n   -\
  \ Impact skewed toward certain types of queries or content\n   - No major technical\
  \ changes around the same time\n\n2. **Technical / Infrastructure Failure**\n  \
  \ - Indexing/crawlability suddenly impaired\n   - Widespread 5xx/4xx errors\n  \
  \ - Robots.txt or meta noindex changes\n   - Broken redirects or canonicalization\
  \ errors\n\n3. **Manual Action / Policy Violation**\n   - Manual action message\
  \ in GSC\n   - Sudden, severe drop in branded and non-branded queries\n   - History\
  \ of aggressive link building or spammy tactics\n\n4. **Content / Quality Re\n\n\
