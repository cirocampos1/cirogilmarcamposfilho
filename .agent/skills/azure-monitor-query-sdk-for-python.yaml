  source: community\ndate_added: '2026-02-27'\n---\n\n# Azure Monitor Query SDK for\
  \ Python\n\nQuery logs and metrics from Azure Monitor and Log Analytics workspaces.\n\
  \n## Installation\n\n```bash\npip install azure-monitor-query\n```\n\n## Environment\
  \ Variables\n\n```bash\n# Log Analytics\nAZURE_LOG_ANALYTICS_WORKSPACE_ID=<workspace-id>\n\
  \n# Metrics\nAZURE_METRICS_RESOURCE_URI=/subscriptions/<sub>/resourceGroups/<rg>/providers/<provider>/<type>/<name>\n\
  ```\n\n## Authentication\n\n```python\nfrom azure.identity import DefaultAzureCredential\n\
  \ncredential = DefaultAzureCredential()\n```\n\n## Logs Query Client\n\n### Basic\
  \ Query\n\n```python\nfrom azure.monitor.query import LogsQueryClient\nfrom datetime\
  \ import timedelta\n\nclient = LogsQueryClient(credential)\n\nquery = \"\"\"\nAppRequests\n\
  | where TimeGenerated > ago(1h)\n| summarize count() by bin(TimeGenerated, 5m),\
  \ ResultCode\n| order by TimeGenerated desc\n\"\"\"\n\nresponse = client.query_workspace(\n\
  \    workspace_id=os.environ[\"AZURE_LOG_ANALYTICS_WORKSPACE_ID\"],\n    query=query,\n\
  \    timespan=timedelta(hours=1)\n)\n\nfor table in response.tables:\n    for row\
  \ in table.rows:\n        print(row)\n```\n\n### Query with Time Range\n\n```python\n\
  from datetime import datetime, timezone\n\nresponse = client.query_workspace(\n\
  \    workspace_id=workspace_id,\n    query=\"AppRequests | take 10\",\n    timespan=(\n\
  \        datetime(2024, 1, 1, tzinfo=timezone.utc),\n        datetime(2024, 1, 2,\
  \ tzinfo=timezone.utc)\n    )\n)\n```\n\n### Convert to DataFrame\n\n```python\n\
  import pandas as pd\n\nresponse = client.query_workspace(workspace_id, query, timespan=timedelta(hours=1))\n\
  \nif response.tables:\n    table = response.tables[0]\n    df = pd.DataFrame(data=table.rows,\
  \ columns=[col.name for col in table.columns])\n    print(df.head())\n```\n\n###\
  \ Batch Query\n\n```python\nfrom azure.monitor.query import LogsBatchQuery\n\nqueries\
  \ = [\n    LogsBatchQuery(workspace_id=workspace_id, query=\"AppRequests | take\
  \ 5\", timespan=timedelta(hours=1)),\n    LogsBatchQuery(workspace_id=workspace_id,\
  \ query=\"AppExceptions | take 5\", timespan=timedelta(hours=1))\n]\n\nresponses\
  \ = client.query_batch(queries)\n\nfor response in responses:\n    if response.tables:\n\
  \        print(f\"Rows: {len(response.tables[0].rows)}\")\n```\n\n### Handle Partial\
  \ Results\n\n```python\nfrom azure.monitor.query import LogsQueryStatus\n\nresponse\
  \ = client.query_workspace(workspace_id, query, timespan=timedelta(hours=24))\n\n\
