  date_added: \"2026-02-27\"\n---\n\n# Content Creator\n\nProfessional-grade brand\
  \ voice analysis, SEO optimization, and platform-specific content frameworks.\n\n\
  ## When to Use\nUse this skill when writing blog posts, creating social media content,\
  \ establishing brand voice, optimizing content for SEO, or planning content calendars.\n\
  \n## Keywords\ncontent creation, blog posts, SEO, brand voice, social media, content\
  \ calendar, marketing content, content strategy, content marketing, brand consistency,\
  \ content optimization, social media marketing, content planning, blog writing,\
  \ content frameworks, brand guidelines, social media strategy\n\n## Quick Start\n\
  \n### For Brand Voice Development\n1. Run `scripts/brand_voice_analyzer.py` on existing\
  \ content to establish baseline\n2. Review `references/brand_guidelines.md` to select\
  \ voice attributes\n3. Apply chosen voice consistently across all content\n\n###\
  \ For Blog Content Creation\n1. Choose template from `references/content_frameworks.md`\n\
  2. Research keywords for topic\n3. Write content following template structure\n\
  4. Run `scripts/seo_optimizer.py [file] [primary-keyword]` to optimize\n5. Apply\
  \ recommendations before publishing\n\n### For Social Media Content\n1. Review platform\
  \ best practices in `references/social_media_optimization.md`\n2. Use appropriate\
  \ template from `references/content_frameworks.md`\n3. Optimize based on platform-specific\
  \ guidelines\n4. Schedule using `assets/content_calendar_template.md`\n\n## Core\
  \ Workflows\n\n### Establishing Brand Voice (First Time Setup)\n\nWhen creating\
  \ content for a new brand or client:\n\n1. **Analyze Existing Content** (if available)\n\
  \   ```bash\n   python scripts/brand_voice_analyzer.py existing_content.txt\n  \
  \ ```\n   \n2. **Define Voice Attributes**\n   - Review brand personality archetypes\
  \ in `references/brand_guidelines.md`\n   - Select primary and secondary archetypes\n\
  \   - Choose 3-5 tone attributes\n   - Document in brand guidelines\n\n3. **Create\
  \ Voice Sample**\n   - Write 3 sample pieces in chosen voice\n   - Test consistency\
  \ using analyzer\n   - Refine based on results\n\n### Creating SEO-Optimized Blog\
  \ Posts\n\n1. **Keyword Research**\n   - Identify primary keyword (search volume\
  \ 500-5000/month)\n   - Find 3-5 secondary keywords\n   - List 10-15 LSI keywords\n\
  \n2. **Content Structure**\n   - Use blog template from `references/content_frameworks.md`\n\
  \   - Include keyword in title, first paragraph, and 2-3 H2s\n   - Aim for 1,500-2,500\
  \ words for comprehensive coverage\n\n3. **Optimization Check**\n   ```bash\n  \
  \ python scripts/seo_optimizer.py blog_post.md \"primary keyword\" \"secondary,keywords,list\"\
  \n   ```\n\n4. **Apply SEO Recommendations**\n   - Adjust keyword density to 1-3%\n\
