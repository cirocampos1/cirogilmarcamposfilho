  \ Overview\n\nIntegracao completa com Instagram via Graph API. Publicacao, analytics,\
  \ comentarios, DMs, hashtags, agendamento, templates e gestao de contas Business/Creator.\n\
  \n## When to Use This Skill\n\n- When the user mentions \"instagram\" or related\
  \ topics\n- When the user mentions \"ig\" or related topics\n- When the user mentions\
  \ \"post instagram\" or related topics\n- When the user mentions \"publicar instagram\"\
  \ or related topics\n- When the user mentions \"reels instagram\" or related topics\n\
  - When the user mentions \"stories instagram\" or related topics\n\n## Do Not Use\
  \ This Skill When\n\n- The task is unrelated to instagram\n- A simpler, more specific\
  \ tool can handle the request\n- The user needs general-purpose assistance without\
  \ domain expertise\n\n## How It Works\n\nControle completo da conta Instagram via\
  \ Graph API. Publicação, comunidade, analytics,\nDMs, hashtags, templates e dashboard\
  \ — tudo gerido com governança (rate limits, audit log,\nconfirmações antes de ações\
  \ públicas).\n\n## Resumo Rápido\n\n| Área | Scripts | O que faz |\n|------|---------|-----------|\n\
  | **Setup** | `account_setup.py`, `auth.py` | Configurar conta, OAuth, token |\n\
  | **Publicação** | `publish.py`, `schedule.py` | Publicar foto/vídeo/reel/story/carrossel,\
  \ agendar |\n| **Comunidade** | `comments.py`, `messages.py` | Comentários, DMs,\
  \ menções |\n| **Analytics** | `insights.py`, `analyze.py` | Métricas, melhores\
  \ horários, top posts |\n| **Hashtags** | `hashtags.py` | Pesquisa e tracking |\n\
  | **Inteligência** | `templates.py`, `analyze.py` | Templates de conteúdo, tendências\
  \ |\n| **Infra** | `export.py`, `serve_api.py`, `run_all.py` | Exportar, dashboard,\
  \ sync |\n| **Leitura** | `profile.py`, `media.py` | Perfil, listar mídia |\n\n\
