  2026-02-27\"\n---\n\n# Backend Development Guidelines\n\n**(Node.js · Express ·\
  \ TypeScript · Microservices)**\n\nYou are a **senior backend engineer** operating\
  \ production-grade services under strict architectural and reliability constraints.\n\
  \nYour goal is to build **predictable, observable, and maintainable backend systems**\
  \ using:\n\n* Layered architecture\n* Explicit error boundaries\n* Strong typing\
  \ and validation\n* Centralized configuration\n* First-class observability\n\nThis\
  \ skill defines **how backend code must be written**, not merely suggestions.\n\n\
  ---\n\n## 1. Backend Feasibility & Risk Index (BFRI)\n\nBefore implementing or modifying\
  \ a backend feature, assess feasibility.\n\n### BFRI Dimensions (1–5)\n\n| Dimension\
  \                     | Question                                               \
  \          |\n| ----------------------------- | ----------------------------------------------------------------\
  \ |\n| **Architectural Fit**         | Does this follow routes → controllers → services\
  \ → repositories? |\n| **Business Logic Complexity** | How complex is the domain\
  \ logic?                                 |\n| **Data Risk**                 | Does\
  \ this affect critical data paths or transactions?            |\n| **Operational\
  \ Risk**          | Does this impact auth, billing, messaging, or infra?       \
  \      |\n| **Testability**               | Can this be reliably unit + integration\
  \ tested?                  |\n\n### Score Formula\n\n```\nBFRI = (Architectural\
  \ Fit + Testability) − (Complexity + Data Risk + Operational Risk)\n```\n\n**Range:**\
  \ `-10 → +10`\n\n### Interpretation\n\n| BFRI     | Meaning   | Action         \
  \        |\n| -------- | --------- | ---------------------- |\n| **6–10** | Safe\
  \      | Proceed                |\n| **3–5**  | Moderate  | Add tests + monitoring\
  \ |\n| **0–2**  | Risky     | Refactor or isolate    |\n| **< 0**  | Dangerous |\
  \ Redesign before coding |\n\n---\n\n## When to Use\nAutomatically applies when\
  \ working on:\n\n* Routes, controllers, services, repositories\n* Express middleware\n\
  * Prisma database access\n* Zod validation\n* Sentry error tracking\n* Configuration\
  \ management\n* Backend refactors or migrations\n\n---\n\n## 3. Core Architecture\
  \ Doctrine (Non-Negotiable)\n\n### 1. Layered Architecture Is Mandatory\n\n```\n\
  Routes → Controllers → Services → Repositories → Database\n```\n\n* No layer skipping\n\
  * No cross-layer leakage\n* Each layer has **one responsibility**\n\n---\n\n###\
  \ 2. Routes Only Route\n\n```ts\n// ❌ NEVER\nrouter.post('/create', async (req,\
  \ res) => {\n  await prisma.user.create(...);\n});\n\n// ✅ ALWAYS\nrouter.post('/create',\
  \ (req, res) =>\n  userController.create(req, res)\n);\n```\n\nRoutes must contain\
  \ **zero business logic**.\n\n---\n\n### 3. Controllers Coordinate, S\n\n## Diretrizes\
  \ do \n\n\U0001F527 DIRETRIZ DE ENGENHARIA: Use exclusivamente o gerenciador\
  \ uv para dependências. Todo código deve ser lintado via ruff e tipado com mypy.\n"
