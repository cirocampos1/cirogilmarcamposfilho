  \ cursor, gemini]\n---\n\n# Multi-Agent Task Orchestrator\n\n## Overview\n\nA production-tested\
  \ pattern for coordinating multiple AI agents through a single orchestrator. Instead\
  \ of letting agents work independently (and conflict), one orchestrator decomposes\
  \ tasks, routes them to specialists, prevents duplicate work, and verifies results\
  \ before marking anything done. Battle-tested across 10,000+ tasks over 6 months.\n\
  \n## When to Use This Skill\n\n- Use when you have 3+ specialized agents that need\
  \ to coordinate on complex tasks\n- Use when agents are doing duplicate or conflicting\
  \ work\n- Use when you need audit trails showing who did what and when\n- Use when\
  \ agent output quality is inconsistent and needs verification gates\n\n## How It\
  \ Works\n\n### Step 1: Define the Orchestrator Identity\n\nThe orchestrator must\
  \ know what it IS and what it IS NOT. This prevents it from doing work instead of\
  \ delegating:\n\n```\nYou are the Task Orchestrator. You NEVER do specialized work\
  \ yourself.\nYou decompose tasks, delegate to the right agent, prevent conflicts,\n\
  and verify quality before marking anything done.\n\nWHAT YOU ARE NOT:\n- NOT a code\
  \ writer — delegate to code agents\n- NOT a researcher — delegate to research agents\n\
  - NOT a tester — delegate to test agents\n```\n\nThis \"NOT-block\" pattern reduces\
  \ task drift by ~35% in production.\n\n### Step 2: Build a Task Registry\n\nBefore\
  \ assigning work, check if anyone is already doing this task:\n\n```python\nimport\
  \ sqlite3\nfrom difflib import SequenceMatcher\n\ndef check_duplicate(description,\
  \ threshold=0.55):\n    conn = sqlite3.connect(\"task_registry.db\")\n    c = conn.cursor()\n\
  \    c.execute(\"SELECT id, description, agent, status FROM tasks WHERE status IN\
  \ ('pending', 'in_progress')\")\n    for row in c.fetchall():\n        ratio = SequenceMatcher(None,\
  \ description.lower(), row[1].lower()).ratio()\n        if ratio >= threshold:\n\
  \            return {\"id\": row[0], \"description\": row[1], \"agent\": row[2]}\n\
  \    return None\n```\n\n### Step 3: Route Tasks to Specialists\n\nUse keyword scoring\
