  \n---\n\n# Backend Development Patterns\n\nBackend architecture patterns and best\
  \ practices for scalable server-side applications.\n\n## API Design Patterns\n\n\
  ### RESTful API Structure\n\n```typescript\n// ✅ Resource-based URLs\nGET    /api/markets\
  \                 # List resources\nGET    /api/markets/:id             # Get single\
  \ resource\nPOST   /api/markets                 # Create resource\nPUT    /api/markets/:id\
  \             # Replace resource\nPATCH  /api/markets/:id             # Update resource\n\
  DELETE /api/markets/:id             # Delete resource\n\n// ✅ Query parameters for\
  \ filtering, sorting, pagination\nGET /api/markets?status=active&sort=volume&limit=20&offset=0\n\
  ```\n\n### Repository Pattern\n\n```typescript\n// Abstract data access logic\n\
  interface MarketRepository {\n  findAll(filters?: MarketFilters): Promise<Market[]>\n\
  \  findById(id: string): Promise<Market | null>\n  create(data: CreateMarketDto):\
  \ Promise<Market>\n  update(id: string, data: UpdateMarketDto): Promise<Market>\n\
  \  delete(id: string): Promise<void>\n}\n\nclass SupabaseMarketRepository implements\
  \ MarketRepository {\n  async findAll(filters?: MarketFilters): Promise<Market[]>\
  \ {\n    let query = supabase.from('markets').select('*')\n\n    if (filters?.status)\
  \ {\n      query = query.eq('status', filters.status)\n    }\n\n    if (filters?.limit)\
  \ {\n      query = query.limit(filters.limit)\n    }\n\n    const { data, error\
  \ } = await query\n\n    if (error) throw new Error(error.message)\n    return data\n\
  \  }\n\n  // Other methods...\n}\n```\n\n### Service Layer Pattern\n\n```typescript\n\
  // Business logic separated from data access\nclass MarketService {\n  constructor(private\
  \ marketRepo: MarketRepository) {}\n\n  async searchMarkets(query: string, limit:\
  \ number = 10): Promise<Market[]> {\n    // Business logic\n    const embedding\
  \ = await generateEmbedding(query)\n    const results = await this.vectorSearch(embedding,\
  \ limit)\n\n    // Fetch full data\n    const markets = await this.marketRepo.findByIds(results.map(r\
  \ => r.id))\n\n    // Sort by similarity\n    return markets.sort((a, b) => {\n\
  \      const scoreA = results.find(r => r.id === a.id)?.score || 0\n      const\
  \ scoreB = results.find(r => r.id === b.id)?.score || 0\n      return scoreA - scoreB\n\
  \    })\n  }\n\n  private async vectorSearch(embedding: number[], limit: number)\
  \ {\n    // Vector search implementation\n  }\n}\n```\n\n### Middleware Pattern\n\
